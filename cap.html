<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>pin capture</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  html,body{margin:0;padding:0;background:#fff;}
  #wrap{position:relative;width:1280px;}
  #wrap img{display:block;width:1280px;height:auto;}
  .cap-pin{position:absolute;transform:translate(-50%,-50%);width:25px;height:25px;border-radius:50%;
    background:#3182f6;color:#fff;font-family:'Pretendard',sans-serif;font-weight:800;font-size:13px;
    border:2.5px solid #fff;box-shadow:0 2px 7px rgba(49,130,246,.55);
    display:flex;align-items:center;justify-content:center;line-height:1;}
</style>
</head>
<body>
<div id="wrap"></div>
<script>
/* 핀 좌표(%) — pc 1280 기준 실측. description.html POS와 동일하게 유지 */
var POS = {
  home:{1:{x:5.86,y:19.02},2:{x:3.05,y:8.78},3:{x:23.67,y:8.41},4:{x:23.67,y:12.95},5:{x:23.67,y:26.92},6:{x:23.67,y:42.21},7:{x:23.67,y:66.28}},
  orders:{1:{x:23.67,y:6.89},2:{x:23.67,y:10.25},3:{x:23.67,y:17.91},4:{x:23.67,y:23.16},5:{x:82.66,y:27.93}},
  menu:{1:{x:23.52,y:7.02},2:{x:23.67,y:19.07},3:{x:23.67,y:24.54},4:{x:23.67,y:30.2},5:{x:78.05,y:52.42},6:{x:23.52,y:94.77}},
  overview:{1:{x:23.67,y:8.41},2:{x:23.67,y:12.66},3:{x:23.67,y:24.51},4:{x:23.67,y:33.58},5:{x:23.67,y:42.79}},
  'order-type':{1:{x:23.67,y:6.54},2:{x:23.67,y:9.72},3:{x:23.67,y:18.95},4:{x:23.67,y:33.47}},
  stock:{1:{x:23.52,y:16.46},2:{x:23.52,y:21.29},3:{x:23.67,y:29.99},4:{x:45.08,y:16.46},5:{x:23.67,y:85}}
};
var m = /[?&]key=([\w-]+)/.exec(location.search||'');
var key = m ? m[1] : 'home';
var wrap = document.getElementById('wrap');
var img = document.createElement('img'); img.src = 'desc/img/'+key+'.png';
wrap.appendChild(img);
var p = POS[key] || {};
Object.keys(p).forEach(function(n){
  var d = document.createElement('div'); d.className='cap-pin'; d.textContent=n;
  d.style.left = p[n].x+'%'; d.style.top = p[n].y+'%';
  wrap.appendChild(d);
});
</script>
</body>
</html>
