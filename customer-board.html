<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR오더 손님 화면 · 기획 주석 보드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink-1:#111827;--ink-2:#374151;--ink-3:#6B7280;--ink-4:#9CA3AF;
  --line:#E5E7EB;--bg:#F4F5F7;--white:#fff;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --green:#059669;--green-bg:#ECFDF5;
  --purple:#7C3AED;--purple-bg:#F5F3FF;
  --amber:#D97706;--amber-bg:#FFFBEB;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--ink-1);line-height:1.6;}

.topbar{background:#0F172A;color:#fff;padding:24px 32px;}
.topbar h1{font-size:22px;font-weight:800;}
.topbar p{font-size:13px;color:#94A3B8;margin-top:4px;}
.bar2{background:#fff;border-bottom:1px solid var(--line);padding:14px 32px;position:sticky;top:0;z-index:50;display:flex;gap:18px;flex-wrap:wrap;align-items:center;}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;}
.legend span{display:flex;align-items:center;gap:6px;color:var(--ink-2);}
.lg{width:12px;height:12px;border-radius:3px;}
.idx{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;}
.idx a{font-size:12px;color:var(--ink-3);text-decoration:none;padding:4px 9px;border-radius:6px;border:1px solid var(--line);}
.idx a:hover{color:var(--blue);border-color:var(--blue);}
.note-fig{font-size:12px;color:var(--ink-3);padding:12px 32px;background:#fff8e6;border-bottom:1px solid #ffe3a3;}

.wrap{padding:28px 32px 80px;}
.board{background:var(--white);border:1px solid var(--line);border-radius:16px;margin-bottom:26px;overflow:hidden;scroll-margin-top:80px;}
.board-h{padding:15px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.board-h .num{width:28px;height:28px;border-radius:7px;background:var(--ink-1);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.board-h .nm{font-size:16px;font-weight:800;}
.board-h .gp{font-size:12px;color:var(--ink-3);margin-left:2px;}
.board-b{display:grid;grid-template-columns:380px 1fr;gap:0;}
@media(max-width:880px){.board-b{grid-template-columns:1fr;}}
.stage{padding:22px;border-right:1px solid var(--line);background:#fafbfc;display:flex;justify-content:center;align-items:flex-start;}
@media(max-width:880px){.stage{border-right:none;border-bottom:1px solid var(--line);}}
.stage img{width:330px;max-width:100%;border:1px solid var(--line);border-radius:14px;display:block;box-shadow:0 6px 20px rgba(0,0,0,.08);}
.cards{padding:18px;display:flex;flex-direction:column;gap:12px;}

.pinrow{border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.pinrow-h{display:flex;align-items:center;gap:9px;padding:11px 14px;background:#fafbfc;border-bottom:1px solid var(--line);}
.pinrow-h .pn{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.pinrow-h .pt{font-size:13.5px;font-weight:700;}
.cat4{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);}
@media(max-width:520px){.cat4{grid-template-columns:1fr;}}
.cat{background:#fff;padding:10px 13px;}
.cat .ct{font-size:10.5px;font-weight:800;letter-spacing:.03em;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.cat.p .ct{color:var(--blue);} .cat.b .ct{color:var(--green);}
.cat.d .ct{color:var(--purple);} .cat.e .ct{color:var(--amber);}
.cat ul{list-style:none;display:flex;flex-direction:column;gap:3px;}
.cat li{font-size:11.5px;color:var(--ink-2);padding-left:9px;position:relative;line-height:1.5;}
.cat li::before{content:'·';position:absolute;left:0;}
.cat.p li::before{color:var(--blue);} .cat.b li::before{color:var(--green);}
.cat.d li::before{color:var(--purple);} .cat.e li::before{color:var(--amber);}
.cat.empty{background:#fcfcfd;}
.cat.empty li{color:var(--ink-4);}
</style>
</head>
<body>

<div class="topbar">
  <h1>QR오더 손님 화면 · 기획 주석 보드</h1>
  <p>customer.html 사용자 흐름 순서 · 화면별 번호 핀(이미지 합성) + 4분류 카드 · Figma(html.to.design)용</p>
</div>
<div class="note-fig">💡 Figma 활용: 핀은 캡처 이미지에 합성되어 있어 크기를 키워도 좌표가 틀어지지 않습니다. 이 페이지 URL을 html.to.design으로 가져오세요.</div>
<div class="bar2">
  <div class="legend">
    <span><span class="lg" style="background:var(--blue)"></span>기능·목적</span>
    <span><span class="lg" style="background:var(--green)"></span>동작·상태값</span>
    <span><span class="lg" style="background:var(--purple)"></span>데이터·연동</span>
    <span><span class="lg" style="background:var(--amber)"></span>예외·UX문구</span>
  </div>
  <div class="idx" id="idx"></div>
</div>

<div class="wrap" id="boards"></div>

function catBlock(cls, meta, items){
  const empty = (!items || !items.length || (items.length===1 && items[0]==='—'));
  return `<div class="cat ${cls}${empty?' empty':''}">
    <div class="ct">${meta.t}</div>
    <ul>${(items||['—']).map(i=>`<li>${i}</li>`).join('')}</ul>
  </div>`;
}
function render(){
  document.getElementById('boards').innerHTML = SCREENS.map(s=>{
    const cards = s.pins.map(pin=>`
      <div class="pinrow">
        <div class="pinrow-h"><span class="pn">${pin.n}</span><span class="pt">${pin.title}</span></div>
        <div class="cat4">
          ${catBlock('p',C.p,pin.p)}
          ${catBlock('b',C.b,pin.b)}
          ${catBlock('d',C.d,pin.d)}
          ${catBlock('e',C.e,pin.e)}
        </div>
      </div>`).join('');
    return `<div class="board" id="b-${s.key}">
      <div class="board-h"><span class="num">${s.ord}</span><span class="nm">${s.icon} ${s.name}</span><span class="gp">· ${s.group}</span></div>
      <div class="board-b">
        <div class="stage"><img src="desc/img/cust-${s.key}_pin.png" alt="${s.name}" loading="lazy"></div>
        <div class="cards">${cards}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('idx').innerHTML = SCREENS.map(s=>`<a href="#b-${s.key}">${s.ord}. ${s.name}</a>`).join('');
}
render();
</script>
</body>
</html>
