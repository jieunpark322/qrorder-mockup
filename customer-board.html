<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR오더 손님 화면 · 기획 주석 보드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="desc/cust-board.css">
</head>
<body>
<div class="topbar">
  <h1>QR오더 손님 화면 · 기획 주석 보드</h1>
  <p>customer.html 사용자 흐름 순서 · 화면별 번호 핀(이미지 합성) + 4분류 카드 · Figma(html.to.design)용</p>
</div>
<div class="note-fig">💡 Figma 활용: 핀은 캡처 이미지에 합성되어 있어 크기를 키워도 좌표가 틀어지지 않습니다. 화면별로 따로 가져가려면 <b>desc/cust-boards/</b> 의 개별 파일 URL을 사용하세요.</div>
<div class="bar2">
  <div class="legend">
    <span><span class="lg" style="background:var(--blue)"></span>기능·목적</span>
    <span><span class="lg" style="background:var(--green)"></span>동작·상태값</span>
    <span><span class="lg" style="background:var(--purple)"></span>데이터·연동</span>
    <span><span class="lg" style="background:var(--amber)"></span>예외·UX문구</span>
  </div>
  <div class="idx" id="idx"></div>
</div>
<div class="wrap" id="boards"></div>
<script src="desc/cust-board-data.js"></script>
<script>renderCustBoards({mount:'boards', idxMount:'idx', imgBase:'desc/img/'});</script>
</body>
