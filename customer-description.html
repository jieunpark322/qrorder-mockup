<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR오더 손님 화면 · 기획 주석 보드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink-1:#111827; --ink-2:#374151; --ink-3:#6B7280; --ink-4:#9CA3AF;
  --line:#E5E7EB; --bg:#F9FAFB; --white:#FFFFFF;
  --blue:#2563EB; --blue-bg:#EFF6FF;
  --green:#059669; --green-bg:#ECFDF5;
  --purple:#7C3AED; --purple-bg:#F5F3FF;
  --amber:#D97706; --amber-bg:#FFFBEB;
  --phone-w:165px; --phone-h:314px;
  --scale:0.44; --iframe-w:375px; --iframe-h:714px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  background:var(--bg);color:var(--ink-1);
  display:flex;min-height:100vh;
}

/* ── SIDEBAR ── */
.sidebar{
  width:196px;flex-shrink:0;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:var(--white);border-right:1px solid var(--line);
  padding:20px 0;
}
.sidebar-logo{
  font-size:13px;font-weight:700;color:var(--ink-1);
  padding:0 16px 4px;
}
.sidebar-logo span{font-weight:400;color:var(--ink-3);}
.sidebar-divider{height:1px;background:var(--line);margin:12px 0;}
.sidebar-label{
  font-size:10px;font-weight:700;color:var(--ink-4);
  letter-spacing:.08em;text-transform:uppercase;
  padding:0 16px 8px;
}
.sidebar-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;font-size:13px;color:var(--ink-2);
  text-decoration:none;cursor:pointer;
}
.sidebar-item:hover{background:var(--bg);}
.sidebar-item.active{color:var(--blue);font-weight:600;background:var(--blue-bg);}
.snum{
  width:20px;height:20px;border-radius:4px;
  background:var(--line);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--ink-3);
}
.sidebar-item.active .snum{background:var(--blue);color:white;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:32px 32px 80px;}
.page-header{margin-bottom:36px;}
.page-header h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.page-header p{font-size:13px;color:var(--ink-3);}

/* ── BOARD ── */
.board{
  background:var(--white);border:1px solid var(--line);
  border-radius:12px;margin-bottom:28px;overflow:hidden;
}
.board-header{
  padding:14px 20px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
}
.board-num{
  width:28px;height:28px;background:var(--ink-2);color:white;
  border-radius:6px;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.board-title{font-size:15px;font-weight:700;}
.board-sub{font-size:12px;color:var(--ink-3);margin-left:2px;}
.board-body{
  display:grid;grid-template-columns:1fr 360px;
}

/* ── STAGE (phones) ── */
.stage-area{
  padding:20px;border-right:1px solid var(--line);
  overflow-x:auto;
}
.phones-row{display:flex;gap:14px;align-items:flex-start;}
.phone-col{
  display:flex;flex-direction:column;align-items:center;
  gap:7px;flex-shrink:0;
}
.variant-label{
  font-size:10px;font-weight:600;color:var(--ink-3);
  text-align:center;max-width:var(--phone-w);line-height:1.3;
  background:var(--line);padding:3px 8px;border-radius:4px;
  white-space:pre-line;
}
.phone-chrome{
  width:var(--phone-w);height:var(--phone-h);
  border:2px solid var(--ink-2);border-radius:14px;
  overflow:hidden;background:white;flex-shrink:0;
}
.phone-chrome iframe{
  width:var(--iframe-w);height:var(--iframe-h);
  transform:scale(var(--scale));transform-origin:top left;
  border:none;pointer-events:none;
}

/* ── CARDS ── */
.cards-area{
  padding:14px;overflow-y:auto;
  display:flex;flex-direction:column;gap:9px;
}
.card{border-radius:8px;padding:10px 12px;border:1px solid transparent;}
.card.purpose  {background:var(--blue-bg);  border-color:#BFDBFE;}
.card.behavior {background:var(--green-bg); border-color:#A7F3D0;}
.card.data     {background:var(--purple-bg);border-color:#DDD6FE;}
.card.exception{background:var(--amber-bg); border-color:#FDE68A;}
.card-head{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.pin-b{
  width:18px;height:18px;border-radius:50%;
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.purpose  .pin-b{background:var(--blue);  color:white;}
.behavior .pin-b{background:var(--green); color:white;}
.data     .pin-b{background:var(--purple);color:white;}
.exception .pin-b{background:var(--amber);color:white;}
.cat-tag{
  font-size:9px;font-weight:700;letter-spacing:.05em;
  padding:1px 5px;border-radius:3px;
}
.purpose  .cat-tag{color:var(--blue);  background:#DBEAFE;}
.behavior .cat-tag{color:var(--green); background:#D1FAE5;}
.data     .cat-tag{color:var(--purple);background:#EDE9FE;}
.exception .cat-tag{color:var(--amber);background:#FEF3C7;}
.card-title{font-size:12px;font-weight:600;color:var(--ink-1);margin-bottom:4px;}
.card-body{list-style:none;display:flex;flex-direction:column;gap:2px;}
.card-body li{
  font-size:11px;color:var(--ink-2);
  padding-left:8px;position:relative;line-height:1.5;
}
.card-body li::before{content:'·';position:absolute;left:0;}
.purpose  .card-body li::before{color:var(--blue);}
.behavior .card-body li::before{color:var(--green);}
.data     .card-body li::before{color:var(--purple);}
.exception .card-body li::before{color:var(--amber);}
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">QR오더 <span>손님 화면</span></div>
  <div class="sidebar-divider"></div>
  <div class="sidebar-label">화면 목록</div>
</nav>

<main class="main" id="main">
  <div class="page-header">
    <h1>QR오더 손님 화면 · 기획 주석 보드</h1>

  </div>
  <div id="boards"></div>
</main>

  },
  {
    id:'b8', num:'08', title:'세션 만료',
    sub:'QR 유효 시간(5분) 초과 시 접속 차단 화면',
    variants:[
      {label:'세션 만료', url:'customer.html?screen=session'},
    ],
    pins:[
      {n:1, cat:'purpose',   title:'세션 만료 안내',
       items:['타이머(5분) 종료 시 자동으로 S.screen=session 전환','QR 재스캔으로만 새 세션 시작 가능']},
      {n:2, cat:'exception', title:'기획 보드 iframe 예외',
       items:['window.self !== window.top 조건으로 타이머·Alert 미동작 처리','description 보드 내 iframe에서는 세션 타이머 비활성화']},
    ],
  },
];

const CAT_META = {
  purpose:  {icon:'🎯', label:'목적',   cls:'purpose'},
  behavior: {icon:'⚙️', label:'동작',   cls:'behavior'},
  data:     {icon:'🗄️', label:'데이터', cls:'data'},
  exception:{icon:'⚠️', label:'예외',   cls:'exception'},
};

function buildBoard(s) {
  const phones = s.variants.map(v=>{
    const src = v.url + (v.url.includes('?')?'&':'?') + 'cap=1';  // 데모(시뮬레이터)바 숨김
    return `
    <div class="phone-col">
      <div class="variant-label">${v.label}</div>
      <div class="phone-chrome">
        <iframe src="${src}" loading="lazy" title="${v.label}"></iframe>
      </div>
    </div>`;}).join('');

  const cards = s.pins.map(p=>{
    const m = CAT_META[p.cat]||CAT_META.purpose;
    return `
    <div class="card ${m.cls}">
      <div class="card-head">
        <span class="pin-b">${p.n}</span>
        <span class="cat-tag">${m.icon} ${m.label}</span>
      </div>
      <div class="card-title">${p.title}</div>
      <ul class="card-body">${p.items.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>`;
  }).join('');

  return `
  <div class="board" id="${s.id}">
    <div class="board-header">
      <span class="board-num">${s.num}</span>
      <span class="board-title">${s.title}</span>
      <span class="board-sub">· ${s.sub}</span>
    </div>
    <div class="board-body">
      <div class="stage-area"><div class="phones-row">${phones}</div></div>
      <div class="cards-area">${cards}</div>
    </div>
  </div>`;
}

document.getElementById('boards').innerHTML = SCREENS.map(buildBoard).join('');

document.getElementById('sidebar').innerHTML +=
  SCREENS.map(s=>`
    <a class="sidebar-item" href="#${s.id}">
      <span class="snum">${s.num}</span>${s.title}
    </a>`).join('');

const main = document.getElementById('main');
const sideItems = ()=>document.querySelectorAll('.sidebar-item');
main.addEventListener('scroll',()=>{
  let cur='';
  document.querySelectorAll('.board').forEach(b=>{
    if(b.offsetTop - 60 <= main.scrollTop) cur = b.id;
  });
  sideItems().forEach(i=>i.classList.toggle('active', i.getAttribute('href')==='#'+cur));
});
</script>
</body>
</html>
