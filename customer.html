<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>소프트커피 합정점 · QR 주문</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --blue:#5C8CDA; --blue-d:#3a6fc9; --blue-50:#eef4fd;
    --ink:#191f28; --ink2:#4e5968; --ink3:#8b95a1; --ink4:#b0b8c1;
    --line:#e5e8eb; --line2:#f1f3f5; --bg:#f2f4f6; --card:#fff;
    --green:#64C8BE; --red:#e03131; --amber:#f59f00;
    --coffee1:#4a2f1c; --coffee2:#8a5a36;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:#cfd4da;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:16px;letter-spacing:-.01em;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;}

  .demobar{width:100%;z-index:100;background:#191f28;color:#fff;
    display:flex;align-items:center;gap:7px;justify-content:center;padding:8px 12px;flex-wrap:wrap;font-size:11px;}
  .demobar .lbl{font-weight:800;color:#ffd43b;letter-spacing:.02em;margin-right:2px;}
  .ds-chip{font-size:11px;font-weight:700;color:#ced4da;background:#343a40;border:1px solid #495057;border-radius:20px;padding:5px 11px;cursor:pointer;font-family:inherit;}
  .ds-chip.on{background:#fff;color:#191f28;border-color:#fff;}
  .ds-div{font-size:10px;color:#868e96;font-weight:700;margin-left:8px;}
  .ds-chip.dis{opacity:.4;}

  .device{width:100%;max-width:440px;background:var(--bg);min-height:calc(100vh - 46px);position:relative;
    box-shadow:0 0 0 1px rgba(0,0,0,.04),0 18px 50px rgba(0,0,0,.22);overflow:hidden;}
  @media(min-width:480px){ .device{border-radius:28px;margin-bottom:22px;min-height:calc(100vh - 90px);} }
  .scroll{padding-bottom:120px;}

  .cover{aspect-ratio:16/9;min-height:210px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--coffee1) 0%,var(--coffee2) 70%,#b07d4f 100%);background-size:cover;background-position:center;background-repeat:no-repeat;}
  .cover::after{content:'';position:absolute;inset:0;background:radial-gradient(120% 90% at 25% 18%,rgba(255,255,255,.22),transparent 55%);}
  .cover .ctag{position:absolute;top:10px;left:12px;z-index:2;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.32);padding:3px 9px;border-radius:20px;}
  .cover-badge{position:absolute;top:12px;right:12px;z-index:3;display:inline-flex;align-items:center;gap:5px;max-width:calc(100% - 24px);font-size:12px;font-weight:800;color:#fff;background:rgba(0,0,0,.46);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);padding:7px 12px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.18);white-space:nowrap;}
  .cover-badge .btable{color:#fff;}
  /* 대표 이미지 캐러셀 (최대 3장 자동 전환) */
  .cover-slides{position:absolute;inset:0;}
  .cover-slide{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0;transition:opacity .9s ease;}
  .cover-slide.on{opacity:1;}
  .cover-dots{position:absolute;bottom:42px;right:14px;display:flex;gap:5px;z-index:4;}
  .cover-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.55);transition:.3s;}
  .cover-dot.on{width:16px;border-radius:3px;background:#fff;}
  /* 메뉴 검색 */
  .searchwrap{background:#fff;padding:12px 14px 2px;}
  .searchbar{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--line);border-radius:13px;padding:14px 15px;transition:border-color .15s;}
  .searchbar.focus{border-color:var(--blue);background:#fff;}
  .searchbar .ic{font-size:18px;line-height:1;flex-shrink:0;}
  .searchbar input{flex:1;min-width:0;border:none;background:none;font-size:16.5px;font-family:inherit;color:var(--ink);outline:none;}
  .searchbar .clr{border:none;background:var(--ink4);color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;}
  .search-empty{text-align:center;color:var(--ink3);font-size:15px;line-height:1.7;padding:46px 20px;}
  .origin-note{font-size:12.5px;color:var(--ink4);margin-top:12px;line-height:1.55;}
  .origin-text{white-space:pre-line;font-size:14.5px;color:var(--ink);line-height:1.8;}
  /* 로고만 커버에 살짝 겹치고, 매장명·상태는 흰 배경 위에 배치(겹침 방지) */
  .brandinfo{padding:0 18px;margin-top:-32px;position:relative;z-index:3;}
  .logo{width:72px;height:72px;border-radius:18px;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.18);
    display:flex;align-items:center;justify-content:center;font-size:36px;border:3px solid #fff;}
  .brow{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:12px;}
  .binfo{min-width:0;}
  .histbtn{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;color:var(--blue-d);background:var(--blue-50);border:1px solid #c5d8f5;border-radius:20px;padding:8px 13px;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .histbtn:active{transform:scale(.97);}
  .histbtn .hist-cnt{background:var(--blue);color:#fff;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
  .hist-card{border:1px solid var(--line);border-radius:13px;padding:14px;margin-top:14px;}
  .hist-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .hist-round{font-size:15px;font-weight:800;color:var(--blue-d);background:var(--blue-50);padding:4px 11px;border-radius:8px;}
  .hist-meta{font-size:12.5px;color:var(--ink3);font-weight:600;}
  .hist-line{display:flex;justify-content:space-between;gap:10px;font-size:14px;padding:5px 0;color:var(--ink2);}
  .hist-opt{color:var(--ink4);font-size:12px;}
  .hist-tot{display:flex;justify-content:space-between;font-size:15px;font-weight:800;border-top:1px solid var(--line2);margin-top:8px;padding-top:9px;}
  .bstore{font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--ink);}
  .bstatus{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-top:6px;}
  .bstatus .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .bstatus.open{color:var(--green);}
  .bstatus.open .sdot{background:var(--green);box-shadow:0 0 0 3px rgba(100,200,190,.2);}
  .bstatus.closed{color:var(--red);}
  .bstatus.closed .sdot{background:var(--red);box-shadow:0 0 0 3px rgba(224,49,49,.15);}
  .bsub{padding:13px 18px 0;}
  .bmode{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--blue-d);background:var(--blue-50);padding:7px 13px;border-radius:20px;}
  .btable{font-weight:800;color:var(--ink);}
  .bintro{font-size:14px;color:var(--ink3);margin-top:10px;line-height:1.6;}
  .bamen{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
  .bamen span{font-size:12.5px;font-weight:600;color:var(--ink2);background:var(--bg);border:1px solid var(--line);padding:5px 10px;border-radius:8px;}

  .maintabs{position:sticky;top:0;z-index:18;background:#fff;display:flex;border-bottom:1px solid var(--line);margin-top:14px;}
  .maintab{flex:1;padding:15px 0;font-size:16px;font-weight:700;color:var(--ink3);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:inherit;}
  .maintab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:800;}
  .cattabs-wrap{position:sticky;top:54px;z-index:15;background:#fff;border-bottom:1px solid var(--line);}
  .cattabs-wrap::after{content:'';position:absolute;top:0;right:0;bottom:1px;width:42px;background:linear-gradient(90deg,rgba(255,255,255,0),#fff 72%);pointer-events:none;opacity:1;transition:opacity .2s;}
  .cattabs-wrap.at-end::after{opacity:0;}
  .cattabs{display:flex;gap:7px;padding:12px 14px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
  .cattabs::-webkit-scrollbar{display:none;}
  .cattab{flex-shrink:0;font-size:15px;font-weight:700;color:var(--ink3);padding:9px 16px;border-radius:20px;background:var(--bg);border:none;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .cattab.on{background:var(--blue);color:#fff;font-weight:800;}
  .cattab-ic{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-family:inherit;}
  .cattab-ic.on{background:var(--blue);color:#fff;}
  /* 탭(메뉴/리뷰/매장정보) 전환 슬라이딩 */
  @keyframes tabSlide{from{opacity:0;transform:translateX(var(--tab-dx,20px));}to{opacity:1;transform:translateX(0);}}
  .tab-anim{animation:tabSlide .28s cubic-bezier(.22,.61,.36,1);}

  .notice{margin:12px 14px 0;display:flex;gap:9px;align-items:flex-start;border-radius:11px;padding:13px 14px;font-size:14px;line-height:1.6;}
  .notice.blue{background:var(--blue-50);border:1px solid #c5d8f5;color:var(--blue-d);}
  .notice.amber{background:#fff8e6;border:1px solid #ffe3a3;color:#92400e;}
  .notice.red{background:#fff0f0;border:1px solid #ffc9c9;color:#c92a2a;}

  /* 영업 종료 배너 */
  .closed-banner{margin:12px 14px 0;display:flex;gap:9px;align-items:center;background:#fff0f0;border:1.5px solid #ffa8a8;border-radius:11px;padding:14px 15px;font-size:14.5px;font-weight:700;color:#c92a2a;}
  /* 카카오 알림톡 강조 (카톡 연상 노랑 + 말풍선 아이콘) */
  .kakao-note{margin:12px 14px 0;display:flex;gap:11px;align-items:center;background:#FEE500;border-radius:13px;padding:14px 15px;font-size:14.5px;font-weight:700;color:#3c1e1e;line-height:1.5;box-shadow:0 3px 12px rgba(254,229,0,.55);}
  .kakao-note .kic{width:30px;height:30px;border-radius:9px;background:#3c1e1e;color:#FEE500;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .kakao-note b{color:#1c1714;}

  .catsec-h{padding:18px 18px 8px;font-size:16.5px;font-weight:800;}
  .mcard{display:flex;gap:14px;padding:15px 16px;background:#fff;cursor:pointer;border-bottom:1px solid var(--line2);width:100%;border:none;font-family:inherit;text-align:left;align-items:center;position:relative;}
  .mcard:active{background:var(--bg);}
  .mcard.out .mname,.mcard.out .mprice{color:var(--ink3);}
  .mcard.closed-mode .mplus{background:var(--line2);color:var(--ink4);}
  .mcard.hh-active{background:#fffef7;}
  /* 품절 이미지 오버레이 (dimming + 대각선 글자) */
  .soldout{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:2;}
  .soldout span{color:#fff;font-weight:800;letter-spacing:1px;white-space:nowrap;transform:rotate(-30deg);text-shadow:0 1px 4px rgba(0,0,0,.5);}
  .mimg .soldout span{font-size:15px;}
  .sheet-img .soldout span{font-size:42px;}
  .mimg{font-size:38px;width:88px;height:64px;display:flex;align-items:center;justify-content:center;background:var(--line2);border-radius:12px;flex-shrink:0;position:relative;overflow:hidden;}
  .mimg img,.ci-img img,.sheet-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
  .minfo{flex:1;min-width:0;}
  .mname{font-size:16.5px;font-weight:800;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .badge-out{display:inline-flex;align-items:center;font-size:10px;font-weight:700;color:var(--red);background:#fff0f0;padding:1px 6px;border-radius:5px;margin-left:5px;vertical-align:middle;}
  /* 메뉴 배지 — 1개 · 아주 작게 */
  .mbadge{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;vertical-align:middle;white-space:nowrap;}
  .mbadge.happy{background:rgba(255,212,59,.22);color:#7a5900;}
  /* 이미지 왼쪽 상단 오버레이 배지 */
  .img-badges{position:absolute;top:5px;left:5px;z-index:3;display:flex;flex-direction:column;gap:3px;}
  .img-badge{display:inline-flex;align-items:center;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:5px;line-height:1.5;white-space:nowrap;}
  .img-badge.hot{background:#e8590c;color:#fff;}
  .img-badge.reco{background:#f59f00;color:#fff;}
  .img-badge.new{background:#1971c2;color:#fff;}
  .mdesc{font-size:13px;color:var(--ink3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mprice{font-size:16.5px;font-weight:800;margin-top:5px;display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;}
  .mprice .ori{font-size:12px;color:var(--ink4);font-weight:500;text-decoration:line-through;}
  .mprice .disc{color:var(--red);}
  .mprice .stk{font-size:11.5px;font-weight:600;color:var(--amber);}
  .mplus{flex-shrink:0;align-self:center;width:36px;height:36px;border-radius:50%;background:var(--blue-50);color:var(--blue);font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  /* 장바구니 바 + 담기 애니메이션 */
  .cartbar{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:calc(100% - 28px);max-width:412px;z-index:40;}
  .cartbtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:15px;padding:17px 18px;font-size:17.5px;font-weight:800;display:flex;align-items:center;gap:11px;cursor:pointer;box-shadow:0 8px 22px rgba(92,140,218,.32);font-family:inherit;transition:transform .1s;}
  .cartbtn .cnt{background:#fff;color:var(--blue);min-width:26px;height:26px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:14.5px;transition:transform .15s,background .15s,color .15s;}
  .cartbtn .amt{margin-left:auto;}
  .cartbtn:active{transform:scale(.99)!important;}
  @keyframes cartBounce{0%{transform:translateX(-50%) scale(1);}18%{transform:translateX(-50%) scale(1.04);}36%{transform:translateX(-50%) scale(.97);}54%{transform:translateX(-50%) scale(1.02);}72%{transform:translateX(-50%) scale(.99);}100%{transform:translateX(-50%) scale(1);}}
  @keyframes cntPop{0%{transform:scale(1);}35%{transform:scale(1.5);background:var(--green);color:#fff;}70%{transform:scale(.92);}100%{transform:scale(1);}}
  .cartbar.bounce{animation:cartBounce .5s ease;}
  .cartbar.bounce .cnt{animation:cntPop .5s ease;}

  /* 플로팅 버튼 스택 (스크롤 탑 + 직원 호출) */
  .fab-stack{position:fixed;right:16px;bottom:22px;z-index:39;display:flex;flex-direction:column;align-items:flex-end;gap:11px;transition:bottom .22s ease;}
  .fab-stack.lifted{bottom:92px;}
  @media(min-width:480px){.fab-stack{right:calc(50% - 220px + 16px);}}
  .staff-fab{display:none;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:66px;height:66px;border-radius:50%;background:var(--blue);color:#fff;border:none;box-shadow:0 6px 18px rgba(92,140,218,.4);cursor:pointer;font-family:inherit;padding:0;}
  .staff-fab.show{display:flex;}
  .staff-fab:active{transform:scale(.95);}
  .staff-fab .fi{font-size:28px;line-height:1;}
  .staff-fab .ft{font-size:12px;font-weight:800;line-height:1.05;letter-spacing:-.03em;white-space:nowrap;}

  .topbar{position:sticky;top:0;z-index:20;background:var(--blue);color:#fff;display:flex;align-items:center;gap:10px;padding:15px 16px;}
  .topbar .back{font-size:23px;background:none;border:none;cursor:pointer;color:#fff;padding:2px 4px;margin-left:-4px;}
  .topbar .ttl{font-size:18px;font-weight:800;color:#fff;}
  .topbar .sub{font-size:12.5px;color:rgba(255,255,255,.72);font-weight:600;}

  /* 공통 바텀시트 */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:none;}
  .sheet-bg.on{display:block;}
  .sheet{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:440px;background:#fff;border-radius:22px 22px 0 0;max-height:88%;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;animation:slideup .22s ease;}
  body.scroll-locked{position:fixed;left:0;right:0;width:100%;overflow:hidden;}
  @keyframes slideup{from{transform:translate(-50%,100%);}to{transform:translate(-50%,0);}}
  .sheet-close{position:absolute;top:12px;right:12px;z-index:6;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;border:none;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
  .sheet-close:active{transform:scale(.92);}
  .sheet-img{position:relative;overflow:hidden;height:172px;background:var(--line2);display:flex;align-items:center;justify-content:center;font-size:60px;}
  .sheet-body{padding:18px 18px 12px;}
  .sheet-name{font-size:22px;font-weight:800;}
  .sheet-desc{font-size:14.5px;color:var(--ink3);margin-top:5px;line-height:1.55;}
  .sheet-base{font-size:18px;font-weight:800;margin-top:9px;}
  .optg{margin-top:22px;}
  .optg-h{font-size:16px;font-weight:800;display:flex;align-items:center;gap:7px;margin-bottom:10px;}
  .req{font-size:11px;font-weight:800;color:#e03131;background:#fff0f0;padding:3px 8px;border-radius:5px;}
  .opt-pick{font-size:11.5px;color:var(--ink3);font-weight:600;}
  .optrow{display:flex;align-items:center;gap:12px;padding:14px 14px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:9px;cursor:pointer;transition:.12s;}
  .optrow.sel{border-color:var(--blue);background:var(--blue-50);}
  .optck{width:23px;height:23px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
  .optrow.multi .optck{border-radius:6px;}
  .optrow.sel .optck{background:var(--blue);border-color:var(--blue);}
  .opt-nm{font-size:16px;font-weight:600;flex:1;}
  .opt-step{margin-left:12px;flex-shrink:0;}
  .opt-pr{font-size:15px;color:var(--ink2);font-weight:700;}
  .qtyrow{display:flex;align-items:center;justify-content:space-between;margin-top:24px;padding-top:18px;border-top:1px solid var(--line2);}
  .qtyrow .lbl{font-size:17px;font-weight:800;}
  .stepper{display:flex;align-items:center;gap:18px;}
  .stepper button{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:22px;cursor:pointer;color:var(--ink);font-family:inherit;}
  .stepper .n{font-size:19px;font-weight:800;min-width:22px;text-align:center;}
  .sheet-foot{position:sticky;bottom:0;background:#fff;padding:14px 18px 18px;border-top:1px solid var(--line2);}
  .addbtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:14px;padding:17px;font-size:17.5px;font-weight:800;cursor:pointer;display:flex;justify-content:center;gap:8px;font-family:inherit;}
  .addbtn:active{transform:scale(.99);}

  /* 장바구니 팝업 시트 전용 */
  .cart-sheet-handle{width:36px;height:4px;background:var(--line);border-radius:4px;margin:12px auto 4px;}
  .cart-sheet-hdr{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line2);}
  .cart-sheet-hdr .ttl{font-size:18px;font-weight:800;}
  .cart-sheet-hdr .cnt-badge{font-size:13.5px;font-weight:800;color:var(--blue);background:var(--blue-50);padding:4px 11px;border-radius:20px;}
  .cart-sheet-body{padding:0 18px;}
  .cs-item{display:flex;gap:12px;padding:15px 0;border-bottom:1px solid var(--line2);align-items:flex-start;}
  .cs-item:last-child{border-bottom:none;}

function pic(emoji, photo){ return emoji + (photo?`<img src="${photo}" loading="lazy" onerror="this.remove()" alt="">`:''); }

function soldoutOverlay(){ return '<span class="soldout"><span>품절</span></span>'; }
function imgBox(cls, emoji, photo, soldout){
  if(!photo) return '';
  return `<span class="${cls}">${pic(emoji, photo)}${soldout?soldoutOverlay():''}</span>`;
}

/* --- 플로팅 버튼(직원 호출 / 위로) 표시·위치 --- */
function syncFabs(){
  const onMenu = S.screen==='menu' && S.tab==='menu';
  // 직원 호출: 서빙 매장(dinein+server) + 영업중 + 메뉴 화면에서만
  const showStaff = onMenu && S.orderType==='dinein' && S.serve==='server' && S.businessOpen;
  const fab=$('staffFab'); if(fab) fab.classList.toggle('show', showStaff);
  // 장바구니 바가 떠 있으면 플로팅 버튼을 위로 띄움
  const cartVisible = onMenu && S.cart.length>0 && S.businessOpen;
  const stack=$('fabStack'); if(stack) stack.classList.toggle('lifted', cartVisible);
}

function applyCover(){
  const slides=document.querySelectorAll('.cover-slide');
  const dots=document.querySelectorAll('.cover-dot');
  if(!slides.length) return;
  const i=_coverIdx%slides.length;
  slides.forEach((s,k)=>s.classList.toggle('on',k===i));
  dots.forEach((d,k)=>d.classList.toggle('on',k===i));
}
function ensureCover(){
  applyCover();
  if(_coverTimer) return;
  _coverTimer=setInterval(()=>{
    const slides=document.querySelectorAll('.cover-slide');
    if(slides.length<2) return;
    _coverIdx=(_coverIdx+1)%slides.length; applyCover();
  },3500);
}

/* --- 카테고리 = 해당 섹션으로 스크롤 (잘라내기 X) --- */
function stickyOffset(){
  const mt=document.querySelector('.maintabs'), ct=document.querySelector('.cattabs-wrap');
  return (mt?mt.offsetHeight:0)+(ct?ct.offsetHeight:0)+4;
}
function scrollToSec(id){
  const el=document.getElementById(id);
  if(el){ const y=el.getBoundingClientRect().top+window.scrollY-stickyOffset(); window.scrollTo({top:Math.max(0,y),behavior:'smooth'}); }
  _lastActiveSec=id; setActiveChip(id,true);
}
let _lastActiveSec=null;
function setActiveChip(id,center){
  const tabs=$('cattabs'); if(!tabs) return;
  let activeEl=null;
  tabs.querySelectorAll('.cattab').forEach(b=>{ const on=b.getAttribute('data-sec')===id; b.classList.toggle('on',on); if(on) activeEl=b; });
  // 가로 탭 컨테이너만 스크롤(세로 페이지 스크롤은 건드리지 않음)
  if(center&&activeEl){
    const cRect=tabs.getBoundingClientRect(), aRect=activeEl.getBoundingClientRect();
    const target=tabs.scrollLeft + (aRect.left-cRect.left) - tabs.clientWidth/2 + aRect.width/2;
    tabs.scrollTo({left:Math.max(0,target), behavior:'smooth'});
  }
}
function updateCatFade(){
  const tabs=$('cattabs'), wrap=document.querySelector('.cattabs-wrap');
  if(!tabs||!wrap) return;
  const atEnd = tabs.scrollLeft + tabs.clientWidth >= tabs.scrollWidth - 2;
  wrap.classList.toggle('at-end', atEnd);
}
function setupScrollSpy(){
  window.onscroll=()=>{
    if(S.screen!=='menu'||S.tab!=='menu') return;
    const secs=[...document.querySelectorAll('#menuResults [id^="sec-"]')];
    if(!secs.length) return;
    const off=stickyOffset()+8; let cur=secs[0].id;
    for(const s of secs){ if(s.getBoundingClientRect().top<=off) cur=s.id; }
    if(cur!==_lastActiveSec){ _lastActiveSec=cur; setActiveChip(cur,true); }
  };
}
function setCard(s){
  const isOut = s.status==='품절';
  return `
    <button class="mcard ${!S.businessOpen?'closed-mode':''}" style="${isOut?'opacity:.55;':''}" onclick="${isOut?`toast('품절된 세트예요')`:`openSet(${s.id})`}">
      <span class="mimg">${pic(s.img, PHOTO['set'+s.id])}</span>
      <span class="minfo">
        <span class="mname">${s.name} ${isOut?'<span style="color:var(--red);font-size:10px;font-weight:700;background:#fef2f2;padding:1px 6px;border-radius:4px;margin-left:2px;">품절</span>':''}</span>
        <span class="mprice" style="display:block;">${won(s.base)}원~ <span style="font-size:11px;color:var(--ink4);font-weight:500;">구성 선택</span></span>
      </span>
      ${(!isOut && S.businessOpen)?'<span class="mplus">+</span>':''}
    </button>`;
}
function menuResultsHtml(){
  const q=(S.search||'').trim().toLowerCase();
  if(q){
    const sets=SETS.filter(s=>s.status!=='숨김'&&(s.name+' '+(s.desc||'')+' '+(s.cat||'')).toLowerCase().includes(q));
    const items=visibleMenu().filter(m=>(m.name+' '+(m.desc||'')+' '+m.cat).toLowerCase().includes(q));
    if(!sets.length && !items.length)
      return `<div class="search-empty">🔍 ‘${S.search.trim()}’ 검색 결과가 없어요.<br>다른 키워드로 찾아보세요.</div>`;
    const merged = [...sets.map(s=>({_set:true,row:s,name:s.name})), ...items.map(m=>({_set:false,row:m,name:m.name}))];
    return `<div style="padding-top:4px;"><div class="catsec-h">검색 결과 ${merged.length}개</div>${merged.map(x=>x._set?setCard(x.row):menuCard(x.row)).join('')}</div>`;
  }
  // 검색 안 할 때 — 카테고리별로 단품 + 세트를 함께 노출
  let html=`<div style="padding-top:4px;">`;
  CATS.forEach((cat,ci)=>{
    const items=visibleMenu().filter(m=>m.cat===cat);
    const sets=SETS.filter(s=>s.status!=='숨김'&&s.cat===cat);
    if(!items.length && !sets.length) return;
    html+=`<div id="sec-${ci+1}"><div class="catsec-h">${cat}</div>${sets.map(setCard).join('')}${items.map(menuCard).join('')}</div>`;
  });
  return html+`</div>`;
}
function mainTabs(){
  return `<div class="maintabs">${[['menu','🍽️ 메뉴'],['review','⭐ 리뷰'],['info','🏪 매장정보']].map(([k,l])=>`<button class="maintab ${S.tab===k?'on':''}" onclick="setTab('${k}')">${l}</button>`).join('')}</div>`;
}
function setTab(t){
  if(t===S.tab){ window.scrollTo(0,0); return; }
  const order=['menu','review','info'];
  S._tabAnim = order.indexOf(t) > order.indexOf(S.tab) ? 'right' : 'left';
  S.tab=t; render(); window.scrollTo(0,0);
}

  return `<div style="height:6px;"></div>${amenHtml}${storeInfoSection()}${originSection()}`;
}
function originSection(){
  if(!STORE.originText || !STORE.originText.trim()) return '';
  // 사장님이 입력한 서술형 텍스트를 줄바꿈·배열 그대로 노출 (제목/내용 구분 없음)
  return `<div class="stsec" style="margin-bottom:11px;">
    <div class="st-ttl">🌱 원산지 정보</div>

  </div>`;
}
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function menuImgBox(m){
  const photo = PHOTO[m.id];
  const out = isOut(m);
  return `<span class="mimg">${pic(m.img, photo)}${out?soldoutOverlay():''}</span>`;
}
function menuCard(m){
  const out = isOut(m);
  const closed = !S.businessOpen;
  const baseP = priceOf(m);
  const fixedD = m.discount || 0;
  const hhD = happyHourDisc(m);
  const effP = baseP - fixedD - hhD;
  const anyDisc = fixedD > 0 || hhD > 0;
  const showTakeout = S.orderType!=='dinein' && m.takeout!=null && m.takeout!==m.price;

  // 가격: 취소선 원가 + 최종가만
  const priceHtml = anyDisc
    ? `<span class="ori">${won(baseP)}원</span><span class="disc">${won(effP)}원</span>`
    : showTakeout
      ? `${won(effP)}원<span class="ori">${won(m.price)}원</span>`
      : `${won(effP)}원`;

  // 해피아워 활성 시 메뉴명 자체를 앰버 박스로 강조
  const nameDisplay = hhD
    ? `<span style="display:inline-block;background:#FFF9DB;border:1.5px solid #FFD43B;border-radius:7px;padding:1px 8px 1px 6px;color:#5C4000;font-weight:700;">🎉 ${m.name}</span>`
    : m.name;

  const clickHandler = `onclick="openSheet(${m.id})"`;
  void closed;

  return `
    <button class="mcard ${out?'out':''} ${closed&&!out?'closed-mode':''} ${hhD?'hh-active':''}" ${clickHandler}>
      ${menuImgBox(m)}
      <span class="minfo">
        ${!out && (m.badges||[]).filter(k=>BADGE[k]).length?`<span style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:3px;">${(m.badges||[]).filter(k=>BADGE[k]).map(k=>`<span class="img-badge ${k}">${BADGE[k].e} ${BADGE[k].l}</span>`).join('')}</span>`:''}
        <span class="mname">${nameDisplay}${out?'<span class="badge-out">품절</span>':''}</span>
        <span class="mprice">${priceHtml}${lowStock(m)?`<span class="stk">· 잔여 ${m.stock}개</span>`:''}</span>
      </span>
      ${(out||closed)?'':`<span class="mplus" onclick="event.stopPropagation();${(m.opt||[]).length?`openSheet(${m.id})`:`quickAdd(${m.id})`}">+</span>`}
    </button>`;
}
/* 옵션 없는 메뉴 — 메인에서 + 누르면 바로 담기 */
function quickAdd(id){
  const m=MENU.find(x=>x.id===id);
  if(!m || isOut(m) || !S.businessOpen) return;
  const key=id+'|';
  const ex=S.cart.find(c=>c.key===key);
  if(ex) ex.qty+=1;
  else S.cart.push({ key, id, name:m.name, img:m.img, photo:PHOTO[m.id], qty:1, unit:effectivePrice(m), optText:'' });
  S._keepScroll=true; render(); S._keepScroll=false;
  toast('장바구니에 담았어요'); triggerCartAnim();
}
/* --- 옵션 바텀시트 --- */
function openSheet(id){
  const m = MENU.find(x=>x.id===id); const sel={};
  // sel[gid] = { itemIdx: qty } — single은 1개, multi는 항목별 수량
  (m.opt||[]).forEach(gid=>{ const g=OPTS[gid]; sel[gid] = (!g.multi && g.required) ? {0:1} : {}; });
  S.sheet={ id, sel, qty:1 }; renderSheet(); $('sheetbg').classList.add('on'); syncScrollLock();
}
function closeSheet(){ S.sheet=null; S.setSheet=null; $('sheetbg').classList.remove('on'); $('sheet').innerHTML=''; syncScrollLock(); }

/* --- 배경 스크롤 잠금 (열린 시트만 스크롤 반응) --- */
let _scrollLockY = 0;
function anyOverlayOpen(){
  return $('sheetbg').classList.contains('on')
    || $('cartsheetbg').classList.contains('on')
    || !!document.getElementById('closedModal');
}
function syncScrollLock(){
  const locked = document.body.classList.contains('scroll-locked');
  const wantLock = anyOverlayOpen();
  if(wantLock && !locked){
    _scrollLockY = window.scrollY;
    document.body.style.top = (-_scrollLockY)+'px';
    document.body.classList.add('scroll-locked');
  } else if(!wantLock && locked){
    document.body.classList.remove('scroll-locked');
    document.body.style.top = '';
    window.scrollTo(0, _scrollLockY);
  }
}
function sheetUnit(){ const m=MENU.find(x=>x.id===S.sheet.id); let p=effectivePrice(m);
  (m.opt||[]).forEach(gid=>{ const g=OPTS[gid]; const sel=S.sheet.sel[gid]||{}; Object.keys(sel).forEach(i=>{ p+=g.items[i].p*sel[i]; }); }); return p; }
// 옵션 토글·수량 변경 시엔 전체 시트를 다시 그리지 않고(이미지 깜빡임 방지) 바뀐 부분만 갱신
function setOptSingle(gid,idx){ S.sheet.sel[gid]={[idx]:1}; updateSheet(); }   // 1개만(라디오)
function optQty(gid,idx,d){                                                     // 여러 개(항목별 수량)
  const g=OPTS[gid]; const sel=S.sheet.sel[gid]||(S.sheet.sel[gid]={});
  const cur=sel[idx]||0;
  if(d>0){
    const qmax=g.items[idx].qmax||1;
    if(cur>=qmax){ toast(`이 항목은 최대 ${qmax}개까지 담을 수 있어요`); return; }
    const distinct=Object.keys(sel).filter(k=>sel[k]>0).length;
    if(cur===0 && g.max && distinct>=g.max){ toast(`최대 ${g.max}개 항목까지 선택할 수 있어요`); return; }
    sel[idx]=cur+1;
  } else {
    if(cur<=0) return; sel[idx]=cur-1; if(sel[idx]===0) delete sel[idx];
  }
  updateSheet();
}
function sheetQty(d){
  const m=MENU.find(x=>x.id===S.sheet.id);
  const maxQ=m&&m.maxQty?m.maxQty:Infinity;
  S.sheet.qty=Math.max(1,Math.min(maxQ,S.sheet.qty+d)); updateSheet();
}
function sheetGroupsHtml(m){
  return (m.opt||[]).map(gid=>{ const g=OPTS[gid]; const sel=S.sheet.sel[gid]||{};
    const tag = g.required ? '<span class="req">필수</span>'
      : (g.multi ? `<span class="opt-pick">선택 · 최대 ${g.max}개</span>` : '<span class="opt-pick">선택</span>');
    const rows = g.items.map((it,i)=>{
      const pr = it.p>0?'+'+won(it.p)+'원':'무료';
      if(g.multi){
        const q=sel[i]||0;
        return `<div class="optrow multi ${q>0?'sel':''}">
          <span class="opt-nm">${it.n}</span>
          <span class="opt-pr">${pr}</span>
          <span class="mini-step opt-step"><button onclick="optQty(${gid},${i},-1)">−</button><span class="n">${q}</span><button onclick="optQty(${gid},${i},1)">+</button></span>
        </div>`;
      }
      const on = !!sel[i];
      return `<div class="optrow ${on?'sel':''}" onclick="setOptSingle(${gid},${i})">
        <span class="optck">${on?'●':''}</span><span class="opt-nm">${it.n}</span><span class="opt-pr">${pr}</span></div>`;
    }).join('');
    return `<div class="optg"><div class="optg-h">${g.name} ${tag}</div>${rows}</div>`;
  }).join('');
}
function sheetDynHtml(m){
  const maxQ = m.maxQty || Infinity;
  const atMax = S.sheet.qty >= maxQ;
  return sheetGroupsHtml(m)
    + `<div class="qtyrow"><span class="lbl">수량${m.maxQty?`<span style="font-size:12px;color:var(--ink3);font-weight:600;margin-left:6px;">최대 ${m.maxQty}개</span>`:''}</span>
        <span class="stepper">
          <button onclick="sheetQty(-1)">−</button>
          <span class="n">${S.sheet.qty}</span>
          <button onclick="sheetQty(1)" ${atMax?'disabled style="opacity:.35;cursor:not-allowed;"':''}>+</button>
        </span></div>
      ${atMax?`<div style="font-size:12.5px;color:var(--ink3);text-align:right;margin-top:4px;">최대 주문 수량이에요</div>`:''}`;
}
function updateSheet(){
  const m=MENU.find(x=>x.id===S.sheet.id);
  const dyn=$('sheetDyn'); if(dyn) dyn.innerHTML=sheetDynHtml(m);
  const btn=$('sheetAddBtn'); if(btn) btn.textContent=`담기 · ${won(sheetUnit()*S.sheet.qty)}원`;
}
function renderSheet(){
  const m=MENU.find(x=>x.id===S.sheet.id);
  const out = isOut(m);
  $('sheet').innerHTML = `<div class="sheet">
      <button class="sheet-close" onclick="closeSheet()" aria-label="닫기">✕</button>
      ${imgBox('sheet-img', m.img, PHOTO[m.id], out)}
      <div class="sheet-body">
        <div class="sheet-name">${m.name} ${badgesHtml(m)}</div>
        ${m.desc?`<div class="sheet-desc">${m.desc}</div>`:''}
        <div class="sheet-base">
          ${(()=>{
            const baseP=priceOf(m); const fixedD=m.discount||0; const hhD=happyHourDisc(m);
            const effP=baseP-fixedD-hhD; const anyDisc=fixedD>0||hhD>0;
            const isTakeout=S.orderType!=='dinein'&&m.takeout!=null&&m.takeout!==m.price;
            return (anyDisc?`<span style="text-decoration:line-through;color:var(--ink4);font-size:14px;font-weight:500;">${won(baseP)}원</span> `:'')
              + won(effP)+'원'
              + (fixedD?`<span class="disc-badge">🏷 ${won(fixedD)}원 할인</span>`:'')
              + (hhD?`<span class="happy-badge">🎉 해피아워 ${won(hhD)}원 할인</span>`:'')
              + (isTakeout?`<div style="font-size:12.5px;color:var(--ink3);font-weight:600;margin-top:4px;">포장가 · 매장가 <span style="text-decoration:line-through;">${won(m.price)}원</span></div>`:'');
          })()}
        </div>
        ${m.happyHour&&S.happyHour?`<div style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#664d00;background:#fff9db;border:1px solid #ffd43b;border-radius:9px;padding:9px 12px;margin-top:10px;">🎉 해피아워 적용 중 · ${STORE.happyHour.start}~${STORE.happyHour.end}</div>`:''}
        ${lowStock(m)?`<div class="stock-pill" style="margin-top:10px;">⚡ 잔여 ${m.stock}개 · 서둘러 주세요</div>`:''}
        ${allergyTextOf(m)?`<div class="allergy"><span class="al-h">⚠️ 알레르기 정보</span><span class="al-list" style="white-space:pre-line;">${escapeHtml(allergyTextOf(m))}</span></div>`:''}
        ${out?'':`<div id="sheetDyn">${sheetDynHtml(m)}</div>`}
      </div>
      <div class="sheet-foot">${(out || !S.businessOpen)
        ? `<button class="addbtn" disabled style="background:var(--line);color:var(--ink3);cursor:not-allowed;box-shadow:none;">${out?'지금은 담을 수 없어요':'영업 종료. 주문이 불가해요'}</button>`
        : `<button class="addbtn" id="sheetAddBtn" onclick="addToCart()">담기 · ${won(sheetUnit()*S.sheet.qty)}원</button>`}</div>
    </div>`;
}
function addToCart(){
  const m=MENU.find(x=>x.id===S.sheet.id);
  if(isOut(m)){ toast('품절된 메뉴예요'); return; }
  const optText=(m.opt||[]).flatMap(gid=>{ const g=OPTS[gid]; const sel=S.sheet.sel[gid]||{}; return Object.keys(sel).map(i=>g.items[i].n+(sel[i]>1?` ×${sel[i]}`:'')); }).join(', ');
  const unit=sheetUnit(); const key=S.sheet.id+'|'+optText; const ex=S.cart.find(c=>c.key===key);
  if(ex) ex.qty+=S.sheet.qty; else S.cart.push({ key, id:m.id, name:m.name, img:m.img, photo:PHOTO[m.id], qty:S.sheet.qty, unit, optText });
  closeSheet(); S._keepScroll=true; render(); S._keepScroll=false; toast('장바구니에 담았어요');
  triggerCartAnim();
}
function triggerCartAnim(){
  const bar = document.querySelector('.cartbar');
  if(!bar) return;
  bar.classList.remove('bounce');
  void bar.offsetWidth;
  bar.classList.add('bounce');
  setTimeout(()=>bar.classList.remove('bounce'), 550);
}
let _toastT;
function toast(msg){ let el=$('toast'); if(!el){ el=document.createElement('div'); el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:92px;transform:translateX(-50%);z-index:90;background:rgba(25,31,40,.92);color:#fff;font-size:13px;font-weight:700;padding:11px 18px;border-radius:22px;transition:opacity .25s;white-space:nowrap;';
    document.body.appendChild(el); }
  el.textContent='✓ '+msg; el.style.opacity='1'; clearTimeout(_toastT); _toastT=setTimeout(()=>el.style.opacity='0',1500); }

function setPick(i,ci){ S.setSheet.sel[i]=ci; updateSetSheet(); }

/* --- 주문 내역 (차수별 · 내림차순) --- */

}

/* --- 장바구니 팝업 시트 --- */
function cartCount(){ return S.cart.reduce((s,c)=>s+c.qty,0); }
function cartTotal(){ return S.cart.reduce((s,c)=>s+c.unit*c.qty,0); }
function couponDiscount(){
  if(!S.couponId) return 0;
  const cp = COUPONS.find(c=>c.id===S.couponId);
  if(!cp) return 0;
  const base = cartTotal();
  if(base < (cp.minOrder||0)) return 0;
  if(cp.type==='amount') return Math.min(cp.value, base);
  if(cp.type==='rate') return Math.min(Math.floor(base*cp.value/100), cp.maxDisc||Infinity, base);
  return 0;
}
function applyCode(){
  const code = (S.couponCode||'').trim().toUpperCase();
  if(!code){ toast('쿠폰번호를 입력해 주세요'); return; }
  const entry = COUPON_CODES[code];
  if(!entry){ toast('유효하지 않은 쿠폰번호예요'); return; }
  S.couponId = entry.couponId;
  S.couponCode = '';
  render();
  toast('쿠폰이 적용됐어요 🎉');
}

function openCartSheet(){
  if(!S.cart.length) return;
  renderCartSheet();
  $('cartsheetbg').classList.add('on'); syncScrollLock();
}
function closeCartSheet(){
  $('cartsheetbg').classList.remove('on');
  $('cartsheet').innerHTML='';
  syncScrollLock();
}
function renderCartSheet(){
  const items = S.cart.map((c,i)=>{
    const mi=MENU.find(x=>x.id===c.id); const maxQ=mi&&mi.maxQty?mi.maxQty:Infinity;
    return `
    <div class="cs-item">
      ${imgBox('cs-img', c.img, c.photo, false)}
      <div style="flex:1;min-width:0;">
        <div class="cs-name">${c.name}</div>
        ${c.optText?`<div class="cs-opt">${c.optText}</div>`:''}
        <div class="cs-bot">
          <span class="mini-step">
            <button onclick="csChgQty(${i},-1)">−</button>
            <span class="n">${c.qty}</span>
            <button onclick="csChgQty(${i},1)" ${c.qty>=maxQ?'disabled style="opacity:.35;cursor:not-allowed;"':''}>+</button>
          </span>
          <span class="cs-price-grp">
            <span class="cs-price">${won(c.unit*c.qty)}원</span>
            <button class="cs-del-x" onclick="csDel(${i})" title="삭제" aria-label="삭제">×</button>
          </span>
        </div>
      </div>
    </div>`;
  }).join('');
  const showGroup = S.groupMode && S.orderType==='dinein';
  const guestSections = showGroup ? GUEST_CARTS.map(g=>{
    const gItems = g.cart.map(c=>`
    <div class="cs-item">
      <span style="font-size:26px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${c.img}</span>
      <div style="flex:1;min-width:0;">
        <div class="cs-name">${c.name}</div>
        ${c.optText?`<div class="cs-opt">${c.optText}</div>`:''}
        <div class="ci-bot" style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
          <span class="cs-opt">× ${c.qty}</span>
          <span class="ci-price">${won(c.unit*c.qty)}원</span>
        </div>
      </div>
    </div>`).join('');
    return `<div class="cs-owner">${g.name}</div>${gItems}`;
  }).join('') : '';

  const myLabel = showGroup ? `<div class="cs-owner me">나</div>` : '';
  const groupTotal = showGroup ? guestTotal() : 0;
  const totalAmt = cartTotal() + groupTotal;

  const paySplitHtml = showGroup ? `
    <div style="padding:0 16px 8px;">
      <div style="font-size:12.5px;color:var(--ink3);margin-bottom:8px;">결제 방식</div>
      <div class="pay-split">
        <button class="${!S.payGroup?'on':''}" onclick="S.payGroup=false;renderCartSheet()">개별 결제</button>
        <button class="${S.payGroup?'on':''}" onclick="S.payGroup=true;renderCartSheet()">함께 결제</button>
      </div>
    </div>` : '';

  const totalLabel = showGroup && S.payGroup ? `전체 합계` : `내 합계`;
  const totalAmt2 = showGroup && S.payGroup ? totalAmt : cartTotal();

  $('cartsheet').innerHTML = `<div class="sheet" style="max-height:80vh;">
    <div class="cart-sheet-handle"></div>
    <div class="cart-sheet-hdr">
      <span class="ttl">🛒 장바구니</span>
      <span class="cnt-badge">${cartCount()}개</span>
    </div>
    <div class="cart-sheet-body">
      ${myLabel}
      ${items.length?items:'<div style="padding:24px 0;text-align:center;color:var(--ink3);font-size:14px;">담은 메뉴가 없어요</div>'}
      ${guestSections}
    </div>
    ${paySplitHtml}
    <div class="cart-sheet-footer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px;font-size:13px;color:var(--ink2);">
        <span>${totalLabel}</span><span style="font-weight:700;">${won(totalAmt2)}원</span>
      </div>
      <button class="addbtn" onclick="goToCheckout()" ${!S.cart.length?'disabled style="opacity:.4;cursor:not-allowed;"':''}>
        주문하기 · ${won(S.groupMode&&S.payGroup?totalAmt2:cartTotal())}원
      </button>
    </div>
  </div>`;
}
function csChgQty(i,d){
  S.cart[i].qty += d;
  if(S.cart[i].qty <= 0) S.cart.splice(i,1);
  if(!S.cart.length){ closeCartSheet(); S._keepScroll=true; render(); S._keepScroll=false; return; }
  renderCartSheet();
  S._keepScroll=true; renderCartBar(); S._keepScroll=false;
}
function csDel(i){
  S.cart.splice(i,1);
  if(!S.cart.length){ closeCartSheet(); S._keepScroll=true; render(); S._keepScroll=false; return; }
  renderCartSheet();
  S._keepScroll=true; renderCartBar(); S._keepScroll=false;
}
function goToCheckout(){
  if(!S.cart.length) return;
  closeCartSheet();
  S.screen='checkout';
  render();
}
/* 결제 화면 주문내용 수량·삭제 (화면 튀지 않게 keepScroll) */
function coChgQty(i,d){
  S.cart[i].qty+=d;
  if(S.cart[i].qty<=0) S.cart.splice(i,1);
  if(!S.cart.length){ S.screen='menu'; render(); return; }
  S._keepScroll=true; render(); S._keepScroll=false;
}
function coDel(i){
  S.cart.splice(i,1);
  if(!S.cart.length){ S.screen='menu'; render(); return; }
  S._keepScroll=true; render(); S._keepScroll=false;
}

/* --- 장바구니 바 --- */
function renderCartBar(){
  if(S.screen!=='menu' || S.tab!=='menu' || S.cart.length===0 || !S.businessOpen){ $('cartbar').innerHTML=''; return; }
  $('cartbar').innerHTML = `<div class="cartbar"><button class="cartbtn" onclick="goToCheckout()">
      <span class="cnt">${cartCount()}</span> 주문하기 <span class="amt">${won(cartTotal())}원 ›</span></button></div>`;
}

/* --- 결제 화면 --- */
function timeSlots(){ const out=[]; for(let h=12;h<=20;h++){ out.push(h+':00',h+':30'); } return out; }
function scrCheckout(){
  const ot=ORDER_TYPES[S.orderType]; const needTime=S.orderType==='preorder';

  const terms = getTermsConfig();
  terms.forEach(t=>{ if(!(t.id in S.termsChecked)) S.termsChecked[t.id]=false; });
  ['tos','privacy','age','location'].forEach(k=>{ if(!terms.find(t=>t.id===k)) delete S.termsChecked[k]; });
  window._toggleTerm = id=>{ S.termsChecked[id]=!S.termsChecked[id]; render(); };
  window._toggleAllCheckout = ()=>{ const allOn=terms.every(t=>S.termsChecked[t.id]); terms.forEach(t=>S.termsChecked[t.id]=!allOn); render(); };
  const reqAllChecked = !terms.length || terms.filter(t=>t.required).every(t=>S.termsChecked[t.id]);
  const hasOptional = terms.some(t=>!t.required);
  const allTermsOn = terms.length>0 && terms.every(t=>S.termsChecked[t.id]);
  const termsRows = terms.map(t=>{
    const checked=S.termsChecked[t.id];
    const badge=t.pending?`<span class="term-q">확인중</span>`:t.required?`<span class="term-req">필수</span>`:`<span class="term-opt">선택</span>`;

  }).join('');
  const finalTotal = (()=>{ const base=(S.groupMode&&S.payGroup&&S.orderType==='dinein')?cartTotal()+guestTotal():cartTotal(); return base-couponDiscount(); })();

  // 쿠폰 섹션 빌더

    const couponRows = COUPONS.map(cp=>{
      const base = cartTotal();

        <input type="radio" name="coupon" style="margin-top:2px;accent-color:var(--blue);" ${sel?'checked':''} ${!applicable?'disabled':''} onchange="S.couponId='${cp.id}';render()">

        </span>

      </label>`}

        <input id="couponCodeInput" style="flex:1;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;" placeholder="쿠폰번호 입력" value="${S.couponCode}" oninput="S.couponCode=this.value" onkeydown="if(event.key==='Enter')applyCode()">
        <button onclick="applyCode()" style="background:var(--blue);color:#fff;border:none;border-radius:10px;padding:0 18px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;">적용</button>
      </div>
    </div>`;
  })() : '';

  return `<div class="topbar"><button class="back" onclick="S.screen='menu';render()">‹</button>
      <div><div class="ttl">주문 확인 · 결제</div><div class="sub">${ot.emoji} ${ot.name}${S.orderType==='dinein'?' · '+STORE.table:''}</div></div></div>

    <div class="sec"><div class="sec-h">📋 주문 내용 <span class="opt-pick" style="font-weight:700;">${cartCount()}개</span></div>
      ${S.cart.map((c,i)=>{ const mi=MENU.find(x=>x.id===c.id); const maxQ=mi&&mi.maxQty?mi.maxQty:Infinity; return `<div class="citem">

          ${c.optText?`<div class="ci-opt">${c.optText}</div>`:''}

            <span class="mini-step"><button onclick="coChgQty(${i},-1)">−</button><span class="n">${c.qty}</span><button onclick="coChgQty(${i},1)" ${c.qty>=maxQ?'disabled style="opacity:.35;cursor:not-allowed;"':''}>+</button></span>

    ${needTime?`<div class="sec"><div class="sec-h">📅 수령 시간 <span class="req">필수</span></div>

          <span style="font-size:22px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${c.img}</span>

      ${couponDiscount()>0 ? `<div class="rowline" style="color:var(--blue);"><span>🎟️ 쿠폰 할인</span><span>-${won(couponDiscount())}원</span></div>` : ''}

            <div class="field" style="margin-bottom:10px;">

          <button onclick="tryNotifPay()" class="primarybtn">${isPostpay?`주문 넣기 · ${won(cartTotal())}원`:`${won(finalTotal)}원 결제하기`}</button>

          ${notifRequired?'':`
            <button onclick="S.notifChoice='skip';goToTermsFromNotif()" style="background:none;border:none;font-size:13px;color:var(--ink3);cursor:pointer;width:100%;padding:12px 8px 0;font-family:inherit;text-decoration:underline;">
              알림 없이 주문하기
            </button>`}
        </div>`;
    })()}
    `;
}

/* --- 약관 동의 (결제 화면 인라인) --- */
function getTermsConfig(){
  const isKakao = S.authType === 'kakao';
  const isPrepay = S.payTiming === 'prepay' || S.orderType !== 'dinein';
  const isPostpay = !isPrepay;
  const terms = [];
  if(isPrepay){
    terms.push({ id:'tos',      label:'이용약관 동의',           required:true,  link:true });
    terms.push({ id:'privacy',  label:'개인정보 수집·이용 동의', required:true,  link:true });
  }
  if(!isKakao && isPrepay){
    terms.push({ id:'age', label:'만 14세 이상임을 확인합니다', required:true, link:false });
  }
  // 마케팅 동의는 알림 수단 시트에서 인라인 처리
  return terms;
}

/* --- 알림 수단 선택 화면 --- */

function highlightTerms(){
  const terms = getTermsConfig();
  const uncheck = terms.filter(t=>t.required && !S.termsChecked[t.id]);
  if(!uncheck.length) return;
  toast('필수 약관에 동의해 주세요');
  // 미체크 항목 shake 효과
  const rows = document.querySelectorAll('.term-row');
  rows.forEach(row=>{
    const badge = row.querySelector('.term-req');
    if(badge){ row.classList.add('term-shake'); setTimeout(()=>row.classList.remove('term-shake'),600); }
  });
  // 약관 섹션으로 스크롤
  const first = document.querySelector('.term-row');
  if(first) first.scrollIntoView({behavior:'smooth', block:'center'});
}
function tryNotifPay(){
  if(S.notifChoice===null){ toast('연락처 등록 방법을 선택해 주세요'); return; }
  if(S.notifChoice==='phone'){
    const digits=(S.phone||'').replace(/\D/g,'');
    if(digits.length<10){ toast('휴대폰 번호를 입력해 주세요'); const el=document.getElementById('phoneInput'); if(el){el.focus();el.classList.add('term-shake');setTimeout(()=>el.classList.remove('term-shake'),600);} return; }
  }
  goToTermsFromNotif();
}
function goToNotif(){
  if(S.orderType==='preorder' && !S.pickup){ toast('수령 시간을 선택해 주세요'); return; }
  // 카카오 로그인 상태 → 알림 수단 이미 확정, 시트 생략
  if(S.authType==='kakao'){ S.notifChoice='kakao'; S.notifSheet=false; placeOrder(); return; }
  if(S.orderType==='dinein' && S.serve==='self' && S.callMethod==='verbal'){
    S.notifChoice='skip'; S.notifSheet=false; S.phone=''; placeOrder(); return;
  }
  if(S.orderType==='dinein' && S.serve==='server' && S.payTiming==='postpay'){
    S.notifChoice='skip'; S.notifSheet=false; placeOrder(); return;
  }
  S.notifChoice = null;
  S.notifSheet = true;
  render();
}

function goToTermsFromNotif(){
  if(S.notifChoice === 'kakao'){
    // 목업: 시뮬레이터 authType 유지
  } else if(S.notifChoice === 'phone'){
    S.authType = 'anon';
    const digits = (S.phone||'').replace(/\D/g,'');
    if(digits.length < 10){
      toast('휴대폰 번호를 입력해 주세요');
      const el = document.getElementById('phoneInput');
      if(el) el.focus();
      return;
    }
  } else {
    // 알림 없이 주문: 카카오 로그인 상태는 유지, 비회원이면 그대로
    S.phone = '';
  }
  S.notifSheet = false;
  placeOrder();
}


/* --- 결제 진행 → 주문 접수 (STA_001·STA_002) → 완료 / 에러 분기 --- */
function placeOrder(){
  const isPrepay = !(S.orderType==='dinein' && S.payTiming==='postpay');
  S.screen='processing'; S.procStep = isPrepay ? 'pay' : 'submit'; render();
  if(isPrepay){
    setTimeout(()=>{ if(S.screen!=='processing') return; S.procStep='submit'; render(); setTimeout(finishOrder,1300); }, 1500);
  } else {
    setTimeout(finishOrder, 1300);
  }
}
function genCallNo(){
  const c=STORE.callConfig||{prefix:'',digits:3};
  const n=String(Math.floor(Math.random()*Math.pow(10,c.digits))).padStart(c.digits,'0');
  return (c.prefix?c.prefix+'-':'')+n;
}
function finishOrder(){
  if(S.screen!=='processing') return;
  if(S.errSim!=='none'){ S.errType=S.errSim; S.screen='error'; render(); return; }
  S.orderNo='#20260515-'+String(50+Math.floor((cartTotal()%900))).padStart(4,'0');
  S.callNo = (S.orderType!=='dinein' || S.serve==='self') ? genCallNo() : null;   // 서빙 매장 제외 전 케이스 발급
  // 주문 내역에 차수 누적
  const nextRound=ORDER_HISTORY.reduce((m,r)=>Math.max(m,r.round),0)+1;
  ORDER_HISTORY.push({ round:nextRound, time:'방금', status:'주문 접수',
    items:S.cart.map(c=>({n:c.name,o:c.optText,q:c.qty,p:c.unit*c.qty})), total:cartTotal() });
  S.screen='done'; render();
}
function scrProcessing(){
  const isPay = S.procStep==='pay';
  return `<div class="proc">
    <div class="spinner"></div>
    <h2>${isPay?'결제 처리 중이에요':'주문 접수 중이에요'}</h2>
    <p>${isPay
      ? `<b>${S.pay}</b>로 결제를 진행하고 있어요.<br>잠시만 기다려 주세요.`
      : `결제가 완료됐어요.<br>매장에 주문을 전달하고 있어요.`}</p>
  </div>`;
}
const ERR_CASES = {
  payfail:{icon:'💳', title:'결제에 실패했어요', code:'PAYMENT_FAILED',
    msg:'카드 한도·잔액 또는 일시적인 오류일 수 있어요.<br>다른 결제수단으로 다시 시도해 주세요.',
    primary:'다른 방법으로 결제', onPrimary:'backToCheckout()'},
  pos:{icon:'🔌', title:'매장 시스템이<br>일시 연결 끊김', code:'POS_OFFLINE',
    get msg(){ return S.orderType==='dinein'&&S.serve==='server'
      ? '매장 POS와 통신이 잠시 끊겼어요.<br>직원 호출 후 주문하거나 잠시 뒤 다시 시도해 주세요.'
      : '매장 POS와 통신이 잠시 끊겼어요.<br>잠시 뒤 다시 시도해 주세요.'; },
    primary:'다시 시도', onPrimary:'placeOrder()'},
  network:{icon:'🌐', title:'연결이 불안정해요', code:'NETWORK_ERROR',
    msg:'네트워크 연결이 원활하지 않아요.<br>연결 상태를 확인하고 다시 시도해 주세요.',
    primary:'다시 시도', onPrimary:'placeOrder()'},
};
function scrError(){
  const e=ERR_CASES[S.errType]||ERR_CASES.network;
  return `<div class="topbar"><button class="back" onclick="backToCheckout()">‹</button>
      <div><div class="ttl">주문 처리 오류</div></div></div>
    <div class="errbox">
      <div class="eic">${e.icon}</div>
      <h2>${e.title}</h2>
      <p>${e.msg}</p>
      <div class="code">CODE: ${e.code}</div>
    </div>
    <button class="primarybtn" onclick="${e.onPrimary}">${e.primary}</button>
    <div style="padding:0 16px 24px;">
      ${S.orderType==='dinein' && S.serve==='server' ? `<button class="ghostbtn" onclick="openCallSheet()">🛎 직원 호출</button>` : ''}
      <button class="err-link" onclick="backToCheckout()">결제 화면으로 돌아가기</button>
    </div>`;
}
function backToCheckout(){ S.screen='checkout'; S.errType=null; render(); }

/* --- 완료 --- */
function buildProgressBar(){
  const ci = {received:0,preparing:1,ready:2,completed:3}[S.orderStatus]??0;
  let steps;
  if(S.orderType==='takeout')       steps=['주문 접수','준비 중','픽업 대기','픽업 완료'];
  else if(S.orderType==='preorder') steps=['주문 접수','수락 대기','준비 중','완료'];
  else if(S.serve==='self')         steps=['주문 접수','준비 중','수령 대기','완료'];
  else                              steps=['주문 접수','준비 중','서빙 중','완료'];
  let h='<div class="order-progress"><div class="op-steps">';
  steps.forEach((lbl,i)=>{
    const dc=i<ci?'past':i===ci?'act':'', lc=i<ci?'past':i===ci?'act':'';
    h+=`<div class="op-step"><div class="op-dot ${dc}">${i<ci?'✓':i+1}</div><div class="op-lbl ${lc}">${lbl}</div></div>`;
    if(i<steps.length-1) h+=`<div class="op-connector ${i<ci?'filled':''}"></div>`;
  });
  return h+'</div></div>';
}
function scrDone(){
  const ot=ORDER_TYPES[S.orderType]; let head, statusHtml, extra='';
  if(S.orderType==='dinein'){ head='주문을 받았어요';
    const acceptLine = S.payTiming==='postpay'
      ? `<div class="status-line"><span class="dot"></span> 주문 접수 · 주방으로 전달됐어요</div>`
      : `<div class="status-line"><span class="dot"></span> 결제 완료 · 주방으로 전달됐어요</div>`;
    const serveLine = S.serve==='self'
      ? S.callMethod==='alimtalk'
        ? `<div class="status-line"><span class="dot" style="background:var(--amber);"></span> 조리 중. 준비되면 <b>카카오 알림톡</b>으로 알려드려요</div>
           <div class="status-line"><span class="dot" style="background:var(--line);"></span> ${STORE.table} 테이블 · 셀프 수령</div>`
        : `<div class="status-line"><span class="dot" style="background:var(--amber);"></span> 조리 중. 준비되면 <b>호명으로 불러드려요</b></div>
           <div class="status-line"><span class="dot" style="background:var(--line);"></span> ${STORE.table} 테이블 · 셀프 수령</div>`
      : `<div class="status-line"><span class="dot" style="background:var(--amber);"></span> 조리 중. 준비되면 <b>직원이 자리로 가져다 드려요</b></div>
         <div class="status-line"><span class="dot" style="background:var(--line);"></span> ${STORE.table} 테이블 · 서빙 매장</div>`;
    const payLine = S.payTiming==='postpay'
      ? `<div class="status-line"><span class="dot" style="background:var(--line);"></span> 🧾 나갈 때 카운터에서 결제해 주세요</div>` : '';
    statusHtml = acceptLine + serveLine + payLine;
  } else if(S.orderType==='takeout'){ head='포장 주문을 받았어요';
    statusHtml=`<div class="status-line"><span class="dot"></span> 결제 완료 · 포장 준비를 시작했어요</div>
      <div class="status-line"><span class="dot" style="background:var(--amber);"></span> 약 <b>15~25분</b> 뒤 준비 완료 · 카카오 알림톡 발송</div>`;
    extra=`<div style="text-align:center;"><div class="qrbox"></div><div style="font-size:12px;color:var(--ink3);font-weight:700;margin-top:8px;">픽업 시 이 QR을 보여주세요</div></div>`;
  } else { head='예약 요청을 보냈어요';
    statusHtml=`<div class="status-line"><span class="dot" style="background:var(--amber);"></span> <b>사장님 수락 대기 중</b>. 수락하면 확정 알림이 와요</div>
      <div class="status-line"><span class="dot"></span> 결제 완료 · 수령 예정 <b>오늘 ${S.pickup}</b></div>`;
  }
  const isDineinSelf = S.orderType==='dinein' && S.serve==='self';
  const callNoLabel = isDineinSelf ? '주문 번호' : '호출 번호';
  const callNoNote = isDineinSelf
    ? '준비되면 알림으로 알려드려요'
    : `준비되면 이 번호로 불러드려요${S.orderType==='takeout'?' · 픽업대에서 확인하세요':''}`;
  const callNoCard = S.callNo
    ? `<div class="callno-box">
        <div class="cn-label">${callNoLabel}</div>
        <div class="cn-num">${S.callNo}</div>
        <div class="cn-note">${callNoNote}</div>
      </div>` : '';

  const isKakao = S.authType === 'kakao';
  const noAlimtalkCase = S.orderType==='dinein' && (S.serve==='server' || S.callMethod==='verbal');

  // 알림 안내 메시지
  const notifyNote = (()=>{
    if(noAlimtalkCase){
      if(isKakao || S.notifChoice==='kakao') return `<div class="kakao-note"><span class="kic">🧾</span><span>영수증은 <b>카카오 알림톡</b>으로 발송돼요.</span></div>`;
      return '';
    }
    if(isKakao || S.notifChoice==='kakao') return `<div class="kakao-note"><span class="kic">💬</span><span>준비되면 <b>카카오 알림톡</b>으로 알려드려요.</span></div>`;
    return S.phone
      ? `<div class="kakao-note" style="background:var(--bg);"><span class="kic">💬</span><span><b>${S.phone}</b>으로 알림톡을 발송할게요.</span></div>`
      : '';
  })();

  const receiptInput = '';


  return `<div class="done"><div class="dlogo">${STORE.logo}</div><div class="ck">✓</div>
      <h2>${head}</h2><div class="ordno">주문번호 ${S.orderNo}</div></div>
    ${buildProgressBar()}
    ${callNoCard}
    <div class="done-card">
      <div style="font-size:13px;font-weight:800;margin-bottom:6px;">${ot.emoji} ${ot.name} · ${STORE.name}${S.orderType==='dinein'?' · '+STORE.table:''}</div>
      ${statusHtml}${extra}
      ${notifyNote}
      <div style="border-top:1px solid var(--line2);margin-top:14px;padding-top:13px;">
        ${S.cart.map(c=>`<div class="rowline" style="padding:3px 0;"><span style="flex:1;">${c.name} ×${c.qty}</span><span style="color:var(--ink);font-weight:700;">${won(c.unit*c.qty)}원</span></div>`).join('')}
        ${couponDiscount()>0?`<div class="rowline" style="padding:3px 0;color:var(--blue);"><span style="flex:1;">🎟️ 쿠폰 할인</span><span>-${won(couponDiscount())}원</span></div>`:''}
        <div class="rowline tot" style="font-size:15px;"><span>${(S.orderType==='dinein'&&S.payTiming==='postpay')?'결제 예정 · 나갈 때':'결제 금액 · '+S.pay}</span><span>${won(cartTotal()-couponDiscount())}원</span></div>
      </div>
      ${receiptInput}
    </div>
    <button class="primarybtn" onclick="resetOrder()">새 주문하기</button><div style="height:24px;"></div>`;
}
function resetOrder(){
  const keepAuth = S.tableActive; // 테이블 점유 중이면 로그인 상태 유지
  S.cart=[]; S.sheet=null; S.pickup=null; S.pay='카드'; S.phone=''; S.orderNo=null; S.callNo=null; S.cat='전체'; S.couponId=null; S.couponCode=''; S.termsChecked={}; S.requestNote=''; S.orderStatus='received';
  if(!keepAuth){ S.authType='anon'; S.notifChoice=null; }
  S.screen='menu'; render();
}

/* --- 세션 만료 --- */
function scrSession(){
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100svh;padding:40px 32px;text-align:center;background:var(--bg);">
    <div style="width:80px;height:80px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:28px;box-shadow:0 8px 24px rgba(92,140,218,.18);">⏱️</div>
    <div style="font-size:22px;font-weight:800;color:var(--blue);line-height:1.4;letter-spacing:-.3px;margin-bottom:10px;">접속 시간이 지났어요.</div>
    <div style="font-size:14px;color:var(--ink3);line-height:1.8;word-break:keep-all;">안전한 이용을 위해<br>QR코드를 다시 한 번 스캔해 주세요.</div>
    <div style="margin-top:40px;padding:18px 24px;border-radius:16px;background:var(--card);border:1px solid var(--line2);display:flex;align-items:center;gap:12px;max-width:280px;width:100%;">
      <div style="font-size:28px;">📷</div>
      <div style="text-align:left;"><div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:2px;">테이블 QR 스캔</div><div style="font-size:12px;color:var(--ink3);line-height:1.5;">테이블 위 QR코드를 스캔해 주세요.</div></div>
    </div>
  </div>`;
}

let _sessionTimer = null;
const SESSION_TIMEOUT = 5 * 60 * 1000; // 5분

function resetSessionTimer(){
  if(S.screen==='session') return;
  clearTimeout(_sessionTimer);
  _sessionTimer = setTimeout(()=>{
    S.screen='session';
    render();
  }, SESSION_TIMEOUT);
}

['touchstart','touchend','click','scroll','keydown','input'].forEach(ev=>{
  document.addEventListener(ev, resetSessionTimer, {passive:true});
});

/* --- 리뷰 / 매장정보 --- */
function stars(r){ return '★★★★★'.slice(0,r)+'☆☆☆☆☆'.slice(0,5-r); }
function avgRating(){ return (REVIEWS.reduce((s,v)=>s+v.r,0)/REVIEWS.length).toFixed(1); }
function reviewsSection(){
  if(!STORE.reviewOn) return '';
  return `<div class="rvsec">
    <div class="rv-head">
      <div><div class="rv-ttl">💬 손님 리뷰</div><div class="rv-sub">실제 방문 손님이 남긴 후기예요</div></div>
      <div class="rv-score"><span class="rv-num">⭐ ${avgRating()}</span><span class="rv-cnt">리뷰 ${REVIEWS.length}개</span></div>
    </div>
    ${REVIEWS.map(v=>`<div class="rv-card">
      <div class="rv-top"><span class="rv-stars">${stars(v.r)}</span><span class="rv-cust">${v.c}</span><span class="rv-date">${v.d}</span></div>
      <div class="rv-body">${v.b}</div>
      ${v.reply?`<div class="rv-reply"><b>사장님</b>${v.reply}</div>`:''}
    </div>`).join('')}
  </div>`;
}
function storeInfoSection(){
  return `<div class="stsec">
    <div class="st-ttl">🏪 매장 정보</div>
    <div class="st-row"><span class="st-k">대표자</span><span class="st-v">${STORE.owner}</span></div>
    <div class="st-row"><span class="st-k">매장 주소</span><span class="st-v">${STORE.addr}</span></div>
    <div class="st-row"><span class="st-k">사업자등록번호</span><span class="st-v">${STORE.bizNo}</span></div>
    <div class="st-row"><span class="st-k">매장 연락처</span><span class="st-v">${STORE.phone}</span></div>
    <div class="st-row"><span class="st-k">운영 시간</span><span class="st-v">${STORE.hours.map(h=>`${h.d} ${h.t}${h.note?` <span style="color:var(--ink4);">· ${h.note}</span>`:''}`).join('<br/>')}<br/><span style="color:var(--ink4);">라스트오더 ${STORE.lastOrder}</span></span></div>
    <div class="st-row"><span class="st-k">휴무일</span><span class="st-v">${STORE.holidays.join(' · ')}</span></div>
  </div>`;
}

render();
resetSessionTimer();
if(!S.businessOpen) showClosedAlert();
</script>
</body>
