<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>소프트커피 합정점 · QR 주문</title>
<style>
  :root{
    --blue:#16315b; --blue-d:#0f2444; --blue-50:#eef1f7;
    --ink:#191f28; --ink2:#4e5968; --ink3:#8b95a1; --ink4:#b0b8c1;
    --line:#e5e8eb; --line2:#f1f3f5; --bg:#f2f4f6; --card:#fff;
    --green:#12b886; --red:#e03131; --amber:#f59f00;
    --coffee1:#4a2f1c; --coffee2:#8a5a36;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Malgun Gothic',sans-serif;
    background:#cfd4da;color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;}

  .demobar{width:100%;z-index:100;background:#191f28;color:#fff;
    display:flex;align-items:center;gap:7px;justify-content:center;padding:8px 12px;flex-wrap:wrap;font-size:11px;}
  .demobar .lbl{font-weight:800;color:#ffd43b;letter-spacing:.02em;margin-right:2px;}
  .ds-chip{font-size:11px;font-weight:700;color:#ced4da;background:#343a40;border:1px solid #495057;border-radius:20px;padding:5px 11px;cursor:pointer;font-family:inherit;}
  .ds-chip.on{background:#fff;color:#191f28;border-color:#fff;}
  .ds-div{font-size:10px;color:#868e96;font-weight:700;margin-left:8px;}
  .ds-chip.dis{opacity:.4;}

  .device{width:100%;max-width:440px;background:var(--bg);min-height:calc(100vh - 46px);position:relative;
    box-shadow:0 0 0 1px rgba(0,0,0,.04),0 18px 50px rgba(0,0,0,.22);overflow:hidden;}
  @media(min-width:480px){ .device{border-radius:28px;margin-bottom:22px;min-height:calc(100vh - 90px);} }
  .scroll{padding-bottom:120px;}

  .cover{height:158px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--coffee1) 0%,var(--coffee2) 70%,#b07d4f 100%);background-size:cover;background-position:center;background-repeat:no-repeat;}
  .cover::after{content:'';position:absolute;inset:0;background:radial-gradient(120% 90% at 25% 18%,rgba(255,255,255,.22),transparent 55%);}
  .cover .ctag{position:absolute;top:10px;left:12px;z-index:2;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.32);padding:3px 9px;border-radius:20px;}
  .cover-badge{position:absolute;top:12px;right:12px;z-index:3;display:inline-flex;align-items:center;gap:5px;max-width:calc(100% - 24px);font-size:12px;font-weight:800;color:#fff;background:rgba(0,0,0,.46);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);padding:7px 12px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.18);white-space:nowrap;}
  .cover-badge .btable{color:#fff;}
  .brandinfo{display:flex;align-items:flex-end;gap:13px;padding:0 18px;margin-top:-34px;position:relative;z-index:3;}
  .logo{width:72px;height:72px;border-radius:18px;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.18);
    display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;border:3px solid #fff;}
  .binfo{padding-bottom:2px;min-width:0;}
  .bstore{font-size:21px;font-weight:800;letter-spacing:-.02em;}
  .bstatus{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;margin-top:5px;}
  .bstatus .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .bstatus.open{color:var(--green);}
  .bstatus.open .sdot{background:var(--green);box-shadow:0 0 0 3px rgba(18,184,134,.15);}
  .bstatus.closed{color:var(--red);}
  .bstatus.closed .sdot{background:var(--red);box-shadow:0 0 0 3px rgba(224,49,49,.15);}
  .bsub{padding:13px 18px 0;}
  .bmode{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--blue-d);background:var(--blue-50);padding:7px 13px;border-radius:20px;}
  .btable{font-weight:800;color:var(--ink);}
  .bintro{font-size:12.5px;color:var(--ink3);margin-top:10px;line-height:1.55;}
  .bamen{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
  .bamen span{font-size:11px;font-weight:600;color:var(--ink2);background:var(--bg);border:1px solid var(--line);padding:4px 9px;border-radius:8px;}

  .maintabs{position:sticky;top:0;z-index:18;background:#fff;display:flex;border-bottom:1px solid var(--line);margin-top:14px;}
  .maintab{flex:1;padding:13px 0;font-size:13.5px;font-weight:700;color:var(--ink3);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;font-family:inherit;}
  .maintab.on{color:var(--ink);border-bottom-color:var(--ink);}
  .cattabs{position:sticky;top:45px;z-index:15;background:#fff;display:flex;gap:7px;padding:11px 14px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .cattab{flex-shrink:0;font-size:13px;font-weight:700;color:var(--ink3);padding:7px 14px;border-radius:20px;background:var(--bg);border:none;cursor:pointer;font-family:inherit;}
  .cattab.on{background:var(--blue);color:#fff;}

  .notice{margin:12px 14px 0;display:flex;gap:9px;align-items:flex-start;border-radius:11px;padding:11px 13px;font-size:12.5px;line-height:1.55;}
  .notice.blue{background:var(--blue-50);border:1px solid #d6deec;color:var(--blue-d);}
  .notice.amber{background:#fff8e6;border:1px solid #ffe3a3;color:#92400e;}
  .notice.red{background:#fff0f0;border:1px solid #ffc9c9;color:#c92a2a;}

  /* 영업 종료 배너 */
  .closed-banner{margin:12px 14px 0;display:flex;gap:9px;align-items:center;background:#fff0f0;border:1.5px solid #ffa8a8;border-radius:11px;padding:12px 14px;font-size:13px;font-weight:700;color:#c92a2a;}

  .catsec-h{padding:16px 18px 7px;font-size:14px;font-weight:800;}
  .mcard{display:flex;gap:13px;padding:13px 16px;background:#fff;cursor:pointer;border-bottom:1px solid var(--line2);width:100%;border:none;font-family:inherit;text-align:left;align-items:center;}
  .mcard:active{background:var(--bg);}
  .mcard.out{opacity:.5;cursor:not-allowed;}
  .mcard.closed-mode .mplus{background:var(--line2);color:var(--ink4);}
  .mimg{font-size:34px;width:90px;height:60px;display:flex;align-items:center;justify-content:center;background:var(--line2);border-radius:13px;flex-shrink:0;position:relative;overflow:hidden;}
  .mimg img,.ci-img img,.sheet-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
  .minfo{flex:1;min-width:0;}
  .mname{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .badge-out{font-size:10px;font-weight:800;color:var(--red);background:#fff0f0;padding:2px 7px;border-radius:6px;}
  .mdesc{font-size:12px;color:var(--ink3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mallerg{font-size:11px;margin-top:4px;}
  .mprice{font-size:15px;font-weight:800;margin-top:5px;}
  .mprice .was{font-size:11px;color:var(--ink4);font-weight:500;}
  .mplus{flex-shrink:0;align-self:center;width:30px;height:30px;border-radius:50%;background:var(--blue-50);color:var(--blue);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  /* 장바구니 바 + 담기 애니메이션 */
  .cartbar{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:calc(100% - 28px);max-width:412px;z-index:40;}
  .cartbtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:14px;padding:15px 18px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 8px 22px rgba(22,49,91,.32);font-family:inherit;transition:transform .1s;}
  .cartbtn .cnt{background:#fff;color:var(--blue);min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:12.5px;transition:transform .15s,background .15s,color .15s;}
  .cartbtn .amt{margin-left:auto;}
  .cartbtn:active{transform:scale(.99)!important;}
  @keyframes cartBounce{0%{transform:translateX(-50%) scale(1);}18%{transform:translateX(-50%) scale(1.04);}36%{transform:translateX(-50%) scale(.97);}54%{transform:translateX(-50%) scale(1.02);}72%{transform:translateX(-50%) scale(.99);}100%{transform:translateX(-50%) scale(1);}}
  @keyframes cntPop{0%{transform:scale(1);}35%{transform:scale(1.5);background:var(--green);color:#fff;}70%{transform:scale(.92);}100%{transform:scale(1);}}
  .cartbar.bounce{animation:cartBounce .5s ease;}
  .cartbar.bounce .cnt{animation:cntPop .5s ease;}

  /* 플로팅 스크롤 탑 버튼 */
  .scroll-top-btn{position:fixed;bottom:80px;right:14px;z-index:38;width:40px;height:40px;border-radius:50%;background:#fff;border:1.5px solid var(--line);box-shadow:0 4px 14px rgba(0,0,0,.14);display:none;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--ink2);transition:opacity .2s;}
  .scroll-top-btn.show{display:flex;}
  @media(min-width:480px){.scroll-top-btn{right:calc(50% - 220px + 14px);}}

  .topbar{position:sticky;top:0;z-index:20;background:var(--blue);color:#fff;display:flex;align-items:center;gap:10px;padding:15px 16px;}
  .topbar .back{font-size:20px;background:none;border:none;cursor:pointer;color:#fff;padding:2px 4px;margin-left:-4px;}
  .topbar .ttl{font-size:16px;font-weight:800;color:#fff;}
  .topbar .sub{font-size:11px;color:rgba(255,255,255,.7);font-weight:600;}

  /* 공통 바텀시트 */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:none;}
  .sheet-bg.on{display:block;}
  .sheet{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:440px;background:#fff;border-radius:22px 22px 0 0;max-height:88%;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;animation:slideup .22s ease;}
  body.scroll-locked{position:fixed;left:0;right:0;width:100%;overflow:hidden;}
  @keyframes slideup{from{transform:translate(-50%,100%);}to{transform:translate(-50%,0);}}
  .sheet-img{position:relative;overflow:hidden;height:172px;background:var(--line2);display:flex;align-items:center;justify-content:center;font-size:60px;}
  .sheet-body{padding:18px 18px 12px;}
  .sheet-name{font-size:19px;font-weight:800;}
  .sheet-desc{font-size:13px;color:var(--ink3);margin-top:4px;}
  .sheet-base{font-size:15px;font-weight:800;margin-top:8px;}
  .optg{margin-top:20px;}
  .optg-h{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px;margin-bottom:9px;}
  .req{font-size:10px;font-weight:800;color:var(--blue);background:var(--blue-50);padding:2px 7px;border-radius:5px;}
  .opt-pick{font-size:10px;color:var(--ink3);font-weight:600;}
  .optrow{display:flex;align-items:center;gap:11px;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;}
  .optrow.sel{border-color:var(--blue);background:var(--blue-50);}
  .optck{width:21px;height:21px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
  .optrow.multi .optck{border-radius:6px;}
  .optrow.sel .optck{background:var(--blue);border-color:var(--blue);}
  .opt-nm{font-size:14px;font-weight:600;flex:1;}
  .opt-pr{font-size:13px;color:var(--ink2);font-weight:700;}
  .qtyrow{display:flex;align-items:center;justify-content:space-between;margin-top:22px;padding-top:16px;border-top:1px solid var(--line2);}
  .qtyrow .lbl{font-size:15px;font-weight:800;}
  .stepper{display:flex;align-items:center;gap:16px;}
  .stepper button{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:20px;cursor:pointer;color:var(--ink);font-family:inherit;}
  .stepper .n{font-size:17px;font-weight:800;min-width:20px;text-align:center;}
  .sheet-foot{position:sticky;bottom:0;background:#fff;padding:13px 18px 18px;border-top:1px solid var(--line2);}
  .addbtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;display:flex;justify-content:center;gap:8px;font-family:inherit;}
  .addbtn:active{transform:scale(.99);}

  /* 장바구니 팝업 시트 전용 */
  .cart-sheet-handle{width:36px;height:4px;background:var(--line);border-radius:4px;margin:12px auto 4px;}
  .cart-sheet-hdr{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line2);}
  .cart-sheet-hdr .ttl{font-size:16px;font-weight:800;}
  .cart-sheet-hdr .cnt-badge{font-size:12px;font-weight:800;color:var(--blue);background:var(--blue-50);padding:3px 9px;border-radius:20px;}
  .cart-sheet-body{padding:0 18px;}
  .cs-item{display:flex;gap:11px;padding:13px 0;border-bottom:1px solid var(--line2);align-items:flex-start;}
  .cs-item:last-child{border-bottom:none;}
  .cs-img{font-size:22px;width:52px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--line2);border-radius:9px;flex-shrink:0;position:relative;overflow:hidden;}
  .cs-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .cs-name{font-size:13.5px;font-weight:700;}
  .cs-opt{font-size:11px;color:var(--ink3);margin-top:2px;line-height:1.45;}
  .cs-bot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
  .cs-price{font-size:13.5px;font-weight:800;}
  .mini-step{display:flex;align-items:center;gap:10px;}
  .mini-step button{width:27px;height:27px;border-radius:7px;border:1.5px solid var(--line);background:#fff;font-size:15px;cursor:pointer;font-family:inherit;color:var(--ink);}
  .mini-step .n{font-size:14px;font-weight:800;min-width:16px;text-align:center;}
  .cs-price-grp{display:flex;align-items:center;gap:9px;}
  .cs-del-x{width:24px;height:24px;border-radius:50%;border:none;background:var(--line2);color:var(--ink3);font-size:16px;line-height:1;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
  .cs-del-x:active{background:#ffe3e3;color:var(--red);}
  .cart-sheet-footer{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line2);padding:12px 18px 18px;}
  .cart-sheet-tot{display:flex;justify-content:space-between;align-items:center;font-size:14px;margin-bottom:11px;}
  .cart-sheet-tot .lbl{font-weight:700;color:var(--ink2);}
  .cart-sheet-tot .val{font-size:17px;font-weight:800;color:var(--ink);}

  /* 약관 동의 화면 */
  .terms-all{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--bg);border-radius:12px;margin:0 18px 4px;cursor:pointer;}
  .terms-all .lbl{font-size:14px;font-weight:800;color:var(--ink);}
  .term-row{display:flex;align-items:flex-start;gap:11px;padding:13px 18px;border-bottom:1px solid var(--line2);cursor:pointer;}
  .term-row:last-child{border-bottom:none;}
  .term-ck{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:.12s;}
  .term-ck.checked{background:var(--blue);border-color:var(--blue);}
  .term-all-ck{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:.12s;}
  .term-all-ck.checked{background:var(--blue);border-color:var(--blue);}
  .term-label{flex:1;font-size:13.5px;color:var(--ink);}
  .term-req{font-size:10px;font-weight:800;color:var(--blue);background:var(--blue-50);padding:1px 6px;border-radius:4px;margin-right:5px;vertical-align:middle;}
  .term-opt{font-size:10px;font-weight:800;color:var(--ink3);background:var(--bg);border:1px solid var(--line);padding:1px 6px;border-radius:4px;margin-right:5px;vertical-align:middle;}
  .term-q{font-size:10px;font-weight:800;color:var(--amber);background:#fff8e6;border:1px solid #ffe3a3;padding:1px 6px;border-radius:4px;margin-right:5px;vertical-align:middle;}
  .term-link{font-size:12px;color:var(--ink3);text-decoration:underline;margin-left:4px;flex-shrink:0;white-space:nowrap;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;}

  /* 기존 장바구니/결제 화면 공통 */
  .sec{background:#fff;margin:11px 0;padding:16px 18px;}
  .sec-h{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
  .citem{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line2);}
  .citem:last-child{border-bottom:none;}
  .ci-img{font-size:26px;width:60px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--line2);border-radius:10px;flex-shrink:0;position:relative;overflow:hidden;}
  .ci-name{font-size:14px;font-weight:700;}
  .ci-opt{font-size:11.5px;color:var(--ink3);margin-top:2px;line-height:1.5;}
  .ci-bot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
  .ci-price{font-size:14px;font-weight:800;}
  .ci-del{font-size:11px;color:var(--ink4);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;}
  .rowline{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;padding:5px 0;color:var(--ink2);}
  .rowline.tot{font-size:17px;font-weight:800;color:var(--ink);padding-top:11px;margin-top:5px;border-top:1px solid var(--line);}
  .info-pill{display:flex;gap:9px;align-items:flex-start;background:var(--blue-50);border:1px solid #d3e4ff;border-radius:11px;padding:12px 14px;font-size:12.5px;color:var(--blue-d);line-height:1.6;}
  .info-pill.amber{background:#fff8e6;border-color:#ffe3a3;color:#92400e;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .pchip{font-size:13px;font-weight:700;padding:10px 14px;border:1.5px solid var(--line);border-radius:11px;background:#fff;cursor:pointer;color:var(--ink2);font-family:inherit;display:flex;align-items:center;gap:6px;}
  .pchip.on{border-color:var(--blue);background:var(--blue-50);color:var(--blue-d);}
  .timechip{min-width:74px;justify-content:center;}
  .field{margin-top:13px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px;}
  .field input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;font-size:15px;font-family:inherit;}
  .field input:focus{outline:none;border-color:var(--blue);}
  .done{text-align:center;padding:40px 24px 18px;}
  .done .dlogo{width:60px;height:60px;border-radius:15px;background:#fff;border:1px solid var(--line);box-shadow:0 3px 10px rgba(0,0,0,.07);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;}
  .done .ck{width:80px;height:80px;border-radius:50%;background:var(--green);color:#fff;font-size:44px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 26px rgba(18,184,134,.4);animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.12);}100%{transform:scale(1);}}
  .done h2{font-size:21px;font-weight:800;margin:0 0 7px;}
  .done .ordno{font-size:13px;color:var(--ink3);font-weight:700;}
  .done-card{background:#fff;border-radius:16px;margin:22px 16px;padding:20px;text-align:left;box-shadow:0 4px 16px rgba(0,0,0,.05);}
  .status-line{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--ink);padding:9px 0;}
  .status-line .dot{width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .qrbox{width:120px;height:120px;margin:14px auto 4px;border-radius:14px;background:repeating-conic-gradient(#191f28 0% 25%,#fff 0% 50%) 50%/16px 16px;border:7px solid #fff;box-shadow:0 0 0 1px var(--line);}
  .primarybtn{display:block;width:calc(100% - 32px);margin:20px 16px 8px;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:16px;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 22px rgba(22,49,91,.3);}
  .primarybtn:disabled{background:var(--line);box-shadow:none;cursor:not-allowed;color:var(--ink3);}

/* --- 배경 스크롤 잠금 (열린 시트만 스크롤 반응) --- */
let _scrollLockY = 0;
function anyOverlayOpen(){
  return $('sheetbg').classList.contains('on')
    || $('cartsheetbg').classList.contains('on')
    || !!document.getElementById('closedModal');
}
function syncScrollLock(){
  const locked = document.body.classList.contains('scroll-locked');
  const wantLock = anyOverlayOpen();
  if(wantLock && !locked){
    _scrollLockY = window.scrollY;
    document.body.style.top = (-_scrollLockY)+'px';
    document.body.classList.add('scroll-locked');
  } else if(!wantLock && locked){
    document.body.classList.remove('scroll-locked');
    document.body.style.top = '';
    window.scrollTo(0, _scrollLockY);
  }
}
function sheetUnit(){ const m=MENU.find(x=>x.id===S.sheet.id); let p=priceOf(m);
  (m.opt||[]).forEach(gid=>{ const g=OPTS[gid]; (S.sheet.sel[gid]||[]).forEach(i=>p+=g.items[i].p); }); return p; }
function toggleOpt(gid,idx){ const g=OPTS[gid]; const cur=S.sheet.sel[gid]||[];
  if(g.multi){ S.sheet.sel[gid]=cur.includes(idx)?cur.filter(x=>x!==idx):[...cur,idx]; } else { S.sheet.sel[gid]=[idx]; }
  renderSheet(); }
function sheetQty(d){ S.sheet.qty=Math.max(1,S.sheet.qty+d); renderSheet(); }
function renderSheet(){

      ${g.items.map((it,i)=>`<div class="optrow ${g.multi?'multi':''} ${cur.includes(i)?'sel':''}" onclick="toggleOpt(${gid},${i})">
        <span class="optck">${cur.includes(i)?(g.multi?'✓':'●'):''}</span><span class="opt-nm">${it.n}</span>

  }).join('');
  $('sheet').innerHTML = `<div class="sheet">

/* --- 약관 동의 화면 --- */
function getTermsConfig(){
  const isKakao = S.authType === 'kakao';
  const isPrepay = S.payTiming === 'prepay' || S.orderType !== 'dinein';
  const isPostpay = !isPrepay;
  const terms = [];
  if(isPrepay){
    terms.push({ id:'tos',      label:'이용약관 동의', required:true,  link:true });
    terms.push({ id:'privacy',  label:'개인정보 수집·이용 동의 (개인정보 처리방침 포함)', required:true, link:true });
  }
  if(isPostpay){
    terms.push({ id:'location', label:'위치정보 수집·이용 동의 (위치정보 처리방침 포함)', required:false, link:true, pending:true });
  }
  if(!isKakao && isPrepay){
    terms.push({ id:'age',      label:'만 14세 이상임을 확인합니다', required:true,  link:false });
  }
  if(isKakao || isPrepay){
    terms.push({ id:'marketing',label:`이 가게의 쿠폰·이벤트 알림 수신 동의`, required:false, link:false });
  }
  return terms;
}

function goToTerms(){
  if(S.orderType==='preorder' && !S.pickup){ toast('수령 시간을 선택해 주세요'); return; }
  const notify = (S.orderType!=='dinein') || S.serve==='self';
  if(notify && (!S.phone || S.phone.length<4)){ toast('카카오 알림톡 받을 연락처 끝 4자리를 입력해 주세요'); $('phoneInput')&&$('phoneInput').focus(); return; }
  const terms = getTermsConfig();
  if(!terms.length){ placeOrder(); return; }
  S.termsChecked = {};
  terms.forEach(t=>S.termsChecked[t.id]=false);
  S.screen='terms'; render();
}

function scrTerms(){
  const ot=ORDER_TYPES[S.orderType];
  const isPostpay = S.orderType==='dinein' && S.payTiming==='postpay';
  const terms = getTermsConfig();
  const requiredIds = terms.filter(t=>t.required).map(t=>t.id);
  const allChecked = terms.every(t=>S.termsChecked[t.id]);
  const reqAllChecked = requiredIds.every(id=>S.termsChecked[id]);

  function toggleTerm(id){ S.termsChecked[id]=!S.termsChecked[id]; $('screen').innerHTML = scrTerms(); }
  function toggleAll(){
    const next = !allChecked;
    terms.forEach(t=>S.termsChecked[t.id]=next);
    $('screen').innerHTML = scrTerms();
  }

  // expose to global for inline onclick
  window._toggleTerm = function(id){ S.termsChecked[id]=!S.termsChecked[id]; $('screen').innerHTML = scrTerms(); };
  window._toggleAll  = function(){
    const next = !terms.every(t=>S.termsChecked[t.id]);
    terms.forEach(t=>S.termsChecked[t.id]=next);
    $('screen').innerHTML = scrTerms();
  };

  const rows = terms.map(t=>{
    const checked = S.termsChecked[t.id];
    const badge = t.pending
      ? `<span class="term-q">❓확인중</span>`
      : t.required
        ? `<span class="term-req">필수</span>`
        : `<span class="term-opt">선택</span>`;
    const link = t.link ? `<button class="term-link" onclick="event.stopPropagation();toast('약관 내용 보기 (준비 중)')">보기</button>` : '';
    return `<div class="term-row" onclick="_toggleTerm('${t.id}')">
      <span class="term-ck ${checked?'checked':''}">${checked?'✓':''}</span>
      <span class="term-label">${badge}${t.label}${link}</span>
    </div>`;
  }).join('');

  const allOn = terms.every(t=>S.termsChecked[t.id]);

  return `<div class="topbar"><button class="back" onclick="S.screen='checkout';render()">‹</button>
      <div><div class="ttl">약관 동의</div><div class="sub">${ot.emoji} ${ot.name}${S.orderType==='dinein'?' · '+STORE.table:''}</div></div></div>
    <div style="padding:16px 0 0;">
      <div class="terms-all" onclick="_toggleAll()">
        <span class="term-all-ck ${allOn?'checked':''}">${allOn?'✓':''}</span>
        <span class="lbl">전체 동의하기</span>
      </div>
      <div style="background:#fff;margin:8px 0 0;">
        ${rows}
      </div>
      ${!S.authType==='kakao'&&!terms.find(t=>t.id==='marketing')?'':`
      <div class="notice blue" style="margin:10px 14px 0;">
        ℹ️ <span>선택 항목에 동의하지 않아도 주문은 가능해요.</span>
      </div>`}
    </div>
    <div class="sec" style="margin-top:11px;">
      <div class="rowline"><span>상품 금액</span><span>${won(cartTotal())}원</span></div>
      <div class="rowline tot"><span>${isPostpay?'주문 금액':'결제 금액'}</span><span style="color:var(--blue);">${won(cartTotal())}원</span></div>
    </div>
    <button class="primarybtn" ${reqAllChecked?`onclick="placeOrder()"`:' disabled'}>${isPostpay?`주문 넣기 · ${won(cartTotal())}원`:`${won(cartTotal())}원 결제하기`}</button>
    <div style="height:20px;"></div>`;
}

function placeOrder(){
  S.orderNo='#20260515-'+String(50+Math.floor((cartTotal()%900))).padStart(4,'0'); S.screen='done'; render();
}

/* --- 완료 --- */
function scrDone(){
  const ot=ORDER_TYPES[S.orderType]; let head, statusHtml, extra='';
  if(S.orderType==='dinein'){ head='주문이 들어갔어요!';
    const acceptLine = S.payTiming==='postpay'
      ? `<div class="status-line"><span class="dot"></span> 주문 접수 · 주방으로 전달됐어요</div>`
      : `<div class="status-line"><span class="dot"></span> 결제 완료 · 주방으로 전달됐어요</div>`;
    const serveLine = S.serve==='self'
      ? `<div class="status-line"><span class="dot" style="background:var(--amber);"></span> 조리 중 — 준비되면 <b>카카오 알림톡</b>으로 알려드려요</div>
         <div class="status-line"><span class="dot" style="background:var(--line);"></span> ${STORE.table} 테이블 · 셀프 수령</div>`
      : `<div class="status-line"><span class="dot" style="background:var(--amber);"></span> 조리 중 — 준비되면 <b>직원이 자리로 가져다 드려요</b></div>
         <div class="status-line"><span class="dot" style="background:var(--line);"></span> ${STORE.table} 테이블 · 직접 서빙 (카카오 알림톡 없음)</div>`;
    const payLine = S.payTiming==='postpay'
      ? `<div class="status-line"><span class="dot" style="background:var(--line);"></span> 🧾 나갈 때 카운터에서 결제해 주세요</div>` : '';
    statusHtml = acceptLine + serveLine + payLine;
  } else if(S.orderType==='takeout'){ head='포장 주문 완료!';
    statusHtml=`<div class="status-line"><span class="dot"></span> 결제 완료 · 포장 준비를 시작했어요</div>
      <div class="status-line"><span class="dot" style="background:var(--amber);"></span> 약 <b>15~25분</b> 뒤 준비 완료 · 카카오 알림톡 발송</div>`;
    extra=`<div style="text-align:center;"><div class="qrbox"></div><div style="font-size:12px;color:var(--ink3);font-weight:700;margin-top:8px;">픽업 시 이 QR을 보여주세요</div></div>`;
  } else { head='포장 예약 신청 완료!';
    statusHtml=`<div class="status-line"><span class="dot" style="background:var(--amber);"></span> <b>사장님 수락 대기 중</b> — 수락하면 확정 알림이 와요</div>
      <div class="status-line"><span class="dot"></span> 결제 완료 · 수령 예정 <b>오늘 ${S.pickup}</b></div>`;
  }
  return `<div class="done"><div class="dlogo">${STORE.logo}</div><div class="ck">✓</div>
      <h2>${head}</h2><div class="ordno">주문번호 ${S.orderNo}</div></div>
    <div class="done-card"><div style="font-size:13px;font-weight:800;margin-bottom:6px;">${ot.emoji} ${ot.name} · ${STORE.name}${S.orderType==='dinein'?' · '+STORE.table:''}</div>
      ${statusHtml}${extra}
      <div style="border-top:1px solid var(--line2);margin-top:14px;padding-top:13px;">
        ${S.cart.map(c=>`<div class="rowline" style="padding:3px 0;"><span style="flex:1;">${c.name} ×${c.qty}</span><span style="color:var(--ink);font-weight:700;">${won(c.unit*c.qty)}원</span></div>`).join('')}
        <div class="rowline tot" style="font-size:15px;"><span>${(S.orderType==='dinein'&&S.payTiming==='postpay')?'결제 예정 · 나갈 때':'결제 금액 · '+S.pay}</span><span>${won(cartTotal())}원</span></div></div></div>
    <button class="primarybtn" onclick="resetOrder()">새 주문하기</button><div style="height:24px;"></div>`;
}
function resetOrder(){ S.cart=[]; S.sheet=null; S.pickup=null; S.pay='카드'; S.phone=''; S.orderNo=null; S.cat='전체'; S.screen='menu'; render(); }

/* --- 리뷰 / 매장정보 --- */
function stars(r){ return '★★★★★'.slice(0,r)+'☆☆☆☆☆'.slice(0,5-r); }
function avgRating(){ return (REVIEWS.reduce((s,v)=>s+v.r,0)/REVIEWS.length).toFixed(1); }
function reviewsSection(){
  if(!STORE.reviewOn) return '';
  return `<div class="rvsec">
    <div class="rv-head">
      <div><div class="rv-ttl">💬 손님 리뷰</div><div class="rv-sub">실제 방문 손님이 남긴 후기예요</div></div>
      <div class="rv-score"><span class="rv-num">⭐ ${avgRating()}</span><span class="rv-cnt">리뷰 ${REVIEWS.length}개</span></div>
    </div>
    ${REVIEWS.map(v=>`<div class="rv-card">
      <div class="rv-top"><span class="rv-stars">${stars(v.r)}</span><span class="rv-cust">${v.c}</span><span class="rv-date">${v.d}</span></div>
      <div class="rv-body">${v.b}</div>
      ${v.reply?`<div class="rv-reply"><b>사장님</b>${v.reply}</div>`:''}
    </div>`).join('')}
  </div>`;
}
function storeInfoSection(){
  return `<div class="stsec">
    <div class="st-ttl">🏪 매장 정보</div>
    <div class="st-row"><span class="st-k">대표자</span><span class="st-v">${STORE.owner}</span></div>
    <div class="st-row"><span class="st-k">매장 주소</span><span class="st-v">${STORE.addr}</span></div>
    <div class="st-row"><span class="st-k">사업자등록번호</span><span class="st-v">${STORE.bizNo}</span></div>
    <div class="st-row"><span class="st-k">매장 연락처</span><span class="st-v">${STORE.phone}</span></div>
    <div class="st-row"><span class="st-k">운영 시간</span><span class="st-v">${STORE.hours.map(h=>`${h.d} ${h.t}${h.note?` <span style="color:var(--ink4);">· ${h.note}</span>`:''}`).join('<br/>')}<br/><span style="color:var(--ink4);">라스트오더 ${STORE.lastOrder}</span></span></div>
    <div class="st-row"><span class="st-k">휴무일</span><span class="st-v">${STORE.holidays.join(' · ')}</span></div>
  </div>`;
}

/* --- 플로팅 스크롤 탑 버튼 --- */
function setupScrollTop(){
  window.onscroll = function(){
    const btn = $('scrollTopBtn');
    if(!btn) return;
    if(window.scrollY > 200) btn.classList.add('show');
    else btn.classList.remove('show');
  };
}
function scrollToTop(){ window.scrollTo({ top:0, behavior:'smooth' }); }

render();
</script>
</body>
</html>
