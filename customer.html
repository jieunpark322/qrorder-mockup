<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>소프트커피 합정점 · QR 주문</title>
<style>
  :root{
    --blue:#3182f6; --blue-d:#1b64da; --blue-50:#eef5ff;
    --ink:#191f28; --ink2:#4e5968; --ink3:#8b95a1; --ink4:#b0b8c1;
    --line:#e5e8eb; --line2:#f1f3f5; --bg:#f2f4f6; --card:#fff;
    --green:#12b886; --green-d:#0ca678; --red:#e03131; --amber:#f59f00;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Malgun Gothic',sans-serif;
    background:#d9dde2;color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;min-height:100vh;padding:0;}
  /* 폰 프레임 */
  .device{width:100%;max-width:440px;background:var(--bg);min-height:100vh;position:relative;
    box-shadow:0 0 0 1px rgba(0,0,0,.04),0 18px 50px rgba(0,0,0,.22);overflow:hidden;}
  @media(min-width:480px){ body{padding:22px 0;} .device{min-height:calc(100vh - 44px);border-radius:30px;} }
  .scroll{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:120px;}

  /* 상단 바 */
  .topbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;padding:14px 16px;}
  .topbar .back{font-size:20px;background:none;border:none;cursor:pointer;color:var(--ink);padding:2px 4px;margin-left:-4px;}
  .topbar .ttl{font-size:16px;font-weight:800;}
  .topbar .sub{font-size:11px;color:var(--ink3);font-weight:600;}
  .otchip{margin-left:auto;font-size:11px;font-weight:800;padding:5px 11px;border-radius:20px;background:var(--blue-50);color:var(--blue-d);display:flex;align-items:center;gap:4px;}

  /* 시작 화면 */
  .hero{background:linear-gradient(160deg,#3182f6,#1b64da);color:#fff;padding:30px 22px 26px;}
  .hero .store{font-size:23px;font-weight:800;letter-spacing:-.02em;}
  .hero .addr{font-size:12.5px;opacity:.85;margin-top:5px;}
  .hero .open{display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size:11.5px;font-weight:700;background:rgba(255,255,255,.18);padding:5px 11px;border-radius:20px;}
  .start-wrap{padding:20px 16px;}
  .start-q{font-size:15px;font-weight:800;margin:4px 2px 14px;}
  .ot-card{display:flex;align-items:center;gap:15px;background:#fff;border:2px solid var(--line);border-radius:16px;
    padding:18px 18px;margin-bottom:13px;cursor:pointer;transition:.15s;text-align:left;width:100%;font-family:inherit;}
  .ot-card:active{transform:scale(.985);}
  .ot-card:hover{border-color:var(--blue);box-shadow:0 6px 18px rgba(49,130,246,.12);}
  .ot-emoji{font-size:34px;width:54px;height:54px;display:flex;align-items:center;justify-content:center;background:var(--blue-50);border-radius:14px;flex-shrink:0;}
  .ot-name{font-size:17px;font-weight:800;}
  .ot-desc{font-size:12.5px;color:var(--ink3);margin-top:3px;}
  .ot-arrow{margin-left:auto;color:var(--ink4);font-size:20px;}

  /* 카테고리 탭 */
  .cattabs{position:sticky;top:57px;z-index:15;background:#fff;display:flex;gap:7px;padding:11px 14px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .cattab{flex-shrink:0;font-size:13px;font-weight:700;color:var(--ink3);padding:7px 14px;border-radius:20px;background:var(--bg);border:none;cursor:pointer;font-family:inherit;}
  .cattab.on{background:var(--ink);color:#fff;}

  /* 메뉴 카드 */
  .catsec-h{padding:16px 18px 7px;font-size:14px;font-weight:800;}
  .mcard{display:flex;gap:13px;padding:13px 16px;background:#fff;cursor:pointer;border-bottom:1px solid var(--line2);transition:background .12s;width:100%;border:none;font-family:inherit;text-align:left;align-items:center;}
  .mcard:active{background:var(--bg);}
  .mcard.out{opacity:.5;cursor:not-allowed;}
  .mimg{font-size:34px;width:62px;height:62px;display:flex;align-items:center;justify-content:center;background:var(--line2);border-radius:13px;flex-shrink:0;}
  .minfo{flex:1;min-width:0;}
  .mname{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .badge-out{font-size:10px;font-weight:800;color:var(--red);background:#fff0f0;padding:2px 7px;border-radius:6px;}
  .mdesc{font-size:12px;color:var(--ink3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mallerg{font-size:11px;margin-top:4px;}
  .mprice{font-size:15px;font-weight:800;margin-top:5px;}
  .mprice .was{font-size:11px;color:var(--ink4);font-weight:500;}
  .mplus{flex-shrink:0;align-self:center;width:30px;height:30px;border-radius:50%;background:var(--blue-50);color:var(--blue);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  /* 하단 장바구니 바 */
  .cartbar{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:calc(100% - 28px);max-width:412px;z-index:40;}
  .cartbtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:14px;padding:15px 18px;font-size:15px;font-weight:800;
    display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 8px 22px rgba(49,130,246,.4);font-family:inherit;}
  .cartbtn .cnt{background:#fff;color:var(--blue);min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:12.5px;}
  .cartbtn .amt{margin-left:auto;}
  .cartbtn:active{transform:scale(.99);}

  /* 바텀시트 */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:none;}
  .sheet-bg.on{display:block;}
  .sheet{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:440px;background:#fff;
    border-radius:22px 22px 0 0;max-height:88%;overflow-y:auto;animation:slideup .22s ease;}
  @keyframes slideup{from{transform:translate(-50%,100%);}to{transform:translate(-50%,0);}}
  .sheet-img{font-size:60px;text-align:center;padding:22px 0 6px;background:var(--line2);}
  .sheet-body{padding:18px 18px 12px;}
  .sheet-name{font-size:19px;font-weight:800;}
  .sheet-desc{font-size:13px;color:var(--ink3);margin-top:4px;}
  .sheet-base{font-size:15px;font-weight:800;margin-top:8px;}
  .optg{margin-top:20px;}
  .optg-h{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px;margin-bottom:9px;}
  .req{font-size:10px;font-weight:800;color:var(--blue);background:var(--blue-50);padding:2px 7px;border-radius:5px;}
  .opt-pick{font-size:10px;color:var(--ink3);font-weight:600;}
  .optrow{display:flex;align-items:center;gap:11px;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s;}
  .optrow.sel{border-color:var(--blue);background:var(--blue-50);}
  .optck{width:21px;height:21px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
  .optrow.multi .optck{border-radius:6px;}
  .optrow.sel .optck{background:var(--blue);border-color:var(--blue);}
  .opt-nm{font-size:14px;font-weight:600;flex:1;}
  .opt-pr{font-size:13px;color:var(--ink2);font-weight:700;}
  .qtyrow{display:flex;align-items:center;justify-content:space-between;margin-top:22px;padding-top:16px;border-top:1px solid var(--line2);}
  .qtyrow .lbl{font-size:15px;font-weight:800;}
  .stepper{display:flex;align-items:center;gap:16px;}
  .stepper button{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:20px;cursor:pointer;color:var(--ink);font-family:inherit;}
  .stepper .n{font-size:17px;font-weight:800;min-width:20px;text-align:center;}
  .sheet-foot{position:sticky;bottom:0;background:#fff;padding:13px 18px 18px;border-top:1px solid var(--line2);}
  .addbtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;display:flex;justify-content:center;gap:8px;font-family:inherit;}
  .addbtn:active{transform:scale(.99);}

  /* 장바구니/결제 공통 */
  .sec{background:#fff;margin:11px 0;padding:16px 18px;}
  .sec-h{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
  .citem{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line2);}
  .citem:last-child{border-bottom:none;}
  .ci-img{font-size:26px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:var(--line2);border-radius:10px;flex-shrink:0;}
  .ci-name{font-size:14px;font-weight:700;}
  .ci-opt{font-size:11.5px;color:var(--ink3);margin-top:2px;line-height:1.5;}
  .ci-bot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
  .ci-price{font-size:14px;font-weight:800;}
  .mini-step{display:flex;align-items:center;gap:11px;}
  .mini-step button{width:27px;height:27px;border-radius:7px;border:1.5px solid var(--line);background:#fff;font-size:15px;cursor:pointer;font-family:inherit;color:var(--ink);}
  .mini-step .n{font-size:14px;font-weight:800;min-width:16px;text-align:center;}
  .ci-del{font-size:11px;color:var(--ink4);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;}

  .rowline{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;padding:5px 0;color:var(--ink2);}
  .rowline.tot{font-size:17px;font-weight:800;color:var(--ink);padding-top:11px;margin-top:5px;border-top:1px solid var(--line);}
  .info-pill{display:flex;gap:9px;align-items:flex-start;background:var(--blue-50);border:1px solid #d3e4ff;border-radius:11px;padding:12px 14px;font-size:12.5px;color:var(--blue-d);line-height:1.6;}
  .info-pill.amber{background:#fff8e6;border-color:#ffe3a3;color:#92400e;}

  /* 칩 선택 (시간/결제수단/테이블) */
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .pchip{font-size:13px;font-weight:700;padding:10px 14px;border:1.5px solid var(--line);border-radius:11px;background:#fff;cursor:pointer;color:var(--ink2);font-family:inherit;display:flex;align-items:center;gap:6px;}
  .pchip.on{border-color:var(--blue);background:var(--blue-50);color:var(--blue-d);}
  .timechip{min-width:74px;justify-content:center;}

  .field{margin-top:13px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px;}
  .field input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;font-size:15px;font-family:inherit;}
  .field input:focus{outline:none;border-color:var(--blue);}

  /* 완료 */
  .done{text-align:center;padding:46px 24px 20px;}
  .done .ck{width:84px;height:84px;border-radius:50%;background:var(--green);color:#fff;font-size:46px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 10px 26px rgba(18,184,134,.4);animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.12);}100%{transform:scale(1);}}
  .done h2{font-size:21px;font-weight:800;margin:0 0 7px;}
  .done .ordno{font-size:13px;color:var(--ink3);font-weight:700;}
  .done-card{background:#fff;border-radius:16px;margin:22px 16px;padding:20px;text-align:left;box-shadow:0 4px 16px rgba(0,0,0,.05);}
  .status-line{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--ink);padding:9px 0;}
  .status-line .dot{width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .qrbox{width:120px;height:120px;margin:14px auto 4px;border-radius:14px;background:repeating-conic-gradient(#191f28 0% 25%,#fff 0% 50%) 50%/16px 16px;border:7px solid #fff;box-shadow:0 0 0 1px var(--line);}
  .ghostbtn{display:block;width:calc(100% - 32px);margin:8px 16px;background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:15px;font-size:14.5px;font-weight:800;color:var(--ink2);cursor:pointer;font-family:inherit;}
  .primarybtn{display:block;width:calc(100% - 32px);margin:20px 16px 8px;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:16px;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 22px rgba(49,130,246,.36);}
  .primarybtn:active,.cartbtn:active{transform:scale(.99);}
  .demo-tag{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:80;font-size:10px;font-weight:800;letter-spacing:.04em;color:#fff;background:rgba(25,31,40,.78);padding:3px 11px;border-radius:20px;pointer-events:none;}
</style>
</head>
<body>
<div class="device">
  <div class="scroll" id="screen"></div>
  <div id="cartbar"></div>
</div>
<div class="sheet-bg" id="sheetbg" onclick="if(event.target===this)closeSheet()"><div id="sheet"></div></div>
<div class="demo-tag">QR오더 · 손님 화면 데모</div>

<script>
/* ===== 매장/메뉴/옵션 데이터 — 사장님 사이트 spec 반영 ===== */
const STORE = { name:'소프트커피 합정점', addr:'서울 마포구 양화로 45', hours:'09:00 ~ 22:00', table:'T03' };

// 주문 유형 — 사장님이 주문 방식에서 켠 채널 (먹고가기·포장하기·미리주문)
const ORDER_TYPES = {
  dinein:   { key:'dinein',   name:'먹고가기', emoji:'🍽️', desc:'매장에서 드시고 가요 · 테이블로 받기' },
  takeout:  { key:'takeout',  name:'포장하기', emoji:'🥡', desc:'지금 주문하고 포장해서 가져가요' },
  preorder: { key:'preorder', name:'미리주문', emoji:'📅', desc:'원하는 시간에 맞춰 미리 주문해요' },
};

const ALLERGEN_ICON = { milk:'🥛', soy:'🫘', wheat:'🌾', egg:'🥚', peach:'🍑', peanut:'🥜' };

// 옵션 그룹 (샷 추가=중복, 사이즈/얼음=필수 1개)
const OPTS = {
  1:{ id:1, name:'샷 추가',   multi:true,  required:false, items:[{n:'샷 1번 추가',p:600},{n:'샷 2번 추가',p:1200},{n:'디카페인 변경',p:500}] },
  2:{ id:2, name:'사이즈',     multi:false, required:true,  items:[{n:'Regular',p:0},{n:'Large',p:800}] },
  3:{ id:3, name:'얼음·온도',  multi:false, required:true,  items:[{n:'얼음 보통',p:0},{n:'얼음 적게',p:0},{n:'따뜻하게',p:0}] },
};

// 메뉴 — status 판매중/품절/숨김, price(매장가)/takeoutPrice(포장가), opt(옵션 그룹)
const MENU = [
  { id:1, name:'아메리카노',        cat:'커피',   price:4500, takeout:4000, status:'판매중', img:'☕', opt:[2,3,1], desc:'에티오피아 원두 100%', allerg:[] },
  { id:2, name:'카페라떼',          cat:'커피',   price:5000, takeout:4500, status:'판매중', img:'🥛', opt:[2,3,1], desc:'에티오피아 원두 100%', allerg:['milk'] },
  { id:3, name:'바닐라라떼',        cat:'커피',   price:5500, takeout:5000, status:'판매중', img:'🥤', opt:[2,3,1], desc:'부드러운 바닐라 시그니처', allerg:['milk','soy'] },
  { id:4, name:'아이스 아메리카노', cat:'커피',   price:4500, takeout:4000, status:'판매중', img:'🧊', opt:[2,3,1], desc:'', allerg:[] },
  { id:5, name:'복숭아 아이스티',   cat:'음료',   price:4800, takeout:4300, status:'판매중', img:'🍑', opt:[2,3],   desc:'', allerg:['peach'] },
  { id:6, name:'레몬에이드',        cat:'음료',   price:5200, takeout:4700, status:'판매중', img:'🍋', opt:[2,3],   desc:'상큼한 수제 레몬', allerg:[] },
  { id:7, name:'크로아상',          cat:'디저트', price:3800, takeout:null, status:'판매중', img:'🥐', opt:[],      desc:'매일 매장에서 구워요', allerg:['wheat','egg','milk'] },
  { id:8, name:'치즈케이크',        cat:'디저트', price:5500, takeout:null, status:'품절',   img:'🍰', opt:[],      desc:'', allerg:['egg','milk','wheat'] },
  { id:9, name:'마들렌',            cat:'디저트', price:2800, takeout:null, status:'숨김',   img:'🍪', opt:[],      desc:'', allerg:[] },
];
const CATS = ['커피','음료','디저트'];
const PAY_METHODS = [{k:'카드',e:'💳'},{k:'카카오페이',e:'🟡'},{k:'네이버페이',e:'🟢'},{k:'토스페이',e:'🔵'}];

/* ===== 상태 ===== */
const S = {
  screen:'start',          // start | menu | cart | checkout | done
  orderType:null,          // dinein | takeout | preorder
  cat:'전체',
  cart:[],                 // {key,id,name,img,qty,unit,optText}
  sheet:null,              // 편집 중 메뉴 {id, sel:{gid:[idx...]}, qty}
  pickup:null,             // 미리주문 수령 시간
  pay:'카드',
  phone:'',
  orderNo:null,
};
const won = n => n.toLocaleString('ko-KR');
const priceOf = m => (S.orderType==='dinein') ? m.price : (m.takeout!=null ? m.takeout : m.price);
const isOut = m => m.status==='품절';
const visibleMenu = () => MENU.filter(m=>m.status!=='숨김');

/* ===== 렌더 ===== */
const $ = id => document.getElementById(id);
function render(){
  const r = { start:scrStart, menu:scrMenu, cart:scrCart, checkout:scrCheckout, done:scrDone }[S.screen];
  $('screen').innerHTML = r();
  $('screen').scrollTop = (S.screen==='menu' && S._keepScroll) ? $('screen').scrollTop : 0;
  renderCartBar();
}

/* --- 시작: 주문 유형 선택 --- */
function scrStart(){
  return `
    <div class="hero">
      <div class="store">${STORE.name}</div>
      <div class="addr">📍 ${STORE.addr}</div>
      <div class="open">🟢 영업 중 · ${STORE.hours}</div>
    </div>
    <div class="start-wrap">
      <div class="start-q">어떻게 주문하시겠어요?</div>
      ${Object.values(ORDER_TYPES).map(t=>`
        <button class="ot-card" onclick="pickType('${t.key}')">
          <span class="ot-emoji">${t.emoji}</span>
          <span style="flex:1;min-width:0;">
            <span class="ot-name">${t.name}</span>
            <span class="ot-desc" style="display:block;">${t.desc}</span>
          </span>
          <span class="ot-arrow">›</span>
        </button>
      `).join('')}
      <div class="info-pill" style="margin-top:8px;">💡 <span>${STORE.table} 테이블에서 QR을 스캔했어요. 먹고가기는 이 테이블로 주문이 연결돼요.</span></div>
    </div>`;
}
function pickType(t){ S.orderType=t; S.screen='menu'; S.cat='전체'; render(); }

/* --- 메뉴판 --- */
function scrMenu(){
  const ot = ORDER_TYPES[S.orderType];
  const list = (S.cat==='전체'?CATS:[S.cat]).map(cat=>{
    const items = visibleMenu().filter(m=>m.cat===cat);
    if(!items.length) return '';
    return `<div class="catsec-h">${cat}</div>` + items.map(menuCard).join('');
  }).join('');
  return `
    <div class="topbar">
      <button class="back" onclick="goStart()">‹</button>
      <div><div class="ttl">${STORE.name}</div><div class="sub">${STORE.table} 테이블</div></div>
      <span class="otchip">${ot.emoji} ${ot.name} ✎</span>
    </div>
    <div class="cattabs">
      ${['전체',...CATS].map(c=>`<button class="cattab ${S.cat===c?'on':''}" onclick="setCat('${c}')">${c}</button>`).join('')}
    </div>
    ${S.orderType==='takeout'?`<div class="info-pill amber" style="margin:12px 14px 0;">🥡 <span>포장 주문은 <b>포장가</b>로 계산돼요. 메뉴별로 매장가와 다를 수 있어요.</span></div>`:''}
    ${S.orderType==='preorder'?`<div class="info-pill" style="margin:12px 14px 0;">📅 <span>미리주문은 다음 단계에서 <b>수령 시간</b>을 정하고, 사장님이 수락하면 확정돼요.</span></div>`:''}
    <div style="padding-top:4px;">${list}</div>`;
}
function menuCard(m){
  const out = isOut(m);
  const allerg = (m.allerg||[]).map(a=>ALLERGEN_ICON[a]||'').join('');
  return `
    <button class="mcard ${out?'out':''}" ${out?'disabled':`onclick="openSheet(${m.id})"`}>
      <span class="mimg">${m.img}</span>
      <span class="minfo">
        <span class="mname">${m.name} ${out?'<span class="badge-out">품절</span>':''}</span>
        ${m.desc?`<span class="mdesc" style="display:block;">${m.desc}</span>`:''}
        ${allerg?`<span class="mallerg" style="display:block;" title="알레르기">${allerg}</span>`:''}
        <span class="mprice" style="display:block;">${won(priceOf(m))}원${S.orderType!=='dinein'&&m.takeout!=null&&m.takeout!==m.price?` <span class="was">매장 ${won(m.price)}원</span>`:''}</span>
      </span>
      ${out?'':'<span class="mplus">+</span>'}
    </button>`;
}
function setCat(c){ S.cat=c; render(); }
function goStart(){ if(S.cart.length && !confirm('주문을 처음부터 다시 시작할까요? 담은 메뉴가 비워져요.'))return; S.cart=[]; S.orderType=null; S.screen='start'; render(); }

/* --- 옵션 바텀시트 --- */
function openSheet(id){
  const m = MENU.find(x=>x.id===id);
  const sel = {};
  (m.opt||[]).forEach(gid=>{ const g=OPTS[gid]; sel[gid] = (!g.multi && g.required) ? [0] : []; });
  S.sheet = { id, sel, qty:1 };
  renderSheet(); $('sheetbg').classList.add('on');
}
function closeSheet(){ S.sheet=null; $('sheetbg').classList.remove('on'); $('sheet').innerHTML=''; }
function sheetUnit(){
  const m=MENU.find(x=>x.id===S.sheet.id); let p=priceOf(m);
  (m.opt||[]).forEach(gid=>{ const g=OPTS[gid]; (S.sheet.sel[gid]||[]).forEach(i=>p+=g.items[i].p); });
  return p;
}
function toggleOpt(gid,idx){
  const g=OPTS[gid]; const cur=S.sheet.sel[gid]||[];
  if(g.multi){ S.sheet.sel[gid] = cur.includes(idx)?cur.filter(x=>x!==idx):[...cur,idx]; }
  else { S.sheet.sel[gid]=[idx]; }
  renderSheet();
}
function sheetQty(d){ S.sheet.qty=Math.max(1,S.sheet.qty+d); renderSheet(); }
function renderSheet(){
  const m=MENU.find(x=>x.id===S.sheet.id);
  const groups=(m.opt||[]).map(gid=>{
    const g=OPTS[gid]; const cur=S.sheet.sel[gid]||[];
    return `
      <div class="optg">
        <div class="optg-h">${g.name} ${g.required?'<span class="req">필수</span>':'<span class="opt-pick">선택 · 중복 가능</span>'}</div>
        ${g.items.map((it,i)=>`
          <div class="optrow ${g.multi?'multi':''} ${cur.includes(i)?'sel':''}" onclick="toggleOpt(${gid},${i})">
            <span class="optck">${cur.includes(i)?(g.multi?'✓':'●'):''}</span>
            <span class="opt-nm">${it.n}</span>
            <span class="opt-pr">${it.p>0?'+'+won(it.p)+'원':'무료'}</span>
          </div>`).join('')}
      </div>`;
  }).join('');
  $('sheet').innerHTML = `
    <div class="sheet">
      <div class="sheet-img">${m.img}</div>
      <div class="sheet-body">
        <div class="sheet-name">${m.name}</div>
        ${m.desc?`<div class="sheet-desc">${m.desc}</div>`:''}
        <div class="sheet-base">${won(priceOf(m))}원${S.orderType!=='dinein'&&m.takeout!=null&&m.takeout!==m.price?` <span style="font-size:11px;color:var(--ink4);font-weight:600;">(포장가)</span>`:''}</div>
        ${groups || '<div style="margin-top:16px;font-size:13px;color:var(--ink3);">옵션 없이 바로 담을 수 있어요.</div>'}
        <div class="qtyrow">
          <span class="lbl">수량</span>
          <span class="stepper">
            <button onclick="sheetQty(-1)">−</button>
            <span class="n">${S.sheet.qty}</span>
            <button onclick="sheetQty(1)">+</button>
          </span>
        </div>
      </div>
      <div class="sheet-foot">
        <button class="addbtn" onclick="addToCart()">담기 · ${won(sheetUnit()*S.sheet.qty)}원</button>
      </div>
    </div>`;
}
function addToCart(){
  const m=MENU.find(x=>x.id===S.sheet.id);
  const optText=(m.opt||[]).flatMap(gid=>(S.sheet.sel[gid]||[]).map(i=>OPTS[gid].items[i].n)).join(', ');
  const unit=sheetUnit();
  const key=S.sheet.id+'|'+optText;
  const ex=S.cart.find(c=>c.key===key);
  if(ex) ex.qty+=S.sheet.qty;
  else S.cart.push({ key, id:m.id, name:m.name, img:m.img, qty:S.sheet.qty, unit, optText });
  closeSheet(); S._keepScroll=true; render(); S._keepScroll=false;
  toast(`'${m.name}' ${S.sheet?'':''}담았어요`);
}
let _toastT;
function toast(msg){
  let el=$('toast'); if(!el){ el=document.createElement('div'); el.id='toast';
    el.style.cssText='position:fixed;left:50%;bottom:92px;transform:translateX(-50%);z-index:90;background:rgba(25,31,40,.92);color:#fff;font-size:13px;font-weight:700;padding:11px 18px;border-radius:22px;transition:opacity .25s;max-width:380px;';
    document.body.appendChild(el); }
  el.textContent='✓ '+msg; el.style.opacity='1';
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.style.opacity='0',1500);
}

/* --- 장바구니 바 --- */
function cartCount(){ return S.cart.reduce((s,c)=>s+c.qty,0); }
function cartTotal(){ return S.cart.reduce((s,c)=>s+c.unit*c.qty,0); }
function renderCartBar(){
  const showOn = (S.screen==='menu');
  if(!showOn || S.cart.length===0){ $('cartbar').innerHTML=''; return; }
  $('cartbar').innerHTML = `
    <div class="cartbar"><button class="cartbtn" onclick="S.screen='cart';render()">
      <span class="cnt">${cartCount()}</span> 장바구니 보기 <span class="amt">${won(cartTotal())}원 ›</span>
    </button></div>`;
}

/* --- 장바구니 --- */
function cartLine(c,i){
  return `
    <div class="citem">
      <span class="ci-img">${c.img}</span>
      <div style="flex:1;min-width:0;">
        <div class="ci-name">${c.name}</div>
        ${c.optText?`<div class="ci-opt">${c.optText}</div>`:''}
        <div class="ci-bot">
          <span class="mini-step">
            <button onclick="chgQty(${i},-1)">−</button>
            <span class="n">${c.qty}</span>
            <button onclick="chgQty(${i},1)">+</button>
          </span>
          <span class="ci-price">${won(c.unit*c.qty)}원</span>
        </div>
        <div style="margin-top:6px;"><button class="ci-del" onclick="delLine(${i})">삭제</button></div>
      </div>
    </div>`;
}
function chgQty(i,d){ S.cart[i].qty+=d; if(S.cart[i].qty<=0) S.cart.splice(i,1); if(!S.cart.length){S.screen='menu';} render(); }
function delLine(i){ S.cart.splice(i,1); if(!S.cart.length)S.screen='menu'; render(); }
function scrCart(){
  const ot=ORDER_TYPES[S.orderType];
  return `
    <div class="topbar"><button class="back" onclick="S.screen='menu';render()">‹</button>
      <div><div class="ttl">장바구니</div><div class="sub">${ot.emoji} ${ot.name}</div></div></div>
    <div class="sec"><div class="sec-h">🛒 담은 메뉴 ${cartCount()}개</div>
      ${S.cart.map(cartLine).join('')}
      <button class="ghostbtn" style="width:100%;margin:14px 0 0;" onclick="S.screen='menu';render()">+ 메뉴 더 담기</button>
    </div>
    <div class="sec">
      <div class="rowline"><span>상품 금액</span><span>${won(cartTotal())}원</span></div>
      <div class="rowline tot"><span>합계</span><span>${won(cartTotal())}원</span></div>
    </div>
    <button class="primarybtn" onclick="S.screen='checkout';render()">${won(cartTotal())}원 주문하기</button>
    <div style="height:20px;"></div>`;
}

/* --- 결제 --- */
function timeSlots(){ const out=[]; for(let h=12;h<=20;h++){ out.push(h+':00',h+':30'); } return out; }
function scrCheckout(){
  const ot=ORDER_TYPES[S.orderType];
  const needTime = S.orderType==='preorder';
  return `
    <div class="topbar"><button class="back" onclick="S.screen='cart';render()">‹</button>
      <div><div class="ttl">주문 확인 · 결제</div><div class="sub">${ot.emoji} ${ot.name}</div></div></div>

    <div class="sec"><div class="sec-h">📋 주문 내용</div>
      ${S.cart.map(c=>`<div class="rowline"><span style="flex:1;">${c.name} ${c.optText?`<span style="color:var(--ink4);font-size:11.5px;">· ${c.optText}</span>`:''} ×${c.qty}</span><span style="font-weight:700;color:var(--ink);">${won(c.unit*c.qty)}원</span></div>`).join('')}
    </div>

    ${S.orderType==='dinein'?`
      <div class="sec"><div class="sec-h">🍽️ 받는 방법</div>
        <div class="info-pill">🪑 <span><b>${STORE.table} 테이블</b>에서 주문했어요. 음식이 준비되면 <b>알림톡</b>으로 알려드리고, 손님이 직접 받는 셀프 수령이에요.</span></div>
      </div>`:''}
    ${S.orderType==='takeout'?`
      <div class="sec"><div class="sec-h">🥡 포장 안내</div>
        <div class="info-pill amber">⏱️ <span>결제 후 <b>약 15~25분</b> 뒤 준비돼요. 준비되면 알림톡으로 알려드려요.</span></div>
      </div>`:''}
    ${needTime?`
      <div class="sec"><div class="sec-h">📅 수령 시간 <span class="req">필수</span></div>
        <div class="chips">${timeSlots().map(t=>`<button class="pchip timechip ${S.pickup===t?'on':''}" onclick="S.pickup='${t}';render()">${t}</button>`).join('')}</div>
        <div class="info-pill amber" style="margin-top:12px;">📨 <span>주문하면 <b>사장님이 수락</b>해야 확정돼요. 영업 종료 30분 전까지 신청할 수 있어요.</span></div>
      </div>`:''}

    <div class="sec"><div class="sec-h">💳 결제 수단 <span class="opt-pick" style="font-weight:600;">선불 · 주문 시 바로 결제</span></div>
      <div class="chips">${PAY_METHODS.map(p=>`<button class="pchip ${S.pay===p.k?'on':''}" onclick="S.pay='${p.k}';render()">${p.e} ${p.k}</button>`).join('')}</div>
      <div class="field"><label>연락처 (주문 알림용 · 끝 4자리)</label>
        <input id="phoneInput" inputmode="numeric" maxlength="4" placeholder="1234" value="${S.phone}" oninput="S.phone=this.value.replace(/[^0-9]/g,'')" /></div>
    </div>

    <div class="sec">
      <div class="rowline"><span>상품 금액</span><span>${won(cartTotal())}원</span></div>
      <div class="rowline tot"><span>결제 금액</span><span style="color:var(--blue);">${won(cartTotal())}원</span></div>
    </div>
    <button class="primarybtn" onclick="placeOrder()">${won(cartTotal())}원 결제하기</button>
    <div style="height:20px;"></div>`;
}
function placeOrder(){
  if(S.orderType==='preorder' && !S.pickup){ toast('수령 시간을 선택해 주세요'); return; }
  if(!S.phone || S.phone.length<4){ toast('연락처 끝 4자리를 입력해 주세요'); $('phoneInput')&&$('phoneInput').focus(); return; }
  S.orderNo = '#20260515-' + String(50 + Math.floor((cartTotal()%900))).padStart(4,'0');
  S.screen='done'; render();
}

/* --- 완료 --- */
function scrDone(){
  const ot=ORDER_TYPES[S.orderType];
  let head, statusHtml, extra='';
  if(S.orderType==='dinein'){
    head='주문이 들어갔어요!';
    statusHtml=`
      <div class="status-line"><span class="dot"></span> 결제 완료 · 주방으로 전달됐어요</div>
      <div class="status-line"><span class="dot" style="background:var(--amber);"></span> 조리 중 — 준비되면 <b>알림톡</b>으로 알려드려요</div>
      <div class="status-line"><span class="dot" style="background:var(--line);"></span> ${STORE.table} 테이블 · 셀프 수령</div>`;
  } else if(S.orderType==='takeout'){
    head='포장 주문 완료!';
    statusHtml=`
      <div class="status-line"><span class="dot"></span> 결제 완료 · 포장 준비를 시작했어요</div>
      <div class="status-line"><span class="dot" style="background:var(--amber);"></span> 약 <b>15~25분</b> 뒤 준비 완료 · 알림톡 발송</div>`;
    extra=`<div style="text-align:center;"><div class="qrbox"></div><div style="font-size:12px;color:var(--ink3);font-weight:700;margin-top:8px;">픽업 시 이 QR을 보여주세요</div></div>`;
  } else {
    head='미리주문 신청 완료!';
    statusHtml=`
      <div class="status-line"><span class="dot" style="background:var(--amber);"></span> <b>사장님 수락 대기 중</b> — 수락하면 확정 알림이 와요</div>
      <div class="status-line"><span class="dot"></span> 결제 완료 · 수령 예정 <b>오늘 ${S.pickup}</b></div>`;
  }
  return `
    <div class="done">
      <div class="ck">✓</div>
      <h2>${head}</h2>
      <div class="ordno">주문번호 ${S.orderNo}</div>
    </div>
    <div class="done-card">
      <div style="font-size:13px;font-weight:800;margin-bottom:6px;">${ot.emoji} ${ot.name} · ${STORE.name}</div>
      ${statusHtml}
      ${extra}
      <div style="border-top:1px solid var(--line2);margin-top:14px;padding-top:13px;">
        ${S.cart.map(c=>`<div class="rowline" style="padding:3px 0;"><span style="flex:1;">${c.name} ×${c.qty}</span><span style="color:var(--ink);font-weight:700;">${won(c.unit*c.qty)}원</span></div>`).join('')}
        <div class="rowline tot" style="font-size:15px;"><span>결제 금액 · ${S.pay}</span><span>${won(cartTotal())}원</span></div>
      </div>
    </div>
    <button class="primarybtn" onclick="resetAll()">새 주문하기</button>
    <div style="height:24px;"></div>`;
}
function resetAll(){ Object.assign(S,{screen:'start',orderType:null,cat:'전체',cart:[],sheet:null,pickup:null,pay:'카드',phone:'',orderNo:null}); render(); }

render();
</script>
</body>
</html>
