  `;
  return { wf, tools, stats };
}

/* ============================================================
   영역 도구 — 샘플 / 백업 / 초기화
   ============================================================ */
function genCode(prefix){
  const used = new Set([
    ...MENUS.map(m=>m.code),
    ...OPT_GROUPS.map(o=>o.code),
    ...SETS.map(s=>s.code),
  ]);
  while(true){
    const n = String(Math.floor(Math.random()*899999) + 100000);
    const code = `${prefix}${n.slice(1)}`;
    if (!used.has(code)) return code;
  }
}

  if (typeof m.stock === 'undefined')  m.stock  = null;   // null = 무제한
  if (typeof m.sold === 'undefined')   m.sold   = 0;
  if (typeof m.manualSoldOut === 'undefined') m.manualSoldOut = false;
  // soldOutKind 필드는 더 이상 사용 안 함 — 품절 단일 상태로 통합됨
  if (typeof m.takeoutPrice === 'undefined') m.takeoutPrice = null;  // null = 매장가 동일 적용
  // 분류 태그 — 사장님 내부 검색·구분용 자유 키워드 (손님 화면에는 안 노출)
  if (typeof m.catL2 === 'undefined') m.catL2 = '';
  if (typeof m.catL3 === 'undefined') m.catL3 = '';
  if (typeof m.tag3  === 'undefined') m.tag3  = '';
  if (typeof m.maxQty === 'undefined') m.maxQty = null;  // null = 제한 없음 (1회 주문 최대 수량)
  // 옵션 항목별 추가 횟수 — 메뉴 측에서 옵션별로 따로 설정 (옵션 그룹의 기본값을 덮어씀)
  // 구조: { groupId: { itemIdx: maxQty } } — 예) {1: {0: 3, 1: 1}}는 옵션 그룹 1의 0번 항목 최대 3회, 1번 항목 1회
  if (typeof m.optMaxQty === 'undefined' || m.optMaxQty===null) m.optMaxQty = {};
  if (typeof m.badges === 'undefined') m.badges = [];
  // 알레르기 정보 — 사장님 자유 입력 (텍스트). 옛 allergens 배열은 텍스트로 마이그레이션
  if (typeof m.allergyText === 'undefined') {
    if (Array.isArray(m.allergens) && m.allergens.length>0 && typeof ALLERGENS!=='undefined'){
      m.allergyText = m.allergens.map(c=>ALLERGENS.find(a=>a.code===c)?.label||c).join(', ');
    } else {
      m.allergyText = '';
    }
  }
  if (!m.schedule) m.schedule = { enabled:false, days:[1,2,3,4,5,6,0], start:'09:00', end:'22:00' };
  if (!m.discount) m.discount = { enabled:false, days:[1,2,3,4,5], start:'14:00', end:'17:00', rate:20 };
}

// 메뉴 사진 — 실제 이미지(data:/http:) vs 이모지 vs 없음
function isMenuImageData(img){ return typeof img==='string' && (img.startsWith('data:') || img.startsWith('http')); }
function menuImgHtml(img, size=32, radius=8){
  if(!img) return '';
  if(isMenuImageData(img)){
    return `<img src="${img}" style="width:${size}px;height:${size}px;border-radius:${radius}px;object-fit:cover;display:block;" alt="" />`;
  }
  return `<span style="font-size:${Math.round(size*0.7)}px;line-height:1;">${img}</span>`;
}
function onMenuEditImgUpload(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ alert('이미지 파일을 골라 주세요. (JPG·PNG)'); return; }
  if(file.size > 5*1024*1024){ alert('사진이 너무 커요. 5MB 이하 파일로 올려 주세요.'); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{ state._menuEdit.img = e.target.result; renderMenuEditModal(); };
  reader.readAsDataURL(file);
}

function toggleSel(selKey, id){
  const s = state[selKey];
  if (s.has(id)) s.delete(id); else s.add(id);

function toggleSelAll(selKey, ids){
  const s = state[selKey];
  const allOn = ids.every(id=>s.has(id));
  if (allOn) ids.forEach(id=>s.delete(id));
  else ids.forEach(id=>s.add(id));

// 행 순서 드래그 — '≡' 손잡이 + HTML5 drag-and-drop
let _dragSrc = null; // { arrName, idx }
function dragHandleTd(arrName, idx, num){
  const numHtml = num != null ? `<b style="margin-right:6px;color:var(--ink-3);font-variant-numeric:tabular-nums;">${num}</b>` : '';
  return `<td style="white-space:nowrap;">${numHtml}<span class="drag-handle" title="끌어서 순서 바꾸기">≡</span></td>`;
}
function dragRowAttrs(arrName, idx){
  return `draggable="true"
    ondragstart="dragRowStart(event,'${arrName}',${idx})"
    ondragover="dragRowOver(event,'${arrName}',${idx})"
    ondragleave="dragRowLeave(event)"
    ondrop="dragRowDrop(event,'${arrName}',${idx})"
    ondragend="dragRowEnd()"`;
}
function _getArrByName(name){
  return ({ MENUS, OPT_GROUPS, SETS, CAT_MENU })[name];
}
function dragRowStart(ev, arrName, idx){
  _dragSrc = { arrName, idx };
  ev.dataTransfer.effectAllowed = 'move';
  try { ev.dataTransfer.setData('text/plain', arrName+':'+idx); } catch(e){}
  ev.currentTarget.classList.add('drag-source');
}
function dragRowOver(ev, arrName, idx){
  if(!_dragSrc || _dragSrc.arrName !== arrName) return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  const tr = ev.currentTarget;
  const rect = tr.getBoundingClientRect();
  const above = ev.clientY < rect.top + rect.height/2;
  document.querySelectorAll('tr.drag-over-top, tr.drag-over-bottom').forEach(r=>r.classList.remove('drag-over-top','drag-over-bottom'));
  tr.classList.add(above ? 'drag-over-top' : 'drag-over-bottom');
}
function dragRowLeave(ev){
  // 행에서 완전히 벗어났을 때만 인디케이터 제거
  if(ev.currentTarget.contains(ev.relatedTarget)) return;
  ev.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
}
function dragRowDrop(ev, arrName, idx){
  if(!_dragSrc || _dragSrc.arrName !== arrName){ dragRowEnd(); return; }
  ev.preventDefault();
  const arr = _getArrByName(arrName);
  if(!arr){ dragRowEnd(); return; }
  const srcIdx = _dragSrc.idx;
  let dstIdx = idx;
  const tr = ev.currentTarget;
  const rect = tr.getBoundingClientRect();
  const above = ev.clientY < rect.top + rect.height/2;
  if(!above) dstIdx = dstIdx + 1;
  if(srcIdx === dstIdx || srcIdx === dstIdx - 1 && !above && false){
    // 자기 자신 위치 — 무동작
  }
  if(srcIdx !== dstIdx){
    const [moved] = arr.splice(srcIdx, 1);
    if(srcIdx < dstIdx) dstIdx--;
    arr.splice(dstIdx, 0, moved);
  }
  _dragSrc = null;
  document.querySelectorAll('tr.drag-source, tr.drag-over-top, tr.drag-over-bottom').forEach(r=>r.classList.remove('drag-source','drag-over-top','drag-over-bottom'));
  renderApp();
}
function dragRowEnd(){
  document.querySelectorAll('tr.drag-source, tr.drag-over-top, tr.drag-over-bottom').forEach(r=>r.classList.remove('drag-source','drag-over-top','drag-over-bottom'));
  _dragSrc = null;
}

function effectiveStatus(m){
  ensureMenuExtras(m);
  if (m.manualSoldOut) return { kind:'manual-out', label: '품절', pill:'cancel' };
  if (m.stock != null && m.sold >= m.stock) return { kind:'auto-out', label:'자동 품절', pill:'cancel' };
  if (m.status === '숨김') return { kind:'hidden', label:'숨김', pill:'hold' };
  if (m.status === '품절') return { kind:'out', label:'품절', pill:'partial' };
  return { kind:'on', label:'판매중', pill:'done' };
}
function stockLeftLabel(m){
  ensureMenuExtras(m);
  if (m.stock == null) return '제한 없음';
  const left = Math.max(0, m.stock - m.sold);
  if (left === 0) return '0개 (자동 품절)';
  if (left <= 3)  return `잔여 ${left}개`;
  return `잔여 ${left}/${m.stock}개`;
}
function scheduleLabel(sch){
  if (!sch || !sch.enabled) return '항상';
  const ds = sch.days.slice().sort().map(d=>DOW_KO[d]).join('·');
  return `${ds} ${sch.start}~${sch.end}`;
}
function discountLabel(d){
  if (!d || !d.enabled) return '';
  const ds = d.days.slice().sort().map(x=>DOW_KO[x]).join('·');
  return `${d.rate}%↓ · ${ds} ${d.start}~${d.end}`;
}

function parseMenuExcel(event){
  const file = event.target.files[0];
  if(!file) return;
  if(typeof XLSX==='undefined'){ state._excelError='엑셀 라이브러리를 불러오는 중이에요. 잠시 후 다시 시도해 주세요.'; renderMenuExcelModal(); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
      if(rows.length===0){ state._excelError='엑셀 파일에 등록할 메뉴가 없어요.'; renderMenuExcelModal(); return; }
      // 헤더 검증
      const firstKeys = Object.keys(rows[0]);
      const missing = ['메뉴 이름','매장 판매가'].filter(k=>!firstKeys.includes(k));
      if(missing.length>0){ state._excelError=`필수 컬럼이 빠졌어요: ${missing.join(', ')}. 양식 그대로 사용해 주세요.`; renderMenuExcelModal(); return; }
      // 행 검증
      const valid=[], invalid=[];
      rows.forEach((row, i)=>{
        const name = String(row['메뉴 이름']||'').trim();
        const price = Number(String(row['매장 판매가']||'').replace(/[^0-9.-]/g,''));
        if(!name){ invalid.push({ line:i+2, reason:'메뉴 이름 누락' }); return; }
        if(isNaN(price) || price<0){ invalid.push({ line:i+2, reason:`매장 판매가 형식 오류('${row['매장 판매가']}')` }); return; }
        const tp = String(row['포장가']||'').trim();
        const takeoutPrice = tp==='' ? null : Number(tp.replace(/[^0-9.-]/g,''));
        const maxQ = String(row['1회 주문 최대 수량']||'').trim();
        const maxQty = maxQ==='' ? null : Math.max(0, Math.floor(Number(maxQ)||0));
        valid.push({
          code: String(row['상품코드']||'').trim(),
          name,
          price,
          takeoutPrice: (takeoutPrice!=null && !isNaN(takeoutPrice)) ? takeoutPrice : null,
          cat:  String(row['카테고리']||'').trim() || (CAT_MENU[0]?.name||'미분류'),
          desc: String(row['설명']||'').trim(),
          status: ['판매중','품절','숨김'].includes(String(row['판매 상태']||'').trim()) ? String(row['판매 상태']).trim() : '판매중',
          maxQty,
          catL2: String(row['분류 태그 ①']||'').trim(),
          catL3: String(row['분류 태그 ②']||'').trim(),
          tag3:  String(row['분류 태그 ③']||'').trim(),
        });
      });
      state._excelParsed = { valid, invalid, filename:file.name };
      state._excelError = null;
      renderMenuExcelModal();
    } catch(err){
      state._excelError = `엑셀 파일을 읽지 못했어요. 양식이 올바른지 확인해 주세요. (${err.message||err})`;
      renderMenuExcelModal();
    }
  };
  reader.onerror = ()=>{ state._excelError='파일을 읽지 못했어요.'; renderMenuExcelModal(); };
  reader.readAsArrayBuffer(file);
}

function applyMenuExcel(){
  const parsed = state._excelParsed;
  if(!parsed || parsed.valid.length===0) return;
  if(!confirm(`정상 행 ${parsed.valid.length}개를 메뉴판에 등록할까요? 같은 이름 메뉴가 있어도 추가로 등록돼요.`)) return;
  let nextId = (MENUS.reduce((m,r)=>Math.max(m,r.id),0))+1;
  parsed.valid.forEach(v=>{
    MENUS.push({
      id: nextId++,
      code: v.code || genCode('M'),
      name: v.name,
      cat: v.cat,
      catL2: v.catL2, catL3: v.catL3, tag3: v.tag3,
      price: v.price, takeoutPrice: v.takeoutPrice,
      status: v.status,
      img:'', opt:[], desc: v.desc,
      maxQty: v.maxQty,
    });
  });
  state._excelParsed = null;
  closeModal();
  alert(`${parsed.valid.length}개 메뉴를 등록했어요.`);
  renderApp();
}

function importMenuJSON(ev){
  const file = ev.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const p = JSON.parse(e.target.result);
      if (!confirm('지금 등록된 데이터를 덮어쓸까요?')) return;
      MENUS.length = 0;       (p.menus||[]).forEach(x=>MENUS.push(x));
      OPT_GROUPS.length = 0;  (p.optGroups||[]).forEach(x=>OPT_GROUPS.push(x));
      CAT_MENU.length = 0;    (p.catMenu||[]).forEach(x=>CAT_MENU.push(x));
      SETS.length = 0;        (p.sets||[]).forEach(x=>SETS.push(x));
      renderApp();
      showToast(`<span class="ic">📤</span> 메뉴 데이터를 불러왔어요`, 'ok');
    }catch(err){ alert('파일 형식을 확인해 주세요.'); }

  r.readAsText(file);
  ev.target.value = '';
}

function saveStaff(mode){
  const name    = document.getElementById('sf-name').value.trim();
  const phone   = document.getElementById('sf-phone').value.trim();
  const loginId = document.getElementById('sf-loginId').value.trim();
  const pw      = document.getElementById('sf-pw').value.trim();
  const email   = document.getElementById('sf-email').value.trim();
  const useFrom = document.getElementById('sf-from').value;
  const useTo   = document.getElementById('sf-to').value;
  // 직원 계정은 무조건 '직원' 권한 그룹(id=2) 자동 부여
  const groupId = 2;
  const enabled = state._staffForm.enabled;
  if(!name)    { alert('직원 이름을 입력해 주세요.'); return; }
  if(!phone)   { alert('휴대폰을 입력해 주세요.'); return; }
  if(!loginId) { alert('로그인 ID를 입력해 주세요.'); return; }
  if(mode==='등록' && !pw){ alert('비밀번호를 입력해 주세요.'); return; }
  if(!email)   { alert('이메일을 입력해 주세요. 비밀번호 찾기·계정 안내에 필요해요.'); return; }
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ alert('이메일 형식을 확인해 주세요. (예: hong@example.com)'); return; }
  // 중복 ID 확인
  if(mode==='등록' && STAFF_LIST.some(s=>s.loginId===loginId)){
    alert(`이미 사용 중인 로그인 ID예요. 다른 ID로 입력해 주세요.`); return;
  }
  if(mode==='등록'){
    const newId = (STAFF_LIST.reduce((m,s)=>Math.max(m,s.id),0))+1;
    STAFF_LIST.push({ id:newId, name, loginId, phone, email, groupId, useFrom, useTo, enabled, regDate: new Date().toISOString().slice(0,10) });
  } else {
    const s = STAFF_LIST.find(x=>x.id===state._staffEdit);
    if(!s) return;
    Object.assign(s, { name, phone, email, useFrom, useTo, enabled });
  }
  closeModal();
  renderApp();
  showToast(`<span class="ic">✅</span> ${name} 직원 계정을 ${mode==='등록'?'등록했어요':'수정했어요'}`, 'ok');
}
function deleteStaff(id){
  const s = STAFF_LIST.find(x=>x.id===id);
  if(!s || s.isMe) return;
  if(!confirm(`${s.name} 직원 계정을 삭제할까요? 이 계정으로는 더 이상 로그인할 수 없게 돼요.`)) return;
  const idx = STAFF_LIST.findIndex(x=>x.id===id);
  STAFF_LIST.splice(idx,1);
  renderApp();
  showToast(`<span class="ic">🗑️</span> ${s.name} 직원 계정을 삭제했어요`, 'ok');
}

/* ============================================================
   오늘의 준비량 — 분식·도시락처럼 한정 수량 메뉴 관리
   ============================================================ */
function renderStock(main){
  const today = '2026-05-15(목)';
  const items = MENU_STOCK.items.filter(it=>it.enabled);
  const lowCnt = items.filter(it=>it.remaining>0 && it.remaining<=it.lowAlert).length;
  const outCnt = items.filter(it=>it.remaining===0).length;
  // 품절 처리 대상 — 수량 관리 밖 메뉴에서 숨김 처리된 메뉴 제외
  const otherMenus = MENUS.filter(m=>!MENU_STOCK.items.some(it=>it.menuId===m.id) && m.status!=='숨김');
  otherMenus.forEach(m=>ensureMenuExtras(m));
  const manualOutCnt = otherMenus.filter(m=>m.manualSoldOut).length;
  // 일시/종일 구분 제거 — '품절' 단일 상태로 통합

  // 분류 필터 선택 목록 (전체 메뉴 기준)
  const stockAllCats  = [...new Set(MENUS.map(m=>m.cat).filter(x=>x&&x.trim()))];
  const stockAllL2    = [...new Set(MENUS.map(m=>{ ensureMenuExtras(m); return m.catL2; }).filter(x=>x&&x.trim()))];
  const stockAllL3    = [...new Set(MENUS.map(m=>{ ensureMenuExtras(m); return m.catL3; }).filter(x=>x&&x.trim()))];
  const stockAllTag3  = [...new Set(MENUS.map(m=>{ ensureMenuExtras(m); return m.tag3;  }).filter(x=>x&&x.trim()))];
  const hasStockTags  = stockAllL2.length>0 || stockAllL3.length>0 || stockAllTag3.length>0;
  const stockFilterActive = state.stockCatFilter!=='all' || state.stockL2Filter!=='all' || state.stockL3Filter!=='all' || state.stockTag3Filter!=='all';

  // 필터 적용
  let displayItems = items;
  let displayOtherMenus = otherMenus;
  if (state.stockCatFilter!=='all') {
    displayItems = displayItems.filter(it=>{ const m=MENUS.find(x=>x.id===it.menuId); return m&&m.cat===state.stockCatFilter; });
    displayOtherMenus = displayOtherMenus.filter(m=>m.cat===state.stockCatFilter);
  }
  if (state.stockL2Filter!=='all') {
    displayItems = displayItems.filter(it=>{ const m=MENUS.find(x=>x.id===it.menuId); return m&&(m.catL2||'')=== state.stockL2Filter; });
    displayOtherMenus = displayOtherMenus.filter(m=>(m.catL2||'')===state.stockL2Filter);
  }
  if (state.stockL3Filter!=='all') {
    displayItems = displayItems.filter(it=>{ const m=MENUS.find(x=>x.id===it.menuId); return m&&(m.catL3||'')=== state.stockL3Filter; });
    displayOtherMenus = displayOtherMenus.filter(m=>(m.catL3||'')===state.stockL3Filter);
  }
  if (state.stockTag3Filter!=='all') {
    displayItems = displayItems.filter(it=>{ const m=MENUS.find(x=>x.id===it.menuId); return m&&(m.tag3||'')=== state.stockTag3Filter; });
    displayOtherMenus = displayOtherMenus.filter(m=>(m.tag3||'')===state.stockTag3Filter);
  }
  const displayLowCnt = displayItems.filter(it=>it.remaining>0 && it.remaining<=it.lowAlert).length;
  const displayOutCnt = displayItems.filter(it=>it.remaining===0).length;
  const displayManualOutCnt = displayOtherMenus.filter(m=>m.manualSoldOut).length;

// 빠른 수량 조정
function changeStock(menuId, delta){
  const it = MENU_STOCK.items.find(x=>x.menuId===menuId);
  if(!it) return;
  it.prepared = Math.max(0, it.prepared + delta);
  // 잔여는 준비량 변경 시 비례 조정 (mock)
  const consumed = it.yesterdayPrep>0 ? Math.round((it.yesterdayPrep - it.yesterdaySold) / it.yesterdayPrep * (it.prepared - it.remaining)) : 0;
  it.remaining = Math.min(it.prepared, Math.max(0, it.remaining + delta));
  renderApp();
}
function setStock(menuId, qty){
  const it = MENU_STOCK.items.find(x=>x.menuId===menuId);
  if(!it) return;
  const delta = qty - it.prepared;
  it.prepared = Math.max(0, qty);
  it.remaining = Math.min(it.prepared, Math.max(0, it.remaining + delta));
  renderApp();
}
function removeStock(menuId){
  const m = MENUS.find(x=>x.id===menuId);
  if(!confirm(`${m?.name||'이 메뉴'}의 수량 관리를 해제할까요? 다시 등록하기 전까지는 잔여 수량이 표시되지 않아요.`)) return;
  const idx = MENU_STOCK.items.findIndex(x=>x.menuId===menuId);
  if(idx>=0) MENU_STOCK.items.splice(idx,1);
  renderApp();
  showToast(`<span class="ic">🗑️</span> '${m?.name||'메뉴'}'의 수량 관리를 해제했어요`, 'ok');
}
function clearAllManualSoldOut(){
  const targets = MENUS.filter(m=>{ ensureMenuExtras(m); return m.manualSoldOut; });
  if(targets.length===0){ alert('오늘 품절 처리된 메뉴가 없어요.'); return; }
  if(!confirm(`품절 처리된 메뉴 ${targets.length}개를 모두 판매 중으로 되돌릴까요?`)) return;
  const cnt = targets.length;
  targets.forEach(m=>{ m.manualSoldOut = false; });
  renderApp();
  showToast(`<span class="ic">✅</span> 메뉴 ${cnt}개를 판매 중으로 되돌렸어요`, 'ok');
}
function copyYesterdayStock(){
  MENU_STOCK.items.forEach(it=>{ it.prepared = it.yesterdayPrep; it.remaining = it.yesterdayPrep; });
  renderApp();
  showToast(`<span class="ic">✅</span> 어제 준비량으로 모두 맞췄어요`, 'ok');
}
// 아직 등록 안 한 메뉴를 한 번에 불러오기 — 준비량은 0으로 시작
function loadAllMenus(){
  const other = MENUS.filter(m=>!MENU_STOCK.items.some(it=>it.menuId===m.id));
  if(other.length===0){ alert('모든 메뉴가 이미 등록돼 있어요.'); return; }
  if(!confirm(`수량 관리 안 하는 메뉴 ${other.length}개를 모두 불러올까요?\n준비량은 0으로 시작하니, 추가 후 메뉴마다 직접 수량을 입력해 주세요.`)) return;
  const cnt = other.length;

function scrollToQRSection(key){
  const el = document.getElementById('qr-section-' + key);

  const top = el.getBoundingClientRect().top + window.scrollY - 16;
  window.scrollTo(0, top);
}

/* ============================================================
   메뉴 — 일괄 등록 표 + 단품 메뉴 목록
   ============================================================ */
function renderMenu(main){
  let rows = MENUS;
  // 분류 태그 드롭다운 목록 — 대/중/소분류 각각
  const allL2Tags   = [...new Set(MENUS.map(m=>{ ensureMenuExtras(m); return m.catL2; }).filter(x=>x&&x.trim()))];
  const allL3Tags   = [...new Set(MENUS.map(m=>{ ensureMenuExtras(m); return m.catL3; }).filter(x=>x&&x.trim()))];
  const allTag3s    = [...new Set(MENUS.map(m=>{ ensureMenuExtras(m); return m.tag3;  }).filter(x=>x&&x.trim()))];
  if (state.menuCatFilter !== 'all')    rows = rows.filter(r=>r.cat===state.menuCatFilter);
  if (state.menuStatusFilter !== 'all') rows = rows.filter(r=>r.status===state.menuStatusFilter);
  if (state.menuL2Filter !== 'all')     rows = rows.filter(r=>{ ensureMenuExtras(r); return r.catL2===state.menuL2Filter; });
  if (state.menuL3Filter !== 'all')     rows = rows.filter(r=>{ ensureMenuExtras(r); return r.catL3===state.menuL3Filter; });
  if (state.menuTag3Filter !== 'all')   rows = rows.filter(r=>{ ensureMenuExtras(r); return r.tag3 ===state.menuTag3Filter; });
  if (state.menuSearch){
    const q = state.menuSearch.toLowerCase();
    rows = rows.filter(r=>{ ensureMenuExtras(r); return (r.name+' '+r.code+' '+(r.catL2||'')+' '+(r.catL3||'')+' '+(r.tag3||'')).toLowerCase().includes(q); });
  }

  // 정렬
  const sort = state.menuSort || { key:'order', dir:'asc' };
  const cmp = (a,b)=>{
    let av, bv;
    switch(sort.key){
      case 'order':   av=MENUS.indexOf(a); bv=MENUS.indexOf(b); break;
      case 'name':    av=a.name||''; bv=b.name||''; break;
      case 'cat':     av=a.cat||''; bv=b.cat||''; break;
      case 'price':   av=a.price||0; bv=b.price||0; break;
      case 'takeoutPrice': av=a.takeoutPrice!=null?a.takeoutPrice:a.price; bv=b.takeoutPrice!=null?b.takeoutPrice:b.price; break;
      case 'stock':   { const sa=getMenuStock(a.id), sb=getMenuStock(b.id); av=sa?sa.remaining:Infinity; bv=sb?sb.remaining:Infinity; break; }
      case 'status':  av=a.status||''; bv=b.status||''; break;
      default: av=0; bv=0;
    }
    if(typeof av==='string'){ return av.localeCompare(bv,'ko') * (sort.dir==='asc'?1:-1); }
    return (av-bv) * (sort.dir==='asc'?1:-1);
  };
  rows = rows.slice().sort(cmp);

  // 페이지네이션
  const totalCnt = rows.length;
  const perPage  = state.menuRowsPerPage || 20;
  const totalPages = Math.max(1, Math.ceil(totalCnt/perPage));
  if(state.menuPage > totalPages) state.menuPage = 1;
  const curPage = state.menuPage || 1;
  const pagedRows = rows.slice((curPage-1)*perPage, curPage*perPage);

  const h = mmHeaderHTML('menu');

  // 일괄 입력 표 행 HTML
  const bulkRowsHtml = state.menuBulkRows.map((row, idx) => `
    <tr>
      <td><span class="row-num">${idx+1}</span></td>
      <td>
        <div class="code-cell">
          <input class="input" style="font-family:ui-monospace,monospace;letter-spacing:.04em;" placeholder="6자리" maxlength="6" value="${row.code||''}" oninput="state.menuBulkRows[${idx}].code=this.value.toUpperCase()" />
          <button class="gen-btn" onclick="state.menuBulkRows[${idx}].code=genCode('M');renderApp()" title="자동 생성">⚙️</button>
        </div>
      </td>
      <td><input class="input" placeholder="예) 아메리카노" value="${row.name||''}" oninput="state.menuBulkRows[${idx}].name=this.value" /></td>
      <td><input class="input" type="number" placeholder="0" value="${row.price||''}" oninput="state.menuBulkRows[${idx}].price=Number(this.value)||0" style="text-align:right;" /></td>

// 메뉴 삭제 시 연결 데이터 일괄 정리 — 오늘의 준비량·세트 후보·옵션 연결
function cleanupAfterMenuDelete(id, code){
  // 옵션 그룹 연결 제거
  OPT_GROUPS.forEach(g=>{ if(g.links) g.links = g.links.filter(x=>x!==id); });
  // 오늘의 준비량에서 제거
  if(typeof MENU_STOCK!=='undefined' && MENU_STOCK.items){
    MENU_STOCK.items = MENU_STOCK.items.filter(it=>it.menuId!==id);
  }
  // 세트 메뉴의 자리 후보에서 제거 — 후보가 0이 되면 안내
  let setWarnings = [];
  SETS.forEach(s=>{
    (s.slots||[]).forEach(sl=>{
      const before = sl.candidates.length;
      const wasDefault = sl.candidates.find(c=>c.code===code)?.isDefault;
      sl.candidates = sl.candidates.filter(c=>c.code!==code);
      if(wasDefault && sl.candidates.length>0){ sl.candidates[0].isDefault = true; }
      if(before > sl.candidates.length && sl.candidates.length===0){
        setWarnings.push(`${s.name} - ${sl.name}`);
      }
    });
  });
  return setWarnings;
}
function deleteMenu(id){
  const m = MENUS.find(x=>x.id===id);
  if(!m) return;
  if (!confirm(`'${m.name}' 메뉴를 삭제할까요?\n오늘의 준비량·세트 후보·옵션 연결도 함께 정리돼요.`)) return;
  const warnings = cleanupAfterMenuDelete(m.id, m.code);
  const i = MENUS.findIndex(x=>x.id===id);
  if (i>=0) MENUS.splice(i,1);
  if(warnings.length>0){ alert(`삭제했어요. 다음 세트의 구성이 비었으니 새 후보를 추가해 주세요:\n• ${warnings.join('\n• ')}`); }
  renderApp();
  showToast(`<span class="ic">🗑️</span> '${m.name}' 메뉴를 삭제했어요`, 'ok');
}

function saveOptEdit(){
  const f = state._optEdit;
  if(!f) return;
  const g = OPT_GROUPS.find(x=>x.id===f.id);
  if(!g) return;
  const name = (f.name||'').trim();
  if(!name){ alert('옵션 그룹명을 입력해 주세요.'); return; }
  const items = f.items.filter(it=>(it.name||'').trim());
  if(items.length===0){ alert('옵션 항목을 1개 이상 입력해 주세요.'); return; }
  g.code = (f.code||'').trim() || g.code;
  g.name = name;
  g.mode = f.mode || '1개만';
  g.maxSelect = g.mode==='1개만' ? 1 : Math.max(2, Number(f.maxSelect)||2);
  g.required = !!f.required;
  g.items = items.map(it=>({ name: it.name.trim(), price: Number(it.price)||0 }));
  state._optEdit = null;
  closeModal();
  renderApp();
  showToast(`<span class="ic">✅</span> '${name}' 옵션 그룹을 저장했어요`, 'ok');
}

function toggleCatPick(id){
  const arr = state.catForm.pickedMenus;
  const i = arr.indexOf(id);
  if (i>=0) arr.splice(i,1); else arr.push(id);
  renderApp();
}
function clearCatForm(){
  state.catForm = { name:'', order:1, pickedMenus:[] };
  renderApp();
}
function saveCategory(){
  const f = state.catForm;
  if (!f.name){ alert('카테고리명을 입력해 주세요.'); return; }
  const nextId = (CAT_MENU.reduce((m,c)=>Math.max(m,c.id),0))+1;
  CAT_MENU.push({ id:nextId, name:f.name, order:f.order||CAT_MENU.length+1 });
  MENUS.forEach(m => { if (f.pickedMenus.includes(m.id)) m.cat = f.name; });
  const savedName = f.name;
  clearCatForm();
  showToast(`<span class="ic">✅</span> '${savedName}' 카테고리를 추가했어요`, 'ok');
}
function deleteCategory(id){
  const i = CAT_MENU.findIndex(c=>c.id===id);
  if (i<0) return;
  const target = CAT_MENU[i];
  const inUse = MENUS.filter(m=>m.cat===target.name).length;
  if (inUse>0 && !confirm(`소속 메뉴 ${inUse}개가 있어요. 삭제하면 '미분류'로 옮겨져요.\n그래도 삭제할까요?`)) return;
  MENUS.forEach(m=>{ if (m.cat===target.name) m.cat='미분류'; });
  CAT_MENU.splice(i,1);
  renderApp();
  showToast(`<span class="ic">🗑️</span> '${target.name}' 카테고리를 삭제했어요`, 'ok');
}

// 자리 추가/삭제
function addSetSlot(){
  const nextSlotId = Math.max(0, ...state.setForm.slots.map(sl=>sl.id||0)) + 1;
  state.setForm.slots.push({ id: nextSlotId, name:'', selectionType:'single', candidates:[] });
  renderApp();
}
function removeSetSlot(si){
  if(!confirm(`구성 ${si+1}을(를) 삭제할까요? 안의 후보 메뉴도 함께 사라져요.`)) return;
  state.setForm.slots.splice(si, 1); renderApp();
}
// 후보 메뉴 선택 모달 — 자리별 진입
function openSetCandidatePicker(si){
  state._setPickerOpen = si;
  const sl = state.setForm.slots[si];
  const usedCodes = (sl.candidates||[]).map(c=>c.code);
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-box" style="max-width:520px;">
      <div class="modal-head"><b>구성 ${si+1} — 후보 메뉴 추가</b><button onclick="closeModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink-3);">✕</button></div>
      <div class="modal-body" style="padding:18px 20px;">
        <div style="font-size:12px;color:var(--ink-3);margin-bottom:12px;line-height:1.55;">손님이 이 구성에서 고를 수 있는 메뉴를 골라 주세요. 이미 추가한 메뉴는 회색으로 표시돼요.</div>
        <div style="display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;">
          ${MENUS.map(m=>{
            const used = usedCodes.includes(m.code);
            return `<div onclick="${used?'':`addSetCandidate(${si},'${m.code}')`}" style="padding:11px 14px;border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;gap:10px;cursor:${used?'not-allowed':'pointer'};opacity:${used?0.5:1};transition:all .12s;" ${used?'':`onmouseover="this.style.borderColor='var(--blue)';this.style.background='var(--blue-50)'" onmouseout="this.style.borderColor='var(--line)';this.style.background='#fff'"`}>
              <span style="font-size:22px;">${m.img||'🍽️'}</span>
              <div style="flex:1;">
                <div style="font-size:14px;font-weight:700;color:var(--ink);">${m.name}${used?' <span style="font-size:10px;color:var(--ink-4);font-weight:600;">이미 추가됨</span>':''}</div>
                <div style="font-size:11px;color:var(--ink-3);">${m.cat||'미분류'} · 정가 ${fmt(m.price)}원</div>
              </div>
              ${used?'<span style="color:var(--ink-4);font-size:13px;font-weight:700;">✓</span>':'<span style="color:var(--blue);font-size:13px;font-weight:700;">+ 추가</span>'}
            </div>`;
          }).join('')}
        </div>
        <div style="margin-top:14px;display:flex;justify-content:flex-end;">
          <button class="btn-primary" onclick="closeModal()">완료</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('on');
}
function addSetCandidate(si, code){
  const m = MENUS.find(x=>x.code===code);
  if(!m) return;
  const sl = state.setForm.slots[si];
  if(sl.candidates.some(c=>c.code===code)) return;
  // 첫 후보는 자동으로 기본 설정
  const isFirst = sl.candidates.length===0;
  sl.candidates.push({ code:m.code, name:m.name, extraPrice:isFirst?0:0, isDefault:isFirst });
  openSetCandidatePicker(si); // 다시 그려서 회색 표시
}
function removeSetCandidate(si, ci){
  const sl = state.setForm.slots[si];
  const wasDefault = sl.candidates[ci]?.isDefault;
  sl.candidates.splice(ci, 1);
  // 기본을 지웠다면 첫 번째 항목을 기본으로
  if(wasDefault && sl.candidates.length>0){ sl.candidates[0].isDefault = true; }
  renderApp();
}
function setDefaultCandidate(si, ci){
  const sl = state.setForm.slots[si];
  sl.candidates.forEach((c, i)=>{ c.isDefault = (i===ci); });
  renderApp();
}
function clearSetForm(){
  state.setForm = { name:'', basePrice:0, desc:'', slots:[] };
  renderApp();
}
function saveSet(){
  const f = state.setForm;
  if (!f.name){ alert('세트명을 입력해 주세요.'); return; }
  if (!(f.basePrice>0)){ alert('세트 기본 가격을 입력해 주세요.'); return; }
  if (f.slots.length===0){ alert('구성을 1개 이상 추가해 주세요.'); return; }
  for(const sl of f.slots){
    if(!sl.name){ alert('모든 구성에 이름을 적어 주세요.'); return; }
    if(sl.candidates.length===0){ alert(`'${sl.name}' 구성에 후보 메뉴를 1개 이상 추가해 주세요.`); return; }
  }
  const nextId = (SETS.reduce((m,s)=>Math.max(m,s.id),0))+1;
  SETS.push({
    id: nextId, code: genCode('S'),
    name: f.name, basePrice: f.basePrice, desc: f.desc||'',
    enabled: true,
    slots: f.slots.map(sl=>({
      id: sl.id, name: sl.name, selectionType: sl.selectionType||'single',
      candidates: sl.candidates.map(c=>({ code:c.code, name:c.name, extraPrice:Number(c.extraPrice)||0, isDefault:!!c.isDefault })),
    })),
  });
  const savedName = f.name;
  clearSetForm();
  showToast(`<span class="ic">✅</span> '${savedName}' 세트를 등록했어요`, 'ok');
}
function deleteSet(id){
  const s = SETS.find(x=>x.id===id);
  if (!confirm('이 세트를 삭제할까요?')) return;
  const i = SETS.findIndex(s=>s.id===id);
  if (i>=0) SETS.splice(i,1);
  renderApp();
  showToast(`<span class="ic">🗑️</span> '${s?.name||'세트'}'를 삭제했어요`, 'ok');
}

function setTranslation(target, id, field, lang, value){
  const list = target==='menu' ? MENUS : target==='option' ? OPT_GROUPS : SETS;
  const r = list.find(x=>x.id===id); if (!r) return;
  trEnsure(r);
  if (field==='name') r.tr[lang] = value;
  else                r.trDesc[lang] = value;
}
function autoTranslateOne(target, id, lang){
  const list = target==='menu' ? MENUS : target==='option' ? OPT_GROUPS : SETS;
  const r = list.find(x=>x.id===id); if (!r) return;
  trEnsure(r);
  const nameTr = trAuto(r.name, lang);
  if (nameTr) r.tr[lang] = nameTr;
  if (r.desc){
    const descTr = trAuto(r.desc, lang);
    if (descTr) r.trDesc[lang] = descTr;
  }
  if (!nameTr){ alert('사전에 없는 단어예요. 직접 입력해 주세요.'); return; }
  renderApp();
}
function autoTranslateAll(target, lang){
  const list = target==='menu' ? MENUS : target==='option' ? OPT_GROUPS : SETS;
  let cnt = 0, skipped = 0;
  list.forEach(r=>{
    trEnsure(r);
    if (r.tr[lang]) return;
    const t = trAuto(r.name, lang);
    if (t){ r.tr[lang] = t; cnt++; if (r.desc){ const dt = trAuto(r.desc, lang); if (dt) r.trDesc[lang] = dt; } }
    else skipped++;
  });
  alert(`자동 번역 결과\n· 번역됨: ${cnt}개\n· 사전 미등록 (수동 입력 필요): ${skipped}개`);
  renderApp();
}
function clearTranslateLang(lang, target){
  if (!confirm(`${TR_LANGS.find(l=>l.code===lang).label} 번역을 모두 비울까요?\n(대상: ${target==='menu'?'메뉴':target==='option'?'옵션 그룹':'세트 메뉴'})`)) return;
  const list = target==='menu' ? MENUS : target==='option' ? OPT_GROUPS : SETS;
  list.forEach(r=>{ trEnsure(r); r.tr[lang]=''; r.trDesc[lang]=''; });
  renderApp();
}

function openOptLinkModal(menuId){
  const m = MENUS.find(x=>x.id===menuId); if (!m) return;
  const modal = document.getElementById('modal');
  state._optLinkTarget = menuId;
  state._optLinkPicks = [...m.opt];
  const groupsHtml = OPT_GROUPS.map(g=>{
    const checked = state._optLinkPicks.includes(g.id);
    return `
      <div onclick="toggleOptLink(${g.id})" style="display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:10px;border:1.5px solid ${checked?'var(--blue)':'var(--line)'};background:${checked?'var(--blue-50)':'#fff'};cursor:pointer;margin-bottom:6px;transition:all .12s;">
        <div style="width:20px;height:20px;border-radius:6px;border:2px solid ${checked?'var(--blue)':'var(--ink-4)'};background:${checked?'var(--blue)':'#fff'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;">${checked?'✓':''}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:700;color:${checked?'var(--blue)':'var(--ink)'};">${g.name}</div>
          <div style="font-size:11px;color:var(--ink-3);margin-top:2px;">${g.required?'필수':'선택'} · ${g.mode} · 항목 ${g.items.length}개</div>
        </div>
      </div>
    `;
  }).join('');
  modal.innerHTML = `
    <div class="modal-head">
      <div>
        <h3>옵션 그룹 연결</h3>
        <div class="modal-sub">${m.code} · ${m.name}에 붙일 옵션 그룹을 골라 주세요</div>
      </div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
    <div id="opt-link-list">
      ${OPT_GROUPS.length===0 ? `<div style="padding:24px;text-align:center;color:var(--ink-3);font-size:13px;">먼저 옵션 그룹을 등록해 주세요.</div>` : groupsHtml}
    </div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <button class="btn-ghost" style="flex:1;" onclick="closeModal()">취소</button>
      <button class="btn-primary" style="flex:1;" onclick="confirmOptLink()">적용</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('on');
}
function toggleOptLink(gid){
  const picks = state._optLinkPicks;
  const i = picks.indexOf(gid);
  if (i>=0) picks.splice(i,1); else picks.push(gid);
  openOptLinkModal(state._optLinkTarget);
}
function confirmOptLink(){
  const m = MENUS.find(x=>x.id===state._optLinkTarget); if (!m){ closeModal(); return; }
  m.opt = [...state._optLinkPicks];
  // 옵션 그룹의 links도 동기화
  OPT_GROUPS.forEach(g=>{
    const has = m.opt.includes(g.id);
    const inLinks = g.links.includes(m.id);
    if (has && !inLinks) g.links.push(m.id);
    if (!has && inLinks) g.links = g.links.filter(x=>x!==m.id);
  });
  closeModal();
  state._flashMenuId = m.id;
  renderApp();
  flashSavedMenu(m.id);
  showToast(`<span class="ic">✅</span> '${m.name}' 옵션 연결을 저장했어요`, 'ok');
}

/* ============================================================
   일괄 처리 — 메뉴 복제·삭제·가격 조정·카테고리 이동·품절 토글
   ============================================================ */
function duplicateMenu(id){
  const src = MENUS.find(x=>x.id===id); if (!src) return;
  const nextId = (MENUS.reduce((m,r)=>Math.max(m,r.id),0))+1;
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = nextId; copy.code = genCode('M'); copy.name = src.name + ' (복제본)'; copy.sold = 0;
  const idx = MENUS.indexOf(src);
  MENUS.splice(idx+1, 0, copy);
  renderApp();
}
function duplicateSelectedMenus(){
  const ids = [...state.menuSel];
  if (ids.length===0) return;
  ids.forEach(id => duplicateMenu(id));
  state.menuSel.clear();
}
function bulkDeleteMenus(){
  const ids = [...state.menuSel];
  if (ids.length===0) return;
  if (!confirm(`선택한 ${ids.length}개 메뉴를 삭제할까요?\n오늘의 준비량·세트 후보·옵션 연결도 함께 정리돼요.`)) return;
  let allWarnings = [];
  ids.forEach(id=>{
    const m = MENUS.find(x=>x.id===id);
    if(m){ allWarnings = allWarnings.concat(cleanupAfterMenuDelete(m.id, m.code)); }
    const i = MENUS.findIndex(x=>x.id===id);
    if (i>=0) MENUS.splice(i,1);
  });
  const removedCount = ids.length;
  state.menuSel.clear();
  if(allWarnings.length>0){ alert(`삭제했어요. 다음 세트 구성이 비었으니 새 후보를 추가해 주세요:\n• ${[...new Set(allWarnings)].join('\n• ')}`); }
  renderApp();
  showToast(`<span class="ic">🗑️</span> 메뉴 ${removedCount}개를 삭제했어요`, 'ok');
}

  if(!name || !name.trim()) return;

  if(CAT_MENU.some(c=>c.name===trimmed)){
    alert(`'${trimmed}' 분류는 이미 있어요.`);
    cur.cat = trimmed;
  } else {
    const nextId = (CAT_MENU.reduce((m,c)=>Math.max(m,c.id||0),0))+1;

function cycleMenuEditImg(){

function saveMenuEdit(){
  const f = state._menuEdit;
  // 신규 등록 분기 — id가 null이면 새 메뉴 push
  let m;
  if(f.isNew){
    m = { id: (MENUS.reduce((mx,r)=>Math.max(mx,r.id),0))+1, code: genCode('M'), opt:[] };
  } else {
    m = MENUS.find(x=>x.id===f.id);
    if(!m) return;
  }
  const name = document.getElementById('me-name').value.trim();
  const price = Number(document.getElementById('me-price').value);
  if(!name){ alert('메뉴 이름을 입력해 주세요.'); return; }
  if(price<0 || isNaN(price)){ alert('매장 판매가는 0원 이상이어야 해요. (음수 입력 불가)'); return; }
  // 같은 이름 메뉴 중복 체크 (자기 자신 제외)
  if(MENUS.some(x=>x.id!==m.id && x.name.trim()===name)){
    if(!confirm(`같은 이름의 메뉴('${name}')가 이미 있어요. 그래도 저장할까요?`)) return;
  }
  const tpVal = document.getElementById('me-takeout').value;
  const takeoutPrice = tpVal==='' ? null : Math.max(0, Number(tpVal)||0);
  const dcVal = document.getElementById('me-discount')?.value;
  const discountAmt = (!dcVal||dcVal===''||Number(dcVal)<=0) ? null : Math.min(Number(dcVal), price); // 할인 금액이 정가 초과 불가
  // 포장가 > 매장가 안내 (사장님 의도 존중, 차단 X)
  if(takeoutPrice!=null && takeoutPrice > price){
    if(!confirm(`포장가(${fmt(takeoutPrice)}원)가 매장 판매가(${fmt(price)}원)보다 비싸요.\n보통은 포장이 더 저렴해요. 그래도 저장할까요?`)) return;
  }
  m.name = name;
  m.price = price;
  m.takeoutPrice = takeoutPrice;
  m.discountAmt = discountAmt;
  m.cat = document.getElementById('me-cat').value;
  m.catL2 = (document.getElementById('me-catL2').value||'').trim();
  m.catL3 = (document.getElementById('me-catL3').value||'').trim();
  m.tag3  = (document.getElementById('me-tag3')?.value||'').trim();
  m.status = document.getElementById('me-status').value;
  m.desc = document.getElementById('me-desc').value;
  m.img = f.img;
  const mqVal = document.getElementById('me-maxqty').value;
  m.maxQty = (mqVal==='' || Number(mqVal)<=0) ? null : Math.floor(Number(mqVal));
  m.badges = [...(f.badges||[])];     // 인기·추천·신메뉴 배너
  // 알레르기 정보 — textarea 값으로 저장 (자유 입력)
  const allergyEl = document.getElementById('me-allergy');
  m.allergyText = allergyEl ? (allergyEl.value||'').trim() : (f.allergyText||'');
  // 기존 allergens 배열 데이터는 더 이상 안 씀
  delete m.allergens;
  m.optMaxQty = JSON.parse(JSON.stringify(f.optMaxQty||{})); // 옵션 항목별 메뉴 한도 오버라이드
  // 신규 등록이면 MENUS에 push
  if(f.isNew){ MENUS.push(m); }
  closeModal();
  state._flashMenuId = m.id;
  renderApp();
  flashSavedMenu(m.id);
  showToast(`<span class="ic">✅</span> '${name}' ${f.isNew?'등록됐어요':'저장됐어요'}`, 'ok');
}

  }));

function changeOptStock(gid, idx, delta){
  const it = OPT_STOCK.items.find(x=>x.groupId===gid && x.itemIdx===idx);
  if(!it) return;
  it.prepared  = Math.max(0, it.prepared + delta);
  it.remaining = Math.min(it.prepared, Math.max(0, it.remaining + delta));
  renderApp();
}
function setOptStockQty(gid, idx, qty){
  const it = OPT_STOCK.items.find(x=>x.groupId===gid && x.itemIdx===idx);
  if(!it) return;
  const q = Math.max(0, Number(qty)||0);
  const diff = q - it.prepared;
  it.prepared  = q;
  it.remaining = Math.min(q, Math.max(0, it.remaining + diff));
  renderApp();
}
function removeOptStock(gid, idx){
  const i = OPT_STOCK.items.findIndex(x=>x.groupId===gid && x.itemIdx===idx);
  if(i<0) return;
  const g = OPT_GROUPS.find(x=>x.id===gid);
  const itName = g && g.items && g.items[idx] ? g.items[idx].name : '옵션';
  OPT_STOCK.items.splice(i, 1);
  renderApp();
  showToast(`<span class="ic">🗑️</span> 옵션 '${itName}' 수량 관리를 해제했어요`, 'ok');
}

  if(OPT_STOCK.items.some(x=>x.groupId===gid && x.itemIdx===idx)) return;
  const g = OPT_GROUPS.find(x=>x.id===gid);
  const it = g && g.items && g.items[idx];

  OPT_STOCK.items.push({
    groupId:gid, itemIdx:idx, enabled:true,
    prepared:20, remaining:20, unit:'개', lowAlert:5, soldOutAlert:true,
    yesterdayPrep:0, yesterdaySold:0
  });
  renderApp();
  showToast(`<span class="ic">✅</span> 옵션 '${it.name}' 수량 관리를 시작했어요`, 'ok');
}

  const trDesc = (m) => { trEnsure(m); return lang==='ko' ? (m.desc||'') : (m.trDesc[lang] || m.desc || ''); };

  const langTabs = [{c:'ko',f:'🇰🇷',n:'한국어'}, ...TR_LANGS.map(l=>({c:l.code,f:l.flag,n:l.label}))]
    .map(l=>`<span class="chip ${lang===l.c?'on':''}" onclick="state._cpLang='${l.c}';renderCustomerPreview()" style="font-size:11px;">${l.f} ${l.n}</span>`).join('');

  const catChips = `
    <span class="chip ${cat==='all'?'on':''}" onclick="state._cpCat='all';renderCustomerPreview()" style="font-size:11px;">전체</span>
    ${activeCats.map(c=>`<span class="chip ${cat===c.name?'on':''}" onclick="state._cpCat='${c.name}';renderCustomerPreview()" style="font-size:11px;">${c.name}</span>`).join('')}
  `;

  // 카테고리별 그룹화
  let grouped = {};
  filtered.forEach(m=>{
    if (!grouped[m.cat]) grouped[m.cat] = [];
    grouped[m.cat].push(m);
  });

  // 휴대폰 화면 내부 카드 (.qrp-card 스타일 활용)
  const renderPhoneCard = (m) => {
    const eff = effectiveStatus(m);
    const isOut = eff.kind==='manual-out' || eff.kind==='auto-out' || eff.kind==='out';
    const dc = m.discount && m.discount.enabled;
    const dcPrice = dc ? Math.round(m.price * (1 - m.discount.rate/100)) : m.price;
    const desc = trDesc(m);
    return `
      <div class="qrp-card" style="${isOut?'opacity:.55;':''}position:relative;">
        ${dc?`<span style="position:absolute;top:6px;right:8px;font-size:9px;font-weight:800;color:var(--blue);background:var(--blue-50);padding:2px 6px;border-radius:6px;">${m.discount.rate}%↓</span>`:''}
        <div class="qrp-mimg">${m.img?menuImgHtml(m.img,48,8):'🍽️'}</div>
        <div class="qrp-minfo" style="flex:1;min-width:0;">
          <div class="qrp-mname">${trName(m)} ${isOut?'<span style="color:var(--red);font-size:9px;font-weight:700;background:#fef2f2;padding:1px 5px;border-radius:4px;margin-left:2px;">품절</span>':''}</div>
          ${desc?`<div class="qrp-mdesc">${desc}</div>`:''}
          <div class="qrp-mprice">${dc?`<span style="color:var(--blue);">${fmt(dcPrice)}원</span> <span style="color:var(--ink-4);text-decoration:line-through;font-size:10px;font-weight:500;">${fmt(m.price)}원</span>`:`${fmt(m.price)}원`}</div>
        </div>
      </div>
    `;
  };

  const phoneListHtml = Object.keys(grouped).map(catName=>{
    const items = grouped[catName];
    return `
      <div style="padding:10px 12px 4px;font-size:12px;font-weight:800;color:var(--ink);background:#fafafa;letter-spacing:-.01em;">
        ${catName} <span style="font-size:10px;color:var(--ink-3);font-weight:500;margin-left:4px;">${items.length}개</span>
      </div>
      ${items.map(renderPhoneCard).join('')}
    `;
  }).join('');

  const modal = document.getElementById('modal');
  modal.style.width = '420px';
  modal.innerHTML = `
    <div class="modal-head">
      <div>
        <h3>👁️ 손님 화면 미리보기</h3>
        <div class="modal-sub">${STORE.name} · 손님이 QR로 보는 화면 그대로</div>
      </div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>

    <!-- 휴대폰 프레임 안에 손님 화면 그대로 (현재 세팅된 메뉴 기준) -->
    <div style="display:flex;justify-content:center;padding:6px 0 4px;">
      <div class="qrp-phone">
        <div class="qrp-notch"></div>
        <div class="qrp-screen">
          <div class="qrp-header">
            <div class="qrp-store">${STORE.name}</div>
            <div class="qrp-tag">맛있는 한 잔, QR로 빠르게</div>
            <div class="qrp-table-chip">T03 테이블</div>
          </div>
          <div class="qrp-list" style="padding:0;gap:0;">
            ${Object.keys(grouped).length===0
              ? `<div class="qrp-empty" style="padding:60px 14px;">노출할 메뉴가 없어요.</div>`
              : phoneListHtml}
          </div>
          ${renderOriginPreviewInner()}
          ${(()=>{
            const notice = (typeof STORE_ALLERGY!=='undefined'&&STORE_ALLERGY.notice)?STORE_ALLERGY.notice:'';
            const menuAllergens = MENUS.filter(m=>{ ensureMenuExtras(m); return m.status!=='숨김' && (m.allergyText||'').trim(); });
            if(!notice&&menuAllergens.length===0) return '';
            return '<div class="qrp-origin">'
              +'<div class="qrp-otitle">⚠️ 알레르기 안내</div>'
              +(notice?`<div class="qrp-orow">${notice}</div>`:'')
              +(menuAllergens.length>0
                ? '<div style="margin-top:6px;font-size:10px;color:var(--ink-3);">'
                  + menuAllergens.map(m=>{
                    const txt = (m.allergyText||'').replace(/</g,'&lt;');
                    return `<div style="margin-top:3px;"><b style="color:var(--ink-2);">${m.name}</b> · ${txt}</div>`;
                  }).join('')
                  +'</div>'
                : '')
              +'</div>';
          })()}
        </div>
      </div>
    </div>

    <div class="banner-info" style="margin-top:14px;font-size:11px;line-height:1.65;">
      💡 이 화면은 <b>예시 미리보기</b>예요. 실제 손님 휴대폰에서는 <b>매장 디자인이 입혀진 화면</b>으로 보이고, <b>지금 노출 중인 상품 카테고리·메뉴·가격 그대로</b> 반영돼요. 자동 품절·수동 품절·숨김 메뉴는 자동으로 빠지거나 회색 처리돼요.
    </div>

    <div style="display:flex;gap:8px;margin-top:14px;">

      <button class="btn-primary" style="flex:1.7;" onclick="window.open('customer.html','_blank')" title="손님이 실제로 주문하는 전체 화면(먹고가기·포장하기·포장 예약)을 새 탭에서 체험해요">🛒 실제 주문 화면 체험 →</button>
    </div>
  `;
}

/* ============================================================
   알림 센터 — 상위 조직(시스템 관리자/기업 관리자/브랜드 관리자) 공지 게시판
   실시간 주문·재고·리뷰 알림은 각 기능 페이지에서 확인 (여기엔 X)
   ============================================================ */
function renderNotify(main){
  // 발신처 필터(평소 접힘) + 확인이 필요한 공지만 보기(별도 토글)
  state.notifyFilter      = state.notifyFilter      || 'all';   // all | softment | corp | brand
  state.notifyFilterOpen  = state.notifyFilterOpen  || false;
  state.notifyOnlyUnread  = state.notifyOnlyUnread  || false;
  // 이전 버전 호환 — 'unread'가 들어와 있으면 토글로 옮김
  if (state.notifyFilter === 'unread'){ state.notifyOnlyUnread = true; state.notifyFilter = 'all'; }

  // 필터링
  let rows = NOTIFICATIONS;
  if (state.notifyFilter !== 'all') rows = rows.filter(n => n.level === state.notifyFilter);
  if (state.notifyOnlyUnread)       rows = rows.filter(n => !n.read);

  const unread   = NOTIFICATIONS.filter(n=>!n.read).length;
  const urgent   = NOTIFICATIONS.filter(n=>n.urgent && !n.read).length;
  const softCnt  = NOTIFICATIONS.filter(n=>n.level==='softment').length;
  const corpCnt  = NOTIFICATIONS.filter(n=>n.level==='corp').length;
  const brandCnt = NOTIFICATIONS.filter(n=>n.level==='brand').length;

  // 정렬 — 안읽음 + 긴급 위로, 그 다음 날짜 최신순
  rows = rows.slice().sort((a,b) => {
    const aw = (!a.read?2:0) + (a.urgent?1:0);
    const bw = (!b.read?2:0) + (b.urgent?1:0);
    if (aw !== bw) return bw - aw;
    return (b.date||'').localeCompare(a.date||'');
  });

  const fmtDate = (d) => {
    if (!d) return '';
    const [date, time] = d.split(' ');
    const [, m, dd] = date.split('-');
    return `${Number(m)}/${Number(dd)} ${time?time.slice(0,5):''}`.trim();
  };

          <span class="chip ${state.notifyFilter==='all'?'on':''}" onclick="state.notifyFilter='all';renderApp()">전체 <span style="color:${state.notifyFilter==='all'?'#cfe4ff':'var(--ink-3)'};font-size:11px;">${NOTIFICATIONS.length}</span></span>

      </div>
    </div>
  `;
}

/* ── 테이블 평면도 드래그 상태 ── */
let _tDrag = null;              // 드래그 진행 상태
let _tDidDrag = false;          // 클릭 억제 플래그
let _pendingTablePos = {};      // { [id]: {x,y} } — 아직 저장 안 된 임시 위치

function _tMouseMove(e){
  if(!_tDrag) return;
  const dx = e.clientX - _tDrag.startX;
  const dy = e.clientY - _tDrag.startY;
  if(Math.abs(dx)>4||Math.abs(dy)>4) _tDrag.moved = true;
  if(!_tDrag.moved) return;

  const floor = document.getElementById('floorplan');
  if(!floor) return;
  const fw = floor.offsetWidth;
  const fh = floor.offsetHeight;
  const newX = Math.max(4, Math.min(_tDrag.origX + dx, fw - 84));
  const newY = Math.max(4, Math.min(_tDrag.origY + dy, fh - 84));

  _tDrag.card.style.left        = newX + 'px';
  _tDrag.card.style.top         = newY + 'px';
  _tDrag.card.style.zIndex      = '30';
  _tDrag.card.style.opacity     = '0.88';
  _tDrag.card.style.boxShadow   = '0 10px 28px rgba(0,0,0,0.20)';
  _tDrag.card.style.transition  = 'none';
  _tDrag.card.style.cursor      = 'grabbing';
}
function _tMouseUp(){
  document.removeEventListener('mousemove', _tMouseMove);
  document.removeEventListener('mouseup',   _tMouseUp);
  if(!_tDrag) return;
  if(_tDrag.moved){
    // TABLES에 직접 쓰지 않고 pending에만 저장
    _pendingTablePos[_tDrag.id] = {
      x: parseInt(_tDrag.card.style.left),
      y: parseInt(_tDrag.card.style.top)
    };
    _tDrag.card.style.zIndex    = '';
    _tDrag.card.style.opacity   = '';
    _tDrag.card.style.boxShadow = '';
    _tDrag.card.style.cursor    = 'grab';
    // 저장 버튼 강조 (리렌더 없이)
    const btn = document.getElementById('table-save-btn');
    if(btn){
      const cnt = Object.keys(_pendingTablePos).length;
      btn.textContent = `저장 (${cnt}건 변경)`;
      btn.classList.remove('btn-ghost');
      btn.classList.add('btn-primary');
    }
    _tDidDrag = true;
    _tDrag.card.addEventListener('click', e=>{ e.stopImmediatePropagation(); _tDidDrag=false; }, { once:true, capture:true });
  }
  _tDrag = null;
}
function tableMouseDown(e, id){
  e.preventDefault();
  // 영업 중이면 드래그 차단 — 모달 안내
  if(state.storeIsOpen){
    const modal = document.getElementById('modal');
    modal.innerHTML = `
      <div class="modal-head">
        <div><h3>테이블 배치 변경 불가</h3><div class="modal-sub">영업 마감 후에 작업할 수 있어요</div></div>
        <button class="close" onclick="closeModal()">✕</button>
      </div>
      <div style="background:#fef9c3;border:1px solid #fde047;border-radius:10px;padding:14px 16px;font-size:13px;color:#713f12;line-height:1.7;margin-bottom:20px;">
        🟢 현재 <b>영업 중</b>이에요.<br>테이블 위치 변경은 <b>영업 마감 후</b>에만 가능해요.
      </div>
      <button class="btn-primary" style="width:100%;" onclick="closeModal()">확인</button>
    `;
    document.getElementById('modal-bg').classList.add('on');
    return;
  }
  const card = e.currentTarget;
  const t    = TABLES.find(x=>x.id===id);
  const pend = _pendingTablePos[id];
  _tDrag = { id,
    startX: e.clientX, startY: e.clientY,
    origX: pend ? pend.x : t.x,
    origY: pend ? pend.y : t.y,
    card, moved: false };
  document.addEventListener('mousemove', _tMouseMove);
  document.addEventListener('mouseup',   _tMouseUp);
}

function addTable(){
  const nextId = (TABLES.reduce((m,t)=>Math.max(m,t.id),0))+1;
  const zone   = state.currentZone || ZONE_LIST[0].id;
  const col    = TABLES.filter(t=>t.zone===zone).length % 4;
  const row    = Math.floor(TABLES.filter(t=>t.zone===zone).length / 4);
  const newName = 'T'+String(nextId).padStart(2,'0');
  TABLES.push({ id:nextId, name:newName, zone,
    shape:'square', x:20+col*100, y:20+row*110, status:'비어있음', orderCnt:0 });
  renderApp();
  showToast(`<span class="ic">✅</span> '${newName}' 테이블을 추가했어요`, 'ok');
}
// 테이블 모양 변경 — 사각/원형 토글
function setTableShape(id, shape){
  const t = TABLES.find(x=>x.id===id);
  if(!t || t.shape === shape) return;
  t.shape = shape;
  renderApp();
}
// 테이블 이름 변경 — 중복·공백 검증 후 반영
function renameTable(id){
  const t = TABLES.find(x=>x.id===id);
  if(!t) return;
  const raw = prompt('새 테이블 이름을 적어 주세요. (예: A-1, 창가1, T07)', t.name);
  if(raw === null) return;
  const newName = raw.trim();
  if(!newName){ alert('테이블 이름은 비워 둘 수 없어요.'); return; }
  if(newName === t.name) return;
  if(TABLES.some(x => x.id !== id && x.name === newName)){
    alert(`'${newName}'은(는) 이미 사용 중인 테이블 이름이에요.`);
    return;
  }
  t.name = newName;
  renderApp();
}

/* ============================================================
   QR 관리
   ============================================================ */
function qrMock(id){
  // 테이블 id 기반 결정론적 QR 패턴 (7×7)
  const bits = [];
  for(let i=0;i<49;i++){
    const r = (id*31+i*17+i*i*7)%100;
    // 모서리 파인더 패턴 고정
    const row=Math.floor(i/7), col=i%7;
    const corner = (row<3&&col<3)||(row<3&&col>3)||(row>3&&col<3);
    bits.push(corner ? (row===1&&col===1||row===1&&col===5||row===5&&col===1?0:1) : (r>45?1:0));
  }
  return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1.5px;width:56px;height:56px;padding:5px;background:#fff;border:1px solid var(--line);border-radius:6px;flex-shrink:0;">
    ${bits.map(b=>`<div style="background:${b?'#191f28':'#fff'};border-radius:1px;"></div>`).join('')}
  </div>`;
}

          +'<td><div style="display:flex;align-items:center;gap:8px;"><div style="width:18px;height:18px;background:'+r.hex+';border-radius:4px;border:'+rb+';flex-shrink:0;"></div><span style="font-size:13px;">'+r.colorName+'</span></div></td>'
          +'<td><b>'+r.qty+'장</b></td>'
          +'<td class="num"><b>'+(r.totalPrice||0).toLocaleString()+'</b><span style="color:var(--ink-3);font-size:11px;">원</span></td>'
          +'<td style="color:var(--ink-2);font-size:12px;">'+(r.memo||'<span style="color:var(--ink-4);">—</span>')+'</td>'
          +'<td style="color:var(--ink-3);">'+rd+'</td>'
          +'<td><span class="pill '+rp+'">'+r.status+'</span></td>'
          +'<td style="text-align:center;">'+cancelBtn+'</td></tr>';
      }).join('')
    + '</tbody></table>'
  );

  return '<div class="panel">'
    +'<h3>📦 정식 QR 스티커 신청</h3>'
    +'<div class="page-sub" style="margin-bottom:14px;">추가 QR이 필요할 땐 <b style="color:var(--ink-2);">'+QR_BATCH_SIZE+'장 단위</b>로 한 번에 신청해 주세요. 한 번 신청 시 <b style="color:var(--ink-2);">색상 1가지</b>만 선택할 수 있어요.</div>'
    +'<div style="display:flex;gap:10px;align-items:flex-start;padding:14px 16px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;margin-bottom:20px;"><span style="font-size:16px;flex-shrink:0;">💰</span><div style="font-size:13px;color:#9a3412;line-height:1.65;">QR 이미지 1장당 <b>'+QR_PRICE_PER_UNIT.toLocaleString()+'원</b>, 최소 신청 단위는 <b>'+QR_BATCH_SIZE+'장</b>이에요. 색상을 여러 가지로 받고 싶다면 신청을 나눠서 진행해 주세요.</div></div>'
    +'<div style="margin-bottom:22px;">'
    +'<div style="font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:10px;">디자인 선택 <span style="color:var(--red);">*</span></div>'
    +'<div style="padding:16px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;margin-bottom:14px;">'
    +'<div style="font-size:12px;color:var(--ink-3);font-weight:700;margin-bottom:10px;">📦 매장에서 사용하시던 기존 QR 스티커 시안이에요</div>'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;">'+qrPreview
    +'<div><div style="font-size:14px;font-weight:800;color:var(--ink);">기존 발송 시안</div>'
    +'<div style="font-size:11px;color:var(--ink-3);margin-top:3px;">'+ed.note+'</div>'
    +'<div style="font-size:11px;color:var(--ink-4);margin-top:2px;">발송일 '+deliveredFmt+'</div></div></div>'
    +'<div style="font-size:12px;color:var(--ink-2);line-height:1.6;margin-bottom:12px;">같은 디자인으로 추가 제작을 원하신다면 <b>기존 시안으로 제작</b> 버튼을 선택해 주세요.</div>'
    +'<div style="display:flex;gap:10px;">'
    +'<div onclick="state.qrDesignMode=\'same\';state.qrReqColor=null;renderApp()" style="flex:1;padding:12px 16px;border-radius:10px;border:2px solid '+sBorder+';background:'+sBg+';cursor:pointer;text-align:center;transition:all .12s;">'
    +'<div style="font-size:13px;font-weight:800;color:'+sColor+';">✓ 기존 시안으로 제작</div>'
    +'<div style="font-size:11px;color:'+sSub+';margin-top:2px;">발송된 시안 그대로</div></div>'
    +'<div onclick="state.qrDesignMode=\'new\';renderApp()" style="flex:1;padding:12px 16px;border-radius:10px;border:2px solid '+nBorder+';background:'+nBg+';cursor:pointer;text-align:center;transition:all .12s;">'
    +'<div style="font-size:13px;font-weight:800;color:'+nColor+';">🎨 새 색상으로 제작</div>'
    +'<div style="font-size:11px;color:'+nSub+';margin-top:2px;">아래에서 색상 선택</div></div>'
    +'</div></div>'
    + samePreview
    + colorPicker
    +'</div>'
    +'<div style="margin-bottom:22px;">'
    +'<label style="display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:10px;">신청 수량 <span style="color:var(--red);">*</span> <span style="color:var(--ink-4);font-weight:400;font-size:12px;margin-left:4px;">'+QR_BATCH_SIZE+'장 단위</span></label>'
    +'<div style="display:flex;align-items:center;gap:12px;">'
    +'<button onclick="if(state.qrReqQty>'+QR_BATCH_SIZE+'){state.qrReqQty-='+QR_BATCH_SIZE+';renderApp();}" style="width:44px;height:44px;border-radius:50%;border:2px solid var(--line);background:#fff;font-size:22px;font-weight:700;cursor:pointer;color:var(--ink-2);display:flex;align-items:center;justify-content:center;transition:all .12s;'+(qty<=QR_BATCH_SIZE?'opacity:.35;cursor:not-allowed;':'')+'" title="'+QR_BATCH_SIZE+'장 줄이기">−</button>'
    +'<div style="text-align:center;min-width:80px;"><div style="font-size:32px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums;line-height:1;">'+qty+'</div><div style="font-size:11px;color:var(--ink-3);margin-top:2px;">장</div></div>'
    +'<button onclick="state.qrReqQty='+(qty+QR_BATCH_SIZE)+';renderApp();" style="width:44px;height:44px;border-radius:50%;border:2px solid var(--blue);background:var(--blue);font-size:22px;font-weight:700;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;transition:all .12s;" title="'+QR_BATCH_SIZE+'장 늘리기">+</button>'
    +'<div style="font-size:12px;color:var(--ink-3);line-height:1.5;">'+QR_BATCH_SIZE+'장 단위로<br/>조절할 수 있어요</div>'
    +'</div></div>'
    +'<div style="margin-bottom:22px;">'
    +'<label style="display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:8px;">메모 <span style="color:var(--ink-4);font-weight:400;font-size:12px;margin-left:4px;">선택 — 어떤 용도인지 알려 주시면 빠르게 처리돼요</span></label>'
    +'<input id="qr-req-memo" class="input" placeholder="예: 옥상 테라스 신규 테이블용, 야외 영업용 예비 등" style="width:100%;" value="'+memo.replace(/"/g,'&quot;')+'" oninput="state.qrReqMemo=this.value" />'
    +'</div>'
    + summary
    +'<button class="btn-primary" style="'+btnStyle+'" onclick="submitQRRequest()">'+btnLabel+'</button>'
    + history
    +'</div>';
}

// QR 스티커 신청 — 결제 요약 + 신청 버튼 (3중 템플릿 중첩 회피용 분리 함수)
function renderQRStickerSummary(){
  const dm        = state.qrDesignMode || 'same';
  const colorName = dm === 'same' ? QR_EXISTING_DESIGN.colorName : (state.qrReqColor || '');
  const colorHex  = dm === 'same' ? QR_EXISTING_DESIGN.hex : (QR_COLOR_OPTIONS.find(c=>c.name===colorName)?.hex || '');
  const sameLabel = dm === 'same' ? ' (기존 시안)' : '';
  const ready     = !!colorName && !!state.qrReqQty;
  const total     = ready ? state.qrReqQty * QR_PRICE_PER_UNIT : 0;
  const border    = colorName === '흰색' ? '1px solid var(--line)' : 'none';
  const btnLabel  = ready
    ? colorName + sameLabel + ' ' + state.qrReqQty + '장 · ' + total.toLocaleString() + '원 신청하기'
    : (dm === 'new' ? '색상을 선택해 주세요' : '수량을 선택해 주세요');
  const summary = ready ? (
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:16px 18px;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:12px;margin-bottom:14px;">'
    + '<div style="display:flex;align-items:center;gap:12px;">'
    + '<div style="width:20px;height:20px;background:' + colorHex + ';border-radius:4px;border:' + border + ';flex-shrink:0;"></div>'
    + '<div><div style="font-size:13px;color:var(--ink-2);font-weight:700;">' + colorName + sameLabel + ' · ' + state.qrReqQty + '장</div>'
    + '<div style="font-size:11px;color:var(--ink-3);">' + QR_PRICE_PER_UNIT.toLocaleString() + '원 × ' + state.qrReqQty + '장</div></div>'
    + '</div>'
    + '<div style="font-size:20px;font-weight:800;color:var(--blue);">' + total.toLocaleString() + '원</div>'
    + '</div>'
  ) : '';
  const btnStyle = 'width:100%;padding:14px;font-size:14px;font-weight:800;' + (!ready ? 'opacity:.5;cursor:not-allowed;' : '');
  return summary
    + '<button class="btn-primary" style="' + btnStyle + '" onclick="submitQRRequest()">' + btnLabel + '</button>';
}

// 포장/메뉴판 QR은 더 이상 수동 추가하지 않아요 — 매장 설정에서 자동 파생
// 임시 출력 모달 — 정식 스티커 도착 전 종이로 출력해 임시 사용
function openTempPrintQRModal(type, id){
  let title, link, qrId, isMenuOnly = false;
  if(type==='table'){
    const t = TABLES.find(x=>x.id===id);
    if(!t) return;
    title = `${t.name} 테이블`;
    link = `order.qrorder.co.kr/softcoffee-hapjeong/${t.name}`;
    qrId = t.id;
  } else if(type==='menu'){
    title = `메뉴판 (외부 노출용)`;
    link = `order.qrorder.co.kr/softcoffee-hapjeong/menu`;
    qrId = 2000;
    isMenuOnly = true;
  } else {
    title = `포장하기`;
    link = `order.qrorder.co.kr/softcoffee-hapjeong/takeout`;
    qrId = 1000;
  }
  const modal = document.getElementById('modal');

function submitQRRequest(){
  const dm    = state.qrDesignMode || 'same';
  const color = dm==='same' ? QR_EXISTING_DESIGN.colorName : state.qrReqColor;
  const qty   = state.qrReqQty;
  const memo  = (state.qrReqMemo||'').trim();
  if(!color){ alert('색상을 선택해 주세요.'); return; }
  if(!qty)  { alert(`신청 수량을 선택해 주세요. 최소 ${QR_BATCH_SIZE}장 단위로 신청할 수 있어요.`); return; }
  if(qty % QR_BATCH_SIZE !== 0){ alert(`수량은 ${QR_BATCH_SIZE}장 단위로만 신청할 수 있어요.`); return; }
  const total = qty * QR_PRICE_PER_UNIT;
  const designLabel = dm==='same' ? `${color} (기존 시안과 동일)` : `${color} (새 색상)`;
  // 최종 더블 체크
  if(!confirm(`${designLabel} QR ${qty}장을 신청할게요.\n결제 금액: ${total.toLocaleString()}원\n\n한 번 발주되면 변경이 어려워요. 신청할까요?`)) return;
  const hex = dm==='same' ? QR_EXISTING_DESIGN.hex : (QR_COLOR_OPTIONS.find(c=>c.name===color)?.hex || '#000');
  const today = new Date().toISOString().slice(0,10);
  QR_REQUESTS.push({ id: QR_REQUESTS.length+1, qty, colorName:color, hex, memo, reqDate:today, status:'신청중', totalPrice:total });
  state.qrDesignMode = 'same';
  state.qrReqColor = null;
  state.qrReqQty = 9;
  state.qrReqMemo = '';
  renderApp();
  showToast(`<span class="ic">✅</span> ${color} QR ${qty}장 신청이 접수됐어요`, 'ok');
}
function cancelQRRequest(id){
  const r = QR_REQUESTS.find(x=>x.id===id);
  if(!r) return;
  if(r.status !== '신청중'){ alert('제작이 이미 시작돼 취소할 수 없어요.'); return; }
  if(!confirm('신청을 취소할까요?\n취소 후엔 복구할 수 없어요.')) return;
  r.status = '취소';
  renderApp();
  showToast('<span class="ic">🗑️</span> QR 스티커 신청을 취소했어요', 'ok');
}

// ===== 운영 시간 슬롯 관리 =====
function addScheduleSlot(){
  if(!STORE_INFO.scheduleSlots) STORE_INFO.scheduleSlots = [];
  const maxId = STORE_INFO.scheduleSlots.reduce((m,s)=>Math.max(m,s.id),0);
  STORE_INFO.scheduleSlots.push({ id:maxId+1, days:[], open:'09:00', close:'22:00', lastOrder:'' });
  markUnsavedUI(); renderApp();
}
function removeScheduleSlot(id){
  if((STORE_INFO.scheduleSlots||[]).length<=1){ alert('운영 시간은 최소 1개 필요해요.'); return; }
  STORE_INFO.scheduleSlots = STORE_INFO.scheduleSlots.filter(s=>s.id!==id);
  markUnsavedUI(); renderApp();
}
function toggleSlotDay(id, day){
  const slot = (STORE_INFO.scheduleSlots||[]).find(s=>s.id===id);
  if(!slot) return;
  if(slot.days.includes(day)) slot.days = slot.days.filter(d=>d!==day);
  else slot.days.push(day);
  markUnsavedUI(); renderApp();
}
function updateSlotTime(id, field, value){
  const slot = (STORE_INFO.scheduleSlots||[]).find(s=>s.id===id);
  if(slot) slot[field] = value;
}

function toggleAmenity(name){
  const arr = STORE_INFO.amenities;
  const i = arr.indexOf(name);
  if (i>=0) arr.splice(i,1); else arr.push(name);
  renderApp();
}
// 편의정보 직접입력 추가
function addCustomAmenity(){
  const el = document.getElementById('amenity-custom-input');
  if(!el) return;
  const v = el.value.trim();
  if(!v){ el.focus(); return; }
  if (STORE_INFO.amenities.includes(v) || STORE_INFO.amenitiesCustom.includes(v)){
    showToast('<span class="ic">ℹ️</span> 이미 추가된 편의정보예요', 'ok');
    el.value=''; return;
  }
  STORE_INFO.amenitiesCustom.push(v);
  renderApp();
}
// 편의정보 직접입력 삭제
function removeCustomAmenity(i){
  STORE_INFO.amenitiesCustom.splice(i,1);
  renderApp();
}

function openHolidayModal(){
  const modal = document.getElementById('modal');
  const today = new Date().toISOString().slice(0,10);
  modal.innerHTML = `
    <div class="modal-head">
      <div>
        <h3>휴무일 추가</h3>
        <div class="modal-sub">날짜를 지정하거나, 기념일·사유를 직접 입력할 수 있어요</div>
      </div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
    <div class="tabs" style="margin:-4px 0 18px;">
      <div class="t on" id="hd-tab-date" onclick="switchHdTab('date')">📅 날짜 지정</div>
      <div class="t" id="hd-tab-text" onclick="switchHdTab('text')">✏️ 수기 입력</div>
    </div>
    <div id="hd-date-form" class="form-grid">
      <div class="form-row"><label>날짜 *</label><input class="input" type="date" id="hd-date" value="${today}" /></div>
      <div class="form-row"><label>사유 (선택)</label><input class="input" id="hd-name" placeholder="예: 성탄절, 어린이날" /></div>
    </div>
    <div id="hd-text-form" class="form-grid" style="display:none;">
      <div class="form-row" style="grid-column:1/-1;">
        <label>기념일 · 사유 *</label>
        <input class="input" id="hd-free" placeholder="예: 추석 연휴, 개업 기념일, 대표자 개인 일정" />
      </div>
      <div style="grid-column:1/-1;font-size:12px;color:var(--ink-3);">날짜 없이 사유만 기록할 때 사용해요. 목록에 📌로 표시돼요.</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <button class="btn-ghost" style="flex:1;" onclick="closeModal()">취소</button>
      <button class="btn-primary" style="flex:1;" onclick="addHolidayFromModal()">추가</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('on');
}

function switchHdTab(type){
  document.getElementById('hd-date-form').style.display = type==='date'?'':'none';
  document.getElementById('hd-text-form').style.display = type==='text'?'':'none';
  document.getElementById('hd-tab-date').classList.toggle('on', type==='date');
  document.getElementById('hd-tab-text').classList.toggle('on', type==='text');
}

function addHolidayFromModal(){
  const isDate = document.getElementById('hd-date-form').style.display !== 'none';
  let entry;
  if(isDate){
    const d = document.getElementById('hd-date').value;
    const n = document.getElementById('hd-name').value.trim();
    if(!d){ alert('날짜를 선택해 주세요.'); return; }
    entry = d + (n ? ` (${n})` : '');
  } else {
    const t = document.getElementById('hd-free').value.trim();
    if(!t){ alert('기념일·사유를 입력해 주세요.'); return; }
    entry = t;
  }
  STORE_INFO.holidays.push(entry);
  closeModal();
  renderApp();
  showToast(`<span class="ic">📅</span> 휴무일을 추가했어요`, 'ok');
}

function addStoreImage(){
  if(STORE_INFO.extraImages < 2){ STORE_INFO.extraImages++; renderApp(); }
}
function removeStoreImage(idx){
  if(STORE_INFO.extraImages > 0){ STORE_INFO.extraImages--; renderApp(); }
}

// 멤버십 등급명 변경 — 중복·공백 검증 후 반영
function renameMembershipTier(idx){
  const t = MEMBERSHIP.tiers[idx];
  if(!t) return;
  const raw = prompt('새 등급 이름을 적어 주세요. (예: VIP, 다이아몬드, 단골)', t.name);
  if(raw === null) return;
  const newName = raw.trim();
  if(!newName){ alert('등급 이름은 비워 둘 수 없어요.'); return; }
  if(newName === t.name) return;
  if(MEMBERSHIP.tiers.some((x,i) => i !== idx && x.name === newName)){
    alert(`'${newName}'은(는) 이미 사용 중인 등급 이름이에요.`);
    return;
  }
  t.name = newName;
  renderApp();
}

  if(r==='custom'){ if(!state.reviewStart) state.reviewStart='2026-01-01'; if(!state.reviewEnd) state.reviewEnd='2026-05-15'; }

}

  if(f==='wait')  rows = rows.filter(r=>!r.reply);

/* ============================================================
   고객 지원 — 자주 묻는 질문 · 서비스 관련 문의 탭 컨테이너
   ============================================================ */
function renderSupport(main){
  if (!state.supportTab) state.supportTab = 'faq';
  const tab = state.supportTab;
  const sub = tab === 'faq'
    ? '소프트먼트 운영팀이 정리한 사용 안내예요. 원하는 답을 찾지 못하시면 <b style="color:var(--ink-2);">서비스 관련 문의</b> 탭에서 직접 남겨 주세요.'
    : 'QR오더 사용 중 궁금한 점이나 문제가 있으면 남겨 주세요. 소프트먼트 운영팀이 확인 후 답변드려요.';
  const tabLabel = tab === 'faq' ? '자주 묻는 질문' : '서비스 관련 문의';

  const faqCnt = FAQS.length;
  const csWait = CS_INQUIRIES.filter(c => c.status === '답변 대기').length;

  // 자주 묻는 질문 / 서비스 관련 문의 — 카드형 토글 버튼
  const btn = (key, ic, label, desc, badge) => {
    const on = tab === key;
    return `
      <div class="sup-tab${on?' on':''}" onclick="setSupportTab('${key}')">
        <span class="sup-tab-ic">${ic}</span>
        <div class="sup-tab-body">
          <div class="sup-tab-label">${label}${badge?` <span class="sup-tab-badge${on?' on':''}">${badge}</span>`:''}</div>
          <div class="sup-tab-desc">${desc}</div>
        </div>
      </div>
    `;
  };

  main.innerHTML = `
    <div class="crumb">고객 지원 › ${tabLabel}</div>
    <div class="toolbar">
      <div>
        <h2>고객 지원</h2>
        <div class="page-sub">${sub}</div>
      </div>
      ${tab === 'cs' ? `<button class="btn-primary" onclick="openNewInquiryModal()">+ 새 문의 남기기</button>` : ''}
    </div>

    <div class="sup-tabs">
      ${btn('faq', '❓', '자주 묻는 질문', '사용 안내를 먼저 빠르게 확인', faqCnt)}
      ${btn('cs',  '📨', '서비스 관련 문의', '소프트먼트 운영팀에 직접 남기기', csWait ? `대기 ${csWait}` : '')}
    </div>

    <div id="support-body"></div>
  `;

  const body = document.getElementById('support-body');
  if (tab === 'faq') renderFAQ(body);
  else renderCS(body);
}

/* ============================================================

  const waiting = CS_INQUIRIES.filter(c=>c.status==='답변 대기').length;

  host.innerHTML = `

    <div style="display:flex;gap:10px;align-items:flex-start;padding:14px 18px;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:12px;margin-bottom:14px;">

        문의를 남겨 주시면 <b>평균 24시간 안에 답변</b>드려요. 결제·정산 같은 긴급 이슈는 가입 시 안내드린 <b>CS 전화</b>로 연락 주시면 더 빠르게 도와드릴 수 있어요.

    </div>

      <div class="pc-card ${waiting>0?'blue':''}"><div class="label">답변 대기</div><div class="num">${waiting}<span style="font-size:13px;color:${waiting>0?'#1b64da':'var(--ink-3)'};font-weight:600;margin-left:2px;">건</span></div></div>
      <div class="pc-card"><div class="label">답변 완료</div><div class="num">${done}<span style="font-size:13px;color:var(--ink-3);font-weight:600;margin-left:2px;">건</span></div></div>
      <div class="pc-card"><div class="label">평균 응답 시간</div><div class="num">12<span style="font-size:14px;color:var(--ink-3);font-weight:600;margin-left:2px;">시간</span></div></div>

      <h3>내가 남긴 문의 <span class="h-sub">${CS_INQUIRIES.length}건</span></h3>
      ${CS_INQUIRIES.length===0 ? `
        <div style="padding:40px 20px;text-align:center;background:var(--bg-2);border-radius:12px;">
          <div style="font-size:38px;margin-bottom:12px;">📨</div>
          <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;">아직 남긴 문의가 없어요</div>
          <div style="font-size:12px;color:var(--ink-3);">위의 <b style="color:var(--ink-2);">+ 새 문의 남기기</b>를 눌러 궁금한 점을 적어 주세요.</div>
        </div>
      ` : `
        <div style="display:flex;flex-direction:column;gap:12px;">
          ${CS_INQUIRIES.map(c=>`
            <div style="border:1px solid var(--line);border-radius:12px;padding:16px 18px;background:#fff;">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;">
                <span class="chip" style="font-size:11px;padding:3px 9px;cursor:default;background:var(--bg-2);color:var(--ink-2);">${c.type}</span>
                <span class="pill ${c.status==='답변 완료'?'done':'pending'}" style="font-size:11px;">${c.status==='답변 완료'?'✓ 답변 완료':'⏳ 답변 대기'}</span>
                <span style="font-size:11px;color:var(--ink-4);margin-left:auto;">${c.date.replace(/(\d{4})-(\d{2})-(\d{2})/,'$1.$2.$3')} 남김</span>
              </div>
              <div style="font-size:15px;font-weight:800;color:var(--ink);margin-bottom:6px;">${c.title}</div>
              <div style="font-size:13px;color:var(--ink-2);line-height:1.6;white-space:pre-wrap;">${c.body}</div>
              ${c.reply ? `
                <div style="margin-top:12px;padding:12px 14px;background:var(--blue-50);border-radius:10px;border-left:3px solid var(--blue);">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                    <span style="font-size:14px;">💬</span>
                    <span style="font-size:12px;font-weight:700;color:var(--blue);">${c.by||'소프트먼트'}</span>

    </div>

}

// 다른 페이지에서 CS 문의 모달을 미리 분류·제목 채워서 열기
function openNewInquiryWithType(type, title){
  state.section = 'support';
  state.supportTab = 'cs';
  renderApp();
  setTimeout(()=>{
    openNewInquiryModal();
    const t = document.getElementById('inq-type'); if(t) t.value = type;
    const ti = document.getElementById('inq-title'); if(ti) ti.value = title;
    const body = document.getElementById('inq-body');
    if(body && !body.value) body.value = '아래에 변경할 내용·사유를 자세히 적어 주세요.\n\n';
  }, 50);
}

// 새 문의 작성 모달 (사장님 → 소프트먼트)

    <div class="modal-box" style="max-width:520px;">

        <select id="inq-type" class="input" style="width:100%;margin-bottom:14px;">
          <option>결제·정산</option>
          <option>메뉴 관리</option>
          <option>QR·테이블</option>

          <option>기타</option>
        </select>
        <label style="display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:8px;">제목</label>

        <textarea id="inq-body" class="input" placeholder="언제·어떤 상황·어떤 도움이 필요한지 적어 주세요" style="width:100%;min-height:140px;font-family:inherit;resize:vertical;padding:12px 14px;line-height:1.6;"></textarea>
        <label style="display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-top:14px;margin-bottom:8px;">스크린샷 첨부 <span style="color:var(--ink-4);font-weight:400;font-size:12px;margin-left:4px;">선택 · 최대 3장</span></label>
        <div onclick="alert('파일 첨부 (와이어프레임)')" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border:2px dashed var(--line);border-radius:10px;cursor:pointer;color:var(--ink-3);font-size:12px;transition:all .15s;" onmouseover="this.style.borderColor='var(--blue)';this.style.color='var(--blue)'" onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--ink-3)'">
          <span style="font-size:18px;">📎</span>
          <span>여기를 클릭하거나 파일을 끌어다 놓아 주세요 (JPG·PNG, 5MB 이하)</span>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--ink-4);">💡 화면을 첨부해 주시면 더 빠르게 도와드릴 수 있어요.</div>
        <div style="margin-top:20px;display:flex;gap:8px;">
          <button class="btn-ghost" style="flex:1;" onclick="closeModal()">취소</button>
          <button class="btn-primary" style="flex:1;" onclick="submitInquiry()">문의 남기기</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('on');
}
function submitInquiry(){
  const type  = document.getElementById('inq-type').value;
  const title = document.getElementById('inq-title').value.trim();
  const body  = document.getElementById('inq-body').value.trim();
  if(!title){ alert('제목을 입력해 주세요.'); return; }
  if(!body) { alert('자세한 내용을 입력해 주세요.'); return; }
  const today = new Date().toISOString().slice(0,10);
  CS_INQUIRIES.unshift({ id:(CS_INQUIRIES.reduce((m,c)=>Math.max(m,c.id),0))+1, date:today, type, title, body, status:'답변 대기', reply:'', replyAt:'', by:'' });
  closeModal();
  renderApp();
  showToast(`<span class="ic">✅</span> 문의가 접수됐어요. 평균 24시간 안에 답변드릴게요`, 'ok');
}

function ot_currentPolicy(){
  const ch = ORDER_CHANNELS;
  const dineIn = ch.mode==='both' || ch.mode==='dine_in';
  const takeout = ch.mode==='both' || ch.mode==='takeout';
  if(!dineIn && takeout) return { label:'선불', scope:'포장 전용' };
  const now = new Date();
  const hhmm = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  if(ch.payment==='prepay')  return { label:'선불', scope:'고정 정책' };
  if(ch.payment==='postpay') return { label:'후결제', scope:'고정 정책' };
  const cur = ch.schedule.find(s=>hhmm>=s.start && hhmm<=s.end);
  if(cur) return { label: cur.policy==='prepay'?'선불':'후결제', scope:`${cur.name} 시간대` };

function timeOptions10(selected, allowEmpty){
  selected = selected || '';
  var opts = '', has = false;
  for (var h=0; h<24; h++){
    var hh = (h<10?'0':'')+h;
    for (var m=0; m<60; m+=10){
      var v = hh+':'+(m<10?'0'+m:m);
      if (v===selected) has = true;
      opts += '<option value="'+v+'"'+(v===selected?' selected':'')+'>'+v+'</option>';
    }
  }
  var extra = (selected && !has) ? '<option value="'+selected+'" selected>'+selected+' (10분 단위 아님)</option>' : '';
  var empty = allowEmpty ? '<option value=""'+(selected===''?' selected':'')+'>없음</option>' : '';
  return empty + extra + opts;
}

/* ============================================================
   직원호출 설정 페이지

function scHmsToSec(s){ const [h,m,sec]=s.split(':').map(Number); return h*3600+m*60+(sec||0); }
function scHmToShort(s){ // '14:54:25' -> '14:54'
  const [h,m] = s.split(':');
  return `${h}:${m}`;
}
function scCompleteCall(id){
  const row = STAFF_CALL_HISTORY.find(r=>r.id===id);
  if (!row || row.completedAt) return;
  row.completedAt = STAFF_CALL_NOW;
  renderApp();
}
function scUndoComplete(id){
  const row = STAFF_CALL_HISTORY.find(r=>r.id===id);
  if (!row || !row.completedAt) return;
  row.completedAt = null;
  renderApp();
}

// 호출 메시지 드래그앤드롭 재정렬
let _scDragSrc = null;
function scMsgDragStart(e, idx){
  _scDragSrc = idx;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>e.currentTarget.classList.add('drag-source'), 0);
}
function scMsgDragOver(e, idx){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.sc-msg-row').forEach(r=>r.classList.remove('drag-over-top','drag-over-bottom'));
  if(idx === _scDragSrc) return;
  const rect = e.currentTarget.getBoundingClientRect();
  e.currentTarget.classList.add(e.clientY < rect.top + rect.height/2 ? 'drag-over-top' : 'drag-over-bottom');
}
function scMsgDragLeave(e){
  e.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
}
function scMsgDrop(e, idx){
  e.preventDefault();
  if(_scDragSrc===null || _scDragSrc===idx){ _scDragSrc=null; return; }
  const dropAfter = e.clientY >= e.currentTarget.getBoundingClientRect().top + e.currentTarget.getBoundingClientRect().height/2;
  const src = _scDragSrc;
  const msgs = STAFF_CALLS.messages;
  const [item] = msgs.splice(src, 1);
  const insertAt = src < idx ? (dropAfter ? idx : idx-1) : (dropAfter ? idx+1 : idx);
  msgs.splice(insertAt, 0, item);
  msgs.forEach((m,i)=>m.sort=i+1);
  _scDragSrc = null;
  markUnsavedUI();
  renderApp();
}
function scMsgDragEnd(e){
  _scDragSrc = null;
  document.querySelectorAll('.sc-msg-row').forEach(r=>r.classList.remove('drag-source','drag-over-top','drag-over-bottom'));
}
