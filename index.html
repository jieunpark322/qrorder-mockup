// 필드: id / approvalDate(영업일) / settleDate(정산일) / cnt / grossAmt
//        / couponPlatformAmt(소프트먼트 발행 보전) / couponMerchantAmt(사장님 발행, 정산 제외)
//        / feeBase + feeVat = feeTotal (입금 수수료, 결제수단별 가중평균 요율)
//        / couponSettle(쿠폰 정산금) / txSettle(거래금 정산) / totalSettle(총 정산)
//        / status: 정산완료|정산대기 / usedCoupon
// QR오더 정산 주기: 영업일 D+3
// 결제수단별 차등 요율: 카드 국내 2.0% / 해외 3.5% / 카카오 2.3% / 네이버 2.4% / 토스 2.3% / 계좌이체 1.5%
// 결제수단별 거래 비중을 가중평균하여 일별 평균 수수료율 ≈ 2.06% 산출 (수수료 페이지 표와 일치)
const HOLIDAYS_2026 = ['2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-03-01','2026-05-01','2026-05-05','2026-05-25','2026-06-06','2026-08-15','2026-09-24','2026-09-25','2026-09-26','2026-10-03','2026-10-09','2026-12-25'];
// KST 기준 YYYY-MM-DD (toISOString은 UTC 변환되어 자정이 전날로 밀림 — 직접 포맷)
const toISODate = (date) => `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
const isHoliday = (date) => HOLIDAYS_2026.includes(toISODate(date));
// 결제수단별 차등 요율의 거래 비중 가중평균 ≈ 2.00%
// (카드국내 60%×2.0 + 해외 3%×3.5 + 카카오 17%×2.3 + 네이버 10%×2.4 + 토스 2%×2.3 + 계좌이체 1%×1.5)
const AVG_FEE_RATE = 0.02;
const SETTLEMENTS = (function(){
  // 쿠폰 발행 주체 분리
  // 소프트먼트 발행: 플랫폼이 가맹점에 보전 → 정산에 더함
  // 사장님 발행: 가맹점 부담 → 정산 제외 (이미 gross에 반영된 실매출)
  // ORDERS 실데이터가 있는 날짜는 실제 couponIssuer로, 그 외는 결정적 패턴 사용
  const orderCouponByDate = {};  // { 'YYYY-MM-DD': { platform: 합계, merchant: 합계 } }
  if (typeof ORDERS !== 'undefined') {
    ORDERS.forEach(function(o){
      if (!o.couponAmt || !o.couponIssuer) return;
      if (!orderCouponByDate[o.date]) orderCouponByDate[o.date] = { platform:0, merchant:0 };
      if (o.couponIssuer === 'softment') orderCouponByDate[o.date].platform += o.couponAmt;
      else orderCouponByDate[o.date].merchant += o.couponAmt;
    });
  }
  const couponPatternPlatform = DAY.map(function(d, i){
    const [m, dd] = d.d.split('/').map(Number);
    const iso = '2026-' + String(m).padStart(2,'0') + '-' + String(dd).padStart(2,'0');
    if (orderCouponByDate[iso]) return orderCouponByDate[iso].platform > 0;
    return i % 5 === 0 || i % 11 === 0;  // 실데이터 없는 날은 시뮬레이션 패턴
  });
  const couponPatternMerchant = DAY.map(function(d, i){
    const [m, dd] = d.d.split('/').map(Number);
    const iso = '2026-' + String(m).padStart(2,'0') + '-' + String(dd).padStart(2,'0');
    if (orderCouponByDate[iso]) return orderCouponByDate[iso].merchant > 0;
    return i % 4 === 0 || i % 9 === 0;
  });
  const today = new Date(2026, 4, 15);
  const DOW_ARR = ['일','월','화','수','목','금','토'];
  // 영업일 D+N 정산 (주말·공휴일 스킵)
  function addBizDays(base, n){
    const d = new Date(base);
    let added = 0;
    while (added < n) {
      d.setDate(d.getDate() + 1);
      const w = d.getDay();
      if (w !== 0 && w !== 6 && !isHoliday(d)) added++;
    }
    return d;
  }
  // 같은 정산일에 여러 영업일 매출이 합쳐지는 경우(토/일/공휴일) 그룹화
  // 미래 날짜(today 이후)는 아직 발생하지 않은 매출이므로 정산 회차 생성에서 제외
  const todayISO = toISODate(today);
  const groups = new Map();
  DAY.forEach((d, i) => {
    const [m, dd] = d.d.split('/').map(Number);
    const approvalISO = `2026-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    if (approvalISO > todayISO) return; // 오늘 이후 매출은 정산 대상 아님
    const sDate = addBizDays(new Date(2026, m - 1, dd), 3);
    const key = toISODate(sDate);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push({...d, _idx:i, _approval:new Date(2026, m-1, dd)});
  });
  return Array.from(groups.entries()).map(([sKey, days]) => {
    const sDate = new Date(sKey);
    const sM = sDate.getMonth() + 1;
    const sD = sDate.getDate();
    const sW = DOW_ARR[sDate.getDay()];
    const gross = days.reduce((s,d)=>s+d.gross, 0);
    const ref = days.reduce((s,d)=>s+d.ref, 0);
    const cnt = days.reduce((s,d)=>s+d.ocnt, 0);
    // 소프트먼트 발행 쿠폰 — 플랫폼이 가맹점에 보전 (정산에 +)
    const usedPlatformCoupon = days.some(d => couponPatternPlatform[d._idx]);
    const platformBase = days.filter(d => couponPatternPlatform[d._idx]).reduce((s,d)=>s+d.gross, 0);
    const couponPlatformAmt = usedPlatformCoupon ? Math.round(platformBase * 0.012) : 0;
    // 사장님 발행 쿠폰 — 가맹점 부담, 정산 제외 (참고용 표시만)
    const usedMerchantCoupon = days.some(d => couponPatternMerchant[d._idx]);
    const merchantBase = days.filter(d => couponPatternMerchant[d._idx]).reduce((s,d)=>s+d.gross, 0);
    const couponMerchantAmt = usedMerchantCoupon ? Math.round(merchantBase * 0.005) : 0;
    const usedCoupon = usedPlatformCoupon || usedMerchantCoupon;
    // 입금 수수료 — 결제수단별 차등 요율의 가중평균 적용 (실효 2.06%)
    // 환불액에 대해서는 카드사가 수수료도 환급하므로 (gross - ref) × 평균요율
    const feeBase = Math.round((gross - ref) * AVG_FEE_RATE);
    const feeVat  = Math.round(feeBase * 0.1);
    const feeTotal = feeBase + feeVat;
    // 정산 = 결제 − 환불 − 수수료 + 소프트먼트쿠폰보전 (사장님쿠폰은 제외)
    const couponSettle = couponPlatformAmt;
    const txSettle = gross - ref - feeTotal;
    const totalSettle = txSettle + couponSettle;
    const status = sKey <= todayISO ? '정산완료' : '정산대기'; // 문자열 비교로 타임존 버그 방지
    // 회차 ID: STL-YYYYMMDD-MMDD (정산일-승인일 첫째일) 형식으로 고유 보장
    const firstApproval = days[0]._approval;
    const aMM = String(firstApproval.getMonth()+1).padStart(2,'0');
    const aDD = String(firstApproval.getDate()).padStart(2,'0');
    const sMM = String(sM).padStart(2,'0');
    const sDD = String(sD).padStart(2,'0');
    // 승인일 표시: 단일이면 "5/15", 묶음이면 "5/2~5/3"
    const approvalLabel = days.length === 1
      ? days[0].d
      : `${days[0].d}~${days[days.length-1].d}`;
    const approvalDowLabel = days.length === 1
      ? days[0].w
      : `${days[0].w}~${days[days.length-1].w}`;
    return {
      id: `STL-2026${sMM}${sDD}-${aMM}${aDD}`,
      approvalDate: approvalLabel,
      approvalDow:  approvalDowLabel,
      approvalISO: `2026-${String(days[0].d.split('/')[0]).padStart(2,'0')}-${String(days[0].d.split('/')[1]).padStart(2,'0')}`,
      approvalDays: days.map(d => ({date:d.d, dow:d.w, gross:d.gross, ref:d.ref, cnt:d.ocnt})),
      settleDate:  `${sM}/${sD}`,
      settleDow:   sW,
      settleISO:   sKey,
      cnt,
      grossAmt: gross,
      refundAmt: ref,
      couponPlatformAmt,   // 소프트먼트 발행 → 보전금 (정산에 더함)
      couponMerchantAmt,   // 사장님 발행 → 참고용 (정산 제외)
      usedPlatformCoupon,
      usedMerchantCoupon,
      feeBase, feeVat, feeTotal,
      feeRate: AVG_FEE_RATE,
      couponSettle,
      txSettle,
      totalSettle,
      status,
      statusPill: status === '정산완료' ? 'done' : 'pending',
      usedCoupon,
    };
  });
})();
// 주문 → 정산회차 매핑 (date ISO → SETTLEMENTS ID)
function findSettlementByOrderDate(dateISO){
  return SETTLEMENTS.find(s => s.approvalDays.some(d => `2026-${String(d.date.split('/')[0]).padStart(2,'0')}-${String(d.date.split('/')[1]).padStart(2,'0')}` === dateISO));
}
// ORDERS의 stl(정산예정 라벨)을 SETTLEMENTS에서 자동 파생 (수동 입력 텍스트 대체)
ORDERS.forEach(o => {
  if (o._expired) { o.stl = '정산완료'; return; }
  if (o.status === '취소') { o.stl = '제외'; return; }
  if (o.issuer === '현금') { o.stl = '− (현금 즉시)'; return; }
  const s = findSettlementByOrderDate(o.date);
  if (!s) { o.stl = '−'; return; }
  o.stl = s.status === '정산완료' ? `정산완료 ${fmtMD(s.settleDate)}` : `정산예정 ${fmtMD(s.settleDate)}`;
  o._settlementId = s.id;
});

/* ============================================================
   정렬 공통 헬퍼 — 표 헤더 클릭 시 오름차↔내림차 토글
   ============================================================ */
// 헤더 셀 생성: sortableHeader({key, label, align, currentSort, setterName})
// setterName은 'setOrderSort' 같은 전역 함수명. 같은 키 클릭 시 dir 토글, 다른 키 클릭 시 desc 시작.
function sortableHeader({key, label, align, currentSort, setter}){
  const isActive = currentSort && currentSort.key === key;
  const dir = isActive ? currentSort.dir : null;
  const arrow = dir === 'asc' ? '▲' : dir === 'desc' ? '▼' : '⇅';
  const color = isActive ? 'var(--blue)' : 'var(--ink-4)';
  const cls = align === 'num' ? ' class="num"' : '';
  return `<th${cls} style="cursor:pointer;user-select:none;white-space:nowrap;" onclick="${setter}('${key}')">${label} <span style="color:${color};font-size:10px;margin-left:2px;">${arrow}</span></th>`;
}
// 데이터 배열 정렬 — key/dir 기반. accessor는 각 행에서 값을 꺼내는 함수.
function applySort(rows, sortState, accessors){
  if (!sortState || !sortState.key) return rows;
  const fn = accessors[sortState.key];
  if (!fn) return rows;
  const out = rows.slice().sort((a,b) => {
    const av = fn(a), bv = fn(b);
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'number' && typeof bv === 'number') return av - bv;
    return String(av).localeCompare(String(bv), 'ko');
  });
  return sortState.dir === 'desc' ? out.reverse() : out;
}
// 정렬 setter 생성기 — 같은 키 토글, 다른 키 desc 시작
function makeSortSetter(stateKey){
  return function(colKey){
    const cur = state[stateKey];
    if (cur && cur.key === colKey) {
      state[stateKey] = { key: colKey, dir: cur.dir === 'desc' ? 'asc' : 'desc' };
    } else {
      state[stateKey] = { key: colKey, dir: 'desc' };
    }
    renderApp();
  };
}

const sum = (a, k) => a.reduce((s,x)=>s+(x[k]||0),0);

/* === 보안 정책 헬퍼 — 카드번호 등 민감정보 사전 차단 === */
const TODAY_DATE = '2026-05-15';
const STORE_EMAIL = 'hong****@gmail.com';
function isWithinYear(dateStr){
  if (!dateStr) return false;
  const diff = (new Date(TODAY_DATE) - new Date(dateStr)) / (1000*60*60*24);
  return diff <= 365;
}
// 카드번호 표시 마스킹 — 1년 이내는 BIN(앞 6자리) + 끝 4자리 노출 (PCI DSS 표준), 1년 초과는 전체 마스킹
function maskCard(o){
  if (!o.card) return null;
  if (!isWithinYear(o.date)) return '****-****-****-****';
  const f = o.card.slice(0,6);   // 앞 6자리 (BIN)
  const l = o.card.slice(-4);    // 끝 4자리
  return `${f.slice(0,4)}-${f.slice(4,6)}**-****-${l}`;
}
// 결제수단 분류 — 1depth(메인) / 2depth(서브)
// 메인: 카드 / 카카오페이 / 네이버페이 / 토스페이 / 현금
// 서브: 카드면 카드사명, 페이면 머니/페이 등
const CARD_ISSUERS = ['신한','KB','삼성','현대','롯데','BC','하나','농협','우리','시티','외환','VISA (해외)','MASTER (해외)'];
function payMain(o){
  if (CARD_ISSUERS.includes(o.issuer)) return '카드';
  return o.issuer; // 카카오페이 / 네이버페이 / 토스페이 / 현금 그대로
}
function payMainIco(main){
  return { '카드':'💳','카카오페이':'🟡','네이버페이':'🟢','토스페이':'🔵','현금':'💵','계좌이체':'🏦','자체 포인트':'⭐','모바일 상품권':'🎟️' }[main] || '💳';
}
function paySub(o){
  // 카드: 카드사명, 페이: paySub(머니/페이), 현금: 없음
  if (CARD_ISSUERS.includes(o.issuer)) return o.issuer;
  if (o.issuer === '현금') return '';
  return o.paySub || '';
}
// 결제수단 라벨 — 1depth만 (표·요약용). 2depth는 paySub()으로 별도 노출.
// 주문별 결제 방식 — 포장은 항상 선불, 매장은 저녁(17~21시)만 후결제
function orderPayType(o){
  if (!o || o.ch === '포장' || o.ch === '포장 예약') return '선불';
  if (!o.issuer) return '후불'; // 결제 정보 없음 = 주문 취소(후불)
  const [h] = (o.time||'00:00').split(':').map(Number);
  return (h >= 17 && h < 21) ? '후불' : '선불';
}

function payLabel(o){
  const main = payMain(o);
  return `${payMainIco(main)} ${main}`;
}
// 결제수단 라벨 — 1depth + 2depth (상세 모달용)
function payLabelFull(o){
  const main = payMain(o);
  const sub = paySub(o);
  return sub ? `${payMainIco(main)} ${main} · ${sub}` : `${payMainIco(main)} ${main}`;
}
// 결제번호(tid) 마스킹 — 앞 8자 + 끝 4자만 노출
function maskTid(tid){
  if (!tid) return 'tid_********';
  if (tid.length<=12) return tid.slice(0,4)+'****';
  return tid.slice(0,8) + '****' + tid.slice(-4);
}
// 사업자번호 마스킹
// "M/D" 또는 "M/D~M/D" → "2026.MM.DD" 또는 "2026.MM.DD~MM.DD"
function fmtMD(md){
  if(!md || md==='−') return md;
  const cvt = s => { const [m,d]=s.trim().split('/'); return `2026.${String(m).padStart(2,'0')}.${String(d).padStart(2,'0')}`; };
  const parts = md.split('~');
  return parts.length===1 ? cvt(parts[0]) : `${cvt(parts[0])}~${cvt(parts[1]).slice(5)}`;
}

function maskBizNo(bizNo){
  if (!bizNo) return '';
  return bizNo.replace(/^(\d{3})-(\d{2})-(\d{2})(\d{3})$/, '$1-**-**$4');
}

function periodDays(){
  if (state.overviewPeriod==='day') return [DAY[TODAY_IDX]]; // 오늘 5/15
  if (state.overviewPeriod==='week') return DAY.slice(TODAY_IDX-6, TODAY_IDX+1); // 최근 7일 (5/9~5/15)

}

// 영업시간 비율 (24시간 중 영업시간 분수). 토글 OFF면 1.
// 자정 넘어가는 영업(예: 20:00~05:00)도 정확히 처리.
function bhRatio(){
  if (!state.useBusinessHours) return 1;
  const [oh, om] = (state.businessHoursOpen||'09:00').split(':').map(Number);
  const [ch, cm] = (state.businessHoursClose||'22:00').split(':').map(Number);
  const openMin = oh*60+om, closeMin = ch*60+cm;
  const minutes = (closeMin > openMin) ? (closeMin - openMin) : (24*60 - openMin + closeMin);
  return Math.max(0, Math.min(1, minutes / (24*60)));
}
// 영업시간 범위에 시간 h(0~23)가 속하는지
function inBusinessHours(h){
  if (!state.useBusinessHours) return true;
  const [oh] = (state.businessHoursOpen||'09:00').split(':').map(Number);
  const [ch] = (state.businessHoursClose||'22:00').split(':').map(Number);
  if (oh < ch) return h >= oh && h < ch;
  return h >= oh || h < ch;  // 자정 넘김 (20시~05시 등)
}
// 영업시간이 자정을 넘어가는 매장인지 (예: 17:00~05:00, 22:00~03:00)
function bhCrossesMidnight(){
  const [oh, om] = (state.businessHoursOpen||'09:00').split(':').map(Number);
  const [ch, cm] = (state.businessHoursClose||'22:00').split(':').map(Number);
  return (oh*60+om) >= (ch*60+cm);
}
// 매출 데이터 객체에서 amt/cnt 필드에 영업시간 비율 적용한 사본 반환
function applyBhFields(arr, fields){
  const r = bhRatio();
  if (r === 1) return arr;
  return arr.map(o => {
    const copy = { ...o };
    fields.forEach(k => { if (typeof copy[k] === 'number') copy[k] = Math.round(copy[k] * r); });
    if (o.sub) copy.sub = o.sub.map(s => {
      const sc = { ...s };
      fields.forEach(k => { if (typeof sc[k] === 'number') sc[k] = Math.round(sc[k] * r); });
      return sc;
    });
    return copy;
  });
}
// 매출 흐름: 총매출 → (할인 + 포인트 + 환불) 차감 → 실매출 → (과세금액 + 부가세) → 순매출
// 영업시간 토글 ON이면 비율만큼 안분 (시뮬레이션)
function enrichDay(d){
  const r = bhRatio();
  const gross = Math.round((d.gross||0) * r);
  const disc  = Math.round((d.disc||0)  * r);
  const pt    = Math.round((d.pt||0)    * r);
  const ref   = Math.round((d.ref||0)   * r);
  const ocnt  = Math.round((d.ocnt||0)  * r);
  const rcnt  = Math.round((d.rcnt||0)  * r);
  const deduction = disc + pt + ref;
  const actual = gross - deduction;               // 실매출 (공급대가)
  const vat = Math.round(actual * 10 / 110);      // 부가세
  const taxable = actual - vat;                   // 과세금액 (공급가액)
  const net = taxable;                            // 순매출
  return { ...d, gross, disc, pt, ref, ocnt, rcnt, deduction, actual, vat, taxable, net };
}

function renderOverview(main){
  const days = periodDays();
  const r = bhRatio();
  const gross = Math.round(sum(days, 'gross') * r);
  const disc  = Math.round(sum(days, 'disc')  * r);
  const pt    = Math.round(sum(days, 'pt')    * r);
  const ref   = Math.round(sum(days, 'ref')   * r);
  const refCnt = Math.round(sum(days, 'rcnt') * r);
  const ordCnt = Math.round(sum(days, 'ocnt') * r);
  // enrichDay와 동일한 정의로 통일
  const actual = gross - disc - pt - ref;           // 실매출 (공급대가)
  const vat = Math.round(actual * 10 / 110);         // 부가세
  const taxable = actual - vat;                      // 과세금액 (공급가액)
  const net = taxable;                               // 순매출 = 과세금액
  const avgPrice = ordCnt ? Math.round(actual / ordCnt) : 0;

  // 기간별 시간 범위 + 중앙 라벨 (요일 포함)
  let rangeStart, rangeEnd, centerLabel;
  if (state.overviewPeriod==='day') {
    rangeStart='5/15(금) 03:00'; rangeEnd='5/16(토) 02:59';
    centerLabel='2026년 5월 15일(금)';
  } else if (state.overviewPeriod==='week') {
    rangeStart='5/9(토) 03:00'; rangeEnd='5/16(토) 02:59';
    centerLabel='5월 9일(토) ~ 5월 15일(금)';
  } else if (state.overviewPeriod==='month') {
    rangeStart='5/1(금) 03:00'; rangeEnd='5/16(토) 02:59';
    centerLabel='2026년 5월';
  } else { // custom
    const s = new Date(state.customStart);
    const e = new Date(state.customEnd);
    const eNext = new Date(e); eNext.setDate(e.getDate()+1);
    rangeStart = `${s.getMonth()+1}/${s.getDate()}(${DOW[s.getDay()]}) 03:00`;
    rangeEnd   = `${eNext.getMonth()+1}/${eNext.getDate()}(${DOW[eNext.getDay()]}) 02:59`;
    const diff = Math.round((e - s) / (1000*60*60*24)) + 1;
    centerLabel = `${s.getMonth()+1}월 ${s.getDate()}일(${DOW[s.getDay()]}) ~ ${e.getMonth()+1}월 ${e.getDate()}일(${DOW[e.getDay()]}) · ${diff}일간`;
  }

  main.innerHTML = `

    <div class="toolbar">

        <h2>매출 상세 보기</h2>

      </div>
      <div class="left">

        <button class="btn-primary" onclick='openExport(15, "매출 상세 · " + ${JSON.stringify(tabName)}, "2026년 5월 1일(금) ~ 5월 15일(금)")'>📥 엑셀 다운로드</button>

    </div>

    ${bhActiveNotice()}

    <div class="tabs">
      <div class="t ${state.detailTab==='period'?'on':''}"   onclick="setDetailTab('period')">📅 날짜별</div>
      <div class="t ${state.detailTab==='hour'?'on':''}"     onclick="setDetailTab('hour')">⏰ 시간대별</div>
      <div class="t ${state.detailTab==='menu'?'on':''}"     onclick="setDetailTab('menu')">🥐 메뉴별</div>
      <div class="t ${state.detailTab==='category'?'on':''}" onclick="setDetailTab('category')">🗂️ 메뉴 카테고리별</div>
      <div class="t ${state.detailTab==='method'?'on':''}"    onclick="setDetailTab('method')">💳 결제수단별</div>
      <div class="t ${state.detailTab==='channel'?'on':''}"   onclick="setDetailTab('channel')">🛵 주문 방식별</div>

  const body = document.getElementById('detail-body');

}

// 기간별 — 일간/주간/월간/기간선택 모두 동작
function renderDetailPeriod(body){
  // 그룹별 데이터
  let rows;
  if (state.detailGroup==='day') {
    // 일간 모드 — 어제(또는 사용자가 화살표로 이동한 날짜) 1일치만
    // ※ 매출 상세는 어제까지 집계이므로 5/14가 마지막 (idx 13). 여러 날 한번에 보려면 [기간 선택] 사용
    const idx = MAY1_IDX + Math.max(0, Math.min(13, state.detailDayIdx));
    rows = [enrichDay(DAY[idx])];
    rows[0].label = `${DAY[idx].d}(${DAY[idx].w})`;
  } else if (state.detailGroup==='week') {
    // 주별 묶음: 5/1~5/3 (1주), 5/4~5/10 (2주), 5/11~5/15 (3주)
    const groups = [
      { label:'5월 1주차 (5/1~5/3)',   days:DAY.slice(MAY1_IDX, MAY1_IDX+3) },
      { label:'5월 2주차 (5/4~5/10)',  days:DAY.slice(MAY1_IDX+3, MAY1_IDX+10) },
      { label:'5월 3주차 (5/11~5/15)', days:DAY.slice(MAY1_IDX+10, TODAY_IDX+1) },
    ];
    rows = groups.map(g=>{
      const ag = { gross:sum(g.days,'gross'), disc:sum(g.days,'disc'), pt:sum(g.days,'pt'), ref:sum(g.days,'ref'), rcnt:sum(g.days,'rcnt'), ocnt:sum(g.days,'ocnt') };
      const e = enrichDay({...ag, d:'', w:''});
      return { ...e, label:g.label };
    });
  } else if (state.detailGroup==='month') {
    // 월별 — 과거 → 최신 순으로 정렬 (day/week 모드와 일관)
    // 1~5월 각 월 합계를 DAY에서 직접 집계 (정산·일별과 정합)
    const monthSum = (mm)=>{ const ds = DAY.filter(d=>Number(d.d.split('/')[0])===mm); return { gross:sum(ds,'gross'), disc:sum(ds,'disc'), pt:sum(ds,'pt'), ref:sum(ds,'ref'), rcnt:sum(ds,'rcnt'), ocnt:sum(ds,'ocnt') }; };
    rows = [1,2,3,4,5].map(mm => ({ ...enrichDay({...monthSum(mm), d:'', w:''}), label:`2026년 ${mm}월` }));
  } else { // custom — 시작일 ~ 종료일 사이의 일별 데이터
    rows = DAY.filter(d => {
      const [m, dd] = d.d.split('/').map(Number);
      const dt = `2026-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      return dt >= state.customStart && dt <= state.customEnd;
    }).map(d=>enrichDay(d));
    rows.forEach(r=>r.label = `${r.d}(${r.w})`);
  }

  // 상세 검색 필터 적용
  if (state.detailPeriodMinAmt) rows = rows.filter(r => r.gross >= Number(state.detailPeriodMinAmt));
  if (state.detailPeriodMaxAmt) rows = rows.filter(r => r.gross <= Number(state.detailPeriodMaxAmt));
  const tot = rows.reduce((a,r)=>{
    ['gross','disc','pt','ref','deduction','actual','taxable','vat','net','rcnt','ocnt'].forEach(k=>a[k]=(a[k]||0)+(r[k]||0));
    return a;
  },{});
  const avgPrice = tot.ocnt ? Math.round(tot.actual / tot.ocnt) : 0;

  // 단일 일자 모드 — 일간 또는 custom에서 시작일=종료일일 때
  const isSingleDay =
    state.detailGroup==='day' ||
    (state.detailGroup==='custom' && state.customStart === state.customEnd) ||
    rows.length === 1 && state.detailGroup!=='week' && state.detailGroup!=='month';

  // 하루 시간대 분포 — 4주 평균을 그날 총매출에 비례 스케일링
  let singleDayHourly = null, singleDayKpi = null;
  if (isSingleDay && rows.length === 1){
    const totAvg = HOUR_AVG.reduce((a,b)=>a+b.amt, 0);
    const scale = totAvg ? (rows[0].gross / totAvg) : 1;
    singleDayHourly = HOUR_AVG.map(h => ({ h:h.h, amt: Math.round(h.amt * scale) }));
    const active = singleDayHourly.filter(h=>h.amt>0);
    const peak  = active.length ? active.reduce((m,h)=> h.amt>m.amt?h:m, active[0]) : {h:'-',amt:0};
    const quiet = active.length ? active.reduce((m,h)=> h.amt<m.amt?h:m, active[0]) : {h:'-',amt:0};
    const avgPerHour = active.length ? Math.round(rows[0].gross / active.length) : 0;
    singleDayKpi = { peak, quiet, avgPerHour, activeHours: active.length };
  }

  // custom 모드 라벨/범위 계산
  let cCenter='', cStart='', cEnd='';
  if (state.detailGroup==='custom'){
    const s = new Date(state.customStart);
    const e = new Date(state.customEnd);
    const eNext = new Date(e); eNext.setDate(e.getDate()+1);
    const diff = Math.round((e - s) / (1000*60*60*24)) + 1;
    cCenter = `${s.getMonth()+1}월 ${s.getDate()}일(${DOW[s.getDay()]}) ~ ${e.getMonth()+1}월 ${e.getDate()}일(${DOW[e.getDay()]}) · ${diff}일간`;
    cStart  = `${s.getMonth()+1}/${s.getDate()}(${DOW[s.getDay()]}) 03:00`;
    cEnd    = `${eNext.getMonth()+1}/${eNext.getDate()}(${DOW[eNext.getDay()]}) 02:59`;
  }

  body.innerHTML = `
    ${(() => {
      // 일간 모드 — 단일 일자 보기. 화살표로 일자 이동 (5/1 ~ 5/14 = idx 0~13)
      const isDay = state.detailGroup==='day';
      const dayIdx = MAY1_IDX + Math.max(0, Math.min(13, state.detailDayIdx));
      const dayCenter = isDay ? `2026년 5월 ${DAY[dayIdx].d.split('/')[1]}일(${DAY[dayIdx].w})` : '';
      return basisCombo({
        periods:[{key:'day',label:'일간'},{key:'week',label:'주간'},{key:'month',label:'월간'},{key:'custom',label:'기간 선택'}],
        current: state.detailGroup,
        onChange:'setDetailGroup',
        centerLabel:
          isDay                            ? dayCenter
        : state.detailGroup==='week'       ? '2026년 5월 1주차 ~ 3주차'
        : state.detailGroup==='month'      ? '2026년 3월 ~ 5월'
        :                                    cCenter,
        // 일간 모드 — 화살표로 일자 이동. 첫 일자(5/1) / 어제(5/14) 도달 시 끝
        disablePrev: isDay ? (dayIdx <= 0)  : false,
        disableNext: isDay ? (dayIdx >= 13) : true,
        onPrev:      isDay ? 'setDetailDayPrev' : undefined,
        onNext:      isDay ? 'setDetailDayNext' : undefined,
        startTime: isDay ? `${DAY[dayIdx].d}(${DAY[dayIdx].w}) 03:00` : state.detailGroup==='week' ? '5/1(금) 03:00' : state.detailGroup==='month' ? '3/1(일) 03:00' : cStart,
        endTime:   isDay ? `${DAY[Math.min(TODAY_IDX,dayIdx+1)].d}(${DAY[Math.min(TODAY_IDX,dayIdx+1)].w}) 02:59` : state.detailGroup==='week' ? '5/16(토) 02:59' : state.detailGroup==='month' ? '5/31(일) 02:59' : cEnd,
      });
    })()}

    ${state.detailGroup==='day' ? `
      <div class="banner-info" style="margin-bottom:14px;">
        💡 <b>한 날만 보기</b> — ◀▶ 버튼으로 다른 날로 이동할 수 있어요. 여러 날을 한 번에 보려면 <b>기간 선택</b>을 눌러 주세요.
      </div>
    ` : ''}

    <div class="panel" style="padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <div style="font-size:12px;color:var(--ink-2);">
        💡 <b style="color:var(--ink);">총매출 − 할인 − 포인트 − 환불 = 실매출 → 과세금액(공급가액) + 부가세</b>
        <span style="color:var(--ink-3);margin-left:6px;">환불은 결제한 날 매출에서 자동으로 빠져요</span>
      </div>
    </div>

    ${(() => {
      const has = !!(state.detailPeriodMinAmt || state.detailPeriodMaxAmt);
      const unit = state.detailGroup==='day'?'날':state.detailGroup==='week'?'주':state.detailGroup==='month'?'월':'기간';
      return `
      <div class="panel adv-search-panel ${state.detailPeriodAdvOpen?'open':''}" style="padding:0;margin-bottom:14px;">
        <div class="adv-head" onclick="state.detailPeriodAdvOpen=!state.detailPeriodAdvOpen;renderApp()">
          <div class="adv-head-left">
            <div class="adv-title">🔍 더 자세히 찾기 ${has?'<span class="adv-active-badge">조건 적용 중</span>':''}</div>
            <div class="adv-desc">${has?'총매출 범위로 좁혀서 보고 있어요':`총매출 범위로 원하는 ${unit}만 골라볼 수 있어요`}</div>
          </div>
          <span class="adv-toggle-btn">${state.detailPeriodAdvOpen?'접기':'펼치기'}<span class="adv-caret">⌄</span></span>
        </div>
        ${state.detailPeriodAdvOpen?`
          <div style="padding:14px 18px 18px;border-top:1px solid var(--line-2);">
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
              <span class="field-label">총매출 범위</span>
              <input class="input" placeholder="최소" value="${state.detailPeriodMinAmt}" oninput="state.detailPeriodMinAmt=this.value" style="width:140px;" />
              <span style="color:var(--ink-3);">~</span>
              <input class="input" placeholder="최대" value="${state.detailPeriodMaxAmt}" oninput="state.detailPeriodMaxAmt=this.value" style="width:140px;" />
              <span style="font-size:13px;color:var(--ink-3);">원</span>
              <button class="btn-primary" onclick="renderApp()" style="padding:8px 16px;">🔍 검색</button>
              ${has?`<span class="chip" onclick="state.detailPeriodMinAmt='';state.detailPeriodMaxAmt='';renderApp()">✕ 초기화</span>`:''}
            </div>
          </div>
        `:''}

            }

          fill:true,

      maintainAspectRatio:false,
      layout:{padding:{top:36, right:18, bottom:6, left:6}},

            font:{size:13,weight:'600',family:'Pretendard'},

            padding:12,
            maxTicksLimit:5,

          }
        },

          grid:{display:false},
          border:{color:'#e5e8eb',width:1},
          ticks:{
            font:{size:13,weight:'600',family:'Pretendard'},
            color:'#4e5968',
            padding:8
          }
        }
      }
    },
    plugins:[{
      id:'valueLabels',
      afterDatasetsDraw(chart){
        if (!showValueLabels) return;
        const {ctx} = chart;
        const dataset = chart.data.datasets[0];
        const meta = chart.getDatasetMeta(0);
        if (meta.hidden) return;
        ctx.save();
        ctx.font = '800 12px Pretendard, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        meta.data.forEach((point, idx) => {
          const value = dataset.data[idx];
          const text = fmt(Math.round(value/10000)) + '만 원';
          const padX = 9, padY = 5;
          const tw = ctx.measureText(text).width;
          const w = tw + padX*2;
          const h = 22;
          const x = point.x - w/2;
          const y = Math.max(4, point.y - 14 - h);
          // 칩 배경 (파란)
          ctx.fillStyle = '#3182f6';
          if (ctx.roundRect) {
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 6);
            ctx.fill();
          } else {
            ctx.fillRect(x, y, w, h);
          }
          // 작은 꼬리
          ctx.beginPath();
          ctx.moveTo(point.x - 5, y + h);
          ctx.lineTo(point.x + 5, y + h);
          ctx.lineTo(point.x, y + h + 5);
          ctx.closePath();
          ctx.fill();
          // 텍스트
          ctx.fillStyle = '#fff';
          ctx.fillText(text, point.x, y + h/2);
        });
        ctx.restore();
      }
    }]
  });
}

// 영업시간 토글 ON이면 HOUR 데이터 자체를 영업시간 밖은 0으로 만든 사본 반환
function effectiveHourData(){
  if (!state.useBusinessHours) return { HOUR, HOUR_AVG };
  return {
    HOUR:     HOUR.map(h => ({ ...h, amt: inBusinessHours(h.h) ? h.amt : 0 })),
    HOUR_AVG: HOUR_AVG.map(h => ({ ...h, amt: inBusinessHours(h.h) ? h.amt : 0 })),
  };
}

// 메뉴별
function renderDetailMenu(body){
  const cats = ['전체','커피','베이커리','음료','차/논커피'];
  const _MENU = applyBhFields(MENU, ['qty','amt','refund','refundCnt']);
  let filtered = state.detailCategoryFilter==='전체'
    ? _MENU
    : _MENU.filter(m=>m.cat===state.detailCategoryFilter);

  // 상세 검색 필터
  if (state.detailMenuSearch) {
    const q = state.detailMenuSearch.toLowerCase();
    filtered = filtered.filter(m => m.name.toLowerCase().includes(q));
  }
  if (state.detailMenuMinAmt) filtered = filtered.filter(m => m.amt >= Number(state.detailMenuMinAmt));
  if (state.detailMenuMaxAmt) filtered = filtered.filter(m => m.amt <= Number(state.detailMenuMaxAmt));
  if (state.detailMenuRefundOnly) filtered = filtered.filter(m => m.refundCnt > 0);

  const tot = filtered.reduce((a,m)=>{a.qty+=m.qty;a.amt+=m.amt;a.refund+=m.refund;a.refundCnt+=m.refundCnt;return a;},{qty:0,amt:0,refund:0,refundCnt:0});

  // 헤더 클릭 정렬
  const sorted = applySort(filtered, state.detailMenuSort, {
    name: m => m.name,
    cat: m => m.cat,
    qty: m => m.qty,
    amt: m => m.amt,
    price: m => m.price,
    refundCnt: m => m.refundCnt,
    refund: m => m.refund,
  });

  body.innerHTML = `
    ${basisCombo({
      periods:[{key:'day',label:'일간'},{key:'week',label:'주간'},{key:'month',label:'월간'},{key:'custom',label:'기간 선택'}],
      current:'month',
      onChange:'alert',
      centerLabel:'2026년 5월 1일(금) ~ 5월 15일(금)',
      disableNext: true,
      disabled: true,
      lockArrows: true,
      startTime:'5/1(금) 03:00',
      endTime:'5/16(토) 02:59',
    })}

    <div class="banner-info" style="margin-bottom:14px;">
      💡 <b>이번 달(5/1~5/15) 기준</b>으로 보여드려요. 기간을 바꾸려면 <span style="color:var(--blue);font-weight:700;cursor:pointer;text-decoration:underline;" onclick="setDetailTab('period')">[날짜별] 탭</span>에서 변경해 주세요.
    </div>

    <div class="panel" style="padding:12px 18px;margin-bottom:14px;">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <span style="font-size:12px;color:var(--ink-3);font-weight:700;">카테고리</span>
        ${cats.map(c=>`<span class="chip ${state.detailCategoryFilter===c?'on':''}" onclick="setDetailCategory('${c}')">${c}${c==='전체'?` (${MENU.length})`:` (${MENU.filter(m=>m.cat===c).length})`}</span>`).join('')}
      </div>
    </div>

    ${(() => {
      const has = !!(state.detailMenuSearch || state.detailMenuMinAmt || state.detailMenuMaxAmt || state.detailMenuRefundOnly);
      return `
      <div class="panel adv-search-panel ${state.detailMenuAdvOpen?'open':''}" style="padding:0;margin-bottom:14px;">
        <div class="adv-head" onclick="state.detailMenuAdvOpen=!state.detailMenuAdvOpen;renderApp()">
          <div class="adv-head-left">
            <div class="adv-title">🔍 더 자세히 찾기 ${has?'<span class="adv-active-badge">조건 적용 중</span>':''}</div>
            <div class="adv-desc">${has?'메뉴명·매출 범위·환불 여부로 좁혀서 보고 있어요':'메뉴명 검색·매출 범위·환불 있는 메뉴만 보기로 더 정확하게 찾을 수 있어요'}</div>
          </div>
          <span class="adv-toggle-btn">${state.detailMenuAdvOpen?'접기':'펼치기'}<span class="adv-caret">⌄</span></span>
        </div>
        ${state.detailMenuAdvOpen?`
          <div style="padding:14px 18px 18px;border-top:1px solid var(--line-2);">
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
              <span class="field-label">메뉴명</span>
              <input class="input" placeholder="🔍 메뉴명 검색 (예: 아메리카노)" value="${state.detailMenuSearch}" oninput="state.detailMenuSearch=this.value" style="flex:1;min-width:200px;max-width:280px;" />
            </div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;">
              <span class="field-label">매출 범위</span>
              <input class="input" placeholder="최소" value="${state.detailMenuMinAmt}" oninput="state.detailMenuMinAmt=this.value" style="width:140px;" />
              <span style="color:var(--ink-3);">~</span>
              <input class="input" placeholder="최대" value="${state.detailMenuMaxAmt}" oninput="state.detailMenuMaxAmt=this.value" style="width:140px;" />
              <span style="font-size:13px;color:var(--ink-3);">원</span>
            </div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;">
              <span class="chip ${state.detailMenuRefundOnly?'on':''}" onclick="state.detailMenuRefundOnly=!state.detailMenuRefundOnly;renderApp()">↺ 환불 있는 메뉴만</span>
              <button class="btn-primary" onclick="renderApp()" style="padding:8px 16px;">🔍 검색</button>
              ${has?`<span class="chip" onclick="state.detailMenuSearch='';state.detailMenuMinAmt='';state.detailMenuMaxAmt='';state.detailMenuRefundOnly=false;renderApp()">✕ 초기화</span>`:''}
            </div>
          </div>
        `:''}
      </div>`;
    })()}

    <div class="panel tight">
      <h3>메뉴별 매출 <span class="h-act"><span class="unit-tag">단위 · 원</span><span class="h-sub">${state.detailCategoryFilter} (${filtered.length}개) · 헤더 클릭으로 정렬</span></span></h3>
      <table class="t">
        <thead><tr>
          <th style="width:40px;">순위</th>
          ${sortableHeader({key:'name', label:'메뉴', currentSort:state.detailMenuSort, setter:'setDetailMenuSort'})}
          ${sortableHeader({key:'cat', label:'카테고리', currentSort:state.detailMenuSort, setter:'setDetailMenuSort'})}
          ${sortableHeader({key:'qty', label:'판매량', align:'num', currentSort:state.detailMenuSort, setter:'setDetailMenuSort'})}
          ${sortableHeader({key:'amt', label:'매출', align:'num', currentSort:state.detailMenuSort, setter:'setDetailMenuSort'})}
          <th class="num">비중</th>
          ${sortableHeader({key:'price', label:'평균 단가', align:'num', currentSort:state.detailMenuSort, setter:'setDetailMenuSort'})}
          ${sortableHeader({key:'refundCnt', label:'환불건수', align:'num', currentSort:state.detailMenuSort, setter:'setDetailMenuSort'})}
          ${sortableHeader({key:'refund', label:'환불액', align:'num', currentSort:state.detailMenuSort, setter:'setDetailMenuSort'})}
        </tr></thead>
        <tbody>
          ${sorted.slice(0, state.detailRowsPerPage).map((m,i)=>`
            <tr>
              <td>${m.rank}</td>
              <td><b>${m.name}</b> ${m.hot?'<span class="badge hot">🔥</span>':''}${m.isNew?'<span class="badge new">🆕</span>':''}</td>
              <td>${m.cat}</td>
              <td class="num">${fmt(m.qty)}${m.cat==='베이커리'?'개':'잔'}</td>
              <td class="num"><b>${fmt(m.amt)}</b></td>
              <td class="num">${(m.amt/tot.amt*100).toFixed(1)}%</td>
              <td class="num">${fmt(m.price)}</td>
              <td class="num">${m.refundCnt}건</td>
              <td class="num neg">${m.refund?'−'+fmt(m.refund):'−'}</td>
            </tr>
          `).join('')}
          <tr class="total">
            <td colspan="3">합계</td>
            <td class="num">${fmt(tot.qty)}</td>
            <td class="num">${fmt(tot.amt)}</td>
            <td class="num">100%</td>
            <td class="num">−</td>
            <td class="num">${tot.refundCnt}건</td>
            <td class="num neg">−${fmt(tot.refund)}</td>
          </tr>
        </tbody>
      </table>
      <div class="table-footer">
        <div class="rows-control">
          <span>표시 개수</span>
          ${rowsSelect('detailRowsPerPage')}
          <span class="cnt">총 <b>${filtered.length}</b>건 조회</span>
        </div>
        ${paginationStatic(1, Math.ceil(filtered.length / state.detailRowsPerPage))}
      </div>
    </div>
  `;
}

/* ====================== 주문 내역 ====================== */
function renderOrders(main){
  // 필터링
  let rows = ORDERS;

  // 기간 필터 — 최대 조회 3개월 / 보관 1년 정책
  const ORDER_3M_START = '2026-02-15'; // 오늘(5/15) 기준 3개월 전
  const ORDER_1Y_START = '2025-05-15'; // 오늘(5/15) 기준 1년 전 (보관 한도)
  if (state.orderDateFilter==='today')      rows = rows.filter(o=>o.date===TODAY_DATE);
  else if (state.orderDateFilter==='yesterday') rows = rows.filter(o=>o.date==='2026-05-14');
  else if (state.orderDateFilter==='week')  rows = rows.filter(o=>o.date>='2026-05-09' && o.date<='2026-05-15');
  else if (state.orderDateFilter==='month') rows = rows.filter(o=>o.date.startsWith('2026-05'));
  else if (state.orderDateFilter==='3m')    rows = rows.filter(o=>o.date>=ORDER_3M_START && o.date<=TODAY_DATE);
  else if (state.orderDateFilter==='custom') rows = rows.filter(o=>o.date>=state.customStart && o.date<=state.customEnd);
  // 기본(all)은 최대 3개월 범위로 제한
  else rows = rows.filter(o=>o.date>=ORDER_3M_START && o.date<=TODAY_DATE);

  // 포장 예약 미활성 시 포장 예약 주문 숨김
  if (!ORDER_CHANNELS.reservation) rows = rows.filter(o=>o.ch!=='포장 예약');
  // 채널 필터 (먹고가기/포장하기/포장 예약)
  if (state.orderChannelFilter!=='all') rows = rows.filter(o=>o.ch===state.orderChannelFilter);

  // 결제수단 필터 (1depth 기준 매칭 — 카드/카카오페이/네이버페이/토스페이/현금)
  if (state.orderPayFilter!=='all') rows = rows.filter(o=>payMain(o)===state.orderPayFilter);

  // 정산상태 필터

  // 메뉴 검색 — 요약 라벨(o.menu)뿐 아니라 상세 items.name까지 매칭
  if (state.orderMenuSearch){
    const q = state.orderMenuSearch.toLowerCase();
    rows = rows.filter(o=>{
      if ((o.menu||'').toLowerCase().includes(q)) return true;
      return (o.items||[]).some(it=>(it.name||'').toLowerCase().includes(q));
    });
  }

  // 주문번호 / 결제번호 / 승인번호 검색
  if (state.orderSearch){
    const q = state.orderSearch.toLowerCase();
    rows = rows.filter(o=>(o.id+' '+(o.tid||'')+' '+makeApproval(o)).toLowerCase().includes(q));
  }

  // 금액 범위
  if (state.orderAmountMin) rows = rows.filter(o=>o.amt >= Number(state.orderAmountMin));
  if (state.orderAmountMax) rows = rows.filter(o=>o.amt <= Number(state.orderAmountMax));

  // 결제 집계 — 상태 필터 적용 전 기준으로 계산 (KPI 카드는 상태 필터 진입점 역할)
  const cancelAllCnt = rows.filter(o=>o.status==='취소').length;
  const inProgressCnt= rows.filter(o=>o.status==='진행중').length;
  const completedCnt = rows.filter(o=>o.status==='완료').length;
  const validCnt     = completedCnt;
  const refundCnt    = cancelAllCnt;
  const totalAmt = rows.reduce((s,o)=>{
    if (o.status==='완료') return s + o.amt;
    return s;
  }, 0);
  const totalCnt = rows.length;

  // 상태 필터 — KPI 클릭 진입점
  if (state.orderStatusFilter==='cancel-all') rows = rows.filter(o=>o.status==='취소');
  else if (state.orderStatusFilter!=='all')   rows = rows.filter(o=>o.status===state.orderStatusFilter);

  // 헤더 클릭 정렬 적용
  rows = applySort(rows, state.orderSort, {
    datetime: o => `${o.date} ${o.time||''}`,
    id: o => o.id,
    channel: o => o.ch,
    menu: o => o.menu,
    pay: o => payMain(o),
    amt: o => o.amt,
    status: o => o.status,
    stl: o => o.stl,
  });

  main.innerHTML = `
    <div class="crumb">주문 관리 › 주문 내역</div>

    <div class="toolbar">
      <div>
        <h2>주문 내역 <span style="font-size:11px;color:#1b64da;background:#e6f0ff;padding:3px 8px;border-radius:6px;font-weight:700;margin-left:6px;vertical-align:middle;">🟢 실시간</span></h2>
        <div class="page-sub">${rows.length}건 조회</div>
      </div>

      <div class="pc-card clickable${state.orderStatusFilter==='cancel-all'?' on':''}" style="${state.orderStatusFilter==='cancel-all'?'border-color:var(--red);box-shadow:0 0 0 2px rgba(228,68,68,.18);':''}" onclick="setOrderStatus('cancel-all')"><div class="label">취소</div><div class="num" style="color:${cancelAllCnt>0?'var(--red)':'var(--ink-3)'};">${fmt(cancelAllCnt)}<span style="font-size:13px;color:var(--ink-3);font-weight:600;margin-left:2px;">건</span></div></div>
      <div class="pc-card blue"><div class="label">매출 합계</div><div class="num">${fmt(totalAmt)}<span style="font-size:13px;color:#1b64da;font-weight:600;margin-left:2px;">원</span></div><div class="sub" style="color:#1b64da;">완료 기준</div></div>

/* ====================== 정산 달력 ====================== */
// 회차 상세 페이지로 이동 (회차 ID 컨텍스트 함께 전달)
function openStlDetail(stlId){
  state.stlDetailId = stlId;
  state.section = 'stl-detail';
  renderApp();
}
// 달력 일자 클릭 → 정산 회차 상세 페이지로 바로 이동 (중간 정산내역 조회 단계 생략)
// 해당 일자에 정산 회차가 없으면(주말·공휴일) 가장 가까운 회차로 진입
function selectStlDate(iso){
  state.calendarSelectedDate = iso;
  const direct = SETTLEMENTS.find(s => s.settleISO === iso);
  if (direct) { openStlDetail(direct.id); return; }
  // fallback: 같은 일자 승인 회차 또는 가장 가까운 정산일 회차
  const byApproval = SETTLEMENTS.find(s => s.approvalDays.some(d => {
    const [m,dd] = d.date.split('/').map(Number);
    return `2026-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}` === iso;
  }));
  if (byApproval) { openStlDetail(byApproval.id); return; }
  const target = new Date(iso).getTime();
  const nearest = SETTLEMENTS.slice().sort((a,b) => Math.abs(new Date(a.settleISO)-target) - Math.abs(new Date(b.settleISO)-target))[0];
  if (nearest) openStlDetail(nearest.id);
}

// 정산 달력 — 보고 있는 월 변경 (delta: -1 전월 / +1 익월), 'today'는 오늘로 복귀
function setCalendarMonth(delta){
  if (delta === 'today') { state.calendarMonth = '2026-05'; renderApp(); return; }
  const [y, m] = state.calendarMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  state.calendarMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  renderApp();
}

function renderStlCalendar(main){
  // 데이터 인덱스 (정산일 기준)
  const byDate = {};
  SETTLEMENTS.forEach(s => { byDate[s.settleISO] = s; });

  // 보고 있는 월 — state.calendarMonth 기준 (기본 2026-05)
  if (!state.calendarMonth) state.calendarMonth = '2026-05';
  const [year, month] = state.calendarMonth.split('-').map(Number);
  const monthKey = `${year}-${String(month).padStart(2,'0')}`;
  const isCurrentMonth = monthKey === '2026-05';
  const hasData = SETTLEMENTS.some(s => s.settleISO.startsWith(monthKey));

  const firstWeekday = new Date(year, month-1, 1).getDay(); // 0=일
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const selected = state.calendarSelectedDate;

  main.innerHTML = `
    <div class="crumb">정산 관리 › 정산 달력</div>
    <div class="toolbar">
      <div>
        <h2>정산 달력</h2>
        <div class="page-sub">정산일을 한눈에 · 정산 주기 D+3 영업일</div>
      </div>
      <div class="left">
        <button class="btn-ghost" onclick="setSection('stl-list')">🔎 정산 내역 보기</button>
      </div>
    </div>

    <div class="panel" style="padding:16px 20px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;gap:10px;align-items:center;">
          <button class="cal-nav" onclick="setCalendarMonth(-1)" title="전월" aria-label="전월">‹</button>
          <div style="font-size:22px;font-weight:800;letter-spacing:-.02em;min-width:140px;text-align:center;">${year}년 ${month}월</div>
          <button class="cal-nav" onclick="setCalendarMonth(1)" title="익월" aria-label="익월">›</button>
          ${!isCurrentMonth ? `<button class="btn-ghost" style="padding:6px 12px;font-size:12px;margin-left:4px;" onclick="setCalendarMonth('today')">오늘로</button>` : ''}
        </div>
        <div style="display:flex;gap:16px;align-items:center;font-size:12px;color:var(--ink-2);">
          <span><span class="cal-legend done"></span> 입금 완료</span>
          <span><span class="cal-legend pending"></span> 곧 들어와요</span>
        </div>
      </div>
    </div>

    <div class="panel" style="padding:0;margin-bottom:14px;overflow:hidden;">
      <div class="cal-week">
        ${['일','월','화','수','목','금','토'].map((w,i)=>`<div class="cal-wkhead ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join('')}
      </div>
      <div class="cal-grid">
        ${cells.map(d => {
          if (d === null) return `<div class="cal-cell off"></div>`;
          const iso = `${monthKey}-${String(d).padStart(2,'0')}`;
          const stl = byDate[iso];
          const isToday = iso === '2026-05-15';
          const isSelected = iso === selected;
          let inner = `<div class="cal-day ${isToday?'today':''}">${d}</div>`;
          if (stl) {
            inner += `<div class="cal-amt ${stl.statusPill}">${fmt(stl.totalSettle)}원</div>`;
            inner += `<div><span class="cal-tag ${stl.statusPill}">${stl.status==='정산완료'?'입금 완료':'곧 들어와요'}</span></div>`;
            inner += `<div class="cal-sub">결제일 ${fmtMD(stl.approvalDate)}(${stl.approvalDow})</div>`;
          }
          return `<div class="cal-cell ${isSelected?'selected':''} ${stl?'has-data':''}" ${stl?`onclick="selectStlDate('${iso}')"`:''}>${inner}</div>`;
        }).join('')}
      </div>
    </div>

    <div class="info-card" style="text-align:center;padding:22px;">
      ${hasData
        ? '💡 금액이 적힌 날짜를 누르면, 그날 받은 정산을 자세히 볼 수 있어요.'
        : `<div style="text-align:center;padding:8px 0;"><div style="font-size:24px;margin-bottom:8px;">🗓️</div><div style="font-weight:700;color:var(--ink-2);">${year}년 ${month}월 정산 내역이 없어요</div><div style="font-size:12px;color:var(--ink-3);margin-top:4px;">좌우 화살표로 다른 달을 확인할 수 있어요</div></div>`}

function renderStlList(main){
  // 데이터 소스: DAY(영업일별) 기반 — 정산 달력은 일자별 묶음, 여기선 일자별 평면 리스트
  // 각 일자에 SETTLEMENTS에서 회차 정보를 매핑 (정산일/상태/회차ID 등)
  const DOW_ARR = ['일','월','화','수','목','금','토'];
  const dailyList = DAY.map(d => {
    const [m, dd] = d.d.split('/').map(Number);
    const iso = `2026-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const stl = findSettlementByOrderDate(iso);
    const usedPlatformCoupon = stl?.usedPlatformCoupon || false;
    const usedMerchantCoupon = stl?.usedMerchantCoupon || false;
    const usedCoupon = usedPlatformCoupon || usedMerchantCoupon;
    const couponPlatformAmt = usedPlatformCoupon ? Math.round(d.gross * 0.012) : 0; // 소프트먼트 보전
    const couponMerchantAmt = usedMerchantCoupon ? Math.round(d.gross * 0.005) : 0; // 사장님 쿠폰(참고)
    const feeBase = Math.round((d.gross - d.ref) * AVG_FEE_RATE);
    const feeVat  = Math.round(feeBase * 0.1);
    const feeTotal = feeBase + feeVat;
    const txSettle = d.gross - d.ref - feeTotal;
    const totalSettle = txSettle + couponPlatformAmt; // 사장님 쿠폰은 정산 제외
    return {
      approvalDate: d.d,
      approvalDow: d.w,
      approvalISO: iso,
      settleDate: stl?.settleDate || '−',
      settleDow:  stl?.settleDow  || '',
      settleISO:  stl?.settleISO  || '',
      cnt: d.ocnt,
      grossAmt: d.gross,
      refundAmt: d.ref,
      couponPlatformAmt,
      couponMerchantAmt,
      feeBase, feeVat, feeTotal,
      txSettle,
      totalSettle,
      usedPlatformCoupon,
      usedMerchantCoupon,
      usedCoupon,
      status: stl?.status || '정산대기',
      statusPill: stl?.statusPill || 'pending',
      settlementId: stl?.id || '',
    };
  });

  const today = new Date(2026, 4, 15);
  const basisKey = state.stlListDateBasis === 'approval' ? 'approvalISO' : 'settleISO';
  let rows;

  if (state.stlListOrdSearch) {
    // 주문/승인번호 검색은 기간 필터를 우회
    rows = dailyList.slice();
  } else if (state.stlListQuickRange === 'period' && state.stlListPeriodStart && state.stlListPeriodEnd) {
    rows = dailyList.filter(r => r[basisKey] >= state.stlListPeriodStart && r[basisKey] <= state.stlListPeriodEnd);
  } else if (state.stlListSpecificDate) {
    rows = dailyList.filter(r => r[basisKey] === state.stlListSpecificDate);
  } else if (state.stlListQuickRange === 'all') {
    rows = dailyList.slice();
  } else if (state.stlListQuickRange === 'today') {
    rows = dailyList.filter(r => r.approvalISO === TODAY_DATE);
  } else if (state.stlListQuickRange === 'thismonth') {
    rows = dailyList.filter(r => r.approvalISO.startsWith('2026-05'));
  } else {
    const rangeDays = { '1w':7, '1m':31, '3m':93 }[state.stlListQuickRange] || 31;
    const from = new Date(today); from.setDate(today.getDate() - rangeDays + 1);
    rows = dailyList.filter(r => {
      const d = new Date(r[basisKey] || r.approvalISO);
      return d >= from && d <= today;
    });
  }

  if (state.stlListStatus !== 'all') rows = rows.filter(r => r.status === state.stlListStatus);
  if (state.stlListCoupon === 'used') rows = rows.filter(r => r.usedCoupon);
  if (state.stlListCoupon === 'none') rows = rows.filter(r => !r.usedCoupon);
  if (state.stlListOrdSearch) {
    // 주문번호 또는 승인번호로 매칭되는 주문의 결제 일자만 남기기
    const q = state.stlListOrdSearch.replace(/[#\s-]/g, '').toLowerCase();
    const matchedDates = new Set();
    ORDERS.forEach(o => {
      if (!o.date) return;
      const orderIdNorm = o.id.replace(/[#\s-]/g, '').toLowerCase();
      const approvalNorm = makeApproval(o).replace(/[\s-]/g, '');
      if (orderIdNorm.includes(q) || approvalNorm.includes(q)) matchedDates.add(o.date);
    });
    rows = rows.filter(r => matchedDates.has(r.approvalISO));
  }
  if (state.stlListDow !== 'all') rows = rows.filter(r => r.approvalDow === state.stlListDow);
  if (state.stlListAmtMin) rows = rows.filter(r => r.grossAmt >= Number(state.stlListAmtMin));
  if (state.stlListAmtMax) rows = rows.filter(r => r.grossAmt <= Number(state.stlListAmtMax));
  if (state.stlListSettleMin) rows = rows.filter(r => r.totalSettle >= Number(state.stlListSettleMin));
  if (state.stlListSettleMax) rows = rows.filter(r => r.totalSettle <= Number(state.stlListSettleMax));

  // 정렬
  rows = applySort(rows, state.stlListSort, {
    approvalISO: r => r.approvalISO,
    settleISO: r => r.settleISO,
    cnt: r => r.cnt,
    grossAmt: r => r.grossAmt,
    couponPlatformAmt: r => r.couponPlatformAmt,
    feeTotal: r => r.feeTotal,
    totalSettle: r => r.totalSettle,
    status: r => r.status,
  });

  // 집계 (전체 dailyList 기준 카운트)
  const cntAll = dailyList.length;
  const cntDone = dailyList.filter(r=>r.status==='정산완료').length;
  const cntPending = dailyList.filter(r=>r.status==='정산대기').length;
  const totSettle = rows.reduce((a,r)=>a+r.totalSettle, 0);
  const totGross = rows.reduce((a,r)=>a+r.grossAmt, 0);

  const advFilters = [
    state.stlListOrdSearch && '주문/승인번호',
    state.stlListDow !== 'all' && '요일',
    (state.stlListAmtMin || state.stlListAmtMax) && '거래금액',
    (state.stlListSettleMin || state.stlListSettleMax) && '정산금액',
  ].filter(Boolean);
  const hasAdv = advFilters.length > 0;

  const rangeLabel = state.stlListQuickRange==='period' && state.stlListPeriodStart && state.stlListPeriodEnd
    ? `${state.stlListPeriodStart.replace(/(\d{4})-(\d{2})-(\d{2})/,'$1.$2.$3')} ~ ${state.stlListPeriodEnd.replace(/(\d{4})-(\d{2})-(\d{2})/,'$1.$2.$3')}`
    : state.stlListSpecificDate
    ? `${state.stlListSpecificDate.replace(/(\d{4})-(\d{2})-(\d{2})/,'$1.$2.$3')}(${dailyList.find(r=>r[basisKey]===state.stlListSpecificDate)?.[state.stlListDateBasis==='approval'?'approvalDow':'settleDow'] || ''})`
    : state.stlListQuickRange==='today'      ? `오늘 (${TODAY_DATE.replace(/(\d{4})-(\d{2})-(\d{2})/,'$1.$2.$3')})`
    : state.stlListQuickRange==='1w'         ? '최근 1주일'
    : state.stlListQuickRange==='1m'         ? '최근 1개월'
    : state.stlListQuickRange==='thismonth'  ? '이번 달 (5월)'
    : state.stlListQuickRange==='3m'         ? '최근 3개월'
    :                                          '전체 기간';

  const subInfo = state.stlListSpecificDate
    ? `<span style="color:var(--blue);font-weight:700;">📅 ${rangeLabel}</span> · ${state.stlListDateBasis==='approval'?'결제일':'정산일'} 기준 · <b style="color:var(--ink);">${rows.length}일 분량</b> · 받으실 금액 ${fmt(totSettle)}원`
    : `${rangeLabel} · ${state.stlListDateBasis==='approval'?'결제일':'정산일'} 기준 · <b style="color:var(--ink);">${rows.length}일 분량</b> · 결제 ${fmt(totGross)}원 · 받으실 금액 ${fmt(totSettle)}원`;

  main.innerHTML = `
    <div class="crumb">정산 관리 › 정산 내역</div>
    <div class="toolbar">
      <div>
        <h2>정산 내역</h2>
        <div class="page-sub">${subInfo}</div>
      </div>
      <div class="left">
        <button class="btn-ghost" onclick="setSection('stl-calendar')">🗓️ 정산 달력으로</button>
        <button class="btn-primary" onclick='openExport(${rows.length}, "정산 내역", "${rangeLabel} · ${state.stlListDateBasis==='approval'?'결제일':'정산일'} 기준")'>📥 엑셀 다운로드</button>
      </div>
    </div>

    <!-- 1차 필터: 기간 + 정산 상태 + 쿠폰 + 직접 일자/기간 -->
    <div class="search-wrap">
      <div class="row">
        <span class="field-label">날짜 기준</span>
        <div class="seg sm">
          <div class="b ${state.stlListDateBasis==='settle'?'on':''}" onclick="setStlListBasis('settle')">정산일</div>
          <div class="b ${state.stlListDateBasis==='approval'?'on':''}" onclick="setStlListBasis('approval')">결제일</div>
        </div>
        <span class="chip ${state.stlListQuickRange==='today' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('today')">오늘</span>
        <span class="chip ${state.stlListQuickRange==='1w' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('1w')">1주일</span>
        <span class="chip ${state.stlListQuickRange==='1m' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('1m')">1개월</span>
        <span class="chip ${state.stlListQuickRange==='thismonth' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('thismonth')">이번 달</span>
        <span class="chip ${state.stlListQuickRange==='3m' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('3m')">3개월</span>
        <span class="chip ${state.stlListQuickRange==='all' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('all')">전체</span>
      </div>
      <div class="row">
        <span class="field-label" style="color:var(--ink-3);">직접 선택</span>
        <span class="chip ${state.stlListQuickRange==='period'?'on':''}" onclick="state.stlListQuickRange='period';state.stlListSpecificDate='';if(!state.stlListPeriodStart){state.stlListPeriodStart='2026-05-01';state.stlListPeriodEnd='2026-05-15';}renderApp()">📅 기간으로</span>
        ${state.stlListQuickRange==='period' ? `
          <input class="input" type="date" value="${state.stlListPeriodStart}" max="${TODAY_DATE}" style="width:160px;" oninput="state.stlListPeriodStart=this.value;renderApp()" />
          <span style="color:var(--ink-3);">~</span>
          <input class="input" type="date" value="${state.stlListPeriodEnd}" max="${TODAY_DATE}" style="width:160px;" oninput="state.stlListPeriodEnd=this.value;renderApp()" />
          <span class="chip" onclick="state.stlListQuickRange='1w';state.stlListPeriodStart='';state.stlListPeriodEnd='';renderApp()">✕ 해제</span>
        ` : ''}
        <span style="color:var(--ink-4);font-size:12px;margin:0 2px;">또는</span>
        <span class="chip ${state.stlListSpecificDate?'on':''}" onclick="if(!state.stlListSpecificDate){state.stlListSpecificDate=TODAY_DATE;state.stlListQuickRange='specific';}renderApp()">📅 하루로</span>
        ${state.stlListSpecificDate?`
          <input class="input" type="date" id="stl-specific-date" value="${state.stlListSpecificDate}" max="${TODAY_DATE}" style="width:160px;" onchange="applyStlSpecificDate()" />
          <span class="chip" onclick="state.stlListSpecificDate='';state.stlListQuickRange='1w';renderApp()">✕ 해제</span>
        `:''}
      </div>
      <div class="row">
        <span class="field-label">상태</span>
        <span class="chip ${state.stlListStatus==='all'?'on':''}" onclick="setStlListStatus('all')">전체 (${cntAll})</span>
        <span class="chip ${state.stlListStatus==='정산대기'?'on':''}" onclick="setStlListStatus('정산대기')">곧 들어와요 (${cntPending})</span>
        <span class="chip ${state.stlListStatus==='정산완료'?'on':''}" onclick="setStlListStatus('정산완료')">입금 완료 (${cntDone})</span>
        <span style="color:var(--line);margin:0 4px;">|</span>
        <span class="field-label">쿠폰</span>
        <span class="chip ${state.stlListCoupon==='all'?'on':''}" onclick="setStlListCoupon('all')">전체</span>
        <span class="chip ${state.stlListCoupon==='used'?'on':''}" onclick="setStlListCoupon('used')">사용함</span>
        <span class="chip ${state.stlListCoupon==='none'?'on':''}" onclick="setStlListCoupon('none')">안 썼어요</span>
        <span style="color:var(--line);margin:0 4px;">|</span>
        <button class="btn-ghost" onclick="resetStlListFilters()" style="padding:7px 14px;font-size:12px;">처음으로 돌리기</button>
      </div>
    </div>

    <!-- 2차 필터: 세부 검색 (접기/펴기) -->
    <div class="panel adv-search-panel ${state.stlListAdvancedOpen?'open':''}" style="padding:0;margin-bottom:14px;">
      <div class="adv-head" onclick="toggleStlAdvanced()">
        <div class="adv-head-left">
          <div class="adv-title">
            🔍 더 자세히 찾기
            ${hasAdv ? `<span class="adv-active-badge">${advFilters.length}개 조건 적용 중</span>` : ''}
          </div>
          <div class="adv-desc">
            ${hasAdv
              ? `${advFilters.join(' · ')}(으)로 좁혀서 보고 있어요`
              : '주문/승인번호·영업일 요일·거래금액 범위·정산금액 범위로 더 정확하게 찾을 수 있어요'}
          </div>
        </div>
        <span class="adv-toggle-btn">
          ${state.stlListAdvancedOpen?'접기':'펼치기'}
          <span class="adv-caret">⌄</span>
        </span>
      </div>
      ${state.stlListAdvancedOpen ? `
        <div style="padding:0 18px 18px;border-top:1px solid var(--line-2);">
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px;">
            <span class="field-label">영업일 요일</span>
            ${['all','월','화','수','목','금','토','일'].map(w=>`<span class="chip ${state.stlListDow===w?'on':''}" onclick="setStlListDow('${w}')">${w==='all'?'전체':w+'요일'}</span>`).join('')}
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;">
            <span class="field-label">거래 금액</span>
            <input class="input" placeholder="최소" value="${state.stlListAmtMin}" oninput="state.stlListAmtMin=this.value" style="width:140px;" />
            <span style="color:var(--ink-3);">~</span>
            <input class="input" placeholder="최대" value="${state.stlListAmtMax}" oninput="state.stlListAmtMax=this.value" style="width:140px;" />
            <span style="font-size:13px;color:var(--ink-3);">원</span>
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;">
            <span class="field-label">정산 금액</span>
            <input class="input" placeholder="최소" value="${state.stlListSettleMin}" oninput="state.stlListSettleMin=this.value" style="width:140px;" />
            <span style="color:var(--ink-3);">~</span>
            <input class="input" placeholder="최대" value="${state.stlListSettleMax}" oninput="state.stlListSettleMax=this.value" style="width:140px;" />
            <span style="font-size:13px;color:var(--ink-3);">원</span>
            <button class="btn-primary" onclick="renderApp()" style="padding:8px 16px;">🔍 검색</button>
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;">
            <span class="field-label">주문/승인번호</span>
            <input class="input" placeholder="🔍 주문번호(예: 20260515-0046) 또는 승인번호(예: 30150046)" value="${state.stlListOrdSearch}" oninput="state.stlListOrdSearch=this.value" style="flex:1;min-width:320px;" />
            <button class="btn-primary" onclick="renderApp()">검색</button>
          </div>
        </div>
      `:''}
    </div>

    <!-- 결과 그리드 -->
    <div class="panel tight">
      <h3>여기 있어요 <span class="h-sub">${rows.length}일 분량 · 한 줄을 누르면 자세히 볼 수 있어요</span></h3>
      <div style="overflow-x:auto;">
      <table class="t">
        <thead>
          <tr>
            <th style="width:50px;text-align:center;">No.</th>
            ${sortableHeader({key:'approvalISO', label:'결제일', currentSort:state.stlListSort, setter:'setStlListSort'})}
            ${sortableHeader({key:'settleISO', label:'정산일', currentSort:state.stlListSort, setter:'setStlListSort'})}
            ${sortableHeader({key:'cnt', label:'건수', align:'num', currentSort:state.stlListSort, setter:'setStlListSort'})}
            ${sortableHeader({key:'grossAmt', label:'결제 금액', align:'num', currentSort:state.stlListSort, setter:'setStlListSort'})}
            ${sortableHeader({key:'couponPlatformAmt', label:'쿠폰 보전', align:'num', currentSort:state.stlListSort, setter:'setStlListSort'})}
            ${sortableHeader({key:'feeTotal', label:'수수료', align:'num', currentSort:state.stlListSort, setter:'setStlListSort'})}
            ${sortableHeader({key:'totalSettle', label:'받으실 금액', align:'num', currentSort:state.stlListSort, setter:'setStlListSort'})}
            ${sortableHeader({key:'status', label:'상태', currentSort:state.stlListSort, setter:'setStlListSort'})}
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${rows.length===0 ? `<tr class="empty-row"><td colspan="10">다른 조건으로 다시 찾아봐 주세요. <span style="color:var(--blue);cursor:pointer;font-weight:600;" onclick="resetStlListFilters()">처음으로 돌리기</span></td></tr>` : rows.map((r,i) => `
            <tr class="clickable" ${r.settlementId?`onclick="openStlDetail('${r.settlementId}')"`:''}>
              <td style="text-align:center;color:var(--ink-3);font-weight:600;">${i+1}</td>
              <td><b>${fmtMD(r.approvalDate)}(${r.approvalDow})</b></td>
              <td>${r.settleDate&&r.settleDate!=='−' ? `${fmtMD(r.settleDate)}${r.settleDow?`(${r.settleDow})`:''}`:`<span style="font-size:11px;color:var(--ink-4);">산정 중</span>`}</td>
              <td class="num">${fmt(r.cnt)}</td>
              <td class="num">${fmt(r.grossAmt)}</td>
              <td class="num">
                ${r.usedPlatformCoupon?`<span style="color:#15803d;font-weight:800;font-size:13px;">+${fmt(r.couponPlatformAmt)}원</span><div style="font-size:11px;color:#15803d;font-weight:600;margin-top:1px;">소프트먼트 보전</div>`:''}
                ${r.usedMerchantCoupon?`<div style="margin-top:${r.usedPlatformCoupon?4:0}px;"><span style="color:var(--ink-2);font-weight:700;">-${fmt(r.couponMerchantAmt)}원</span><div style="font-size:11px;color:var(--ink-4);margin-top:1px;" title="사장님 발행 쿠폰은 가맹점 부담이라 정산에서 제외돼요">사장님 발행 · 정산 제외</div></div>`:''}
                ${!r.usedCoupon?'<span style="color:var(--ink-4);">−</span>':''}
              </td>
              <td class="num">−${fmt(r.feeTotal)}</td>
              <td class="num"><b style="color:${r.status==='정산완료'?'var(--blue)':'#a25e00'};">${fmt(r.totalSettle)}원</b></td>
              <td><span class="pill ${r.statusPill}">${r.status==='정산대기'?'곧 들어와요':'입금 완료'}</span></td>
              <td style="color:var(--blue);font-weight:600;">${r.settlementId?'자세히 ›':'−'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      </div>
      <div class="table-footer">
        <div class="rows-control">
          <span>표시 개수</span>${rowsSelect('orderRowsPerPage')}
          <span class="cnt">총 <b>${rows.length}</b>건 조회</span>
          <span style="font-size:11px;color:var(--ink-3);margin-left:8px;">💡 화면에만 적용돼요 · 엑셀은 조회된 ${fmt(rows.length)}건 전체</span>
        </div>
        ${paginationStatic(1, 1)}
      </div>
    </div>
  `;
}

/* ====================== 정산 회차 상세 ====================== */
function renderStlDetail(main){
  // 회차 컨텍스트 — state.stlDetailId 우선, 없으면 가장 최근 정산 대기 또는 마지막 회차
  const stl = SETTLEMENTS.find(s => s.id === state.stlDetailId)
           || SETTLEMENTS.slice().reverse().find(s => s.status === '정산대기')
           || SETTLEMENTS[SETTLEMENTS.length - 1];

  const pageCnt = Math.max(1, Math.ceil(stl.cnt / 50));
  const statusLabel = stl.status === '정산완료' ? '입금 완료' : '곧 들어와요';
  const settleColor = stl.status === '정산완료' ? 'var(--blue)' : '#c97a00';
  // 자정 이후 새벽 결제 행을 위한 영업일 마지막 날 / 다음날 라벨
  const lastApprovalDay = stl.approvalDays[stl.approvalDays.length - 1];
  const lastApprovalLabel = lastApprovalDay.date;
  const lastApprovalDow = lastApprovalDay.dow;
  const _lastApprovalNext = (() => {
    const [m, d] = lastApprovalDay.date.split('/').map(Number);
    const dt = new Date(2026, m - 1, d + 1);
    const DOW_ARR = ['일','월','화','수','목','금','토'];
    return { label: `${dt.getMonth()+1}/${dt.getDate()}`, dow: DOW_ARR[dt.getDay()] };
  })();
  const nextDayLabel = _lastApprovalNext.label;
  const nextDayDow = _lastApprovalNext.dow;

  main.innerHTML = `
    <div class="crumb">
      <span style="cursor:pointer;color:var(--blue);" onclick="setSection('stl-calendar')">정산관리 › 정산 달력</span>
      <span style="color:var(--ink-4);margin:0 6px;">·</span>
      <span style="cursor:pointer;color:var(--blue);" onclick="setSection('stl-list')">정산 내역</span>
      › <b style="color:var(--ink);">${stl.id}</b>
    </div>

    <div class="toolbar">
      <div>
        <div class="stl-detail-head" style="margin-bottom:8px;">
          <div class="stl-detail-date">${fmtMD(stl.settleDate)}(${stl.settleDow})</div>
          <div class="stl-detail-status ${stl.statusPill}">${statusLabel}</div>
        </div>
        <div class="stl-detail-meta">결제일 ${fmtMD(stl.approvalDate)}(${stl.approvalDow}) · 신한 ****1234</div>
        <div style="margin-top:4px;font-size:11px;color:var(--ink-4);font-family:ui-monospace,monospace;letter-spacing:.03em;">회차 ID: ${stl.id}</div>
      </div>
      <div class="left">
        <button class="btn-ghost" onclick="setSection('stl-calendar')">🗓️ 정산 달력으로</button>
        <button class="btn-primary" onclick='openExport(${stl.cnt}, "결제 내역", "영업일 ${fmtMD(stl.approvalDate)}(${stl.approvalDow}) · 정산일 ${fmtMD(stl.settleDate)}(${stl.settleDow})")'>📥 엑셀 다운로드</button>
      </div>
    </div>

    <!-- 핵심 정산 카드 (단일) -->
    <div class="panel" style="padding:24px 28px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;">
        <div>
          <div style="font-size:13px;color:var(--ink-3);font-weight:700;margin-bottom:6px;">${stl.status==='정산완료'?'입금된 금액':'받으실 금액'}</div>
          <div style="font-size:36px;font-weight:800;letter-spacing:-.02em;color:${settleColor};font-variant-numeric:tabular-nums;line-height:1.1;">${fmt(stl.totalSettle)}원</div>

function paginationStatic(cur, total){
  if (total <= 1) return `<div class="pagination"><span class="pg dis">‹ 이전</span><span class="pg on">1</span><span class="pg dis">다음 ›</span></div>`;
  let pages = [];
  for (let i=1;i<=Math.min(total,5);i++) pages.push(i);
  return `
    <div class="pagination">
      <span class="pg ${cur===1?'dis':''}">‹ 이전</span>
      ${pages.map(p=>`<span class="pg ${p===cur?'on':''}">${p}</span>`).join('')}
      ${total>5?`<span class="ell">...</span><span class="pg">${total}</span>`:''}
      <span class="pg">다음 ›</span>
    </div>
  `;
}

// 본문에 페이지 단위 '저장' 버튼(하단 저장 바)을 붙이는 설정 페이지들
// (order-type·table은 각자 전용 저장 UI가 있어 제외 — 미저장 가드에는 포함)
const GLOBAL_SAVE_SECTIONS = ['store','staff-call','origin','stock','stamp'];

// 현재 페이지에 저장 안 한 변경 사항이 있으면 '되돌리기 함수'를, 없으면 null 반환
function getUnsavedDiscard(){
  if(state.section === 'order-type' && typeof ot_isDirty === 'function' && ot_isDirty()){
    return () => { const saved = JSON.parse(ORDER_SAVED); for(const k in saved) ORDER_CHANNELS[k] = saved[k]; };
  }
  if(state.section === 'table' && typeof _pendingTablePos !== 'undefined' && Object.keys(_pendingTablePos).length > 0){
    return () => { _pendingTablePos = {}; };
  }
  if(GLOBAL_SAVE_SECTIONS.includes(state.section) && state.unsaved){
    return () => { state.unsaved = false; };
  }
  return null;
}

function setSection(s){
  // 'faq'·'cs'는 통합된 '고객 지원' 페이지의 탭으로 리다이렉트
  const targetSection = (s === 'faq' || s === 'cs') ? 'support' : s;
  // 다른 페이지로 이동할 때 저장 안 한 변경 사항이 있으면 디자인된 팝업으로 확인
  if(targetSection !== state.section){
    const discard = getUnsavedDiscard();
    if(discard){
      openUnsavedModal(() => { discard(); doSetSection(s); });
      return;
    }
  }
  doSetSection(s);
}
function doSetSection(s){
  if (s === 'faq') { state.section = 'support'; state.supportTab = 'faq'; }
  else if (s === 'cs') { state.section = 'support'; state.supportTab = 'cs'; }
  else state.section = s;
  state.unsaved = false;   // 페이지를 떠나면 일반 미저장 플래그 해제
  renderApp();
}

// 페이지 이탈 / 창 닫기 가드 1회 설치
function initUnsavedGuards(){
  const main = document.getElementById('main');
  if(main){
    // 검색·필터·뷰 전환·페이지네이션은 데이터 변경이 아님 — 저장 유도에서 제외
    // 데이터 편집(이름·가격·메모·시간·텍스트 등)만 트래킹
    const FILTER_SELECTORS = [
      '.toolbar',              // 페이지 상단 툴바 (필터 chip · 다운로드 버튼 영역)
      '.search-wrap',          // 주문 내역 등 검색 영역 (검색·카드번호·금액·기간·상태)
      '.period-strip',         // 매출 한눈에/상세 보기 기간 선택 영역
      '.basis-combo',          // 매출 집계 기준 카드 (일/주/월/기간 + 날짜 네비)
      '.tabs',                 // 페이지 내 탭 전환 (매출 상세 5탭 / 고객지원 등)
      '.sup-tabs',             // 고객 지원 탭 (자주 묻는 질문 / 서비스 문의)
      '.stk-tabs',             // 오늘의 준비량 탭 (qty / soldout)
      '.menu-panel-filters',   // 메뉴/옵션/세트 페이지 필터 영역
      '.pagination',           // 페이지 이동
      '.crumb',                // 브레드크럼
      '[data-no-save]',        // 향후 추가될 검색·필터 영역에 명시적으로 붙이는 속성
    ];
    const isFilterEvent = (e) => {
      const t = e.target;
      if(!t || !t.closest) return false;
      if(FILTER_SELECTORS.some(sel => t.closest(sel))) return true;
      if(t.classList && (t.classList.contains('filter-select') || t.classList.contains('sortable-th'))) return true;
      return false;
    };
    const onEdit = (e)=>{
      if(isFilterEvent(e)) return;
      const t=e.target;
      if(t && t.matches && t.matches('input,textarea,select')) markUnsavedUI();
    };
    main.addEventListener('input', onEdit);
    main.addEventListener('change', onEdit);
    main.addEventListener('click', (e)=>{
      if(isFilterEvent(e)) return;
      const t = e.target.closest && e.target.closest('.toggle-switch,.chip,.seg .b');
      if(t) markUnsavedUI();
    });
  }
  // 실제 탭/창 닫기·새로고침 — 브라우저는 커스텀 팝업을 못 띄우므로 기본 경고로 보호
  window.addEventListener('beforeunload', (e)=>{ if(getUnsavedDiscard()){ e.preventDefault(); e.returnValue=''; } });
  // 목업 브라우저 창 닫기(빨간 점) — 디자인된 팝업으로 안내
  const redDot = document.querySelector('.browser-bar .dot.r');
  if(redDot){
    redDot.style.cursor = 'pointer'; redDot.title = '창 닫기';
    redDot.addEventListener('click', ()=>{ if(getUnsavedDiscard()) openUnsavedModal(()=>{ location.reload(); }); });
  }
}

function applyOrderInlineRange(){
  const s = document.getElementById('ord-dt-start').value;
  const e = document.getElementById('ord-dt-end').value;
  if (!s || !e) { alert('시작일과 종료일을 모두 선택해주세요'); return; }
  if (s > e)    { alert('종료일을 시작일 이후로 선택해 주세요'); return; }
  if (e > TODAY_DATE) { alert('오늘까지의 날짜에서 선택해 주세요'); return; }
  // 정책: 1회 최대 3개월(90일) / 1년 이상 과거 데이터 없음
  const diffDays = Math.round((new Date(e) - new Date(s)) / 86400000);
  if (diffDays > 90) { alert('주문 내역은 한 번에 최대 3개월(90일)까지만 조회할 수 있어요.\n기간을 줄여서 다시 선택해 주세요.'); return; }
  if (s < '2025-05-15') { alert('1년 이전 데이터는 보관 정책에 따라 조회할 수 없어요.\n(보관 기간: 1년)'); return; }
  state.customStart = s;
  state.customEnd = e;
  state.orderDateFilter = 'custom';
  renderApp();
}

// 매출 집계 기준 + 기간 토글 + 날짜 네비 통합 컴포넌트
// opts: {periods:[{key,label}], current, onChange, centerLabel, prevAction, nextAction, startTime, endTime}
function basisCombo(opts){
  const prevDis = opts.disablePrev === true;
  const nextDis = opts.disableNext === true;
  const segDis  = opts.disabled === true;        // 토글 자체를 비활성화(시각적 흐림)
  const arrowDis = opts.lockArrows === true;     // ◀▶도 비활성화 → UI 자체 비노출
  // 비활성 탭에서 토글 클릭 시 안내 — onChange는 무시하고 안내만
  const click = segDis ? `showDetailGroupHint` : opts.onChange;
  // 화살표는 누를 수 있는 상황에서만 노출 (미래/잠금 상태는 렌더링하지 않음)
  // 자리 유지를 위해 빈 공간(placeholder)으로 동일한 크기를 차지
  const arrPlaceholder = `<span class="arr" style="visibility:hidden;pointer-events:none;">▶</span>`;
  const prevEl = (prevDis||arrowDis)
    ? arrPlaceholder
    : `<span class="arr" ${opts.onPrev ? `onclick="${opts.onPrev}()" title="이전으로"` : `onclick="alert('이전 기간으로 이동')"`}>◀</span>`;
  const nextEl = (nextDis||arrowDis)
    ? arrPlaceholder
    : `<span class="arr" ${opts.onNext ? `onclick="${opts.onNext}()" title="다음으로"` : `onclick="alert('다음 기간으로 이동')"`}>▶</span>`;
  return `
    <div class="basis-combo">
      <div class="date-hero">
        ${prevEl}
        <div class="date-title">${opts.centerLabel}</div>
        ${nextEl}
      </div>
      <div class="bc-row">
        <div class="seg ${segDis?'disabled':''}" ${segDis?'title="[날짜별] 탭에서 기간을 변경해 주세요"':''}>
          ${opts.periods.map(p=>`<div class="b ${opts.current===p.key?'on':''}" onclick="${click}('${p.key}')">${p.label}</div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderDatePicker(){

        <span class="chip" onclick="setQuickRange('yesterday')">어제</span>

        <span class="chip" onclick="setQuickRange(14)">지난 14일</span>
        <span class="chip" onclick="setQuickRange(30)">지난 30일</span>
        <span class="chip" onclick="setQuickRange('thisMonth')">이번 달</span>

          max="${TODAY_DATE}"
          style="flex:1;" oninput="onDateChange()" />
        <span style="color:var(--ink-3);">~</span>
        <input type="date" id="dp-end" class="input" value="${state.customEnd}"
          ${isOrders ? `min="${state.customStart||ORDER_MIN}"` : ''}
          max="${endMax}"
          style="flex:1;" oninput="onDateChange()" />

function onDateChange(){
  const s = document.getElementById('dp-start').value;
  let e   = document.getElementById('dp-end').value;
  state.customStart = s;
  // 주문 내역: 시작일 기준으로 종료일 max를 90일로 동적 제한
  if(state.customTarget === 'orders' && s){
    const d = new Date(s); d.setDate(d.getDate() + 90);
    const newMax = toISODate(d) > TODAY_DATE ? TODAY_DATE : toISODate(d);
    const endEl = document.getElementById('dp-end');
    if(endEl){
      endEl.min = s;
      endEl.max = newMax;
      if(e && e > newMax){ endEl.value = newMax; e = newMax; }
      if(e && e < s){      endEl.value = s;      e = s; }
    }
  }
  state.customEnd = e;
  document.getElementById('dp-preview').innerHTML = getRangePreview(s, e);
}
function getRangePreview(s, e){
  if (!s || !e) return '시작일과 종료일을 선택해주세요';
  if (s > e) return '<span style="color:var(--red);">종료일을 시작일 이후로 선택해 주세요</span>';
  if (e > TODAY_DATE) return '<span style="color:var(--red);">오늘까지의 날짜에서 선택해 주세요</span>';
  const start = new Date(s);
  const end = new Date(e);
  const diff = Math.round((end - start) / (1000*60*60*24)) + 1;
  if(state.customTarget === 'orders' && diff > 90)
    return `<span style="color:var(--red);">선택한 기간이 ${diff}일이에요. 최대 3개월(90일)로 줄여 주세요.</span>`;
  if(state.customTarget === 'orders' && s < '2025-05-15')
    return `<span style="color:var(--red);">1년 이전 데이터는 보관 정책상 조회할 수 없어요.</span>`;
  const sLabel = `${start.getMonth()+1}월 ${start.getDate()}일(${DOW[start.getDay()]})`;
  const eLabel = `${end.getMonth()+1}월 ${end.getDate()}일(${DOW[end.getDay()]})`;
  return `${sLabel} ~ ${eLabel} <span style="color:var(--ink-3);font-weight:500;font-size:12px;margin-left:4px;">· ${diff}일간</span>`;
}
function setQuickRange(period){
  const today = new Date(TODAY_DATE);
  let start, end;
  if (typeof period === 'number'){
    end = new Date(today);
    start = new Date(today);
    start.setDate(today.getDate() - period + 1);
  } else if (period==='today'){
    start = new Date(today); end = new Date(today);
  } else if (period==='yesterday'){
    start = new Date(today); start.setDate(today.getDate() - 1);
    end = new Date(start);
  } else if (period==='thisMonth'){
    start = new Date(today.getFullYear(), today.getMonth(), 1);
    end = new Date(today);
  } else if (period==='lastMonth'){
    start = new Date(today.getFullYear(), today.getMonth()-1, 1);
    end = new Date(today.getFullYear(), today.getMonth(), 0);
  } else if (period==='thisQuarter'){
    const q = Math.floor(today.getMonth()/3);
    start = new Date(today.getFullYear(), q*3, 1);
    end = new Date(today);
  } else if (period==='lastQuarter'){
    const q = Math.floor(today.getMonth()/3);
    start = new Date(today.getFullYear(), (q-1)*3, 1);
    end = new Date(today.getFullYear(), q*3, 0);
  }
  state.customStart = start.toISOString().slice(0,10);
  state.customEnd = end.toISOString().slice(0,10);
  renderDatePicker();
}
function applyDateRange(){
  if (state.customStart > state.customEnd){
    alert('종료일을 시작일 이후로 선택해 주세요'); return;
  }
  if (state.customEnd > TODAY_DATE){
    alert('오늘까지의 날짜에서 선택해 주세요'); return;
  }
  if (state.customTarget === 'orders'){
    const diff = Math.round((new Date(state.customEnd)-new Date(state.customStart))/86400000);
    if(diff > 90){ alert('주문 내역은 최대 3개월(90일)까지 조회할 수 있어요.'); return; }
    if(state.customStart < '2025-05-15'){ alert('1년 이전 데이터는 보관 정책상 조회할 수 없어요.'); return; }
  }
  if (state.customTarget === 'overview') state.overviewPeriod = 'custom';
  if (state.customTarget === 'detail')   state.detailGroup = 'custom';
  if (state.customTarget === 'orders') {
    // 주문 내역은 패널 안에서 draft로 모아 한 번에 적용 — dateFilter만 draft에 반영
    if (state.orderAdvancedOpen && state.orderFilterDraft) {
      state.orderFilterDraft.dateFilter = 'custom';
    } else {
      state.orderDateFilter = 'custom';
    }
  }
  closeModal();
  renderApp();
}

// 헤더 + 행 배열 → CSV 문자열 (BOM 포함 — 엑셀에서 한글 안 깨지게)
function toCSV(headers, rows){
  const esc = v => {
    const s = (v==null ? '' : String(v));
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  return '﻿' + [headers.map(esc).join(','), ...rows.map(r=>r.map(esc).join(','))].join('\n');
}
// Blob 즉시 다운로드
function triggerDownload(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function showToast(msg, kind){
  let wrap = document.getElementById('toast-wrap');
  if(!wrap){ wrap = document.createElement('div'); wrap.id='toast-wrap'; wrap.className='toast-wrap'; document.body.appendChild(wrap); }

/* ============================================================
   글로벌 툴팁 (overflow 컨테이너에 잘리지 않도록 body 레벨 portal)
   ============================================================ */
(function initTooltipPortal(){
  const portal = document.createElement('div');
  portal.id = 'tip-portal';
  document.body.appendChild(portal);

  function show(tip){
    const body = tip.querySelector('.body');
    if (!body) return;
    portal.innerHTML = body.innerHTML;
    portal.style.opacity = '0';
    portal.style.left = '0px';
    portal.style.top = '0px';
    portal.classList.remove('up','down');
    // measure
    const r = tip.getBoundingClientRect();
    const pw = portal.offsetWidth;
    const ph = portal.offsetHeight;
    const margin = 8;
    let placeUp = r.top - ph - margin > 8;
    let top, dir;
    if (placeUp){ top = r.top - ph - margin; dir = 'up'; }
    else        { top = r.bottom + margin;    dir = 'down'; }
    let left = r.left + r.width/2 - pw/2;
    left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
    portal.style.left = left + 'px';
    portal.style.top  = top  + 'px';
    portal.classList.add(dir);
    portal.style.opacity = '1';
  }
  function hide(){ portal.style.opacity = '0'; }

  document.addEventListener('mouseover', e=>{
    const tip = e.target.closest && e.target.closest('.tip');
    if (tip) show(tip);
  });
  document.addEventListener('mouseout', e=>{
    const tip = e.target.closest && e.target.closest('.tip');
    if (tip && (!e.relatedTarget || !e.relatedTarget.closest || !e.relatedTarget.closest('.tip'))) hide();
  });
  window.addEventListener('scroll', hide, true);
})();

/* ============================================================
   메뉴관리 데이터 — 단품 메뉴 · 옵션 그룹 · 카테고리 · 세트 메뉴

function setPriceRange(s){
  const minExtras = (s.slots||[]).reduce((sum,sl)=>{
    const cands = sl.candidates||[];
    if(cands.length===0) return sum;
    return sum + Math.min(...cands.map(c=>c.extraPrice||0));
  }, 0);
  const maxExtras = (s.slots||[]).reduce((sum,sl)=>{
    const cands = sl.candidates||[];
    if(cands.length===0) return sum;
    return sum + Math.max(...cands.map(c=>c.extraPrice||0));
  }, 0);
  return { min: s.basePrice + minExtras, max: s.basePrice + maxExtras };
}

function trAuto(text, lang){
  if (!text) return '';
  if (TR_DICT[text] && TR_DICT[text][lang]) return TR_DICT[text][lang];
  // 부분 매칭 — 사전에 있는 단어를 순회하며 치환 시도
  let out = text;
  let hit = false;
  Object.keys(TR_DICT).forEach(k=>{
    if (out.includes(k) && TR_DICT[k][lang]){ out = out.split(k).join(TR_DICT[k][lang]); hit = true; }
  });
  return hit ? out : '';
}

  const tools = `
    <div class="mm-tools">

            <button onclick="state.mmMoreOpen=false;openMenuExcelModal()"><span class="ic-em">📊</span>엑셀로 한 번에 올리기</button>
          </div>
        ` : ''}
        <input type="file" id="mm-json-file" accept=".json" style="display:none" onchange="importMenuJSON(event)" />
      </div>
    </div>
  `;
  // 통계 — 한 줄 컴팩트 형태로
  const stats = `
    <div class="mm-stats">
      <div class="mm-stat${activeKey==='menu'?' on':''}" onclick="setSection('menu')"><span class="ic">🍽️</span><span class="lbl">메뉴</span><b>${MENUS.length}</b></div>
