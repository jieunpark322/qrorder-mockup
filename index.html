<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>QR오더 사장님 관리자 — 인터랙티브 프로토타입</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --blue:#3182f6; --blue-50:#e8f3ff; --blue-100:#cfe4ff;
    --ink:#191f28; --ink-2:#4e5968; --ink-3:#8b95a1; --ink-4:#b0b8c1;
    --line:#e5e8eb; --line-2:#f2f4f6;
    --bg:#f9fafb; --bg-2:#f2f4f6;
    --red:#f04452; --red-50:#ffeaec;
    --green:#1eb18d; --green-50:#e3f6f0;
    --amber:#f59e0b; --amber-50:#fff5dd;
    --purple:#8b5cf6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:#eceef1;color:var(--ink);font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  body{padding:24px;}
  .doc-head{max-width:1280px;margin:0 auto 20px;}
  .doc-head h1{font-size:22px;margin:0 0 4px;letter-spacing:-.02em;}
  .doc-head p{margin:0;color:var(--ink-2);font-size:13px;}
  .doc-head .hint{margin-top:10px;padding:10px 14px;background:#fff;border:1px solid var(--line);border-radius:10px;font-size:12px;color:var(--ink-2);line-height:1.5;}
  .doc-head .hint b{color:var(--ink);}

  /* PC frame */
  .pc{max-width:1280px;margin:0 auto;background:#fff;border-radius:14px;border:1px solid var(--line);box-shadow:0 8px 32px rgba(0,0,0,.06);overflow:hidden;}
  .browser-bar{height:36px;background:#f2f4f6;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:6px;}
  .browser-bar .dot{width:11px;height:11px;border-radius:50%;background:#d6dae0;}
  .browser-bar .dot.r{background:#ff5f57;} .browser-bar .dot.y{background:#febc2e;} .browser-bar .dot.g{background:#28c840;}
  .browser-bar .url{flex:1;text-align:center;font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums;}

  .app{display:flex;min-height:920px;}

  /* Sidebar */
  .sidenav{width:232px;background:#fff;border-right:1px solid var(--line);padding:20px 14px;flex-shrink:0;}
  .brand{font-size:17px;font-weight:800;padding:6px 10px 14px;letter-spacing:-.01em;}
  .brand b{color:var(--blue);}
  .userbox{margin:0 0 14px;padding:12px;background:var(--bg-2);border-radius:10px;font-size:12px;color:var(--ink-2);display:flex;gap:10px;align-items:center;}
  .userbox .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#a8c8f5,#3182f6);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .userbox b{display:block;color:var(--ink);font-size:13px;margin-bottom:2px;}
  .grp{font-size:11px;color:var(--ink-4);padding:14px 10px 6px;font-weight:700;letter-spacing:.05em;}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;color:var(--ink-2);cursor:pointer;margin-bottom:1px;transition:all .12s;}
  .navitem:hover{background:var(--bg-2);}
  .navitem.on{background:var(--blue-50);color:var(--blue);font-weight:700;}
  .navitem .ic{width:16px;flex-shrink:0;}
  .navitem .badge-n{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700;}

  /* Main */
  .main{flex:1;overflow-y:auto;background:#fafbfc;padding:24px 32px 60px;max-height:920px;}
  .main h2{font-size:22px;margin:0 0 4px;letter-spacing:-.02em;}
  .crumb{font-size:12px;color:var(--ink-3);margin-bottom:18px;}

  /* Basis bar */
  .basis-bar{display:flex;align-items:center;gap:8px;margin:0 0 14px;padding:10px 14px;background:#fff;border:1px solid var(--line);border-radius:10px;font-size:12px;color:var(--ink-2);}

  /* 매출 집계 기준 + 기간 선택 통합 컴포넌트 */
  .basis-combo{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:14px;padding:18px 20px;}
  .basis-combo .date-hero{display:flex;align-items:center;justify-content:center;gap:18px;padding:6px 0 14px;border-bottom:1px solid var(--line-2);margin-bottom:14px;}
  .basis-combo .date-hero .arr{width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-3);cursor:pointer;border-radius:10px;font-size:18px;background:var(--bg-2);transition:all .12s;flex-shrink:0;}
  .basis-combo .date-hero .arr:hover{background:var(--blue-50);color:var(--blue);}
  .basis-combo .date-hero .arr.disabled{background:transparent;color:var(--ink-4);cursor:not-allowed;opacity:.45;}
  .basis-combo .date-hero .arr.disabled:hover{background:transparent;color:var(--ink-4);}
  .basis-combo .date-hero .date-title{font-size:26px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.02em;text-align:center;line-height:1.2;}
  .basis-combo .bc-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .basis-combo .bc-row + .bc-row{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);}
  .basis-combo .lbl-pill{font-size:11px;color:#1b64da;font-weight:800;background:var(--blue-50);padding:6px 10px;border-radius:6px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:5px;}
  .basis-combo .ico-i{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;cursor:pointer;color:var(--blue);font-weight:700;background:#fff;border:1px solid var(--blue-100);transition:all .12s;font-size:12px;}
  .basis-combo .ico-i:hover{background:var(--blue-50);}
  .basis-combo .period-line{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .basis-combo .range-line{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-2);flex-wrap:wrap;}
  .basis-combo .range-line .rng-time{display:flex;align-items:center;gap:6px;color:var(--ink);}
  .basis-combo .range-line .rng-time b{font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  .basis-combo .range-line .rng-time .arr{color:var(--ink-3);font-weight:600;}
  .basis-combo .range-line .note{color:var(--ink-3);font-size:12px;}

  /* Basis info modal 내부 블록 */
  .ib-block{margin-bottom:18px;}
  .ib-block h4{margin:0 0 6px;font-size:14px;font-weight:800;color:var(--ink);}
  .ib-block p{margin:0 0 10px;font-size:13px;color:var(--ink-2);line-height:1.6;}
  .ib-block .ex-card{padding:12px 14px;background:var(--bg-2);border-radius:10px;font-size:12px;color:var(--ink-2);line-height:1.7;}
  .ib-block .ex-card b{display:block;color:var(--ink);margin-bottom:6px;font-size:13px;}
  .ib-block .ex-card ul{margin:6px 0 0;padding-left:18px;}
  .ib-block .ex-card li{margin-bottom:3px;}
  .ib-block.important{padding:16px 18px;background:linear-gradient(135deg,#f6f3ff,#fafcff);border:1px solid #e3d8ff;border-radius:12px;margin-bottom:0;}
  .ib-block.important h4{color:#6b3eaa;}
  .ib-block .agent-tip{margin-top:10px;padding:10px 14px;background:#fff;border-radius:8px;font-size:13px;font-weight:700;color:#6b3eaa;border:1px dashed #c4a5ff;font-family:'Pretendard',sans-serif;}

  /* 매출 집계 기준 다이어그램 */
  .day-axis{margin:10px 0 4px;padding:16px 18px;background:var(--bg-2);border-radius:12px;}
  .day-axis .da-title{font-size:12px;color:var(--ink-3);font-weight:700;margin-bottom:10px;}
  .day-axis .da-bar{position:relative;height:44px;background:linear-gradient(90deg,#3182f6,#74b3ff);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;letter-spacing:.02em;}
  .day-axis .da-bar .da-edge{position:absolute;top:50%;transform:translateY(-50%);background:#fff;color:var(--ink);font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;border:1px solid var(--line);font-variant-numeric:tabular-nums;}
  .day-axis .da-bar .da-edge.l{left:8px;}
  .day-axis .da-bar .da-edge.r{right:8px;}
  .day-axis .da-foot{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums;}
  .day-axis .da-note{margin-top:10px;font-size:12px;color:var(--ink-2);line-height:1.55;}
  .day-axis .da-note b{color:var(--ink);}

  /* 환불 흐름 다이어그램 */
  .refund-flow{display:flex;align-items:stretch;gap:10px;margin:10px 0 4px;}
  .refund-flow .rf-card{flex:1;padding:14px;border-radius:12px;background:#fff;border:1px solid var(--line);text-align:center;}
  .refund-flow .rf-card.paid{background:#e8f3ff;border-color:var(--blue-100);}
  .refund-flow .rf-card.refund{background:#ffeaec;border-color:#ffd0d4;}
  .refund-flow .rf-day{font-size:12px;color:var(--ink-3);font-weight:700;margin-bottom:6px;}
  .refund-flow .rf-amt{font-size:17px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1.3;}
  .refund-flow .rf-card.refund .rf-amt{color:var(--red);}
  .refund-flow .rf-tag{margin-top:6px;font-size:11px;color:var(--ink-3);}
  .refund-flow .rf-arrow{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-3);font-size:11px;font-weight:700;min-width:60px;}
  .refund-flow .rf-arrow .arr-line{font-size:22px;color:var(--ink-4);line-height:1;margin-bottom:2px;}
  .refund-flow + .da-note{display:block;margin-top:10px;font-size:12px;color:var(--ink-2);line-height:1.55;}
  .refund-flow + .da-note b{color:var(--ink);}
  .basis-bar .ico{width:18px;height:18px;border-radius:50%;background:var(--blue-50);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
  .basis-bar b{color:var(--ink);}
  .basis-bar .sep{color:var(--line);}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
  .toolbar .left{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .page-sub{font-size:12px;color:var(--ink-3);margin-top:4px;}

  /* Chips */
  .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;font-size:13px;color:var(--ink-2);background:#fff;border:1px solid var(--line);cursor:pointer;transition:all .12s;user-select:none;}
  .chip:hover{border-color:var(--ink-4);color:var(--ink);}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .chip.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
  .chip.primary:hover{background:#1e6cd9;border-color:#1e6cd9;color:#fff;}
  .chip.ghost{background:transparent;border-color:transparent;}

  /* Segmented control */
  .seg{display:inline-flex;background:var(--bg-2);padding:3px;border-radius:10px;gap:0;}
  .seg .b{padding:8px 16px;font-size:13px;font-weight:600;color:var(--ink-3);border-radius:8px;cursor:pointer;transition:all .12s;}
  .seg .b:hover{color:var(--ink-2);}
  .seg .b.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .seg.sm .b{padding:7px 12px;font-size:12px;}

  /* Period strip */
  .period-strip{display:flex;align-items:center;gap:14px;padding:14px 18px;background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:16px;flex-wrap:wrap;}
  .date-nav{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--ink);}
  .date-nav .arr{padding:4px 8px;color:var(--ink-3);cursor:pointer;border-radius:6px;font-size:13px;}
  .date-nav .arr:hover{background:var(--bg-2);color:var(--ink);}
  .date-nav b{font-weight:700;}
  .rng{font-size:12px;color:var(--ink-3);margin-left:auto;}

  /* KPI flow card */
  .kpi-flow{display:flex;align-items:stretch;gap:0;background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px 26px;margin-bottom:18px;position:relative;}
  .kpi-flow .step{flex:1;position:relative;padding:0 16px;}
  .kpi-flow .step:first-child{padding-left:0;}
  .kpi-flow .step:last-child{padding-right:0;}
  .kpi-flow .step .label{font-size:13px;color:var(--ink-3);margin-bottom:8px;font-weight:600;}
  .kpi-flow .step .num{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.1;}
  .kpi-flow .step .sub{font-size:12px;color:var(--ink-2);margin-top:8px;}
  .kpi-flow .step.gross .num{color:var(--ink);}
  .kpi-flow .step.refund .num{color:var(--red);}
  .kpi-flow .step.net{padding:0 0 0 16px;}
  .kpi-flow .step.net .num{color:var(--blue);}
  .kpi-flow .step.net{background:linear-gradient(135deg,#eaf3ff,#f5f9ff);border-radius:10px;margin:-12px -12px -12px 0;padding:12px 24px;}
  .kpi-flow .arrow{display:flex;align-items:center;color:var(--ink-4);font-size:24px;width:28px;justify-content:center;}

  /* KPI row */
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
  .pc-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;transition:all .12s;cursor:default;}
  .pc-card.clickable{cursor:pointer;}
  .pc-card.clickable:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(49,130,246,.08);transform:translateY(-1px);}
  .pc-card .label{font-size:13px;color:var(--ink-3);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
  .pc-card .num{font-size:24px;font-weight:800;letter-spacing:-.02em;}
  .pc-card .sub{margin-top:6px;font-size:12px;color:var(--ink-2);}
  .pc-card.blue{background:linear-gradient(135deg,#eaf3ff,#f5f9ff);border-color:var(--blue-100);}
  .pc-card.blue .label,.pc-card.blue .num{color:#1b64da;}

  .grid-2{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px;}
  .grid-3-2{display:grid;grid-template-columns:3fr 2fr;gap:14px;}
  .grid-2-eq{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid-3-eq{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}

  /* Panel */
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:14px;}
  .panel h3{margin:0 0 14px;font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
  .panel h3 .h-sub{font-size:11px;color:var(--ink-3);font-weight:500;}
  .panel h3 .h-act{display:flex;gap:6px;align-items:center;}
  .panel.tight{padding:0;overflow:hidden;}
  .panel.tight h3{padding:16px 20px 12px;margin:0;border-bottom:1px solid var(--line-2);}

  .unit-tag{font-size:11px;color:var(--ink-3);background:var(--bg-2);padding:3px 8px;border-radius:6px;font-weight:600;}

  /* Table */
  table.t{width:100%;border-collapse:collapse;font-size:13px;}
  table.t th{text-align:left;padding:11px 12px;background:var(--bg-2);color:var(--ink-3);font-weight:600;font-size:11px;border-bottom:1px solid var(--line);white-space:nowrap;}
  table.t td{padding:12px;border-bottom:1px solid var(--line-2);color:var(--ink);font-variant-numeric:tabular-nums;}
  table.t tr:last-child td{border-bottom:none;}
  table.t tbody tr{cursor:default;transition:background .1s;}
  table.t tbody tr:hover td{background:#fafbfc;}
  table.t tbody tr.clickable{cursor:pointer;}
  table.t tbody tr.clickable:hover td{background:#f4f8ff;}
  table.t tbody tr.clickable .row-go{display:inline-block;margin-left:6px;font-size:11px;font-weight:700;color:var(--blue);opacity:.55;transition:opacity .12s;}
  table.t tbody tr.clickable:hover .row-go{opacity:1;}

  /* 정산 달력 */
  .cal-week{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg-2);border-bottom:1px solid var(--line);}
  .cal-wkhead{padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--ink-2);}
  .cal-wkhead.sun{color:var(--red);}
  .cal-wkhead.sat{color:var(--blue);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);}
  .cal-cell{min-height:104px;background:#fff;padding:10px;transition:background .12s;display:flex;flex-direction:column;}
  .cal-cell.has-data{cursor:pointer;}
  .cal-cell.has-data:hover{background:#fafcff;}
  .cal-cell.selected{background:#eaf3ff;outline:2px solid var(--blue);outline-offset:-2px;position:relative;z-index:1;}
  .cal-cell.off{background:var(--bg-2);}
  .cal-day{font-size:13px;font-weight:700;color:var(--ink-2);}
  .cal-day.today{color:var(--blue);}
  .cal-day.today::after{content:" · 오늘";font-size:10px;font-weight:600;color:var(--blue);}
  .cal-amt{margin-top:6px;font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1.2;}
  .cal-amt.done{color:var(--blue);}
  .cal-amt.pending{color:#a25e00;}
  .cal-tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;margin-top:4px;}
  .cal-tag.done{background:var(--blue-50);color:var(--blue);}
  .cal-tag.pending{background:#fff3d4;color:#a25e00;}
  .cal-sub{font-size:10px;color:var(--ink-3);margin-top:4px;}
  .cal-legend{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin-right:4px;}
  .cal-legend.done{background:var(--blue);}
  .cal-legend.pending{background:var(--amber);}

  /* 정산 상세 — 큰 제목 + 3 그룹 카드 + sticky 합계 바 */
  .stl-detail-panel{padding:26px 28px;}
  .stl-detail-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
  .stl-detail-date{font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--ink);line-height:1.2;}
  .stl-detail-status{font-size:18px;font-weight:800;letter-spacing:-.01em;}
  .stl-detail-status.done{color:var(--blue);}
  .stl-detail-status.pending{color:#c97a00;}
  .stl-detail-meta{font-size:13px;color:var(--ink-3);margin-bottom:22px;}
  .stl-groups{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:18px;}
  .stl-group{padding:20px 22px;background:#fff;border:1.5px solid var(--line);border-radius:14px;border-top-width:4px;transition:border-color .12s,box-shadow .12s,transform .12s;}
  .stl-group:hover{box-shadow:0 6px 18px rgba(0,0,0,.06);transform:translateY(-1px);}
  .stl-group.g1{border-top-color:var(--blue);}
  .stl-group.g2{border-top-color:#f59e0b;}
  .stl-group.g3{border-top-color:var(--green);}
  .stl-g-title{font-size:15px;font-weight:800;margin-bottom:14px;letter-spacing:-.01em;padding-bottom:10px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:8px;}
  .stl-group.g1 .stl-g-title{color:var(--blue);}
  .stl-group.g2 .stl-g-title{color:#c97a00;}
  .stl-group.g3 .stl-g-title{color:var(--green);}
  .stl-g-no{display:inline-flex;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;}
  .stl-group.g1 .stl-g-no{background:var(--blue);}
  .stl-group.g2 .stl-g-no{background:#f59e0b;}
  .stl-group.g3 .stl-g-no{background:var(--green);}
  .stl-g-table{width:100%;font-size:14px;border-collapse:collapse;}
  .stl-g-table td{padding:9px 0;color:var(--ink-2);vertical-align:top;line-height:1.5;}
  .stl-g-table td:last-child{text-align:right;font-variant-numeric:tabular-nums;color:var(--ink);white-space:nowrap;}
  .stl-g-table tr.stl-sum td{border-top:1px dashed var(--ink-4);padding-top:11px;color:var(--ink);font-weight:700;font-size:14.5px;}
  .stl-g-table tr.stl-final td{border-top:2px solid var(--ink);padding-top:11px;color:var(--ink);font-weight:800;font-size:15.5px;}

const HOLIDAYS_2026 = ['2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-03-01','2026-05-01','2026-05-05','2026-05-25','2026-06-06','2026-08-15','2026-09-24','2026-09-25','2026-09-26','2026-10-03','2026-10-09','2026-12-25'];
// KST 기준 YYYY-MM-DD (toISOString은 UTC 변환되어 자정이 전날로 밀림 — 직접 포맷)
const toISODate = (date) => `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
const isHoliday = (date) => HOLIDAYS_2026.includes(toISODate(date));

    while (added < n) {

      const w = d.getDay();
      if (w !== 0 && w !== 6 && !isHoliday(d)) added++;
    }

    const ref = days.reduce((s,d)=>s+d.ref, 0);

    const usedCoupon = days.some(d => couponPattern[d._idx]);
    const couponBaseGross = days.filter(d => couponPattern[d._idx]).reduce((s,d)=>s+d.gross, 0);
    const couponTable = usedCoupon ? Math.round(couponBaseGross * 0.012) : 0; // 테이블 발행 쿠폰 보전 (1.2%)

/* ============================================================
   정렬 공통 헬퍼 — 표 헤더 클릭 시 오름차↔내림차 토글
   ============================================================ */
// 헤더 셀 생성: sortableHeader({key, label, align, currentSort, setterName})
// setterName은 'setOrderSort' 같은 전역 함수명. 같은 키 클릭 시 dir 토글, 다른 키 클릭 시 desc 시작.
function sortableHeader({key, label, align, currentSort, setter}){
  const isActive = currentSort && currentSort.key === key;
  const dir = isActive ? currentSort.dir : null;
  const arrow = dir === 'asc' ? '▲' : dir === 'desc' ? '▼' : '⇅';
  const color = isActive ? 'var(--blue)' : 'var(--ink-4)';
  const cls = align === 'num' ? ' class="num"' : '';
  return `<th${cls} style="cursor:pointer;user-select:none;white-space:nowrap;" onclick="${setter}('${key}')">${label} <span style="color:${color};font-size:10px;margin-left:2px;">${arrow}</span></th>`;
}
// 데이터 배열 정렬 — key/dir 기반. accessor는 각 행에서 값을 꺼내는 함수.
function applySort(rows, sortState, accessors){
  if (!sortState || !sortState.key) return rows;
  const fn = accessors[sortState.key];
  if (!fn) return rows;
  const out = rows.slice().sort((a,b) => {
    const av = fn(a), bv = fn(b);
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'number' && typeof bv === 'number') return av - bv;
    return String(av).localeCompare(String(bv), 'ko');
  });
  return sortState.dir === 'desc' ? out.reverse() : out;
}
// 정렬 setter 생성기 — 같은 키 토글, 다른 키 desc 시작
function makeSortSetter(stateKey){
  return function(colKey){
    const cur = state[stateKey];
    if (cur && cur.key === colKey) {
      state[stateKey] = { key: colKey, dir: cur.dir === 'desc' ? 'asc' : 'desc' };
    } else {
      state[stateKey] = { key: colKey, dir: 'desc' };
    }
    renderApp();
  };
}

const fmt = n => (n==null ? '−' : new Intl.NumberFormat('ko-KR').format(Math.round(n)));
const fmtSigned = n => (n>=0 ? '+' : '') + fmt(n);
const sum = (a, k) => a.reduce((s,x)=>s+(x[k]||0),0);

/* === 보안 정책 헬퍼 — 카드번호 등 민감정보 사전 차단 === */
const TODAY_DATE = '2026-05-15';
const STORE_EMAIL = 'hong****@gmail.com';
function isWithinYear(dateStr){
  if (!dateStr) return false;
  const diff = (new Date(TODAY_DATE) - new Date(dateStr)) / (1000*60*60*24);
  return diff <= 365;
}
// 카드번호 표시 마스킹 — 1년 이내는 BIN(앞 6자리) + 끝 4자리 노출 (PCI DSS 표준), 1년 초과는 전체 마스킹
function maskCard(o){
  if (!o.card) return null;
  if (!isWithinYear(o.date)) return '****-****-****-****';
  const f = o.card.slice(0,6);   // 앞 6자리 (BIN)
  const l = o.card.slice(-4);    // 끝 4자리
  return `${f.slice(0,4)}-${f.slice(4,6)}**-****-${l}`;
}
// 결제수단 분류 — 1depth(메인) / 2depth(서브)
// 메인: 카드 / 카카오페이 / 네이버페이 / 토스페이 / 현금
// 서브: 카드면 카드사명, 페이면 머니/페이 등
const CARD_ISSUERS = ['신한','KB','삼성','현대','롯데','BC','하나','농협','우리','시티','외환','VISA (해외)','MASTER (해외)'];
function payMain(o){
  if (CARD_ISSUERS.includes(o.issuer)) return '카드';
  return o.issuer; // 카카오페이 / 네이버페이 / 토스페이 / 현금 그대로
}
function payMainIco(main){
  return { '카드':'💳','카카오페이':'🟡','네이버페이':'🟢','토스페이':'🔵','현금':'💵','계좌이체':'🏦','자체 포인트':'⭐','모바일 상품권':'🎟️' }[main] || '💳';
}
function paySub(o){
  // 카드: 카드사명, 페이: paySub(머니/페이), 현금: 없음
  if (CARD_ISSUERS.includes(o.issuer)) return o.issuer;
  if (o.issuer === '현금') return '';
  return o.paySub || '';
}
// 결제수단 라벨 — 1depth만 (표·요약용). 2depth는 paySub()으로 별도 노출.
function payLabel(o){
  const main = payMain(o);
  return `${payMainIco(main)} ${main}`;
}
// 결제수단 라벨 — 1depth + 2depth (상세 모달용)
function payLabelFull(o){
  const main = payMain(o);
  const sub = paySub(o);
  return sub ? `${payMainIco(main)} ${main} · ${sub}` : `${payMainIco(main)} ${main}`;
}
// 결제번호(tid) 마스킹 — 앞 8자 + 끝 4자만 노출
function maskTid(tid){
  if (!tid) return 'tid_********';
  if (tid.length<=12) return tid.slice(0,4)+'****';
  return tid.slice(0,8) + '****' + tid.slice(-4);
}
// 사업자번호 마스킹
function maskBizNo(bizNo){
  if (!bizNo) return '';
  return bizNo.replace(/^(\d{3})-(\d{2})-(\d{2})(\d{3})$/, '$1-**-**$4');
}

function periodDays(){
  if (state.overviewPeriod==='day') return [DAY[14]]; // 5/15
  if (state.overviewPeriod==='week') return DAY.slice(8); // 5/9 ~ 5/15
  if (state.overviewPeriod==='month') return DAY;
  if (state.overviewPeriod==='custom') {
    return DAY.filter(d => {
      const [m, dd] = d.d.split('/').map(Number);
      const dt = `2026-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      return dt >= state.customStart && dt <= state.customEnd;
    });
  }
  return DAY;
}

// 매출 흐름: 총매출 → (할인 + 포인트 + 환불) 차감 → 실매출 → (과세금액 + 부가세) → 순매출
function enrichDay(d){
  const deduction = (d.disc||0) + (d.pt||0) + (d.ref||0);
  const actual = d.gross - deduction;             // 실매출 (공급대가)
  const vat = Math.round(actual * 10 / 110);      // 부가세
  const taxable = actual - vat;                   // 과세금액 (공급가액)
  const net = taxable;                            // 순매출 = 과세금액 (사장님이 가져가는 매출)
  return { ...d, deduction, actual, vat, taxable, net };
}

function saveBusinessHours(){
  const open = document.getElementById('bh-open').value;
  const close = document.getElementById('bh-close').value;
  if (open) state.businessHoursOpen = open;
  if (close) state.businessHoursClose = close;

  closeModal();
  renderApp();
}

/* ====================== 매출 한눈에 보기 ====================== */
function renderOverview(main){
  const days = periodDays();
  const gross = sum(days, 'gross');
  const disc = sum(days, 'disc');
  const pt = sum(days, 'pt');
  const ref = sum(days, 'ref');
  const refCnt = sum(days, 'rcnt');
  const ordCnt = sum(days, 'ocnt');
  // enrichDay와 동일한 정의로 통일
  const actual = gross - disc - pt - ref;           // 실매출 (공급대가)
  const vat = Math.round(actual * 10 / 110);         // 부가세
  const taxable = actual - vat;                      // 과세금액 (공급가액)
  const net = taxable;                               // 순매출 = 과세금액
  const avgPrice = ordCnt ? Math.round(actual / ordCnt) : 0;

  // 기간별 시간 범위 + 중앙 라벨 (요일 포함)
  let rangeStart, rangeEnd, centerLabel;
  if (state.overviewPeriod==='day') {
    rangeStart='5/15(금) 03:00'; rangeEnd='5/16(토) 02:59';
    centerLabel='2026년 5월 15일(금)';
  } else if (state.overviewPeriod==='week') {
    rangeStart='5/9(토) 03:00'; rangeEnd='5/16(토) 02:59';
    centerLabel='5월 9일(토) ~ 5월 15일(금)';

    rangeEnd   = `${eNext.getMonth()+1}/${eNext.getDate()}(${DOW[eNext.getDay()]}) 02:59`;

    <div class="grid-2-eq">

        </h3>

                <td class="num">${fmt(m.qty)}${m.cat==='베이커리'?'개':'잔'}</td>

// 기간별 — 일간/주간/월간/기간선택 모두 동작
function renderDetailPeriod(body){
  // 그룹별 데이터
  let rows;
  if (state.detailGroup==='day') {
    rows = DAY.map(d=>enrichDay(d));
    rows.forEach(r=>r.label = `${r.d}(${r.w})`);
  } else if (state.detailGroup==='week') {
    // 주별 묶음: 5/1~5/3 (1주), 5/4~5/10 (2주), 5/11~5/15 (3주)
    const groups = [
      { label:'5월 1주차 (5/1~5/3)',   days:DAY.slice(0,3) },
      { label:'5월 2주차 (5/4~5/10)',  days:DAY.slice(3,10) },
      { label:'5월 3주차 (5/11~5/15)', days:DAY.slice(10) },
    ];
    rows = groups.map(g=>{
      const ag = { gross:sum(g.days,'gross'), disc:sum(g.days,'disc'), pt:sum(g.days,'pt'), ref:sum(g.days,'ref'), rcnt:sum(g.days,'rcnt'), ocnt:sum(g.days,'ocnt') };
      const e = enrichDay({...ag, d:'', w:''});
      return { ...e, label:g.label };
    });
  } else if (state.detailGroup==='month') {
    // 월별 — 과거 → 최신 순으로 정렬 (day/week 모드와 일관)
    const m5 = { gross:sum(DAY,'gross'), disc:sum(DAY,'disc'), pt:sum(DAY,'pt'), ref:sum(DAY,'ref'), rcnt:sum(DAY,'rcnt'), ocnt:sum(DAY,'ocnt') };
    const m4 = { gross:26480000, disc:265000, pt:295000, ref:600000, rcnt:13, ocnt:984 };
    const m3 = { gross:24180000, disc:241000, pt:268000, ref:560000, rcnt:12, ocnt:912 };
    rows = [
      { ...enrichDay({...m3, d:'', w:''}), label:'2026년 3월' },
      { ...enrichDay({...m4, d:'', w:''}), label:'2026년 4월' },
      { ...enrichDay({...m5, d:'', w:''}), label:'2026년 5월' },
    ];
  } else { // custom — 시작일 ~ 종료일 사이의 일별 데이터
    rows = DAY.filter(d => {
      const [m, dd] = d.d.split('/').map(Number);
      const dt = `2026-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      return dt >= state.customStart && dt <= state.customEnd;
    }).map(d=>enrichDay(d));
    rows.forEach(r=>r.label = `${r.d}(${r.w})`);
  }

  // 상세 검색 필터 적용
  if (state.detailPeriodMinAmt) rows = rows.filter(r => r.gross >= Number(state.detailPeriodMinAmt));
  if (state.detailPeriodMaxAmt) rows = rows.filter(r => r.gross <= Number(state.detailPeriodMaxAmt));
  const tot = rows.reduce((a,r)=>{
    ['gross','disc','pt','ref','deduction','actual','taxable','vat','net','rcnt','ocnt'].forEach(k=>a[k]=(a[k]||0)+(r[k]||0));
    return a;
  },{});
  const avgPrice = tot.ocnt ? Math.round(tot.actual / tot.ocnt) : 0;

  // custom 모드 라벨/범위 계산
  let cCenter='', cStart='', cEnd='';
  if (state.detailGroup==='custom'){
    const s = new Date(state.customStart);
    const e = new Date(state.customEnd);
    const eNext = new Date(e); eNext.setDate(e.getDate()+1);
    const diff = Math.round((e - s) / (1000*60*60*24)) + 1;
    cCenter = `${s.getMonth()+1}월 ${s.getDate()}일(${DOW[s.getDay()]}) ~ ${e.getMonth()+1}월 ${e.getDate()}일(${DOW[e.getDay()]}) · ${diff}일간`;
    cStart  = `${s.getMonth()+1}/${s.getDate()}(${DOW[s.getDay()]}) 03:00`;
    cEnd    = `${eNext.getMonth()+1}/${eNext.getDate()}(${DOW[eNext.getDay()]}) 02:59`;
  }

  body.innerHTML = `
    ${basisCombo({
      periods:[{key:'day',label:'일간'},{key:'week',label:'주간'},{key:'month',label:'월간'},{key:'custom',label:'기간 선택'}],
      current: state.detailGroup,
      onChange:'setDetailGroup',
      centerLabel:
        state.detailGroup==='day'   ? '2026년 5월 1일(금) ~ 5월 15일(금)'
      : state.detailGroup==='week'  ? '2026년 5월 1주차 ~ 3주차'
      : state.detailGroup==='month' ? '2026년 3월 ~ 5월'
      :                                cCenter,
      disableNext: true,
      startTime: state.detailGroup==='day' ? '5/1(금) 03:00' : state.detailGroup==='week' ? '5/1(금) 03:00' : state.detailGroup==='month' ? '3/1(일) 03:00' : cStart,
      endTime:   state.detailGroup==='day' ? '5/16(토) 02:59' : state.detailGroup==='week' ? '5/16(토) 02:59' : state.detailGroup==='month' ? '5/31(일) 02:59' : cEnd,
    })}

    <div class="panel" style="padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <div style="font-size:12px;color:var(--ink-2);">
        💡 <b style="color:var(--ink);">총매출 − 할인 − 포인트 − 환불 = 실매출 → 부가세 빼면 순매출</b>
        <span style="color:var(--ink-3);margin-left:6px;">환불은 결제한 날 매출에서 자동으로 빠져요</span>
      </div>
      <span class="toggle-switch ${state.detailCompare?'on':''}" onclick="toggleDetailCompare()"><span class="sw"></span>전월 같은 시기와 비교</span>
    </div>

    ${(() => {
      const has = !!(state.detailPeriodMinAmt || state.detailPeriodMaxAmt);
      const unit = state.detailGroup==='day'?'날':state.detailGroup==='week'?'주':state.detailGroup==='month'?'월':'기간';
      return `
      <div class="panel adv-search-panel ${state.detailPeriodAdvOpen?'open':''}" style="padding:0;margin-bottom:14px;">
        <div class="adv-head" onclick="state.detailPeriodAdvOpen=!state.detailPeriodAdvOpen;renderApp()">
          <div class="adv-head-left">
            <div class="adv-title">🔍 더 자세히 찾기 ${has?'<span class="adv-active-badge">조건 적용 중</span>':''}</div>
            <div class="adv-desc">${has?'총매출 범위로 좁혀서 보고 있어요':`총매출 범위로 원하는 ${unit}만 골라볼 수 있어요`}</div>
          </div>
          <span class="adv-toggle-btn">${state.detailPeriodAdvOpen?'접기':'펼치기'}<span class="adv-caret">⌄</span></span>
        </div>
        ${state.detailPeriodAdvOpen?`
          <div style="padding:14px 18px 18px;border-top:1px solid var(--line-2);">
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
              <span class="field-label">총매출 범위</span>
              <input class="input" placeholder="최소" value="${state.detailPeriodMinAmt}" oninput="state.detailPeriodMinAmt=this.value" style="width:140px;" />
              <span style="color:var(--ink-3);">~</span>
              <input class="input" placeholder="최대" value="${state.detailPeriodMaxAmt}" oninput="state.detailPeriodMaxAmt=this.value" style="width:140px;" />
              <span style="font-size:13px;color:var(--ink-3);">원</span>
              <button class="btn-primary" onclick="renderApp()" style="padding:8px 16px;">적용</button>
              ${has?`<span class="chip" onclick="state.detailPeriodMinAmt='';state.detailPeriodMaxAmt='';renderApp()">✕ 초기화</span>`:''}
            </div>
          </div>
        `:''}
      </div>`;

          pointHoverRadius:9,
          pointBackgroundColor:'#fff',
          pointBorderColor:'#3182f6',
          pointBorderWidth:3,
          fill:true,
        },
        ...(state.detailCompare ? [{
          label:'전월 동일 시기',
          data:rows.map(r=>Math.round(r.net*0.92)),
          borderColor:'#b0b8c1',
          backgroundColor:'transparent',
          borderDash:[6,6],
          borderWidth:2,
          tension:.35,
          pointRadius:4,
          pointHoverRadius:6,
          pointBackgroundColor:'#fff',
          pointBorderColor:'#b0b8c1',
          pointBorderWidth:2,
          fill:false,
        }] : [])
      ]
    },
    options:{
      maintainAspectRatio:false,
      layout:{padding:{top:36, right:18, bottom:6, left:6}},
      interaction:{mode:'index', intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{font:{size:13,weight:'600'},color:'#4e5968',boxWidth:14,padding:14,usePointStyle:true,pointStyle:'circle'}},
        tooltip:{
          backgroundColor:'#191f28',
          titleFont:{size:13,weight:'700'},
          bodyFont:{size:13},
          padding:12,
          cornerRadius:8,
          displayColors:true,
          callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y)}원`}
        }
      },
      scales:{
        y:{
          beginAtZero:true,
          grid:{color:'#eceff2',lineWidth:1,drawTicks:false},
          border:{display:false},
          ticks:{
            font:{size:13,weight:'600',family:'Pretendard'},
            color:'#4e5968',
            padding:12,
            maxTicksLimit:5,
            callback:v=>fmt(Math.round(v/10000))+'만'
          }
        },
        x:{
          grid:{display:false},
          border:{color:'#e5e8eb',width:1},
          ticks:{
            font:{size:13,weight:'600',family:'Pretendard'},
            color:'#4e5968',
            padding:8
          }
        }
      }
    },
    plugins:[{
      id:'valueLabels',
      afterDatasetsDraw(chart){
        if (!showValueLabels) return;
        const {ctx} = chart;
        const dataset = chart.data.datasets[0];
        const meta = chart.getDatasetMeta(0);
        if (meta.hidden) return;
        ctx.save();
        ctx.font = '800 12px Pretendard, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        meta.data.forEach((point, idx) => {
          const value = dataset.data[idx];
          const text = fmt(Math.round(value/10000)) + '만 원';
          const padX = 9, padY = 5;
          const tw = ctx.measureText(text).width;
          const w = tw + padX*2;
          const h = 22;
          const x = point.x - w/2;
          const y = Math.max(4, point.y - 14 - h);
          // 칩 배경 (파란)
          ctx.fillStyle = '#3182f6';
          if (ctx.roundRect) {
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 6);
            ctx.fill();
          } else {
            ctx.fillRect(x, y, w, h);
          }
          // 작은 꼬리
          ctx.beginPath();
          ctx.moveTo(point.x - 5, y + h);
          ctx.lineTo(point.x + 5, y + h);
          ctx.lineTo(point.x, y + h + 5);
          ctx.closePath();
          ctx.fill();
          // 텍스트
          ctx.fillStyle = '#fff';
          ctx.fillText(text, point.x, y + h/2);
        });
        ctx.restore();
      }
    }]
  });
}

                <td class="num">${r.cnt?fmt(r.avgPrice):'−'}</td>
              </tr>
            `;
          }).join('')}
          <tr class="total">
            <td>합계</td>
            <td class="num">${fmt(Math.round(sum(HOUR,'amt')/5500))}</td>
            <td class="num">${fmt(sum(HOUR,'amt'))}</td>

          </tr>

  `;
  drawHourChart('ch-detail-hour');
}

/* ====================== 주문 내역 ====================== */
function renderOrders(main){
  // 필터링
  let rows = ORDERS;

  // 기간 필터 (오늘/어제/이번 주/이번 달/전체/사용자 지정)
  if (state.orderDateFilter==='today')      rows = rows.filter(o=>o.date===TODAY_DATE);
  else if (state.orderDateFilter==='yesterday') rows = rows.filter(o=>o.date==='2026-05-14');
  else if (state.orderDateFilter==='week')  rows = rows.filter(o=>o.date>='2026-05-09' && o.date<='2026-05-15');
  else if (state.orderDateFilter==='month') rows = rows.filter(o=>o.date.startsWith('2026-05'));
  else if (state.orderDateFilter==='custom') rows = rows.filter(o=>o.date>=state.customStart && o.date<=state.customEnd);
  // 'all' 인 경우 1년 초과 거래까지 모두 노출

  // 상태 필터
  if (state.orderStatusFilter==='cancel-all') rows = rows.filter(o=>o.status==='전체취소');
  else if (state.orderStatusFilter!=='all')   rows = rows.filter(o=>o.status===state.orderStatusFilter);

  // 채널 필터 (매장/포장/배달)
  if (state.orderChannelFilter!=='all') rows = rows.filter(o=>o.ch===state.orderChannelFilter);

  // 결제수단 필터 (1depth 기준 매칭 — 카드/카카오페이/네이버페이/토스페이/현금)
  if (state.orderPayFilter!=='all') rows = rows.filter(o=>payMain(o)===state.orderPayFilter);

  // 정산상태 필터

  // 메뉴 검색 — 요약 라벨(o.menu)뿐 아니라 상세 items.name까지 매칭
  if (state.orderMenuSearch){
    const q = state.orderMenuSearch.toLowerCase();
    rows = rows.filter(o=>{
      if ((o.menu||'').toLowerCase().includes(q)) return true;
      return (o.items||[]).some(it=>(it.name||'').toLowerCase().includes(q));
    });
  }

  // 주문번호 / 결제번호 / 승인번호 검색
  if (state.orderSearch){
    const q = state.orderSearch.toLowerCase();
    rows = rows.filter(o=>(o.id+' '+(o.tid||'')+' '+makeApproval(o)).toLowerCase().includes(q));
  }

  // 🔒 카드번호 검색은 결제일로부터 1년 이내만 적용 — 그 이상은 사전 차단
  if (state.orderCardValue){
    const v = state.orderCardValue;
    rows = rows.filter(o=>{
      if (!o.card) return false;
      if (!isWithinYear(o.date)) return false; // 보안 정책 차단
      if (state.orderCardMode==='last4') return o.card.endsWith(v);
      return o.card.startsWith(v);
    });
  }

  // 금액 범위
  if (state.orderAmountMin) rows = rows.filter(o=>o.amt >= Number(state.orderAmountMin));
  if (state.orderAmountMax) rows = rows.filter(o=>o.amt <= Number(state.orderAmountMax));

// 회차 상세 페이지로 이동 (회차 ID 컨텍스트 함께 전달)
function openStlDetail(stlId){
  state.stlDetailId = stlId;
  state.section = 'stl-detail';
  renderApp();
}
// 달력 일자 클릭 → 정산 회차 상세 페이지로 바로 이동 (중간 정산내역 조회 단계 생략)
// 해당 일자에 정산 회차가 없으면(주말·공휴일) 가장 가까운 회차로 진입
function selectStlDate(iso){
  state.calendarSelectedDate = iso;
  const direct = SETTLEMENTS.find(s => s.settleISO === iso);
  if (direct) { openStlDetail(direct.id); return; }
  // fallback: 같은 일자 승인 회차 또는 가장 가까운 정산일 회차
  const byApproval = SETTLEMENTS.find(s => s.approvalDays.some(d => {
    const [m,dd] = d.date.split('/').map(Number);
    return `2026-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}` === iso;
  }));
  if (byApproval) { openStlDetail(byApproval.id); return; }
  const target = new Date(iso).getTime();
  const nearest = SETTLEMENTS.slice().sort((a,b) => Math.abs(new Date(a.settleISO)-target) - Math.abs(new Date(b.settleISO)-target))[0];
  if (nearest) openStlDetail(nearest.id);
}

function renderStlCalendar(main){
  // 데이터 인덱스 (정산일 기준)
  const byDate = {};
  SETTLEMENTS.forEach(s => { byDate[s.settleISO] = s; });

  // 달력 셀 계산 (2026년 5월)
  const year = 2026, month = 5;
  const firstWeekday = new Date(year, month-1, 1).getDay(); // 0=일
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const selected = state.calendarSelectedDate;
  const sel = byDate[selected];

  main.innerHTML = `

      <div>
        <h2>정산 달력</h2>

          <div style="font-size:22px;font-weight:800;letter-spacing:-.02em;">${year}년 ${month}월</div>
          <span class="stl-cal-arr disabled" title="아직 오지 않은 달은 볼 수 없어요">▶</span>
        </div>
        <div style="display:flex;gap:16px;align-items:center;font-size:12px;color:var(--ink-2);">
          <span><span class="cal-legend done"></span> 입금 완료</span>
          <span><span class="cal-legend pending"></span> 곧 들어와요</span>
        </div>
      </div>
    </div>

    <div class="panel" style="padding:0;margin-bottom:14px;overflow:hidden;">
      <div class="cal-week">
        ${['일','월','화','수','목','금','토'].map((w,i)=>`<div class="cal-wkhead ${i===0?'sun':i===6?'sat':''}">${w}</div>`).join('')}
      </div>
      <div class="cal-grid">
        ${cells.map(d => {
          if (d === null) return `<div class="cal-cell off"></div>`;
          const iso = `2026-05-${String(d).padStart(2,'0')}`;
          const stl = byDate[iso];
          const isToday = iso === '2026-05-15';
          const isSelected = iso === selected;
          let inner = `<div class="cal-day ${isToday?'today':''}">${d}</div>`;
          if (stl) {
            inner += `<div class="cal-amt ${stl.statusPill}">${fmt(stl.totalSettle)}원</div>`;
            inner += `<div><span class="cal-tag ${stl.statusPill}">${stl.status==='정산완료'?'입금 완료':'곧 들어와요'}</span></div>`;
            inner += `<div class="cal-sub">결제일 ${stl.approvalDate}(${stl.approvalDow})</div>`;
          }
          return `<div class="cal-cell ${isSelected?'selected':''} ${stl?'has-data':''}" ${stl?`onclick="selectStlDate('${iso}')"`:''}>${inner}</div>`;
        }).join('')}
      </div>
    </div>

    <div class="info-card" style="text-align:center;padding:22px;">
      💡 금액이 적힌 날짜를 누르면, 그날 받은 정산을 자세히 볼 수 있어요.
    </div>
  `;
}

/* ====================== 정산내역 조회 ====================== */
function setStlListQuick(k){
  state.stlListQuickRange = k;
  state.stlListSpecificDate = '';
  if (k !== 'period') { state.stlListPeriodStart = ''; state.stlListPeriodEnd = ''; }
  renderApp();
}
// 표 헤더 클릭 정렬 setter
const setOrderSort = makeSortSetter('orderSort');
const setStlListSort = makeSortSetter('stlListSort');
const setDetailMenuSort = makeSortSetter('detailMenuSort');
const setDetailCategorySort = makeSortSetter('detailCategorySort');
const setDetailMethodSort = makeSortSetter('detailMethodSort');
const setDetailHourSort = makeSortSetter('detailHourSort');
const setDetailPeriodSort = makeSortSetter('detailPeriodSort');
function setStlListBasis(k){ state.stlListDateBasis = k; renderApp(); }
function setStlListStatus(k){ state.stlListStatus = k; renderApp(); }
function setStlListCoupon(k){ state.stlListCoupon = k; renderApp(); }
function setStlListDow(k){ state.stlListDow = k; renderApp(); }
function applyStlSpecificDate(){
  const v = document.getElementById('stl-specific-date').value;
  state.stlListSpecificDate = v;
  state.stlListQuickRange = v ? 'specific' : 'today';
  renderApp();
}
function toggleStlAdvanced(){ state.stlListAdvancedOpen = !state.stlListAdvancedOpen; renderApp(); }
function resetStlListFilters(){
  state.stlListDateBasis = 'approval';
  state.stlListQuickRange = 'today';
  state.stlListStatus = 'all';
  state.stlListCoupon = 'all';
  state.stlListSpecificDate = '';
  state.stlListPeriodStart = '';
  state.stlListPeriodEnd = '';
  state.stlListOrdSearch = '';
  state.stlListDow = 'all';
  state.stlListAmtMin = '';
  state.stlListAmtMax = '';
  state.stlListSettleMin = '';
  state.stlListSettleMax = '';
  renderApp();
}

function renderStlList(main){
  // 데이터 소스: DAY(영업일별) 기반 — 정산 달력은 일자별 묶음, 여기선 일자별 평면 리스트
  // 각 일자에 SETTLEMENTS에서 회차 정보를 매핑 (정산일/상태/회차ID 등)
  const DOW_ARR = ['일','월','화','수','목','금','토'];
  const dailyList = DAY.map(d => {
    const [m, dd] = d.d.split('/').map(Number);
    const iso = `2026-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const stl = findSettlementByOrderDate(iso);
    const usedCoupon = stl?.usedCoupon || false;
    const couponTable = usedCoupon ? Math.round(d.gross * 0.012) : 0;
    const couponBiz   = usedCoupon ? Math.round(d.gross * 0.005) : 0;
    const feeBase = Math.round((d.gross - d.ref) * AVG_FEE_RATE);
    const feeVat  = Math.round(feeBase * 0.1);
    const feeTotal = feeBase + feeVat;
    const txSettle = d.gross - d.ref - feeTotal - couponBiz;
    const totalSettle = txSettle + couponTable;
    return {
      approvalDate: d.d,
      approvalDow: d.w,
      approvalISO: iso,
      settleDate: stl?.settleDate || '−',
      settleDow:  stl?.settleDow  || '',
      settleISO:  stl?.settleISO  || '',
      cnt: d.ocnt,
      grossAmt: d.gross,
      refundAmt: d.ref,
      couponBizAmt: couponBiz,
      couponTableAmt: couponTable,
      couponDiscount: couponBiz + couponTable,
      feeBase, feeVat, feeTotal,
      txSettle,
      totalSettle,
      usedCoupon,
      status: stl?.status || '정산대기',
      statusPill: stl?.statusPill || 'pending',
      settlementId: stl?.id || '',
    };
  });

  const today = new Date(2026, 4, 15);
  const basisKey = state.stlListDateBasis === 'approval' ? 'approvalISO' : 'settleISO';
  let rows;

  if (state.stlListOrdSearch) {
    // 주문/승인번호 검색은 기간 필터를 우회
    rows = dailyList.slice();
  } else if (state.stlListQuickRange === 'period' && state.stlListPeriodStart && state.stlListPeriodEnd) {
    rows = dailyList.filter(r => r[basisKey] >= state.stlListPeriodStart && r[basisKey] <= state.stlListPeriodEnd);
  } else if (state.stlListSpecificDate) {
    rows = dailyList.filter(r => r[basisKey] === state.stlListSpecificDate);
  } else if (state.stlListQuickRange === 'all') {
    rows = dailyList.slice();
  } else if (state.stlListQuickRange === 'today') {
    rows = dailyList.filter(r => r.approvalISO === TODAY_DATE);
  } else if (state.stlListQuickRange === 'thismonth') {
    rows = dailyList.filter(r => r.approvalISO.startsWith('2026-05'));
  } else {
    const rangeDays = { '1w':7, '1m':31, '3m':93 }[state.stlListQuickRange] || 31;
    const from = new Date(today); from.setDate(today.getDate() - rangeDays + 1);
    rows = dailyList.filter(r => {
      const d = new Date(r[basisKey] || r.approvalISO);
      return d >= from && d <= today;
    });
  }

  if (state.stlListStatus !== 'all') rows = rows.filter(r => r.status === state.stlListStatus);
  if (state.stlListCoupon === 'used') rows = rows.filter(r => r.usedCoupon);
  if (state.stlListCoupon === 'none') rows = rows.filter(r => !r.usedCoupon);
  if (state.stlListOrdSearch) {
    // 주문번호 또는 승인번호로 매칭되는 주문의 결제 일자만 남기기
    const q = state.stlListOrdSearch.replace(/[#\s-]/g, '').toLowerCase();
    const matchedDates = new Set();
    ORDERS.forEach(o => {
      if (!o.date) return;
      const orderIdNorm = o.id.replace(/[#\s-]/g, '').toLowerCase();
      const approvalNorm = makeApproval(o).replace(/[\s-]/g, '');
      if (orderIdNorm.includes(q) || approvalNorm.includes(q)) matchedDates.add(o.date);
    });
    rows = rows.filter(r => matchedDates.has(r.approvalISO));
  }
  if (state.stlListDow !== 'all') rows = rows.filter(r => r.approvalDow === state.stlListDow);
  if (state.stlListAmtMin) rows = rows.filter(r => r.grossAmt >= Number(state.stlListAmtMin));
  if (state.stlListAmtMax) rows = rows.filter(r => r.grossAmt <= Number(state.stlListAmtMax));
  if (state.stlListSettleMin) rows = rows.filter(r => r.totalSettle >= Number(state.stlListSettleMin));
  if (state.stlListSettleMax) rows = rows.filter(r => r.totalSettle <= Number(state.stlListSettleMax));

  // 정렬
  rows = applySort(rows, state.stlListSort, {
    approvalISO: r => r.approvalISO,
    settleISO: r => r.settleISO,
    cnt: r => r.cnt,
    grossAmt: r => r.grossAmt,
    couponDiscount: r => r.couponDiscount,
    feeTotal: r => r.feeTotal,
    totalSettle: r => r.totalSettle,
    status: r => r.status,
  });

  // 집계 (전체 dailyList 기준 카운트)
  const cntAll = dailyList.length;
  const cntDone = dailyList.filter(r=>r.status==='정산완료').length;
  const cntPending = dailyList.filter(r=>r.status==='정산대기').length;
  const totSettle = rows.reduce((a,r)=>a+r.totalSettle, 0);
  const totGross = rows.reduce((a,r)=>a+r.grossAmt, 0);

  const advFilters = [
    state.stlListOrdSearch && '주문/승인번호',
    state.stlListDow !== 'all' && '요일',
    (state.stlListAmtMin || state.stlListAmtMax) && '거래금액',
    (state.stlListSettleMin || state.stlListSettleMax) && '정산금액',
  ].filter(Boolean);
  const hasAdv = advFilters.length > 0;

  const rangeLabel = state.stlListQuickRange==='period' && state.stlListPeriodStart && state.stlListPeriodEnd
    ? `${state.stlListPeriodStart.slice(5).replace('-','/')} ~ ${state.stlListPeriodEnd.slice(5).replace('-','/')}`
    : state.stlListSpecificDate
    ? `${state.stlListSpecificDate.slice(5).replace('-','/')}(${dailyList.find(r=>r[basisKey]===state.stlListSpecificDate)?.[state.stlListDateBasis==='approval'?'approvalDow':'settleDow'] || ''})`
    : state.stlListQuickRange==='today'      ? `오늘 (${TODAY_DATE.slice(5).replace('-','/')})`
    : state.stlListQuickRange==='1w'         ? '최근 1주일'
    : state.stlListQuickRange==='1m'         ? '최근 1개월'
    : state.stlListQuickRange==='thismonth'  ? '이번 달 (5월)'
    : state.stlListQuickRange==='3m'         ? '최근 3개월'
    :                                          '전체 기간';

  const subInfo = state.stlListSpecificDate
    ? `<span style="color:var(--blue);font-weight:700;">📅 ${rangeLabel}</span> · ${state.stlListDateBasis==='approval'?'결제일':'정산일'} 기준 · <b style="color:var(--ink);">${rows.length}일 분량</b> · 받으실 금액 ${fmt(totSettle)}원`
    : `${rangeLabel} · ${state.stlListDateBasis==='approval'?'결제일':'정산일'} 기준 · <b style="color:var(--ink);">${rows.length}일 분량</b> · 결제 ${fmt(totGross)}원 · 받으실 금액 ${fmt(totSettle)}원`;

  main.innerHTML = `
    <div class="crumb">정산관리 › 정산 내역</div>
    <div class="toolbar">
      <div>
        <h2>정산 내역</h2>
        <div class="page-sub">${subInfo}</div>
      </div>
      <div class="left">
        <button class="btn-ghost" onclick="setSection('stl-calendar')">🗓️ 정산 달력으로</button>
        <button class="btn-primary" onclick='openExport(${rows.length}, "정산 내역", "${rangeLabel} · ${state.stlListDateBasis==='approval'?'결제일':'정산일'} 기준")'>📤 엑셀로 받기</button>
      </div>
    </div>

    <!-- 1차 필터: 기간 + 정산 상태 + 쿠폰 + 직접 일자/기간 -->
    <div class="search-wrap">
      <div class="row">
        <span class="field-label">날짜 기준</span>
        <div class="seg sm">
          <div class="b ${state.stlListDateBasis==='settle'?'on':''}" onclick="setStlListBasis('settle')">정산일</div>
          <div class="b ${state.stlListDateBasis==='approval'?'on':''}" onclick="setStlListBasis('approval')">결제일</div>
        </div>
        <span class="chip ${state.stlListQuickRange==='today' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('today')">오늘</span>
        <span class="chip ${state.stlListQuickRange==='1w' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('1w')">1주일</span>
        <span class="chip ${state.stlListQuickRange==='1m' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('1m')">1개월</span>
        <span class="chip ${state.stlListQuickRange==='thismonth' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('thismonth')">이번 달</span>
        <span class="chip ${state.stlListQuickRange==='3m' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('3m')">3개월</span>
        <span class="chip ${state.stlListQuickRange==='all' && !state.stlListSpecificDate?'on':''}" onclick="setStlListQuick('all')">전체</span>
      </div>
      <div class="row">
        <span class="field-label" style="color:var(--ink-3);">직접 선택</span>
        <span class="chip ${state.stlListQuickRange==='period'?'on':''}" onclick="state.stlListQuickRange='period';state.stlListSpecificDate='';if(!state.stlListPeriodStart){state.stlListPeriodStart='2026-05-01';state.stlListPeriodEnd='2026-05-15';}renderApp()">📅 기간으로</span>
        ${state.stlListQuickRange==='period' ? `
          <input class="input" type="date" value="${state.stlListPeriodStart}" max="${TODAY_DATE}" style="width:160px;" oninput="state.stlListPeriodStart=this.value;renderApp()" />
          <span style="color:var(--ink-3);">~</span>
          <input class="input" type="date" value="${state.stlListPeriodEnd}" max="${TODAY_DATE}" style="width:160px;" oninput="state.stlListPeriodEnd=this.value;renderApp()" />
          <span class="chip" onclick="state.stlListQuickRange='today';state.stlListPeriodStart='';state.stlListPeriodEnd='';renderApp()">✕ 해제</span>
        ` : ''}
        <span style="color:var(--ink-4);font-size:12px;margin:0 2px;">또는</span>
        <span class="chip ${state.stlListSpecificDate?'on':''}" onclick="if(!state.stlListSpecificDate){state.stlListSpecificDate=TODAY_DATE;state.stlListQuickRange='specific';}renderApp()">📅 하루로</span>
        ${state.stlListSpecificDate?`
          <input class="input" type="date" id="stl-specific-date" value="${state.stlListSpecificDate}" max="${TODAY_DATE}" style="width:160px;" onchange="applyStlSpecificDate()" />
          <span class="chip" onclick="state.stlListSpecificDate='';state.stlListQuickRange='today';renderApp()">✕ 해제</span>
        `:''}
      </div>
      <div class="row">
        <span class="field-label">상태</span>
        <span class="chip ${state.stlListStatus==='all'?'on':''}" onclick="setStlListStatus('all')">전체 (${cntAll})</span>
        <span class="chip ${state.stlListStatus==='정산대기'?'on':''}" onclick="setStlListStatus('정산대기')">곧 들어와요 (${cntPending})</span>
        <span class="chip ${state.stlListStatus==='정산완료'?'on':''}" onclick="setStlListStatus('정산완료')">입금 완료 (${cntDone})</span>
        <span style="color:var(--line);margin:0 4px;">|</span>
        <span class="field-label">쿠폰</span>
        <span class="chip ${state.stlListCoupon==='all'?'on':''}" onclick="setStlListCoupon('all')">전체</span>
        <span class="chip ${state.stlListCoupon==='used'?'on':''}" onclick="setStlListCoupon('used')">사용함</span>
        <span class="chip ${state.stlListCoupon==='none'?'on':''}" onclick="setStlListCoupon('none')">안 썼어요</span>
        <span style="color:var(--line);margin:0 4px;">|</span>
        <button class="btn-ghost" onclick="resetStlListFilters()" style="padding:7px 14px;font-size:12px;">처음으로 돌리기</button>
      </div>
    </div>

    <!-- 2차 필터: 세부 검색 (접기/펴기) -->
    <div class="panel adv-search-panel ${state.stlListAdvancedOpen?'open':''}" style="padding:0;margin-bottom:14px;">
      <div class="adv-head" onclick="toggleStlAdvanced()">
        <div class="adv-head-left">

            🔍 더 자세히 찾기
            ${hasAdv ? `<span class="adv-active-badge">${advFilters.length}개 조건 적용 중</span>` : ''}
          </div>

              ? `${advFilters.join(' · ')}(으)로 좁혀서 보고 있어요`

          </div>
        </div>
        <span class="adv-toggle-btn">
          ${state.stlListAdvancedOpen?'접기':'펼치기'}
          <span class="adv-caret">⌄</span>
        </span>
      </div>
      ${state.stlListAdvancedOpen ? `
        <div style="padding:0 18px 18px;border-top:1px solid var(--line-2);">
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px;">
            <span class="field-label">영업일 요일</span>
            ${['all','월','화','수','목','금','토','일'].map(w=>`<span class="chip ${state.stlListDow===w?'on':''}" onclick="setStlListDow('${w}')">${w==='all'?'전체':w+'요일'}</span>`).join('')}
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;">
            <span class="field-label">거래 금액</span>
            <input class="input" placeholder="최소" value="${state.stlListAmtMin}" oninput="state.stlListAmtMin=this.value" style="width:140px;" />
            <span style="color:var(--ink-3);">~</span>
            <input class="input" placeholder="최대" value="${state.stlListAmtMax}" oninput="state.stlListAmtMax=this.value" style="width:140px;" />
            <span style="font-size:13px;color:var(--ink-3);">원</span>
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;">
            <span class="field-label">정산 금액</span>
            <input class="input" placeholder="최소" value="${state.stlListSettleMin}" oninput="state.stlListSettleMin=this.value" style="width:140px;" />
            <span style="color:var(--ink-3);">~</span>
            <input class="input" placeholder="최대" value="${state.stlListSettleMax}" oninput="state.stlListSettleMax=this.value" style="width:140px;" />
            <span style="font-size:13px;color:var(--ink-3);">원</span>
            <button class="btn-primary" onclick="renderApp()" style="padding:8px 16px;">적용</button>

          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;">

      `:''}
    </div>

    <!-- 결과 그리드 -->
    <div class="panel tight">

              <td>${r.settleDate}${r.settleDow?`(${r.settleDow})`:''}</td>
              <td class="num">${fmt(r.cnt)}</td>
              <td class="num">${fmt(r.grossAmt)}</td>
              <td class="num">${r.usedCoupon?`<b style="color:#a25e00;">−${fmt(r.couponDiscount)}</b>`:'−'}</td>
              <td class="num">−${fmt(r.feeTotal)}</td>
              <td class="num"><b style="color:${r.status==='정산완료'?'var(--blue)':'#a25e00'};">${fmt(r.totalSettle)}원</b></td>
              <td><span class="pill ${r.statusPill}">${r.status==='정산대기'?'곧 들어와요':'입금 완료'}</span></td>
              <td style="color:var(--blue);font-weight:600;">${r.settlementId?'자세히 ›':'−'}</td>

      <div class="table-footer">

          <span style="font-size:11px;color:var(--ink-3);margin-left:8px;">💡 화면에만 적용돼요 · 엑셀은 조회된 ${fmt(rows.length)}건 전체</span>

        ${paginationStatic(1, 1)}
      </div>
    </div>

/* ====================== 정산 회차 상세 ====================== */
function renderStlDetail(main){

  const stl = SETTLEMENTS.find(s => s.id === state.stlDetailId)
           || SETTLEMENTS.slice().reverse().find(s => s.status === '정산대기')
           || SETTLEMENTS[SETTLEMENTS.length - 1];

  const pageCnt = Math.max(1, Math.ceil(stl.cnt / 50));
  const statusLabel = stl.status === '정산완료' ? '입금 완료' : '곧 들어와요';
  const settleColor = stl.status === '정산완료' ? 'var(--blue)' : '#c97a00';
  // 자정 이후 새벽 결제 행을 위한 영업일 마지막 날 / 다음날 라벨
  const lastApprovalDay = stl.approvalDays[stl.approvalDays.length - 1];
  const lastApprovalLabel = lastApprovalDay.date;
  const lastApprovalDow = lastApprovalDay.dow;
  const _lastApprovalNext = (() => {
    const [m, d] = lastApprovalDay.date.split('/').map(Number);
    const dt = new Date(2026, m - 1, d + 1);
    const DOW_ARR = ['일','월','화','수','목','금','토'];
    return { label: `${dt.getMonth()+1}/${dt.getDate()}`, dow: DOW_ARR[dt.getDay()] };
  })();
  const nextDayLabel = _lastApprovalNext.label;
  const nextDayDow = _lastApprovalNext.dow;

  main.innerHTML = `
    <div class="crumb">
      <span style="cursor:pointer;color:var(--blue);" onclick="setSection('stl-calendar')">정산관리 › 정산 달력</span>
      <span style="color:var(--ink-4);margin:0 6px;">·</span>
      <span style="cursor:pointer;color:var(--blue);" onclick="setSection('stl-list')">정산 내역</span>
      › <b style="color:var(--ink);">${stl.id}</b>
    </div>

    <div class="toolbar">
      <div>
        <div class="stl-detail-head" style="margin-bottom:8px;">
          <div class="stl-detail-date">${stl.settleDate}(${stl.settleDow})</div>
          <div class="stl-detail-status ${stl.statusPill}">${statusLabel}</div>
        </div>
        <div class="stl-detail-meta">${stl.id} · 결제일 ${stl.approvalDate}(${stl.approvalDow}) · 신한 ****1234</div>
      </div>
      <div class="left">
        <button class="btn-ghost" onclick="setSection('stl-calendar')">🗓️ 정산 달력으로</button>
        <button class="btn-primary" onclick='openExport(${stl.cnt}, "결제 내역", "영업일 ${stl.approvalDate}(${stl.approvalDow}) · 정산일 ${stl.settleDate}(${stl.settleDow})")'>📤 엑셀로 받기</button>
      </div>
    </div>

    <!-- 핵심 정산 카드 (단일) -->
    <div class="panel" style="padding:24px 28px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;">
        <div>
          <div style="font-size:13px;color:var(--ink-3);font-weight:700;margin-bottom:6px;">${stl.status==='정산완료'?'입금된 금액':'받으실 금액'}</div>
          <div style="font-size:36px;font-weight:800;letter-spacing:-.02em;color:${settleColor};font-variant-numeric:tabular-nums;line-height:1.1;">${fmt(stl.totalSettle)}원</div>
          <div style="font-size:13px;color:var(--ink-2);margin-top:8px;">
            결제 ${fmt(stl.grossAmt)}원에서 수수료 ${fmt(stl.feeTotal)}원 빼고${stl.usedCoupon?`, 쿠폰 정산 ${fmt(stl.couponSettle)}원 더해서 드려요`:' 드려요'}

function paginationStatic(cur, total){
  if (total <= 1) return `<div class="pagination"><span class="pg dis">‹ 이전</span><span class="pg on">1</span><span class="pg dis">다음 ›</span></div>`;
  let pages = [];
  for (let i=1;i<=Math.min(total,5);i++) pages.push(i);
  return `
    <div class="pagination">
      <span class="pg ${cur===1?'dis':''}">‹ 이전</span>
      ${pages.map(p=>`<span class="pg ${p===cur?'on':''}">${p}</span>`).join('')}
      ${total>5?`<span class="ell">...</span><span class="pg">${total}</span>`:''}
      <span class="pg">다음 ›</span>
    </div>
  `;
}

    </div>

function onDateChange(){
  const s = document.getElementById('dp-start').value;
  const e = document.getElementById('dp-end').value;
  state.customStart = s;
  state.customEnd = e;
  document.getElementById('dp-preview').innerHTML = getRangePreview(s, e);
}
function getRangePreview(s, e){
  if (!s || !e) return '시작일과 종료일을 선택해주세요';
  if (s > e) return '<span style="color:var(--red);">종료일이 시작일보다 빠를 수 없어요</span>';
  if (e > TODAY_DATE) return '<span style="color:var(--red);">아직 오지 않은 날짜는 선택할 수 없어요</span>';
  const start = new Date(s);
  const end = new Date(e);
  const diff = Math.round((end - start) / (1000*60*60*24)) + 1;
  const sLabel = `${start.getMonth()+1}월 ${start.getDate()}일(${DOW[start.getDay()]})`;
  const eLabel = `${end.getMonth()+1}월 ${end.getDate()}일(${DOW[end.getDay()]})`;
  return `${sLabel} ~ ${eLabel} <span style="color:var(--ink-3);font-weight:500;font-size:12px;margin-left:4px;">· ${diff}일간</span>`;
}
function setQuickRange(period){
  const today = new Date(TODAY_DATE);
  let start, end;
  if (typeof period === 'number'){
    end = new Date(today);
    start = new Date(today);
    start.setDate(today.getDate() - period + 1);
  } else if (period==='today'){
    start = new Date(today); end = new Date(today);
  } else if (period==='yesterday'){
    start = new Date(today); start.setDate(today.getDate() - 1);
    end = new Date(start);
  } else if (period==='thisMonth'){
    start = new Date(today.getFullYear(), today.getMonth(), 1);
    end = new Date(today);
  } else if (period==='lastMonth'){
    start = new Date(today.getFullYear(), today.getMonth()-1, 1);
    end = new Date(today.getFullYear(), today.getMonth(), 0);
  } else if (period==='thisQuarter'){
    const q = Math.floor(today.getMonth()/3);
    start = new Date(today.getFullYear(), q*3, 1);
    end = new Date(today);
  } else if (period==='lastQuarter'){
    const q = Math.floor(today.getMonth()/3);
    start = new Date(today.getFullYear(), (q-1)*3, 1);
    end = new Date(today.getFullYear(), q*3, 0);
  }
  state.customStart = start.toISOString().slice(0,10);
  state.customEnd = end.toISOString().slice(0,10);
  renderDatePicker();
}
function applyDateRange(){
  if (state.customStart > state.customEnd){
    alert('종료일이 시작일보다 빠를 수 없어요'); return;
  }
  if (state.customEnd > TODAY_DATE){
    alert('아직 오지 않은 날짜는 선택할 수 없어요'); return;
  }
  if (state.customTarget === 'overview') state.overviewPeriod = 'custom';
  if (state.customTarget === 'detail')   state.detailGroup = 'custom';
  if (state.customTarget === 'orders')   state.orderDateFilter = 'custom';
  closeModal();
  renderApp();
}

      <span style="font-size:12px;color:var(--blue);font-weight:700;padding:6px 12px;border-radius:6px;background:#fff;">받는 방법 변경</span>
    </div>

    <div style="margin-bottom:10px;font-size:14px;font-weight:700;color:var(--ink);">이 메일 주소로 발송할까요?</div>
    <div style="display:flex;gap:8px;align-items:center;">
      ${state.exportEmailEditing
        ? `<input class="input" id="export-email-input" value="${state.exportEmail}" placeholder="example@email.com" style="flex:1;font-size:14px;font-variant-numeric:tabular-nums;" oninput="state.exportEmail=this.value" />
           <button class="btn-primary" onclick='applyEmailEdit(${cnt},${JSON.stringify(src)})' style="padding:10px 18px;">완료</button>`
        : `<div style="flex:1;padding:12px 16px;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;font-size:14px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;">${state.exportEmail}</div>
           <button class="btn-ghost" onclick='startEmailEdit(${cnt},${JSON.stringify(src)})' style="padding:10px 18px;font-weight:700;color:var(--blue);">✏️ 변경</button>`}
    </div>
    <div style="font-size:12px;color:var(--ink-3);margin-top:8px;line-height:1.55;">
      💡 회원가입 시 등록한 이메일이에요. 다른 메일로 받고 싶으시면 <b style="color:var(--ink-2);">변경</b>을 눌러주세요.
    </div>

    <div style="display:flex;gap:8px;margin-top:20px;">
      <button class="btn-ghost" style="flex:1;" onclick="closeModal()">취소</button>
      <button class="btn-primary" style="flex:2;" onclick='confirmEmailSend(${cnt},${JSON.stringify(src)})'>📧 이 메일로 발송</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('on');
  if (state.exportEmailEditing) {
    setTimeout(()=>{
      const el = document.getElementById('export-email-input');
      if (el) { el.focus(); el.select(); }

function startEmailEdit(cnt, src){
  state.exportEmailEditing = true;
  renderEmailStep(cnt, src);
}
function applyEmailEdit(cnt, src){
  const el = document.getElementById('export-email-input');
  if (el) state.exportEmail = (el.value || '').trim() || STORE_EMAIL;
  state.exportEmailEditing = false;
  renderEmailStep(cnt, src);
}
function confirmEmailSend(cnt, src){
  // 편집 중에 바로 발송 누른 경우 input 값을 우선 반영
  if (state.exportEmailEditing) {
    const el = document.getElementById('export-email-input');
    if (el) state.exportEmail = (el.value || '').trim() || STORE_EMAIL;
  }
  closeModal();
  alert(`✅ ${src} ${fmt(cnt)}건 엑셀로 ${state.exportEmail}에 발송 완료`);
}

function closeModal(){
  const m = document.getElementById('modal');
  if (m) m.style.width = '';
  document.getElementById('modal-bg').classList.remove('on');
}

/* 카드 승인번호 생성 (데모용) — 현금/비카드는 '−' */
function makeApproval(o){
  if (o.issuer === '현금') return '−';
  const n = parseInt((o.id||'').replace(/[^0-9]/g,'').slice(-6),10) || 0;
  return String(30000000 + n).padStart(8,'0');
}

/* 매출 상세보기 — 일자(또는 기간) 행 클릭 시 주문 단위 상세 모달 */
function openPeriodDetail(label, dateStr){
  // 데이터 필터 — day/custom 모드: 해당 일자 / week/month: 전체 ORDERS(데모)
  let list;
  if (dateStr) {
    const [m,d] = dateStr.split('/').map(Number);
    const dt = `2026-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    list = ORDERS.filter(o=>o.date===dt && !o._expired);
    if (list.length===0) {
      // 데모 보조: 매칭되는 일자가 없으면 5/15 데이터의 일자만 바꿔 표시
      list = ORDERS.filter(o=>o.date==='2026-05-15').map(o=>({
        ...o,
        date: dt,
        id: o.id.replace('20260515', `2026${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}`),
        ...(o.cancelDate ? { cancelDate: dt } : {})
      }));
    }
  } else {
    list = ORDERS.filter(o=>!o._expired);
  }

  const cancelAllCnt = list.filter(o=>o.status==='전체취소').length;
  const validCnt     = list.length - cancelAllCnt;
  const refundCnt    = cancelAllCnt;
  const totalAmt     = list.reduce((s,o)=>{
    if (o.status==='전체취소') return s;
    return s + o.amt;
  }, 0);
  const fmtCancelDate = d => d ? `${parseInt(d.slice(5,7),10)}/${parseInt(d.slice(8),10)}` : '';

  const modal = document.getElementById('modal');
  modal.style.width = '960px';
  modal.innerHTML = `
    <div class="modal-head">
      <div>
        <h3>📋 ${label} 매출 상세 내역</h3>
        <div class="modal-sub">결제 단위로 주문일시·승인번호·결제수단을 자세히 확인하세요</div>
      </div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <span class="chip">결제완료 <b style="margin-left:4px;color:var(--ink);">${validCnt}건</b></span>
      <span class="chip on">합계 ${fmt(totalAmt)}원</span>
      <span class="chip">전체취소 <b style="margin-left:4px;color:var(--ink);">${cancelAllCnt}건</b></span>
    </div>

    <div style="overflow-x:auto;border:1px solid var(--line);border-radius:10px;">
    <table class="t">
      <thead>
        <tr>
          <th>주문일시</th>
          <th>주문번호</th>
          <th>승인번호</th>
          <th>메뉴</th>
          <th>판매유형</th>
          <th>결제수단</th>
          <th class="num">금액</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody>
        ${list.map(o=>{
          const dateLabel = `${parseInt(o.date.slice(5,7),10)}/${parseInt(o.date.slice(8),10)}`;
          const pillCls = o.status==='완료'?'done':o.status==='전체취소'?'cancel':'partial';
          const isCancelAll = o.status==='전체취소';
          const rowAttr = isCancelAll ? ' style="background:#fff7f7;"' : '';
          const idStyle = isCancelAll
            ? 'color:var(--red);font-weight:700;font-size:12px;text-decoration:line-through;'
            : 'color:var(--ink-2);font-size:12px;';
          const approvalStyle = 'font-variant-numeric:tabular-nums;' + (isCancelAll ? 'color:var(--ink-3);' : '');
          const cancelLabel = isCancelAll
            ? `<div style="margin-top:4px;font-size:11px;font-weight:600;color:var(--red);white-space:nowrap;">↺ ${fmtCancelDate(o.cancelDate)} ${o.cancelTime||'−'} 전체취소 처리</div>`
            : '';
          let amountCell;
          if (isCancelAll) {
            amountCell = `<s style="color:var(--ink-3);">${fmt(o.amt)}</s>`;
          } else {
            amountCell = fmt(o.amt);
          }
          return `
          <tr${rowAttr}>
            <td style="white-space:nowrap;"><div><b>${dateLabel}</b> ${o.time} <span style="font-size:10px;color:var(--ink-3);">주문</span></div>${cancelLabel}</td>
            <td style="${idStyle}" title="${isCancelAll?'전체취소된 원주문번호 — 매출 합계에서 제외':'주문번호'}">${o.id}</td>
            <td style="${approvalStyle}">${makeApproval(o)}</td>
            <td>${o.menu}</td>
            <td><span style="font-size:11px;color:var(--ink-2);">${o.channel}</span></td>
            <td>${payLabel(o)}</td>
            <td class="num">${amountCell}</td>
            <td><span class="pill ${pillCls}">${o.status}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>

    <div style="margin-top:12px;padding:12px 14px;background:var(--bg-2);border-radius:10px;font-size:12px;color:var(--ink-2);line-height:1.65;">
      💡 <b style="color:var(--red);">전체취소</b>는 결제 자체가 무효 처리돼서 <b style="color:var(--ink);">결제완료 집계와 매출 합계에서 빠져요</b>. 주문번호는 원주문 그대로 남고 빨간 취소선으로 표시돼요.
    </div>

    <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--ink-3);">
      ※ 카드번호는 결제일 1년 이내에만 앞 6 + 끝 4가 보이고, 1년 초과 시 전체 마스킹돼요
    </div>

    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn-ghost" style="flex:1;" onclick="closeModal()">닫기</button>
      <button class="btn-primary" style="flex:1;" onclick="closeModal();setSection('orders');">📋 주문 내역 전체 보기</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('on');
}
document.addEventListener('keydown', e=>{ if (e.key==='Escape') closeModal(); });

/* ============================================================
   글로벌 툴팁 (overflow 컨테이너에 잘리지 않도록 body 레벨 portal)
   ============================================================ */
(function initTooltipPortal(){
  const portal = document.createElement('div');
  portal.id = 'tip-portal';
  document.body.appendChild(portal);

  function show(tip){
    const body = tip.querySelector('.body');
    if (!body) return;
    portal.innerHTML = body.innerHTML;
    portal.style.opacity = '0';
    portal.style.left = '0px';
    portal.style.top = '0px';
    portal.classList.remove('up','down');
    // measure
    const r = tip.getBoundingClientRect();
    const pw = portal.offsetWidth;
    const ph = portal.offsetHeight;
    const margin = 8;
    let placeUp = r.top - ph - margin > 8;
    let top, dir;
    if (placeUp){ top = r.top - ph - margin; dir = 'up'; }
    else        { top = r.bottom + margin;    dir = 'down'; }
    let left = r.left + r.width/2 - pw/2;
    left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
    portal.style.left = left + 'px';
    portal.style.top  = top  + 'px';
    portal.classList.add(dir);
    portal.style.opacity = '1';
  }
  function hide(){ portal.style.opacity = '0'; }

  document.addEventListener('mouseover', e=>{
    const tip = e.target.closest && e.target.closest('.tip');
    if (tip) show(tip);
  });
  document.addEventListener('mouseout', e=>{
    const tip = e.target.closest && e.target.closest('.tip');
    if (tip && (!e.relatedTarget || !e.relatedTarget.closest || !e.relatedTarget.closest('.tip'))) hide();
  });
  window.addEventListener('scroll', hide, true);
})();
