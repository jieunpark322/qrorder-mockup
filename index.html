function confirmAddStaffMsg(){
  const body=document.getElementById('sc-msg-input')?.value.trim();
  if(!body){ alert('내용을 입력해 주세요.'); return; }
  const newId=Math.max(0,...STAFF_CALLS.messages.map(m=>m.id))+1;
  STAFF_CALLS.messages.push({ id:newId, body, enabled:true, sort:STAFF_CALLS.messages.length+1 });
  closeModal(); markUnsavedUI(); renderApp();
  showToast(`<span class="ic">✅</span> 직원 호출 메시지를 추가했어요`, 'ok');
}

/* ============================================================
   FAQ — 본문 (renderSupport가 탭 컨테이너 제공)
   ============================================================ */
function renderFAQ(host){
  // 카테고리 자동 추출
  const cats = ['전체', ...Array.from(new Set(FAQS.map(f=>f.cat)))];
  if(!state.faqCat)    state.faqCat = '전체';
  if(!state.faqSearch) state.faqSearch = '';
  if(!state.faqOpen)   state.faqOpen = new Set();

  let rows = FAQS;
  if(state.faqCat !== '전체') rows = rows.filter(f=>f.cat===state.faqCat);
  if(state.faqSearch){
    const q = state.faqSearch.toLowerCase();
    rows = rows.filter(f=>(f.q+' '+f.a).toLowerCase().includes(q));
  }

  host.innerHTML = `
    <!-- 검색 -->
    <div style="margin-bottom:12px;">
      <input class="input" style="width:100%;font-size:14px;padding:14px 16px;" placeholder="🔍 궁금한 키워드로 검색해 보세요 (예: 정산, 옵션, QR)" value="${state.faqSearch}" oninput="state.faqSearch=this.value;renderApp()" />
    </div>

    <!-- 카테고리 칩 -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
      ${cats.map(c=>{
        const cnt = c==='전체' ? FAQS.length : FAQS.filter(f=>f.cat===c).length;
        return `<span class="chip ${state.faqCat===c?'on':''}" onclick="state.faqCat='${c}';renderApp()">${c} <span style="color:${state.faqCat===c?'#cfe4ff':'var(--ink-3)'};font-size:11px;">${cnt}</span></span>`;
      }).join('')}
    </div>

    <!-- 아코디언 목록 -->
    <div class="panel">
      ${rows.length===0 ? `
        <div style="padding:40px 20px;text-align:center;background:var(--bg-2);border-radius:12px;">
          <div style="font-size:36px;margin-bottom:10px;">🔍</div>
          <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;">조건에 맞는 답변이 없어요</div>
          <div style="font-size:12px;color:var(--ink-3);line-height:1.6;">
            다른 키워드로 검색해 보시거나, 아래 버튼을 눌러 직접 문의해 주세요.
          </div>
          <button class="btn-primary" style="margin-top:16px;" onclick="setSection('cs')">📨 서비스 관련 문의 남기기</button>
        </div>
      ` : `
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${rows.map(f=>{
            const isOpen = state.faqOpen.has(f.id);
            return `
              <div style="border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;">
                <div onclick="(()=>{if(state.faqOpen.has(${f.id}))state.faqOpen.delete(${f.id});else state.faqOpen.add(${f.id});renderApp();})()" style="padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;${isOpen?'background:var(--bg-2);':''}">
                  <span class="chip" style="font-size:10px;padding:3px 8px;cursor:default;background:var(--blue-50);color:var(--blue);border-color:var(--blue-100);font-weight:700;">${f.cat}</span>
                  <span style="flex:1;font-size:14px;font-weight:700;color:var(--ink);">Q. ${f.q}</span>
                  <span style="font-size:14px;color:var(--ink-3);transition:transform .2s;${isOpen?'transform:rotate(180deg);':''}">▾</span>
                </div>
                ${isOpen ? `
                  <div style="padding:0 18px 16px 18px;background:var(--bg-2);">
                    <div style="padding-top:12px;border-top:1px dashed var(--line);font-size:13px;color:var(--ink-2);line-height:1.7;white-space:pre-wrap;">
                      <b style="color:var(--blue);">A.</b> ${f.a}
                    </div>
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>

    <!-- 못 찾으셨나요 안내 -->
    <div style="margin-top:14px;padding:18px 22px;background:linear-gradient(135deg,#eaf3ff,#f5f9ff);border:1px solid var(--blue-100);border-radius:12px;display:flex;align-items:center;gap:16px;">
      <span style="font-size:24px;flex-shrink:0;">💁</span>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:800;color:var(--ink);margin-bottom:3px;">더 궁금한 점이 있으신가요?</div>
        <div style="font-size:12px;color:var(--ink-2);line-height:1.55;">소프트먼트 운영팀이 평균 24시간 안에 답변드려요.</div>
      </div>
      <button class="btn-primary" onclick="setSection('cs')">📨 직접 문의 남기기</button>
    </div>
  `;
}

/* ============================================================
   INIT
   ============================================================ */
renderApp();

/* 캡처 진입점: ?cap=<섹션키>[-액션][-id] — description.html / desc/recent 캡처 생성용 (평상시 영향 없음)
   예) ?cap=menu                       → 메뉴판 페이지
       ?cap=menu-edit-1                → 메뉴판 + 메뉴 수정 모달(아메리카노 id=1)
       ?cap=option-bulk                → 옵션 그룹 + 새 옵션 추가 펼침
       ?cap=option-edit-1              → 옵션 그룹 + 옵션 수정 모달(샷 추가 id=1)
       ?cap=schedule-cat-1             → 카테고리 + 판매 시간 모달
       ?cap=export-overview            → 매출 한눈에 보기 + 엑셀 다운로드 모달
*/
(function(){
  var m = /[?&]cap=([\w-]+)/.exec(location.search || '');
  if(!m) return;
  var raw = m[1];
  var parts = raw.split('-');
  var section = parts[0];
  var sub = parts[1] || '';
  var ext = parts[2] || '';
  // 섹션 키 매핑
  var sectionKey = section;
  if (section === 'menu' && (sub === 'edit' || sub === 'list')) sectionKey = 'menu';
  else if (section === 'option' && (sub === 'edit' || sub === 'bulk' || sub === 'list')) sectionKey = 'option';
  else if (section === 'schedule') sectionKey = (sub === 'cat') ? 'category' : (sub === 'menu' ? 'menu' : 'set');
  else if (section === 'export') sectionKey = sub || 'overview';
  function go(){
    try{
      if(typeof setSection==='function') setSection(sectionKey);
      document.querySelectorAll('.grp-items.closed').forEach(function(g){ g.classList.remove('closed'); });
      document.querySelectorAll('.grp .arr:not(.open)').forEach(function(a){ a.classList.add('open'); });
      var dh=document.querySelector('.doc-head'); if(dh) dh.style.display='none';
      document.body.style.padding='0'; document.body.style.margin='0'; document.body.style.background='#fff';
      var pc=document.querySelector('.pc');
      if(pc){ pc.style.margin='0'; pc.style.width='1280px'; pc.style.maxWidth='1280px'; pc.style.borderRadius='0'; pc.style.boxShadow='none'; pc.style.border='none'; }
      document.documentElement.setAttribute('data-cap','ready');
    }catch(e){}
  }
  function openModal(){
    try{
      var id = ext ? Number(ext) : null;
      if (section === 'menu' && sub === 'edit' && id && typeof openMenuEditModal==='function') openMenuEditModal(id);
      else if (section === 'option' && sub === 'edit' && id && typeof editOpt==='function') editOpt(id);
      else if (section === 'option' && sub === 'bulk' && typeof addOptBulkCard==='function') { if(typeof state!=='undefined'){ state.optBulkOpen = true; } addOptBulkCard(); }
      else if (section === 'schedule' && sub && id && typeof openScheduleModal==='function') openScheduleModal(sub === 'cat' ? 'category' : sub, id);
      else if (section === 'export' && typeof openExport==='function') openExport(15, '매출 한눈에 보기', '2026년 5월 15일 (금)');
    }catch(e){}
  }
  go(); setTimeout(go,250); setTimeout(go,700);
  setTimeout(openModal, 800); setTimeout(openModal, 1400);
})();
</script>
