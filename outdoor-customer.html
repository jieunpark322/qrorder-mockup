<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>야외형 QR오더 · 손님 주문 페이지</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Clean White — 뉴트럴 화이트 베이스 + 절제된 퍼시몬 액센트 */
    --persimmon:#5C8CDA; --persimmon-d:#3F6FC9; --mustard:#D9930F; --mulberry:#5C5EDA; --plum:#3A2440;
    --blue:#5C8CDA; --blue-d:#3F6FC9; --blue-50:#ECF2FC;          /* accent = 소프트먼트 키컬러 #5C8CDA */
    /* 소프트먼트 블루 팔레트 */
    --b1:#5C5EDA; --b2:#5C6DDA; --b3:#5C7CDA; --b4:#5C8CDA; --b5:#5C9BDA; --b6:#5CAADA; --b7:#5CB9DA;
    --ink:#1E1E22; --ink2:#5C5C63; --ink3:#8C8C94; --ink4:#BDBDC4;
    --line:#EBEBEE; --line2:#F3F3F5; --bg:#F5F5F6; --card:#FFFFFF;
    --green:#1E8E5F; --red:#DD3B3B; --amber:#D9930F;
    --festA:#5C8CDA; --festB:#5CB9DA;
    --point:#F2503E; --point-50:#FFEDE9;   /* 포인트 컬러 — 할인가·강조 전용(블루의 보색) */
    --display:'Black Han Sans','Pretendard',sans-serif;
    --ui:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    --shadow:0 2px 10px rgba(20,20,25,.05);
    --shadow-lg:0 12px 44px rgba(20,20,25,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:#cfd4da;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:16px;letter-spacing:-.01em;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;}

  /* ── 데모 컨트롤 바 ───────────────────────── */
  .demobar{width:100%;z-index:200;background:#191f28;color:#fff;
    display:flex;align-items:center;gap:7px;justify-content:center;padding:9px 12px;flex-wrap:wrap;font-size:11px;}
  .demobar .lbl{font-weight:800;color:#ffd43b;letter-spacing:.02em;margin-right:2px;}
  .ds-chip{font-size:11px;font-weight:700;color:#ced4da;background:#343a40;border:1px solid #495057;border-radius:20px;padding:6px 12px;cursor:pointer;font-family:inherit;}
  .ds-chip.on{background:#fff;color:#191f28;border-color:#fff;}
  .ds-div{width:1px;height:16px;background:#495057;margin:0 4px;}
  .ds-note{width:100%;text-align:center;color:#868e96;font-size:10.5px;margin-top:1px;}

  .device{width:100%;max-width:440px;background:var(--bg);min-height:calc(100vh - 62px);position:relative;
    box-shadow:0 0 0 1px rgba(0,0,0,.04),0 18px 50px rgba(0,0,0,.22);overflow:clip;}
  @media(min-width:480px){ .device{border-radius:0 0 28px 28px;margin-bottom:22px;} }

  .screen{display:none;animation:fade .28s ease;}
  .screen.on{display:block;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}   /* transform 제거: 플로팅 CTA가 뷰포트 기준 고정되도록 */
  .scroll{padding-bottom:130px;min-height:calc(100vh - 62px);}

  /* ── 공통 헤더 ───────────────────────── */
  .hdr{position:sticky;top:0;z-index:30;background:#fff;display:flex;align-items:center;gap:10px;padding:14px 14px;border-bottom:1px solid var(--line);}
  .hdr .bk{border:none;background:none;font-size:22px;cursor:pointer;color:var(--ink);width:30px;padding:0;font-family:inherit;}
  .hdr .ht{font-size:17px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  /* 시스템 자동 번역: 사용자가 고르는 게 아니라 접속 언어로 자동 적용됨을 알리는 수동 표시 */
  .autotrans{font-size:11.5px;font-weight:700;color:var(--ink3);background:var(--bg);border-radius:20px;padding:5px 11px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .autotrans .adot{width:6px;height:6px;border-radius:50%;background:var(--green);}

  /* ── 스플래시 (전체 화면 이미지) ───────────────────────── */
  .splash-full{position:relative;width:100%;height:calc(100vh - 62px);overflow:hidden;background:#2c1250;background-size:cover;background-position:center;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  @media(min-width:480px){ .splash-full{height:calc(100vh - 90px);border-radius:0 0 28px 28px;} }
  .sp-center{position:relative;z-index:2;color:#fff;padding:0 32px;}
  .sp-emoji{font-size:60px;margin-bottom:16px;animation:pop .6s ease;}
  .sp-title{font-size:23px;font-weight:800;letter-spacing:-.02em;text-shadow:0 2px 10px rgba(0,0,0,.6);}
  .sp-welcome{font-size:20px;font-weight:900;margin-top:10px;text-shadow:0 2px 10px rgba(0,0,0,.6);}
  .splash-load{position:absolute;bottom:46px;left:50%;transform:translateX(-50%);width:30px;height:30px;border:3px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;z-index:2;}
  @keyframes pop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── 메인 배너 (그룹) ───────────────────────── */
  .mbanner{position:relative;overflow:hidden;background:#e9ecef;}
  .mbanner .slides{display:flex;transition:transform .5s ease;}
  /* 배너: 세로 1 : 가로 1 정사각 비율 (실제 스펙은 등록 이미지 비율에 따라 세로 높이 자동 조정) */
  .mb-slide{min-width:100%;aspect-ratio:1/1;background-size:cover;background-position:center;background-color:#2c1250;display:flex;align-items:flex-end;cursor:pointer;}
  .mb-txt{padding:15px 18px;color:#fff;}
  .mb-t{font-size:20px;font-weight:900;letter-spacing:-.02em;text-shadow:0 1px 5px rgba(0,0,0,.55);}
  .mb-s{font-size:13.5px;font-weight:700;opacity:.96;margin-top:3px;text-shadow:0 1px 4px rgba(0,0,0,.55);}
  .mb-dots{position:absolute;bottom:14px;right:14px;display:flex;gap:5px;}
  .mb-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.55);}
  .mb-dot.on{width:16px;border-radius:3px;background:#fff;}

  /* ── 공지문 ───────────────────────── */
  .notice{margin:12px 14px 0;display:flex;gap:10px;align-items:flex-start;border-radius:12px;padding:14px 15px;font-size:14px;line-height:1.6;background:var(--blue-50);border:1px solid #c5d8f5;color:var(--blue-d);}
  .notice .nic{font-size:17px;line-height:1.3;}
  .notice b{color:var(--ink);}
  .notice a{color:var(--blue-d);font-weight:800;text-decoration:underline;}

  /* ── 검색 ───────────────────────── */
  .searchwrap{background:#fff;padding:14px 14px 4px;}
  .searchbar{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;}
  .searchbar .ic{font-size:18px;}
  .searchbar input{flex:1;min-width:0;border:none;background:none;font-size:16px;font-family:inherit;color:var(--ink);outline:none;}

  /* ── 카테고리 필터 ───────────────────────── */
  .catrow{background:#fff;display:flex;gap:7px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;}
  .catrow::-webkit-scrollbar{display:none;}
  .catrow.sub{padding-top:0;padding-bottom:12px;border-bottom:1px solid var(--line);}
  .cchip{flex-shrink:0;font-size:14px;font-weight:700;color:var(--ink3);padding:8px 15px;border-radius:20px;background:var(--bg);border:none;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .cchip.on{background:var(--ink);color:#fff;font-weight:800;}
  .catrow.sub .cchip.on{background:var(--blue);}
  /* 검색: 카테고리 줄 왼쪽 돋보기 버튼으로 접힘 → 탭 시 검색창 펼침 */
  .catbar{background:#fff;display:flex;align-items:center;gap:8px;padding:10px 14px;}
  .searchtog{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:var(--bg);border:1px solid var(--line);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-family:inherit;}
  .searchtog:active{transform:scale(.95);}
  .cchips{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0;
    -webkit-mask-image:linear-gradient(to right,#000 calc(100% - 22px),transparent);mask-image:linear-gradient(to right,#000 calc(100% - 22px),transparent);}
  .cchips::-webkit-scrollbar{display:none;}
  .searchbar-inline{flex:1;display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--blue);border-radius:12px;padding:10px 13px;animation:fade .2s ease;}
  .searchbar-inline .ic{font-size:16px;flex-shrink:0;}
  .searchbar-inline input{flex:1;min-width:0;border:none;background:none;font-size:15.5px;font-family:inherit;outline:none;color:var(--ink);}
  .searchbar-inline .clr{flex-shrink:0;border:none;background:var(--bg);width:24px;height:24px;border-radius:50%;font-size:12px;color:var(--ink2);cursor:pointer;font-family:inherit;}

  /* ── 매장 목록 카드 ───────────────────────── */
  .storelist{padding:12px 14px;}
  .scard{display:flex;gap:13px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:11px;cursor:pointer;position:relative;width:100%;font-family:inherit;text-align:left;align-items:center;}
  .scard:active{background:var(--bg);}
  .scard.dimmed{background:#F5F5F7;border-color:var(--line2);}
  .scard.dimmed .s-thumb{filter:grayscale(100%) brightness(.9);}
  .scard.dimmed .s-thumb::after{content:attr(data-label);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(28,28,32,.5);color:#fff;font-size:12px;font-weight:800;letter-spacing:.02em;border-radius:inherit;}
  .scard.dimmed .s-thumb.paused::after{background:rgba(154,107,8,.66);}
  .scard.dimmed .s-hero{color:var(--ink3);}
  .scard.dimmed .s-sub,.scard.dimmed .s-meta{color:var(--ink4);}
  .storelist-empty{text-align:center;color:var(--ink3);font-size:15px;font-weight:700;padding:52px 20px;}
  .storelist-empty .se-sub{font-size:13px;color:var(--ink4);font-weight:500;margin-top:8px;}
  .s-thumb{width:82px;height:82px;border-radius:13px;flex-shrink:0;background-size:cover;background-position:center;position:relative;display:flex;align-items:center;justify-content:center;font-size:34px;}
  .s-logo{position:absolute;left:-6px;bottom:-6px;width:32px;height:32px;border-radius:9px;background:#fff;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .s-body{flex:1;min-width:0;}
  .s-name{font-size:17px;font-weight:800;display:flex;align-items:center;gap:7px;}
  .s-badge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;}
  .s-badge.open{color:var(--green);background:#e6fcf5;}
  .s-badge.closed{color:var(--red);background:#fff0f0;}
  .s-rep{font-size:13.5px;color:var(--ink2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  /* 대표 메뉴명을 주(hero)로, 매장명을 부(sub)로 */
  .s-hero{font-family:var(--ui);font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .s-sub{font-size:12.5px;font-weight:600;color:var(--ink3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .s-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .s-tag{font-size:12px;font-weight:700;color:var(--ink2);background:var(--bg);border-radius:7px;padding:4px 9px;display:inline-flex;align-items:center;gap:4px;}
  .s-tag.wait{color:#e8590c;background:#fff4e6;}

  /* ── 매장 커버 & 정보 ───────────────────────── */
  .cover{aspect-ratio:16/9;background-size:cover;background-position:center;position:relative;}
  .cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.28),transparent 50%);}
  .brandinfo{padding:0 18px;margin-top:-30px;position:relative;z-index:3;}
  .logo{width:70px;height:70px;border-radius:18px;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;font-size:34px;border:3px solid #fff;}
  .bstore{font-size:23px;font-weight:800;margin-top:12px;}
  .bstatus{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:700;margin-top:6px;}
  .bstatus .sdot{width:7px;height:7px;border-radius:50%;}
  .bstatus.open{color:var(--green);} .bstatus.open .sdot{background:var(--green);box-shadow:0 0 0 3px rgba(18,184,134,.2);}
  .bloc{font-size:13.5px;color:var(--ink3);margin-top:8px;display:flex;align-items:center;gap:5px;}
  .sbanner{margin:14px 18px 0;border-radius:12px;height:58px;background:linear-gradient(100deg,#6741d9,#9775fa);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;cursor:pointer;}

  /* ── 매장 탭 ───────────────────────── */
  .mtabs{position:sticky;top:56px;z-index:20;background:#fff;display:flex;border-bottom:1px solid var(--line);margin-top:14px;}
  .mtab{flex:1;padding:14px 0;font-size:15px;font-weight:700;color:var(--ink3);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:inherit;}
  .mtab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:800;}
  .cattabs{position:sticky;top:105px;z-index:18;background:#fff;display:flex;gap:7px;padding:11px 14px;overflow-x:auto;border-bottom:1px solid var(--line);scrollbar-width:none;}
  .cattabs::-webkit-scrollbar{display:none;}

  /* ── 메뉴 카드 ───────────────────────── */
  .catsec-h{padding:18px 18px 6px;font-size:16px;font-weight:800;}
  .mcard{display:flex;gap:13px;padding:14px 16px;background:#fff;cursor:pointer;border-bottom:1px solid var(--line2);width:100%;border:none;font-family:inherit;text-align:left;align-items:center;position:relative;}
  .mcard:active{background:var(--bg);}
  .mcard.soldout{opacity:.66;}
  .m-thumb{width:76px;height:76px;border-radius:12px;flex-shrink:0;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;}
  .m-thumb .so-dim{position:absolute;inset:0;background:rgba(255,255,255,.55);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--red);}
  .m-body{flex:1;min-width:0;}
  .m-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
  .m-badge{font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px;}
  .mb-hot{color:#e8590c;background:#fff4e6;} .mb-new{color:#1971c2;background:#e7f5ff;} .mb-rec{color:#2f9e44;background:#ebfbee;}
  .m-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .m-emoji{font-size:15px;}
  .m-desc{font-size:12.5px;color:var(--ink3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .m-price{margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .m-now{font-size:16px;font-weight:800;}
  .m-was{font-size:13px;color:var(--ink4);text-decoration:line-through;}
  .m-dc{font-size:12px;font-weight:800;color:var(--red);}
  .m-hh{font-size:11px;font-weight:800;color:#fff;background:var(--amber);padding:2px 6px;border-radius:5px;}
  .m-left{font-size:12px;font-weight:700;color:#e8590c;margin-top:6px;}
  /* 잔여 개수: 메뉴명 영역이 아니라 카드 오른쪽에 별도 표시 */
  .m-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding-left:6px;}
  .m-left-r{font-size:12px;font-weight:800;color:#e8590c;background:#fff4e6;border-radius:9px;padding:6px 10px;white-space:nowrap;text-align:center;line-height:1.25;}
  .m-left-r b{font-size:14px;}
  .m-reuse{font-size:11.5px;font-weight:700;color:#2f9e44;margin-top:5px;}
  .info-multi{white-space:pre-line;font-size:14.5px;color:var(--ink);line-height:1.8;}
  /* 매장 배너 롤링 (브랜드 → 매장) */
  /* 매장 배너: 이미지 기반 · 3:1 비율(권장 1080×360) · 브랜드↔매장 크로스페이드 롤링 */
  .sbanner-roll{position:relative;margin:14px 18px 0;aspect-ratio:1080/360;border-radius:14px;overflow:hidden;cursor:pointer;background:#e9ecef;box-shadow:var(--shadow);}
  .sb-slide{position:absolute;inset:0;background-size:cover;background-position:center;display:flex;flex-direction:column;justify-content:flex-end;padding:13px 16px;opacity:0;animation:sbfade 8s infinite;}
  .sb-slide:nth-child(2){animation-delay:4s;}
  @keyframes sbfade{0%,45%{opacity:1;}50%,100%{opacity:0;}}
  .sb-tag{align-self:flex-start;margin-bottom:auto;font-size:10.5px;font-weight:800;background:rgba(255,255,255,.92);color:var(--ink);padding:3px 10px;border-radius:20px;}
  .sb-txt{color:#fff;font-size:15px;font-weight:800;line-height:1.35;text-shadow:0 1px 5px rgba(0,0,0,.55);}
  .sb-sub{color:rgba(255,255,255,.92);font-size:12px;font-weight:600;margin-top:3px;text-shadow:0 1px 5px rgba(0,0,0,.55);}
  /* 포장 예약 시간 슬롯 */
  .timeslots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .tslot{position:relative;border:1.5px solid var(--line);border-radius:10px;padding:12px 0;font-size:15px;font-weight:700;background:#fff;cursor:pointer;font-family:inherit;color:var(--ink);}
  .tslot.on{border-color:var(--blue);background:var(--blue-50);color:var(--blue-d);}
  .tslot.dis{color:var(--ink4);background:var(--bg);cursor:not-allowed;}
  .tslot .ts-x{font-size:10px;font-weight:800;color:var(--red);margin-top:2px;}
  /* 조리완료 픽업 유도 */
  .oh-pickup{background:#e6fcf5;border-top:1px solid #c3fae8;color:#0b7285;font-size:13.5px;font-weight:800;padding:11px 16px;line-height:1.5;}

  /* ── 메뉴 상세 ───────────────────────── */
  .d-hero{aspect-ratio:1/1;max-height:300px;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:80px;}
  .d-body{padding:18px;}
  .d-name{font-size:22px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .d-desc{font-size:14px;color:var(--ink2);margin-top:8px;line-height:1.6;}
  .d-price{font-size:22px;font-weight:800;margin-top:12px;}
  .d-info{margin-top:16px;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:13px;color:var(--ink2);line-height:1.7;}
  .d-info b{color:var(--ink);}
  .opt-sec{margin-top:20px;}
  .opt-h{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px;margin-bottom:10px;}
  .opt-req{font-size:11px;font-weight:800;color:var(--red);background:#fff0f0;padding:2px 7px;border-radius:5px;}
  .opt{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:8px;cursor:pointer;font-size:15px;}
  .opt.on{border-color:var(--blue);background:var(--blue-50);font-weight:700;}
  .opt .dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;}
  .opt.on .dot{border-color:var(--blue);background:var(--blue);box-shadow:inset 0 0 0 3px #fff;}
  .qty{display:flex;align-items:center;gap:16px;margin-top:20px;justify-content:center;}
  .qbtn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:22px;cursor:pointer;font-family:inherit;}
  .qnum{font-size:22px;font-weight:800;min-width:30px;text-align:center;}

  /* ── 리스트/행 공통 ───────────────────────── */
  .sect{background:#fff;margin-top:10px;padding:16px 18px;}
  .sect-h{font-size:16px;font-weight:800;margin-bottom:12px;}
  .row{display:flex;justify-content:space-between;gap:10px;font-size:14.5px;padding:8px 0;color:var(--ink2);}
  .row .v{font-weight:700;color:var(--ink);}
  .field{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);outline:none;}
  .field:focus{border-color:var(--blue);}
  textarea.field{resize:none;min-height:70px;}
  /* 휴대폰 3박스 입력 (010 고정 + 4자리 + 4자리) */
  .phone3{display:flex;align-items:center;gap:8px;}
  .phone3 .field{text-align:center;padding:13px 6px;letter-spacing:.08em;}
  .phone3 .pf-fixed{flex:0 0 66px;background:#F2F2F4;color:var(--ink2);font-weight:800;}
  .phone3 .pf-num{flex:1;min-width:0;}
  .phone3 .pf-dash{color:var(--ink4);font-weight:700;}
  .cnt{font-size:12px;color:var(--ink4);text-align:right;margin-top:5px;}

  /* 장바구니 아이템 */
  .citem{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line2);}
  .citem .ci-th{width:56px;height:56px;border-radius:10px;background-size:cover;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
  .citem .ci-b{flex:1;min-width:0;}
  .citem .ci-n{font-size:15px;font-weight:700;}
  .citem .ci-o{font-size:12.5px;color:var(--ink3);margin-top:3px;}
  .citem .ci-bot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .stepper{display:flex;align-items:center;gap:12px;}
  .stepper button{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:16px;cursor:pointer;font-family:inherit;}
  .store-group-h{font-size:14px;font-weight:800;color:var(--blue-d);background:var(--blue-50);padding:8px 12px;border-radius:9px;margin:6px 0 4px;display:flex;align-items:center;gap:6px;}

  /* 세그먼트 토글 */
  .seg{display:flex;background:var(--bg);border-radius:11px;padding:4px;gap:4px;}
  .seg button{flex:1;padding:11px 0;border:none;background:none;font-size:14px;font-weight:700;color:var(--ink3);border-radius:8px;cursor:pointer;font-family:inherit;}
  .seg button.on{background:#fff;color:var(--ink);font-weight:800;box-shadow:0 1px 4px rgba(0,0,0,.08);}

  /* 카카오 알림톡 강조 */
  .kakao-note{margin:12px 0 0;display:flex;gap:11px;align-items:center;background:#FEE500;border-radius:12px;padding:13px 14px;font-size:13.5px;font-weight:700;color:#3c1e1e;line-height:1.45;}
  .kakao-note .kic{width:28px;height:28px;border-radius:8px;background:#3c1e1e;color:#FEE500;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}

  /* 약관 */
  .agree-all{display:flex;align-items:center;gap:10px;padding:14px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;}
  .agree{display:flex;align-items:center;gap:9px;padding:10px 4px;font-size:14px;color:var(--ink2);cursor:pointer;}
  .ag-req{font-size:10.5px;font-weight:800;color:var(--persimmon-d);background:var(--blue-50);border-radius:5px;padding:2px 7px;flex-shrink:0;}
  .ag-req.opt{color:var(--ink3);background:#F1F1F3;}
  .ag-t{flex:1;min-width:0;}
  .ag-view{font-size:12.5px;color:var(--ink3);text-decoration:underline;font-weight:600;flex-shrink:0;cursor:pointer;}
  .terms-body{font-size:13.5px;color:var(--ink2);line-height:1.7;}
  .terms-body b{color:var(--ink);font-weight:800;}
  /* 결제(알림 받을 방법) 바텀시트 */
  #confirmModal{z-index:340;}   /* 결제 시트 위에서 더블체크가 항상 보이도록 */
  .pay-scroll{max-height:86vh;overflow-y:auto;padding:28px 22px 26px;}
  .pay-t{font-size:19px;font-weight:900;}
  .pay-s{font-size:13.5px;color:var(--ink2);line-height:1.55;margin:7px 0 20px;}
  .pay-kko-note{font-size:12px;color:var(--ink4);text-align:center;margin-top:8px;}
  .pay-div{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--ink4);font-size:13px;}
  .pay-div span{flex:1;height:1px;background:var(--line);}
  .pay-hint{font-size:12px;color:var(--ink4);margin-top:14px;line-height:1.6;}
  .pay-mkt{display:flex;align-items:center;gap:9px;padding:11px 2px;cursor:pointer;}
  .pay-mkt-ck{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;}
  .pay-mkt-ck.on{background:var(--blue);border-color:var(--blue);}
  .pay-mkt-t{flex:1;font-size:14px;color:var(--ink2);}
  .pay-mkt-t b{font-size:10.5px;font-weight:800;color:var(--ink3);background:#F1F1F3;border-radius:5px;padding:2px 7px;margin-right:6px;}
  .pay-coupon{background:#FFF8E6;border:1px solid #FFE3A3;border-radius:12px;padding:12px 14px;margin:4px 0 14px;}
  .pcp-h{font-size:13px;font-weight:800;color:#92400e;margin-bottom:9px;}
  .pcp-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;margin-bottom:5px;}
  .pcp-row.on{background:#fff;border-color:#E6A817;}
  .pcp-ck{width:20px;height:20px;border-radius:50%;border:2px solid #D1A050;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:900;}
  .pcp-row.on .pcp-ck{background:#E6A817;border-color:#E6A817;}
  .pcp-n{font-size:13px;font-weight:700;color:#78350f;}
  .pcp-scope{font-size:10.5px;font-weight:800;color:#92400e;background:#fff;border:1px solid #FFE3A3;border-radius:5px;padding:1px 6px;margin-right:6px;}
  .pcp-d{font-size:12px;color:#92400e;margin-top:2px;}
  .pcp-clear{background:none;border:none;font-size:12px;color:#92400e;cursor:pointer;font-family:inherit;padding:4px 0 0;opacity:.7;text-decoration:underline;}
  .pay-coupon-none{font-size:13px;color:var(--ink3);text-align:center;padding:6px 0 14px;}
  .chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;}
  .chk.on{background:var(--blue);border-color:var(--blue);}
  .agree-all .chk.on{background:var(--green);border-color:var(--green);}

  /* 결제수단 */
  .pay-opt{display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:9px;cursor:pointer;font-size:15px;font-weight:700;}
  .pay-opt.on{border-color:var(--blue);background:var(--blue-50);}
  .pay-opt .pic{font-size:22px;}
  .kakaobtn{width:100%;background:#FEE500;color:#3c1e1e;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .ghostbtn{width:100%;background:#fff;color:var(--ink2);border:1.5px solid var(--line);border-radius:12px;padding:15px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:10px;}

  /* 최소주문 경고 */
  .minwarn{margin-top:12px;background:#fff0f0;border:1px solid #ffc9c9;border-radius:10px;padding:12px 14px;font-size:13.5px;font-weight:700;color:#c92a2a;line-height:1.5;}
  .minok{margin-top:12px;font-size:12.5px;font-weight:700;color:var(--green);}

  /* 완료 화면 */
  .done-wrap{text-align:center;padding:44px 26px 130px;}
  .done-ic{width:84px;height:84px;border-radius:50%;background:#e6fcf5;color:var(--green);font-size:44px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:pop .5s ease;}
  .done-t{font-size:23px;font-weight:900;}
  .done-s{font-size:15px;color:var(--ink2);margin-top:8px;line-height:1.6;}
  .callno{margin:26px auto 0;background:linear-gradient(135deg,var(--festA),var(--festB));color:#fff;border-radius:18px;padding:22px;max-width:280px;}
  .callno .cl-lbl{font-size:13px;opacity:.9;font-weight:700;}
  .callno .cl-num{font-size:52px;font-weight:900;letter-spacing:2px;margin-top:4px;}
  .callno .cl-sub{font-size:12px;opacity:.85;font-weight:600;margin-top:6px;}
  .pickinfo{margin:22px auto 0;max-width:300px;font-size:14px;color:var(--ink2);line-height:1.7;background:var(--bg);border-radius:12px;padding:16px;}
  /* 완료 화면 주문 진행 스텝퍼 */
  .ord-steps{display:flex;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 10px;margin:24px auto 0;max-width:320px;box-shadow:var(--shadow);}
  .ost{display:flex;flex-direction:column;align-items:center;gap:7px;flex:0 0 auto;width:54px;}
  .ost-dot{width:26px;height:26px;border-radius:50%;background:var(--line2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
  .ost.done .ost-dot{background:var(--blue);}
  .ost.cur .ost-dot{background:var(--blue);box-shadow:0 0 0 4px var(--blue-50);}
  .ost-lbl{font-size:11px;color:var(--ink4);font-weight:700;white-space:nowrap;}
  .ost.done .ost-lbl,.ost.cur .ost-lbl{color:var(--blue-d);}
  .ost-line{flex:1;height:2px;background:var(--line2);margin-top:12px;border-radius:2px;}
  .ost-line.done{background:var(--blue);}
  /* 통합결제 다매장 픽업 인지 */
  .multi-pick{margin:16px auto 0;max-width:320px;text-align:left;background:#FFF8EC;border:1px solid #F5DFA8;border-radius:14px;padding:16px;}
  .multi-pick .mp-h{font-size:15px;font-weight:900;color:#9A6B08;}
  .multi-pick .mp-b{font-size:13px;color:#7A5A12;line-height:1.6;margin-top:6px;}
  .multi-pick .mp-b b{color:#7A4E00;}
  .multi-pick .mp-list{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
  .multi-pick .mp-row{display:flex;justify-content:space-between;gap:10px;background:#fff;border-radius:9px;padding:9px 11px;font-size:13px;}
  .multi-pick .mp-s{font-weight:800;color:var(--ink);}
  .multi-pick .mp-l{color:var(--ink3);font-weight:600;text-align:right;}
  .multi-note{margin:12px 0 0;background:#FFF8EC;border:1px solid #F5DFA8;border-radius:11px;padding:12px 14px;font-size:12.5px;font-weight:600;color:#7A5A12;line-height:1.55;}
  .multi-note b{color:#7A4E00;font-weight:800;}

  /* 주문내역 (결제건=회차 카드) */
  .oh-tabwrap{padding:12px 14px 2px;}
  .oh-card{background:#fff;border-radius:16px;margin:12px 14px;border:1px solid var(--line);box-shadow:0 2px 10px rgba(20,20,25,.05);overflow:hidden;}
  .oh-card.cancel{opacity:.92;}
  .oh-top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;background:linear-gradient(180deg,#fafafb,#fff);border-bottom:1px solid var(--line2);}
  .oh-top-l{display:flex;flex-direction:column;gap:4px;min-width:0;}
  .oh-ord-row{display:flex;align-items:baseline;gap:9px;}
  .oh-ord{font-size:15px;font-weight:900;color:var(--ink);}
  .oh-store-name{font-size:16px;font-weight:900;color:var(--ink);}
  .oh-time{font-size:12.5px;color:var(--ink3);font-weight:600;}
  .oh-where{font-size:13px;color:var(--ink2);font-weight:600;}
  .oh-contact{font-size:12.5px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .oh-contact.sm{margin:3px 0 9px;}
  .oh-ct-lbl{font-size:11px;font-weight:700;color:var(--ink3);background:#F1F1F3;border-radius:6px;padding:2px 7px;}
  .oh-ct{color:var(--persimmon-d);font-weight:800;background:var(--blue-50);border:1px solid #CFE0F7;border-radius:6px;padding:2px 9px;display:inline-block;letter-spacing:.01em;}
  .oh-detail{background:#fff;border:1.5px solid var(--line2);color:var(--ink2);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;white-space:nowrap;}
  .oh-detail.sm{padding:6px 11px;font-size:12px;}
  .oh-detail:active{transform:scale(.96);}
  .oh-foot-btns{display:flex;align-items:center;gap:8px;}
  .oh-grp-btns{display:flex;align-items:center;gap:7px;}
  .oh-grand.top{margin:12px 14px 4px;}
  .oh-grand.top b{font-weight:900;}
  .oh-grand-note{font-size:12px;color:var(--ink4);margin:0 16px 4px;text-align:right;}
  .st-badge{font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap;}
  .st-badge.sm{font-size:11px;padding:2px 8px;}
  .st-cook{color:#e8590c;background:#fff4e6;} .st-done{color:var(--green);background:#e6fcf5;} .st-pick{color:var(--ink3);background:var(--bg);} .st-rej{color:var(--red);background:#fff0f0;}
  .oh-body{padding:4px 16px;}
  .oh-grp{padding:12px 0;border-bottom:1px dashed var(--line2);}
  .oh-grp:last-child{border-bottom:none;}
  .oh-grp-h{font-size:13.5px;font-weight:800;color:var(--ink);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
  .oh-grp-h.split{justify-content:space-between;}
  .oh-grp-ord{font-size:13px;font-weight:800;color:var(--persimmon-d);}
  .oh-line{display:flex;align-items:baseline;gap:8px;font-size:14px;padding:3px 0;color:var(--ink2);}
  .oh-line .ohl-n{flex:1;min-width:0;}
  .oh-line .ohl-q{color:var(--ink3);font-size:13px;font-weight:700;}
  .oh-line .ohl-p{font-weight:700;color:var(--ink);}
  .oh-cancelnote{font-size:12.5px;color:#c92a2a;font-weight:700;margin-top:8px;line-height:1.55;background:#fff0f0;border-radius:8px;padding:9px 11px;}
  .oh-grp-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:13px;font-weight:800;color:var(--ink);}
  .oh-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;background:var(--bg);border-top:1px solid var(--line2);}
  .oh-foot-sum{font-size:14px;font-weight:700;color:var(--ink2);}
  .oh-foot-sum b{font-size:16px;font-weight:900;color:var(--ink);margin-left:4px;}
  .oh-receipt{background:#fff;border:1.5px solid var(--persimmon);color:var(--persimmon-d);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;white-space:nowrap;}
  .oh-receipt.sm{padding:6px 11px;font-size:12px;}
  .oh-receipt:active{transform:scale(.96);}
  .oh-pickup.sm{margin:0 0 8px;padding:8px 11px;font-size:12.5px;}
  .oh-grand{display:flex;justify-content:space-between;align-items:center;background:#fff;margin:14px 14px 8px;border-radius:14px;border:1px solid var(--line);padding:16px;font-size:17px;font-weight:900;}
  .oh-hint{margin:12px 14px;font-size:12.5px;color:var(--ink3);line-height:1.65;background:#fff9e6;border:1px solid #ffe8a3;border-radius:10px;padding:13px;}
  /* 전자영수증 시트 */
  .sheet-receipt{padding:0;position:relative;max-height:86vh;}
  .rc-scroll{max-height:86vh;overflow-y:auto;padding:30px 22px 26px;}
  .rc-badge{display:inline-block;background:var(--blue-50);color:var(--persimmon-d);font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;}
  .rc-badge.cancel{background:#fff0f0;color:var(--red);}
  .rc-title{font-size:20px;font-weight:900;margin-top:12px;}
  .rc-meta{font-size:12.5px;color:var(--ink3);margin-top:8px;line-height:1.6;}
  .rc-meta b{color:var(--ink);}
  .rc-cancel-at{color:var(--red);font-weight:700;}
  .rc-hr{border-top:1px dashed var(--line);margin:16px 0;}
  .rc-store{font-size:13.5px;font-weight:800;color:var(--ink);margin:12px 0 6px;}
  .rc-line{display:flex;justify-content:space-between;gap:10px;font-size:14px;padding:4px 0;color:var(--ink2);}
  .rc-line.dim{color:var(--ink3);}
  .rc-total{font-size:17px;font-weight:900;color:var(--ink);border-top:1px solid var(--line);margin-top:6px;padding-top:12px;}
  .rc-cancelbox{background:#fff0f0;border:1px solid #f5c6c6;border-radius:10px;padding:11px 13px;font-size:12.5px;color:#c0392b;font-weight:700;line-height:1.55;margin-top:12px;}
  .rc-foot{font-size:11.5px;color:var(--ink4);line-height:1.6;margin-top:4px;}

  /* 상황 전체화면 */
  .fullmsg{min-height:calc(100vh - 62px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 34px;}
  .fm-ic{font-size:64px;margin-bottom:18px;}
  .fm-t{font-size:22px;font-weight:900;line-height:1.35;}
  .fm-b{font-size:15px;color:var(--ink2);margin-top:14px;line-height:1.7;}
  .fm-btn{margin-top:26px;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:15px 30px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;}
  .fm-note{margin-top:16px;font-size:12.5px;color:var(--ink4);}

  /* ── 하단 고정 CTA ───────────────────────── */
  /* 하단 결제/장바구니: 화면 위아래로 스크롤해도 항상 보이는 플로팅(뷰포트 고정) */
  .cta{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:440px;background:#fff;border-top:1px solid var(--line);padding:14px 16px calc(14px + env(safe-area-inset-bottom));z-index:40;}
  /* 주문 내역 플로팅 진입 버튼 (device 컬럼 우측 하단 정렬) */
  .hist-fabwrap{position:fixed;left:50%;transform:translateX(-50%);width:100%;max-width:440px;display:flex;justify-content:flex-end;padding:0 16px;z-index:38;pointer-events:none;}
  .hist-fab{pointer-events:auto;background:#fff;color:var(--persimmon-d);border:1px solid var(--line);box-shadow:0 6px 18px rgba(20,20,25,.16);border-radius:24px;padding:11px 16px;font-size:13.5px;font-weight:800;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .hist-fab:active{transform:scale(.96);}
  .cta-btn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:13px;padding:17px;font-size:16.5px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .cta-btn:disabled{background:var(--line);color:var(--ink4);}
  .cta-btn .amt{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:8px;font-size:14px;}
  .cta-sub{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:9px;}

  /* 성인인증 모달 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;}
  .modal-bg.on{display:flex;}
  .sheet{background:#fff;width:100%;max-width:440px;border-radius:22px 22px 0 0;padding:24px 22px calc(24px + env(safe-area-inset-bottom));animation:up .3s ease;}
  @keyframes up{from{transform:translateY(100%);}to{transform:none;}}
  .sheet-t{font-size:19px;font-weight:800;text-align:center;}
  .sheet-s{font-size:14px;color:var(--ink2);text-align:center;margin-top:8px;line-height:1.6;}

/* ══════════════ 라우팅 ══════════════ */
function setMode(m){
  S.mode=m;
  document.getElementById('mode-group').classList.toggle('on',m==='group');
  document.getElementById('mode-single').classList.toggle('on',m==='single');
  S.payScope = m==='group' ? 'unified' : 'separate';
  restart();
}
function setBill(b){
  S.bill=b;
  document.getElementById('bill-pre').classList.toggle('on',b==='pre');
  document.getElementById('bill-post').classList.toggle('on',b==='post');
  render();
}
function setBrandWait(m){
  S.brandWait=m;
  ['count','time','off'].forEach(k=>document.getElementById('wait-'+k).classList.toggle('on',k===m));
  render();
}
function restart(){
  S.cart=[]; S.adult=false; S.searchOpen=false; S.searchQ=''; S.demoState='open'; S.fCat='전체'; S.fZone='전체';
  S.selCoupons={}; S.couponCode=''; S.mktConsent=false; S.pMid=''; S.pEnd=''; S.pEmail='';
  S.screen = S.mode==='group' ? 'splash' : 'store';
  S.curStore = S.mode==='group' ? 'burger' : 'burger';
  render();
  if(S.screen==='splash'){ clearTimeout(window._sp); window._sp=setTimeout(()=>{ if(S.screen==='splash'){go('home');} },1600); }
}
function go(scr){ closeMenuSheet(); closeAdult(); closeConfirm(); closeReceipt(); closeTerms(); closePaySheet(); if(scr==='home') S._homeOrder=null; /* 홈 진입마다 랜덤 재배치 */ S.screen=scr; render(); document.getElementById('device').scrollTop=0; window.scrollTo(0,0);
  if(scr==='splash'){ clearTimeout(window._sp); window._sp=setTimeout(()=>{ if(S.screen==='splash'){go('home');} },1600); } }
function openStore(id){ S.demoState='open'; S.curStore=id; S.storeTab='menu'; go('store'); }
// 영업종료·브레이크 데모: 전체화면이 아니라 매장 화면에서 메뉴판만 조회(주문 불가)
function simState(st){
  S.demoState=st; S.curStore='burger'; S.storeTab='menu'; go('store');
  if(st==='closed') toast('지금은 주문할 수 없어요.','영업이 끝났지만, 메뉴는 둘러볼 수 있어요.');
  else if(st==='break') toast('지금은 브레이크 타임이에요.','잠시 후 다시 열어요. 메뉴는 둘러볼 수 있어요.');
  else if(st==='paused') toast('지금은 잠시 준비 중이에요.','곧 다시 열어요. 메뉴는 둘러볼 수 있어요.');
}
function openMenu(sid,mid){ const m=store(sid).menus.find(x=>x.id===mid); S.curStore=sid; S.curMenu=m; S.tmpQty=1; S.tmpOpt=0; S.infoOpen=false; showMenuSheet(); }
function showMenuSheet(){ renderMenuSheet(); document.getElementById('menuSheet').classList.add('on'); syncBgLock(); }
function closeMenuSheet(){ document.getElementById('menuSheet').classList.remove('on'); syncBgLock(); }
// 시트/모달이 하나라도 열려 있으면 배경(페이지) 스크롤 잠금 → 상세 화면만 컨트롤
function syncBgLock(){
  const open=['menuSheet','adultModal','confirmModal','receiptModal','termsModal','payModal'].some(id=>document.getElementById(id).classList.contains('on'));
  document.documentElement.style.overflow=open?'hidden':'';
  document.body.style.overflow=open?'hidden':'';
}

function toast(t, body){
  const el=document.getElementById('toast');
  if(body){ el.classList.add('rich'); el.innerHTML=`<div class="toast-t">${t}</div><div class="toast-b">${body}</div>`; }
  else { el.classList.remove('rich'); el.textContent=t; }
  el.classList.add('on'); clearTimeout(window._t);
  window._t=setTimeout(()=>el.classList.remove('on'), body?2800:1600);
}

function render(){
  const scr = {
    splash:scSplash, home:scHome, store:scStore, cart:scCart,

    payfail:()=>full('💳','결제가 정상적으로 진행되지 않았어요','잔액 부족이나 한도 초과 등의 일시적인 오류일 수 있어요.<br>다른 결제 수단으로 다시 시도해 주세요.','결제 화면으로 돌아가기','checkout','장바구니·입력 정보는 그대로 유지돼요 · 선불형 전용 (후불형은 해당 없음)'),
    expired:()=>full('⏱️','접속 시간이 만료되었어요','안전한 결제 환경을 위해 연결이 종료되었습니다.<br>QR 코드를 다시 한 번 스캔해 주세요.','QR 다시 스캔','splash','주문 당일 자정이 지나면 세션·내역이 삭제돼요'),
    loaderr:()=>full('📡','화면을 불러오지 못했어요','네트워크 연결이 불안정하거나 일시적인 시스템 오류일 수 있어요.<br>잠시 후 [새로고침] 버튼을 눌러 다시 시도해 주세요.','새로고침','splash','지속 실패 시 네트워크 상태를 확인해 주세요'),
  }[S.screen] || scHome;
  document.getElementById('device').innerHTML = `<div class="screen on">${scr()}</div>`;
  if(S.screen==='home') startBanner();
}

function scardHTML(s){
  // 대기 표시는 브랜드 설정(우선)을 따름 — 매장 개별 설정을 덮어씀
  const paused = s.open && s.paused;          // 영업 일시중지(준비중)
  let waitTxt='';
  if(s.open && !paused && S.brandWait!=='off'){
    const v = S.brandWait==='time' ? s.waitTime : s.waitCount;
    if(v) waitTxt = `${S.brandWait==='time'?'':'대기 '}${v}`;
  }
  // 영업중은 별도 뱃지 없음(기본) · 영업종료/준비중은 dimming + 썸네일 오버레이로 표시
  const dimmed = !s.open || paused;
  const label = !s.open ? '영업종료' : (paused ? '준비중' : '');
  const tap = !s.open
    ? `toast('지금은 주문할 수 없어요.','영업이 끝났지만, 메뉴는 둘러볼 수 있어요.');openStore('${s.id}')`
    : paused
      ? `toast('지금은 잠시 준비 중이에요.','곧 다시 열어요. 메뉴는 둘러볼 수 있어요.');openStore('${s.id}')`
      : `openStore('${s.id}')`;
  return `<button class="scard ${dimmed?'dimmed':''}" onclick="${tap}">
    <div class="s-thumb${paused?' paused':''}" data-label="${label}" style="background-image:url('${s.thumb}');background-size:cover;background-position:center;background-color:var(--bg)"></div>
    <div class="s-body">
      <div class="s-hero">${s.rep}</div>
      <div class="s-sub">🏪 ${s.name}</div>
      <div class="s-meta"><span class="s-loc">📍 ${s.loc}</span>${waitTxt?`<span class="s-wait">⏳ ${waitTxt}</span>`:''}</div>
    </div>
  </button>`;
}
function pickChip(el){ el.parentNode.querySelectorAll('.cchip').forEach(c=>c.classList.remove('on')); el.classList.add('on'); }
// 홈 매장 목록 — ① 분류·구역 필터 → ② 노출 순서(랜덤/순서대로) → ③ 영업중 우선
function homeStores(){
  let list = STORES.slice();
  const q = (S.searchOpen && S.searchQ) ? S.searchQ.trim().toLowerCase() : '';
  if(q){                                                                    // 검색: 매장명·대표메뉴·메뉴명
    list = list.filter(s=> s.name.toLowerCase().includes(q)
      || (s.rep||'').toLowerCase().includes(q)
      || (s.menus||[]).some(m=>m.name.toLowerCase().includes(q)));
  } else {
    if(S.fCat && S.fCat!=='전체') list = list.filter(s=>s.cat===S.fCat);      // 분류 필터
    if(S.fZone && S.fZone!=='전체') list = list.filter(s=>s.cat2===S.fZone);  // 구역 필터
  }
  if(S.sortMode==='random'){                              // 랜덤(페이지 열 때마다 순서 뒤바뀜)
    if(!S._homeOrder){                                    // 홈 진입 시 1회 셔플 → 필터 조작 중엔 순서 유지
      const ids = STORES.map(s=>s.id);
      for(let i=ids.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [ids[i],ids[j]]=[ids[j],ids[i]]; }
      S._homeOrder = ids;
    }
    const pos = id => S._homeOrder.indexOf(id);
    list = list.slice().sort((a,b)=>pos(a.id)-pos(b.id));
  }
  if(S.openFirst){                                        // 영업중=상단, 영업종료·일시중지=하단 (안정 정렬로 그룹 내 순서 유지)
    const rank = s => (s.open && !s.paused) ? 0 : 1;
    list = list.map((s,i)=>[s,i]).sort((a,b)=>rank(a[0])-rank(b[0])||a[1]-b[1]).map(x=>x[0]);
  }
  return list;
}
// 홈 카테고리 필터 선택 (분류/구역 각각 단일 선택 · 전체=해제)

function mcardHTML(sid,m,closed){
  // 태그는 뉴트럴 통일, 색은 가격/할인(퍼시몬) 하나로만 — 시각적 정리
  const badgeMap={hot:['인기','hot'],new:['신메뉴','new'],rec:['추천','rec']};
  const badges = (m.badges||[]).map(b=>badgeMap[b]).filter(Boolean).map(([t,c])=>`<span class="m-tag ${c}">${t}</span>`).join('');
  let promo='', now=m.price, was='';
  if(m.hh){ promo='해피아워'; now=m.hhPrice; was=m.price; }
  else if(m.was){ was=m.was; }
  const price = `${promo?`<span class="m-promo">${promo}</span>`:''}<span class="m-now ${(promo||was)?'sale':''}">${won(now)}</span>${was?`<span class="m-was">${won(was)}</span>`:''}`;
  const rightVal = m.left!=null ? {t:'남은 수량', n:m.left} : null;
  const lowStock = rightVal && rightVal.n<=5;   // 5개 이하 = 곧 품절 강조
  return `<button class="mcard ${m.soldout?'soldout':''}" onclick="openMenu('${sid}','${m.id}')">
    <div class="m-thumb" style="background-image:url('${m.photo||''}');background-size:cover;background-position:center;background-color:var(--bg)">${m.soldout?'<div class="so-dim">품절</div>':''}</div>
    <div class="m-body">
      ${badges?`<div class="m-badges">${badges}</div>`:''}
      <div class="m-name">${m.name} ${m.emoji?`<span class="m-emoji">${m.emoji}</span>`:''}</div>
      ${m.desc?`<div class="m-desc">${m.desc}</div>`:''}
      <div class="m-price">${price}</div>
      ${m.reuse?`<div class="m-reuse">♻️ 다회용기 제공</div>`:''}
    </div>
    ${(!m.soldout && rightVal)?`<div class="m-right"><span class="m-left-r ${lowStock?'low':''}">${lowStock?`🔥 품절임박<br><b>${rightVal.n}개</b>`:`${rightVal.t}<br><b>${rightVal.n}개</b>`}</span></div>`:''}
  </button>`;
}

        : `<div class="sect-sub">이 행사는 <b>포장 픽업</b> 서비스예요. 매장이 예약을 열어둔 경우 수령 시간을 지정할 수 있어요.</div>
           <div class="seg">
             <button class="${S.pickup!=='reserve'?'on':''}" onclick="S.pickup='now';render()">즉시 포장</button>
             <button class="${S.pickup==='reserve'?'on':''}" onclick="S.pickup='reserve';render()">포장 예약</button>

// 결제하기 → 최소 주문 금액 미달이면 다음 화면으로 넘기지 않고 먼저 안내
function tryCheckout(){
  const mi=minInfo();
  const act = S.bill==='post' ? '주문' : '결제';
  if(mi.on && mi.below){
    if(mi.basis==='group'){
      toast(`조금만 더 담으면 ${act}할 수 있어요`, `매장 그룹 통합 ${act} 기준 최소 ${won(mi.min)}부터 가능해요.`);
    } else {
      toast(`조금만 더 담으면 ${act}할 수 있어요`, `매장에서 정한 최소 주문 금액을 채워야 ${act}할 수 있어요.`);
    }
    return;
  }
  go('checkout');
}
// 담기/결제 방식은 브랜드·매장 설정 (고객 선택 아님) — 데모바에서 시뮬레이션
function setMinOrder(b){ S.minBasis=b; ['group','store','off'].forEach(k=>document.getElementById('min-'+k).classList.toggle('on',k===b)); render(); }
// 최소 주문 금액 판정 — 그룹(통합결제 총액) / 매장별 소계. 개별결제는 그룹 기준이 성립 안 되어 매장별로 적용.
function minInfo(){
  if(S.minBasis==='off') return {on:false};
  const GROUP_MIN=8000, STORE_MIN=5000;
  let basis=S.minBasis;
  if(basis==='group' && S.payScope==='separate') basis='store';
  if(basis==='group'){
    const total=S.cart.reduce((a,c)=>a+c.price*c.qty,0);
    return {on:true,basis:'group',label:'매장 그룹(통합 결제) 기준',min:GROUP_MIN,below:total<GROUP_MIN,shortfall:Math.max(0,GROUP_MIN-total)};
  }
  const bySt={}; S.cart.forEach(c=>{bySt[c.store]=(bySt[c.store]||0)+c.price*c.qty;});
  const shortStores=Object.keys(bySt).filter(sid=>bySt[sid]<STORE_MIN).map(sid=>({name:store(sid).name,need:STORE_MIN-bySt[sid]}));
  return {on:true,basis:'store',label:'매장별 기준',min:STORE_MIN,below:shortStores.length>0,shortStores};
}
// 서비스 유형(매장·브랜드 설정) — 포장 루트 / 자리로 받기(현장 배달) 루트. 브랜드는 자리로 받기 설정된 매장을 그룹화. 고객 선택 아님(자리입력 기본 Off)
function setService(v){
  S.service=v; if(v==='delivery') S.pickup='now';
  ['pickup','delivery'].forEach(k=>document.getElementById('svc-'+k).classList.toggle('on',k===v));
  render();
}
function setScope(v){
  S.payScope=v;
  ['unified','separate'].forEach(k=>document.getElementById('scope-'+k).classList.toggle('on',k===v));
  if(v==='separate'){ // 개별 방식이면 서로 다른 매장 혼합분은 최근 매장만 남김
    const last=S.cart.length?S.cart[S.cart.length-1].store:null;
    if(last) S.cart=S.cart.filter(c=>c.store===last);
  }
  render();
}
function chQty(i,d){ S.cart[i].qty=Math.max(1,S.cart[i].qty+d); render(); }
function delItem(i){ S.cart.splice(i,1); render(); }
/* 업셀링: 매장이 '업셀링'으로 설정한 메뉴만 · 통합=전 매장 랜덤 노출(특정 매장 편중 방지) · 개별=해당 가맹점 메뉴만 */
function computeUpsell(){
  const inCart=new Set(S.cart.map(c=>c.menu));
  const sig=S.payScope+'|'+S.cart.map(c=>c.menu).sort().join(',');
  if(S._upsellSig===sig && S._upsellList) return S._upsellList;
  let pool=[];
  if(S.payScope==='separate' && S.cart.length){
    const sid=S.cart[0].store;
    store(sid).menus.forEach(m=>{ if(m.upsell&&!m.soldout&&!inCart.has(m.id)) pool.push({sid,m}); });
  } else {
    STORES.forEach(s=>{ if(!s.open) return; s.menus.forEach(m=>{ if(m.upsell&&!m.soldout&&!inCart.has(m.id)) pool.push({sid:s.id,m}); }); });
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }  // 랜덤 셔플
  }
  S._upsellSig=sig; S._upsellList=pool.slice(0,3);
  return S._upsellList;
}
function upsellRow(sid,m,showStore){
  const price = m.hh?m.hhPrice:m.price;
  return `<div class="citem" style="border:none;padding:10px 0">
    <div class="ci-th" style="background-image:url('${m.photo||''}');background-size:cover;background-position:center;background-color:var(--bg)">${m.photo?'':(m.img||'')}</div>
    <div class="ci-b"><div class="ci-n">${m.name} ${m.emoji||''}</div><div class="ci-o">${showStore?store(sid).name+' · ':''}${won(price)}</div></div>
    <button class="ghostbtn" style="width:auto;margin:0;padding:0 15px;white-space:nowrap" onclick="openMenu('${sid}','${m.id}')">담기</button>
  </div>`;
}
/* 포장 예약: 시/분 직접 선택 (5분 단위) · 매장 영업시간 밖은 선택 불가 */
const pad2 = n => String(n).padStart(2,'0');
const fmtMin = t => `${pad2(Math.floor(t/60))}:${pad2(t%60)}`;
function validPickup(s,t){ return t>=s.ohStart && t<=s.ohEnd && !(s.brkStart!=null && t>=s.brkStart && t<s.brkEnd); }
function pickHour(h){
  const s=store(S.curStore);
  S.pickupH=h;
  if(S.pickupM!=null && !validPickup(s,h*60+S.pickupM)) S.pickupM=null;   // 새 시간대에서 무효한 분 초기화
  syncPickup(); render();
}
function pickMin(m){
  const s=store(S.curStore);
  if(S.pickupH==null || !validPickup(s,S.pickupH*60+m)) return;
  S.pickupM=m; syncPickup(); render();
}
function syncPickup(){ S.pickupTime = (S.pickupH!=null && S.pickupM!=null) ? `${pad2(S.pickupH)}:${pad2(S.pickupM)}` : null; }
function timePickerHTML(){
  const s=store(S.curStore);
  const startH=Math.floor(s.ohStart/60)-1, endH=Math.floor(s.ohEnd/60)+1;   // 영업시간 밖도 1시간씩 보여줘 '선택 불가' 인지
  const hourOk = h => { for(let m=0;m<60;m+=5){ if(validPickup(s,h*60+m)) return true; } return false; };
  const hours=[]; for(let h=Math.max(0,startH); h<=Math.min(23,endH); h++) hours.push(h);
  const mins=[]; for(let m=0;m<60;m+=5) mins.push(m);
  const hourRow = hours.map(h=>{const dis=!hourOk(h); return `<button class="tp-chip ${S.pickupH===h?'on':''} ${dis?'dis':''}" ${dis?'disabled':''} onclick="pickHour(${h})">${h}시</button>`;}).join('');
  const minRow = mins.map(m=>{const dis=(S.pickupH==null)||!validPickup(s,S.pickupH*60+m); return `<button class="tp-chip ${S.pickupM===m?'on':''} ${dis?'dis':''}" ${dis?'disabled':''} onclick="pickMin(${m})">${pad2(m)}분</button>`;}).join('');
  const brk = s.brkStart!=null ? ` · 브레이크 ${fmtMin(s.brkStart)}~${fmtMin(s.brkEnd)}` : '';
  return `
    <div class="tp-wrap">
      <div class="tp-sub">시간대</div>
      <div class="tp-row">${hourRow}</div>
      <div class="tp-sub">분 (5분 단위)</div>
      <div class="tp-row">${S.pickupH==null?`<div class="tp-empty">먼저 시간대를 선택해 주세요</div>`:minRow}</div>
      ${S.pickupTime?`<div class="tp-note">✅ 수령 시간 <b>${S.pickupTime}</b>로 예약할게요</div>`:`<div class="tp-note dim">받을 시간을 선택해 주세요</div>`}
      <div class="tp-hint">영업 시간 ${fmtMin(s.ohStart)}~${fmtMin(s.ohEnd)}${brk} 외에는 선택할 수 없어요</div>
    </div>`;
}
function timeSlotsHTML(){
  const slots=['12:30','13:00','13:30','14:00','14:30','15:00'];
  const closedSlots=['12:30'];   // 예약 가능 시간 마감 예시
  return `<div style="font-size:13.5px;font-weight:800;margin:14px 0 9px">수령 예약 시간 선택</div>
    <div class="timeslots">${slots.map(t=>{
      const dis=closedSlots.includes(t);

    }).join('')}</div>
    <div style="font-size:12px;color:var(--ink4);margin-top:9px">예약 가능 시간대 중 선택 · 마감된 시간은 선택할 수 없어요</div>`;
}

/* ── 쿠폰 (내점형 기준 동기화 + 야외형 재정립) ──
   scope: 'group'(브랜드/그룹 = 주문 전체 합계) | 매장id(매장 쿠폰 = 해당 매장 소계) — 둘 다 지원(동시 선택 가능)
   발급 기준: 입력한 연락처로 발급된 쿠폰만 노출 (데모: ISSUED가 그 목록) */
const COUPONS = [
  { id:'CP001', name:'개장기념 감사 쿠폰',       scope:'group',  type:'amount', value:1000, minOrder:8000, desc:'전체 주문 8,000원 이상 시 1,000원 할인' },
  { id:'CP002', name:'음료 10% 할인',            scope:'group',  type:'rate',   value:10, maxDisc:3000, minOrder:0, desc:'전체 주문 최대 3,000원 할인' },
  { id:'CP003', name:'소프트버거 트럭 단독 할인', scope:'burger', type:'amount', value:2000, minOrder:5000, desc:'이 매장 5,000원 이상 시 2,000원 할인' },
  { id:'CP004', name:'소프트커피 쿠폰',          scope:'coffee', type:'amount', value:1000, minOrder:0, desc:'이 매장에서 1,000원 할인' },
];
const COUPON_CODES = { 'HELLO2026':'CP001', 'SOFT10':'CP002', 'BURGER2000':'CP003' };
// 데모: 입력한 연락처로 발급된 쿠폰 id (실서비스는 서버에서 그 연락처 기준으로 내려줌)
const ISSUED = ['CP001','CP002','CP003','CP004'];
function cartSum(){ return S.cart.reduce((a,c)=>a+c.price*c.qty,0); }
function storeSum(sid){ return S.cart.filter(c=>c.store===sid).reduce((a,c)=>a+c.price*c.qty,0); }
function couponBase(cp){ return cp.scope==='group' ? cartSum() : storeSum(cp.scope); }
function couponAmt(cp){ const base=couponBase(cp); if(base<=0||base<cp.minOrder) return 0;
  if(cp.type==='amount') return Math.min(cp.value,base);
  if(cp.type==='rate') return Math.min(Math.round(base*cp.value/100), cp.maxDisc||Infinity);
  return 0; }
function selectedCoupons(){ return Object.values(S.selCoupons||{}).filter(Boolean).map(id=>COUPONS.find(c=>c.id===id)).filter(Boolean); }
function couponDiscount(){ return selectedCoupons().reduce((a,cp)=>a+couponAmt(cp),0); }
// 발급받은 쿠폰 중, 이번 주문에 적용 가능한 것(그룹 or 장바구니에 있는 매장)
function availCoupons(){
  const inCart=new Set(S.cart.map(c=>c.store));
  return COUPONS.filter(cp=>ISSUED.includes(cp.id) && (cp.scope==='group' || inCart.has(cp.scope)));
}
function pickCoupon(id){ const cp=COUPONS.find(c=>c.id===id); if(!cp)return; S.selCoupons=S.selCoupons||{}; S.selCoupons[cp.scope]=(S.selCoupons[cp.scope]===id?null:id); refreshPaySheet(); render(); }
function applyCode(){
  const code=(S.couponCode||'').trim().toUpperCase();
  if(!code) return toast('쿠폰 코드를 입력해 주세요');
  const cid=COUPON_CODES[code]; const cp=cid&&COUPONS.find(c=>c.id===cid);
  if(!cp) return toast('유효하지 않거나 만료된 쿠폰 코드예요');
  if(cp.scope!=='group' && !S.cart.some(c=>c.store===cp.scope)) return toast(`${store(cp.scope).name} 상품을 담아야 쓸 수 있는 쿠폰이에요`);
  S.selCoupons=S.selCoupons||{}; S.selCoupons[cp.scope]=cp.id; S.couponCode=''; toast('쿠폰이 적용됐어요 🎉'); render();
}
function toggleMkt(){ S.mktConsent=!S.mktConsent; refreshPaySheet(); }

             <div class="cnt"><span id="reqcnt">0</span>/50</div>`;
      })()}
    </div>
    <!-- 쿠폰 코드 (보유 쿠폰은 결제 단계에서 연락처+수신동의 시 자동 노출) -->
    <div class="sect"><div class="sect-h">쿠폰 코드 <span class="scope-chip">선택</span></div>

      ${(()=>{ const sel=selectedCoupons(); if(!sel.length) return `<div style="font-size:12.5px;color:var(--ink4);margin-top:8px">혜택 알림에 동의하면 결제 단계에서 발급받은 쿠폰이 표시돼요.</div>`;

    </div>`}
    <!-- 약관 (내점형 기준: 이용약관·개인정보·연령 필수 · 항목별 배지 + '보기' 전문 열람) -->
    <div class="sect"><div class="sect-h">약관 동의</div>
      <div class="agree-all" onclick="toggleAll(this)"><span class="chk">✓</span> 전체 동의하기</div>
      <div style="margin-top:8px">
        ${post?'':`<div class="agree" onclick="toggleChk(this)"><span class="chk">✓</span><span class="ag-req">필수</span><span class="ag-t">이용약관 동의</span><a class="ag-view" onclick="event.stopPropagation();openTerms('tos')">보기</a></div>`}
        <div class="agree" onclick="toggleChk(this)"><span class="chk">✓</span><span class="ag-req">필수</span><span class="ag-t">개인정보 수집·이용 동의</span><a class="ag-view" onclick="event.stopPropagation();openTerms('privacy')">보기</a></div>
        <div class="agree" onclick="toggleChk(this)"><span class="chk">✓</span><span class="ag-req">필수</span><span class="ag-t">만 14세 이상임을 확인합니다</span></div>
      </div>
      ${post?`<div style="font-size:12px;color:var(--ink4);margin-top:8px">후불형은 결제 관련 약관 없이 개인정보 동의·연령 확인만 받아요</div>`:''}
    </div>
  </div>
  <div class="cta">
    <button class="cta-btn" ${belowMin?'disabled':''} onclick="openPaySheet()">${belowMin?(mi.basis==='group'?`최소 ${won(mi.min)}부터 ${post?'주문':'결제'} 가능`:'매장별 최소 금액을 채워 주세요') : `${post?'주문하기':'결제하기'} <span class="amt">${won(final)}</span>`}</button>
  </div>`;
}
function toggleChk(el){ el.querySelector('.chk').classList.toggle('on'); }
function toggleAll(el){ const on=!el.querySelector('.chk').classList.contains('on'); el.querySelector('.chk').classList.toggle('on',on); el.parentNode.querySelectorAll('.agree .chk').forEach(c=>c.classList.toggle('on',on)); }

};
function openTerms(key){

  document.getElementById('termsInner').innerHTML=`

    <button class="ms-close" onclick="closeTerms()">✕</button>
    <div class="rc-scroll">

}

/* ── 결제(알림 받을 방법) — 바텀시트: 화면 전환 없이 흐름을 짧게 ── */

  const contactOk = S.alertCh==='email' ? emailValid : ((S.pMid||'').length===4 && (S.pEnd||'').length===4);

  const couponReveal = (contactOk && S.mktConsent) ? (()=>{
    const avail=availCoupons();   // 발급받은 쿠폰 중 이번 주문 적용 가능분(그룹 + 담긴 매장)

    return `<div class="pay-coupon">
      <div class="pcp-h">🎟️ 발급받은 쿠폰 ${avail.length}장 · 그룹/매장 각각 선택할 수 있어요</div>
      ${avail.map(cp=>{ const sel=(S.selCoupons||{})[cp.scope]===cp.id; const sc=cp.scope==='group'?'전체':store(cp.scope).name; const amt=couponAmt(cp);
        return `<div class="pcp-row ${sel?'on':''}" onclick="pickCoupon('${cp.id}')"><span class="pcp-ck">${sel?'✓':''}</span><div class="pcp-b"><div class="pcp-n"><span class="pcp-scope">${sc}</span>${cp.name}</div><div class="pcp-d">${cp.desc}${sel&&amt===0?' · 현재 조건 미충족':''}</div></div></div>`; }).join('')}
      ${anySel?`<button class="pcp-clear" onclick="S.selCoupons={};refreshPaySheet();render()">쿠폰 모두 사용 안 함</button>`:''}
    </div>`;
  })() : '';
  return `
    <div class="ms-grab"><span></span></div>
    <button class="ms-close" onclick="closePaySheet()">✕</button>
    <div class="pay-scroll">
      <div class="pay-t">💬 어디로 알림을 보내드릴까요?</div>
      <div class="pay-s">호출번호와 조리 완료 알림에 사용돼요.${post?'':' 주문을 완료하려면 꼭 필요해요.'}</div>
      <button class="kakaobtn" onclick="S.loginType='kakao';payConfirm()">💬 카카오톡으로 시작하기</button>

      <div class="pay-div"><span></span>또는 비회원으로 진행<span></span></div>
      <div class="seg" style="margin-bottom:14px">
        <button class="${S.alertCh==='phone'?'on':''}" onclick="setAlert('phone')">📱 휴대폰</button>

      ${S.alertCh==='email' ? `
      <input class="field" id="emailIn" type="email" placeholder="example@email.com" value="${S.pEmail||''}" oninput="onPayEmail(this)" style="margin-bottom:12px">

      <div class="phone3" style="margin-bottom:12px">
        <input class="field pf-fixed" value="010" readonly tabindex="-1" aria-label="앞자리 010 고정">
        <span class="pf-dash">–</span>
        <input class="field pf-num" id="phoneMid" inputmode="numeric" maxlength="4" placeholder="0000" value="${S.pMid||''}" oninput="onPayPhone(this,'mid')">
        <span class="pf-dash">–</span>
        <input class="field pf-num" id="phoneEnd" inputmode="numeric" maxlength="4" placeholder="0000" value="${S.pEnd||''}" oninput="onPayPhone(this,'end')">
      </div>
      `}
      <label class="pay-mkt" onclick="toggleMkt()"><span class="pay-mkt-ck ${S.mktConsent?'on':''}">${S.mktConsent?'✓':''}</span><span class="pay-mkt-t"><b>선택</b> 쿠폰·이벤트 알림 수신 동의</span><a class="ag-view" onclick="event.stopPropagation();openTerms('mkt')">보기</a></label>

function onPayPhone(el,which){

function openPaySheet(){ document.getElementById('payInner').innerHTML=paySheetHTML(); document.getElementById('payModal').classList.add('on'); syncBgLock(); }
function closePaySheet(){ const el=document.getElementById('payModal'); if(el){ el.classList.remove('on'); syncBgLock(); } }
function refreshPaySheet(){ const el=document.getElementById('payModal'); if(el&&el.classList.contains('on')) document.getElementById('payInner').innerHTML=paySheetHTML(); }
function setAlert(ch){ S.alertCh=ch; refreshPaySheet(); }

function phoneAuto(el,nextId){ el.value=el.value.replace(/\D/g,''); if(el.value.length>=4){ const n=document.getElementById(nextId); if(n) n.focus(); } }
function submitContact(type){
  if(type==='phone'){
    const mid=(S.pMid||'').replace(/\D/g,''), end=(S.pEnd||'').replace(/\D/g,'');
    if(mid.length!==4 || end.length!==4) return toast('휴대폰 뒤 8자리(4자리 + 4자리)를 정확히 입력해 주세요');
    const v=`010-${mid}-${end}`;
    S.loginType='phone'; S.contact=v; openConfirm('입력하신 정보가 맞나요?', `이 번호로 주문 확인·완료 알림을 보내드려요<br><b style="color:var(--ink);font-size:17px">${v}</b>`, '확인했어요.', '다시 입력할게요.', payConfirm);

  }

/* ── 주문 데이터 (결제건=회차=전자영수증 1건) ── */
const ST_CLS = {'조리중':'st-cook','조리완료':'st-done','픽업완료':'st-pick','주문취소':'st-rej'};
function getPayments(){

      items:[{store:'chicken',name:'후라이드 세트',opt:'',qty:1,price:8500}]},
  ];
}
const sumItems = items => items.reduce((a,c)=>a+c.price*c.qty,0);
const payTotal = p => p.status==='주문취소' ? 0 : sumItems(p.items);
const grpByStore = items => { const g={}; items.forEach(it=>{(g[it.store]=g[it.store]||[]).push(it);}); return g; };
const ohLine = it => `<div class="oh-line"><span class="ohl-n">${it.name}${it.opt?' · '+it.opt:''}</span><span class="ohl-q">×${it.qty}</span><span class="ohl-p">${won(it.price*it.qty)}</span></div>`;
const contactHTML = c => `<span class="oh-ct-lbl">알림 연락처</span><span class="oh-ct">${(c||'').includes('@')?'✉️':'📱'} ${c}</span>`;
const storesLabel = items => { const ns=[...new Set(items.map(it=>store(it.store).name))]; return ns.length<=1?ns[0]:`${ns[0]} 외 ${ns.length-1}곳`; };
function toggleHistDetail(id){ S.histOpen=S.histOpen||{}; S.histOpen[id]=!S.histOpen[id]; render(); }

/* ── 내 주문 내역 (요약 + 상태 · 상세 버튼으로 메뉴 펼침) ── */
function scHistory(){
  const unified = S.payScope==='unified';
  const view = unified ? (S.histView||'round') : 'store';   // 매장별은 통합결제만 · 기본은 회차별

  if(view==='round'){

        ${o?`<div class="oh-body">${itemsBlock(grpByStore(p.items))}${canceled?`<div class="oh-cancelnote">↩️ ${p.cancel}</div>`:''}</div>`:''}
        <div class="oh-foot">
          <div class="oh-foot-sum">${canceled?'취소 금액':'결제금액'} <b>${won(total)}</b></div>
          <div class="oh-foot-btns">
            <button class="oh-detail" onclick="toggleHistDetail('${p.id}')">${o?'접기 ▲':'상세 ▼'}</button>

          </div>
        </div>
      </div>`;
    }).join('');
  } else {
    // 매장별 — 매장 카드 안에서 결제건(회차)을 요약 + 상세 토글
    const byStore={};
    P.forEach(p=>{ const g=grpByStore(p.items); Object.entries(g).forEach(([sid,items])=>{ (byStore[sid]=byStore[sid]||[]).push({...p,items}); }); });
    body = Object.entries(byStore).map(([sid,pays])=>{
      const stTotal = pays.reduce((a,p)=>a+payTotal(p),0);
      return `<div class="oh-card">

        </div>

      </div>`;
    }).join('');

  return `
  <div class="hdr"><button class="bk" onclick="go(S.mode==='group'?'home':'store')">‹</button><div class="ht">주문 내역</div></div>

      ? `<div class="oh-tabwrap"><div class="seg">

    <div class="oh-hint">💡 영수증은 결제 1건 기준이라 <b>‘주문 회차별’</b>에서 확인할 수 있어요. <b>‘매장별’</b>은 매장 기준으로 정렬해 보는 화면이에요.<br>주문 내역은 당일 자정이 지나면 자동으로 사라지니, 필요하면 화면을 캡처해 두세요 📸</div>

  </div>`;
}
/* ── 전자영수증 ── */

  const coupon = canceled?0:1000;               // 데모: 취소건은 쿠폰 미적용 가정
  const total=Math.max(0,sub-coupon);
  document.getElementById('receiptInner').innerHTML = `
    <div class="ms-grab"><span></span></div>

        <div class="rc-store">${store(sid).logo} ${store(sid).name}</div>
        ${items.map(it=>`<div class="rc-line"><span>${it.name}${it.opt?' · '+it.opt:''} ×${it.qty}</span><span>${won(it.price*it.qty)}</span></div>`).join('')}
      `).join('')}
      <div class="rc-hr"></div>
      <div class="rc-line"><span>상품 합계</span><span>${won(sub)}</span></div>
      ${coupon?`<div class="rc-line"><span>쿠폰 할인</span><span>−${won(coupon)}</span></div>`:''}
      <div class="rc-line rc-total"><span>${canceled?'환불 예정 금액':'결제금액'}</span><span>${won(total)}</span></div>

    </div>`;

}

    <div class="fm-t">${t}</div>
    <div class="fm-b">${b}</div>
    <button class="fm-btn" onclick="go('${target}')">${btn}</button>
    ${note?`<div class="fm-note">${note}</div>`:''}
  </div>`;
}
function back(){ go(S.mode==='group'?'home':'store'); }

/* ══════════════ 시작 ══════════════ */
restart();
</script>
</body>
</html>
